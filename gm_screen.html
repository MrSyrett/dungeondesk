.npc-defeated-tag { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

/* Status checklist — shared by tracker and NPC cards */
.status-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.status-row { display: flex; align-items: center; gap: 6px; }
.status-check { width: 15px; height: 15px; accent-color: var(--gold); flex-shrink: 0; cursor: pointer; }
.status-text {
  flex: 1; background: transparent; border: none; border-bottom: 1px dotted var(--border);
  color: var(--light); font-size: 11px; padding: 3px 2px;
}
.status-text:focus { border-bottom-color: var(--mid); }
.status-row:has(.status-check:checked) .status-text { color: var(--muted); text-decoration: line-through; }
.status-del { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 2px 4px; flex-shrink: 0; }
.status-del:hover { color: var(--red-light); }
.status-add { margin-top: 6px; }

/* NPC mode toggle */
.npc-mode-toggle { display: flex; gap: 0; flex-shrink: 0; border: 1px solid var(--border); }
.npc-mode-btn {
  font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 4px 7px; background: var(--panel-2); border: none; color: var(--muted); cursor: pointer;
}
.npc-mode-btn.active.std-active { background: var(--green); color: white; }
.npc-mode-btn.active.dcc-active { background: var(--amber); color: black; }

/* DCC segment setup row */
.npc-seg-setup { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
.npc-seg-setup-label { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.npc-seg-count-input, .npc-seg-hp-input { width: 44px; text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 4px 2px; }

/* DCC segments — click to toggle alive/dead */
.npc-seg-row { display: flex; gap: 4px; flex-wrap: wrap; }
.npc-seg {
  flex: 1; min-width: 36px; height: 32px;
  background: var(--seg-color, #4caf50);
  border: 1px solid rgba(0,0,0,0.3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s, filter 0.15s;
}
.npc-seg:hover { filter: brightness(1.15); }
.npc-seg.dead { background: #2a2a2a !important; border-color: var(--border); }
.npc-seg-num {
  font-family: 'Share Tech Mono', monospace; font-size: 12px; font-weight: 700;
  color: rgba(0,0,0,0.55);
}
.npc-seg.dead .npc-seg-num { color: var(--muted); }

@media (max-width: 900px) {
  .cbt-body { flex-direction: column; overflow-y: auto; }
  .cbt-col { border-right: none; border-bottom: 1px solid var(--border); flex: none; }
}

/* ═══ GENERATORS TOOL ═══ */
.gen-tab-select {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.04em;
  padding: 5px 9px; background: var(--panel); border: 1px solid var(--border);
  color: var(--white); cursor: pointer; outline: none; min-width: 0; max-width: 100%;
  transition: border-color 0.15s;
}
.gen-tab-select:hover { border-color: var(--mid); }
.gen-tab-select option { background: var(--panel); color: var(--white); }
.gen-body { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.gen-panel { display: none; flex: 1; flex-direction: column; min-height: 0; overflow: hidden; }
.gen-panel.active { display: flex; }
.gen-controls {
  display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 16px;
  background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.gen-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  display: flex; flex-direction: column; gap: 4px;
}
.gen-select {
  background: var(--panel-2); border: 1px solid var(--border); color: var(--white);
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  padding: 5px 9px; outline: none; cursor: pointer;
}
.gen-select:focus { border-color: var(--mid); }
.gen-results {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.gen-empty { color: var(--muted); font-size: 12px; font-style: italic; padding: 20px 0; }
.gen-card {
  background: var(--panel); border: 1px solid var(--border);
  padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;
}
.gen-card-header {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px;
}
.gen-card-name {
  font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
  letter-spacing: 0.04em; color: var(--white);
}
.gen-card-tag {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold);
}
.gen-card-row {
  font-size: 12px; color: var(--light); line-height: 1.5;
  display: flex; gap: 6px;
}
.gen-card-row-label {
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  min-width: 64px; flex-shrink: 0; padding-top: 1px;
}
.gen-card-divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
.gen-item-name { font-weight: 700; color: var(--gold); font-size: 13px; margin-bottom: 2px; }
.gen-item-desc { font-size: 12px; color: var(--light); line-height: 1.5; }

/* ═══ AUDIO TOOL ═══ */
.aud-url-input {
  flex: 1; max-width: 260px; background: var(--panel-2); border: 1px solid var(--border);
  color: var(--white); font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px; padding: 4px 8px; outline: none; min-width: 0;
}
.aud-url-input:focus { border-color: var(--mid); }
.aud-url-input::placeholder { color: var(--muted); }
.aud-body { flex: 1; display: flex; flex-direction: column; min-height: 0; background: var(--black); }
.aud-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 32px; text-align: center;
}
.aud-empty-icon { font-size: 40px; opacity: 0.4; }
.aud-empty-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); }
.aud-empty-sub { font-size: 12px; color: var(--muted); }
.aud-empty-hint { font-size: 11px; color: var(--muted); line-height: 1.6; margin-top: 4px; }
.aud-empty-hint strong { color: var(--mid); }
.aud-frame { flex: 1; width: 100%; border: none; min-height: 0; }

/* ═══ NOTES TOOL ═══ */
.nts-saved-indicator { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); opacity: 0; transition: opacity 0.3s; }
.nts-saved-indicator.show { opacity: 1; color: var(--green-light); }
.nts-body { flex: 1; display: flex; min-height: 0; background: var(--black); }
.nts-editor {
  flex: 1;
  outline: none;
  padding: 20px 24px;
  overflow-y: auto;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  line-height: 1.75;
  color: var(--light);
  caret-color: var(--gold);
  min-height: 0;
}
.nts-editor:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; }
/* Block styles rendered in place */
.nts-editor h1 { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--gold); margin: 8px 0 6px; }
.nts-editor h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--light); border-bottom: 1px solid var(--border); padding-bottom: 3px; margin: 12px 0 6px; }
.nts-editor h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--mid); margin: 10px 0 4px; }
.nts-editor p { margin: 0 0 4px; min-height: 1.75em; }
.nts-editor strong { color: var(--white); font-weight: 700; }
.nts-editor em { font-style: italic; }
.nts-editor ul, .nts-editor ol { margin: 0 0 6px; padding-left: 20px; }
.nts-editor li { margin-bottom: 2px; }
.nts-editor blockquote { border-left: 3px solid var(--gold); margin: 6px 0; padding: 2px 12px; color: var(--mid); font-style: italic; }
.nts-editor hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.nts-editor code { font-family: 'Share Tech Mono', monospace; font-size: 12px; background: var(--panel-2); padding: 1px 4px; border-radius: 2px; }
.nts-raw {
  flex: 1; display: none;
  background: var(--panel-2); border: none; outline: none;
  color: var(--light); font-family: 'Share Tech Mono', monospace;
  font-size: 12px; line-height: 1.6; padding: 20px 24px;
  resize: none; min-height: 0;
}
.nts-md-toggle.active { background: var(--red); border-color: var(--red); color: white; }



/* ═══ MOBILE ═══ */
@media (max-width: 760px) {
  .topbar { flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 8px; }
  .brand { font-size: 15px; width: 100%; }
  .pane-picker { flex: 1; min-width: 0; }
  .pane-picker-label { display: none; }
  .pane-select { width: 100%; }
  .view-controls { margin-left: auto; }

  .main-area { flex-direction: column; }
  .pane { border-right: none; border-bottom: 2px solid var(--border); }

  /* Pane header wraps on mobile so toolbar buttons stay visible */
  .pane-header { flex-wrap: wrap; gap: 4px; padding: 4px 8px; }
  .pane-select { flex: 0 1 auto; min-width: 0; font-size: 10px; padding: 3px 4px; max-width: 140px; }
  .pane-toolbar-slot { flex-wrap: wrap; gap: 4px; }
  /* Make sure cbt round display and next round button don't get hidden */
  .cbt-round-display { font-size: 11px; }

  /* PDF viewer on mobile: switch to overflow:auto on the pane so the
     entire pane scrolls, and give the PDF object a tall fixed pixel height
     so all pages are accessible by scrolling the pane. */
  .pane { flex: 1; min-height: 0; }
  .pane-content { flex: 1; overflow-y: auto; min-height: 0; }
  .tool-instance { min-height: 0; }
  .doc-body { flex: none; }
  .doc-frame-wrap.pdf-mode {
    padding: 0;
    overflow: visible;
    height: 160vw; /* taller than screen — user scrolls the pane */
  }
  .doc-frame.pdf-frame {
    width: 100% !important;
    height: 100% !important;
    min-height: unset;
  }
  .pdf-mobile-open { display: none !important; }
  .pdf-close-btn { display: none !important; }

  /* Single-pane lock: the layout picker is meaningless on mobile */
  .view-controls { display: none !important; }

  .toolrow { padding: 10px 12px; gap: 10px; }

  /* ── Larger type + touch targets (min 44px tap area) ── */
  .btn { font-size: 14px; padding: 11px 14px; min-height: 44px; }
  .btn.small { font-size: 13px; padding: 9px 12px; min-height: 40px; }
  .brand { font-size: 20px; }
  .bar-title { font-size: 14px; }
  .pane-select { font-size: 14px !important; padding: 9px 8px !important; min-height: 42px; max-width: none !important; flex: 1 1 auto !important; }
  .pane-header { padding: 6px 10px; gap: 6px; }
  .split-select, .gen-tab-select { font-size: 14px; min-height: 42px; padding: 8px 10px; }
  .session-controls .btn { min-height: 44px; }

  /* Notes / text entry */
  .nts-editor { font-size: 16px; padding: 14px 16px; }   /* 16px stops iOS zoom-on-focus */
  input[type="text"], input[type="number"], select, textarea { font-size: 16px; }

  /* Combat + tracker controls */
  .cbt-round-display { font-size: 15px; }
  .npc-hp-btn, .tracker-adjust-btn { width: 44px; height: 44px; font-size: 18px; }
  .dice-camp-btn, .dice-hide-btn { font-size: 14px; padding: 10px 12px; min-height: 42px; }
  .dice-pool-clear, .dice-roll-go { font-size: 14px; padding: 11px 14px; min-height: 44px; }
  .dice-mod { font-size: 15px; padding: 9px 6px; min-height: 42px; }
  .dice-advbtn { font-size: 13px; padding: 10px 10px; min-height: 42px; }

  .cbt-body { flex-direction: column; }
  .npc-hp-btn, .tracker-adjust-btn { width: 32px; height: 32px; }
  /* DCC segments: shrink so 10 fit on one line before wrapping */
  .npc-seg { min-width: 0; height: 26px; flex: 1 1 0; }
  .npc-seg-num { font-size: 10px; }
  .npc-seg-row { gap: 2px; }
  .npc-hp-input { min-height: 32px; font-size: 14px; }
  .tracker-name-input, .npc-name-input { font-size: 14px; }

  .nts-editor { font-size: 16px; padding: 14px 16px; }
}

/* ── NOTES TABS (hanging overlay) ── */
.nts-body { position: relative; }
.nts-tabs { position: absolute; top: 0; left: 8px; right: 8px; z-index: 5; display: flex; align-items: flex-start; gap: 3px; overflow-x: auto; scrollbar-width: none; pointer-events: none; }
.nts-tabs::-webkit-scrollbar { display: none; }
.nts-tab { pointer-events: auto; display: flex; align-items: center; gap: 5px; padding: 4px 10px 5px; background: #232323; color: #999; border: 1px solid var(--border); border-top: none; border-radius: 0 0 5px 5px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; white-space: nowrap; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.4); }
.nts-tab.active { background: var(--panel); color: var(--gold); border-color: var(--gold); }
.nts-tab-x { color: #666; font-size: 10px; padding: 0 1px; line-height: 1; }
.nts-tab-x:hover { color: #d06060; }
.nts-tab-add { pointer-events: auto; padding: 4px 9px 5px; background: rgba(35,35,35,0.85); color: #888; border: 1px dashed var(--border); border-top: none; border-radius: 0 0 5px 5px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900; flex-shrink: 0; }
.nts-tab-add:hover { color: var(--gold); border-color: var(--gold); }

/* ── DICE TRAY & ROLL LOG ── */
.dice-tool { overflow: hidden; }
.dice-tray { flex-shrink: 0; padding: 8px 10px 4px; border-top: 2px solid var(--border); background: rgba(0,0,0,0.25); }
.dice-btn-row { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
.dice-die { position: relative; padding: 12px 0; min-width: 0; background: var(--panel); color: var(--light); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: .04em; transition: border-color .1s, transform .05s; overflow: visible; }
.dice-die:hover { border-color: var(--gold); }
.dice-die:active { transform: scale(0.94); }
.dice-die.has { border-color: var(--gold); color: var(--gold); }
.dice-count { position: absolute; top: -6px; right: -5px; background: var(--gold); color: #1a1a1a; border-radius: 8px; min-width: 16px; height: 16px; line-height: 16px; font-size: 10px; font-weight: 900; font-family: 'Montserrat', sans-serif; }
.dice-pool { flex-shrink: 0; padding: 4px 10px 8px; background: rgba(0,0,0,0.25); }
.dice-pool-label-row { padding: 0 0 6px; }
.dice-pool-label { display: block; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dice-pool-row { display: flex; align-items: center; gap: 5px; }
.dice-pool-row .dice-mod { flex: 0 1 auto; }
.dice-roll-go { flex: 1; }
.dice-mod { width: 44px; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; color: var(--light); font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; padding: 5px 4px; text-align: center; outline: none; }
.dice-advbtn { padding: 6px 8px; background: var(--panel); color: #888; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 900; letter-spacing: .06em; }
.dice-advbtn.on-adv { background: #1a3a1a; border-color: #2d7a2d; color: #6dbf6d; }
.dice-advbtn.on-dis { background: #3a1a1a; border-color: #7a2d2d; color: #df6a6a; }
.dice-roll-go { padding: 6px 12px; background: var(--gold); color: #1a1a1a; border: none; border-radius: 4px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 900; letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; }
.dice-roll-go:hover { filter: brightness(1.1); }
.dice-pool-clear { padding: 6px 9px; background: transparent; color: #999; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; white-space: nowrap; }
.dice-pool-clear:hover { color: #df6a6a; border-color: #7a2d2d; }
.dice-log { flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column-reverse; justify-content: flex-start; gap: 6px; }
.dice-log-hint { font-family: 'Montserrat', sans-serif; font-size: 10px; color: #666; font-style: italic; padding: 8px 2px; }
.dice-log-entry { background: #1e1e1e; border: 1px solid #333; padding: 7px 9px; }
.dice-log-entry .roll-label { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #777; margin-bottom: 2px; }
.dice-log-entry .roll-result { font-family: 'Montserrat', monospace; font-size: 22px; font-weight: 900; color: #f0f0f0; line-height: 1; }
.dice-log-entry .roll-detail { font-size: 9px; color: #555; margin-top: 2px; font-family: 'Montserrat', sans-serif; }
.dice-log-entry.crit { border-color: #ffd700; }
.dice-log-entry.crit .roll-result { color: #ffd700; }
.dice-log-entry.fumble { border-color: #ff4444; }
.dice-log-entry.fumble .roll-result { color: #ff4444; }
@media (max-width: 760px) {
  .dice-btn-row { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; }
  .dice-die { padding: 14px 0; font-size: 16px; min-height: 48px; }
  .dice-log-entry { font-size: 14px; }
}

.dice-camp-btn { padding: 6px 9px; background: transparent; color: #777; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; line-height: 1; white-space: nowrap; }
.dice-camp-btn.on { background: rgba(200,160,32,0.12); color: var(--gold); border-color: var(--gold); }
.dice-hide-btn { padding: 6px 9px; background: rgba(45,122,45,0.12); color: #6dbf6d; border: 1px solid #2d7a2d; border-radius: 4px; cursor: pointer; font-size: 12px; line-height: 1; white-space: nowrap; }
.dice-hide-btn.on { background: rgba(122,45,45,0.15); color: #df8a8a; border-color: #7a2d2d; }
.dice-camp-panel { padding: 6px 0 2px; }
.dice-camp-row { display: flex; gap: 6px; align-items: center; margin-bottom: 5px; }
.dice-log-entry.remote { border-left: 3px solid #8a7ac8; background: #201d2a; }
</style>

<body>

<!-- ═══ TOP BAR ═══ -->
<div class="topbar">
  <div class="brand" style="min-width:140px;"></div>

  <div class="topbar-spacer"></div>

  <div class="session-controls">
    <button class="btn small ghost" id="save-btn" onclick="saveSession()" title="Save session to file">💾 Save</button>
    <label class="btn small ghost" title="Load a saved session" style="cursor:pointer;">
      📂 Load
      <input type="file" id="load-input" accept=".json" style="display:none;" onchange="loadSession(this)">
    </label>
  </div>

  <div class="view-controls">
    <span class="split-label">View</span>
    <select class="split-select" id="split-select" onchange="setSplit(parseInt(this.value))" title="Pane layout">
      <option value="1">▮ Single</option>
      <option value="2">▮▮ Split</option>
      <option value="3">▮⊟ Focus</option>
      <option value="4">▮▮▮▮ Four</option>
    </select>
  </div>
</div>

<!-- ═══ MAIN AREA ═══ -->
<div class="main-area" id="main-area">
  <div class="pane" id="pane-1">
    <div class="pane-header" id="pane-1-header">
      <select class="pane-select" id="pane-1-select" onchange="setPaneTool(1, this.value)">
        <option value="adventure">📜 Adventure</option>
        <option value="maps">🗺 Maps</option>
        <option value="trackers">⏱ Trackers</option>
        <option value="notes">✎ Notes</option>
        <option value="audio">🌐 Browser</option>
        <option value="gen">🎲 Generators</option>
        <option value="dice">🎲 Dice Tray</option>
      </select>
      <div class="pane-toolbar-slot" id="pane-1-toolbar"></div>
    </div>
    <div class="pane-content" id="pane-1-content"></div>
  </div>

  <div class="focus-stack" id="focus-stack">
  <div class="pane" id="pane-2" style="display:none;">
    <div class="pane-header" id="pane-2-header">
      <select class="pane-select pane-2-select" id="pane-2-select" onchange="setPaneTool(2, this.value)">
        <option value="adventure">📜 Adventure</option>
        <option value="maps">🗺 Maps</option>
        <option value="trackers" selected>⏱ Trackers</option>
        <option value="notes">✎ Notes</option>

            <select class="gen-select" id="gen-adv-nnpc"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
          </label>
          <label class="gen-label">Treasures
            <select class="gen-select" id="gen-adv-ntres"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option></select>
          </label>
        </div>
        <div class="gen-results" id="gen-adv-results">
          <div class="gen-empty">Set options and press 🎲 Generate</div>
        </div>
        <div id="gen-adv-bar" style="display:none;padding:8px 14px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;align-items:center;">
          <button id="gen-adv-load-btn" class="btn small primary" style="white-space:nowrap">📖 Load to Adventure</button>
          <button id="gen-adv-maps-btn" class="btn small ghost" style="white-space:nowrap;display:none;">🗺 Load Map to Maps</button>
        </div>
      </div>

    </div>
  </div>
</template>


<script>
// ══════════════════════════════════════════
// PANE / TOOL INSTANCE MANAGEMENT
// Tool instances are created ONCE and kept alive in a hidden pool.
// Switching panes/views MOVES the existing DOM node — never recreates it.
// This is what makes loaded files / typed content persist.
// ══════════════════════════════════════════

const TOOL_TYPES = ['adventure', 'maps', 'trackers', 'notes', 'audio', 'gen'];
const instancePool = document.createElement('div');
instancePool.style.cssText = 'position:fixed; top:0; left:-9999px; width:1px; height:1px; overflow:hidden;';
document.body.appendChild(instancePool);

const instances = {}; // toolType -> DOM node (singleton per tool type)
let splitMode = 1;
// On mobile the GM screen is locked to a single pane. splitPref remembers the
// layout the user actually chose so it comes back when they return to desktop.
let splitPref = 1;
const GM_MOBILE_MQ = window.matchMedia('(max-width: 760px)');
function isMobileView() { return GM_MOBILE_MQ.matches; }
let paneTools = { 1: 'adventure', 2: 'trackers', 3: 'notes', 4: 'dice' };
// Combat and Trackers were merged into one tool; old saves may still say 'combat'.
function normalizeTool(t) { return t === 'combat' ? 'trackers' : t; }

function getOrCreateInstance(toolType) {
  toolType = normalizeTool(toolType);
  if(instances[toolType]) return instances[toolType];
  const tpl = document.getElementById('tpl-' + toolType);
  const node = tpl.content.firstElementChild.cloneNode(true);
  instancePool.appendChild(node);
  instances[toolType] = node;
  const initFn = window['init_' + toolType];
  if(initFn) {
    initFn(node);
  } else {
    console.error('No init function found for tool: ' + toolType + ' (expected window.init_' + toolType + ')');
  }
  return node;
}

function setSplit(n) {
  splitPref = n;
  if(isMobileView()) n = 1;   // mobile: always one pane
  splitMode = n;
  const sel = document.getElementById('split-select');
  if(sel) sel.value = String(n);
  const area = document.getElementById('main-area');
  if(area) {
    area.classList.toggle('quad', n === 4);
    area.classList.toggle('focus', n === 3);
  }
  // Panes 2-4 show only when the split calls for them
  [2, 3, 4].forEach(p => {
    const el = document.getElementById('pane-' + p);
    if(el) el.style.display = (p <= n) ? 'flex' : 'none';
  });
  // Panes squeezed below the mobile breakpoint need the narrow layout (stacked
  // trackers, wrapped toolbars): all four columns in Four mode, and the two
  // stacked panes in Focus mode (pane 1 stays wide there).
  [1, 2, 3, 4].forEach(p => {
    const el = document.getElementById('pane-' + p);
    if(!el) return;
    const narrow = (n === 4) || (n === 3 && (p === 2 || p === 3));
    el.classList.toggle('narrow', narrow);
  });
  // Multi-pane modes: no two panes may hold the same tool (one instance per tool)
  if(n >= 3) dedupePaneTools(n);
  for(let p = 1; p <= n; p++) renderPane(p);
}

// Rotating the phone / resizing across the breakpoint re-applies the layout:
// collapse to one pane on mobile, restore the chosen split on desktop.
GM_MOBILE_MQ.addEventListener('change', () => setSplit(splitPref));

// Each tool has a single DOM instance, so it can only live in one pane.
// If a duplicate is found, swap that pane to the first unused tool.
function dedupePaneTools(count) {
  const all = ['adventure','maps','trackers','notes','audio','gen','dice'];
  const used = new Set();
  for(let p = 1; p <= (count || 4); p++) {
    let tool = paneTools[p];
    if(!tool || used.has(tool)) {
      tool = all.find(t => !used.has(t)) || tool;
      paneTools[p] = tool;
      const sel = document.getElementById('pane-' + p + '-select');
      if(sel) sel.value = tool;
    }
    used.add(tool);
  }
}

function setPaneTool(paneNum, tool) {
  tool = normalizeTool(tool);
  // A tool has one instance, so if a visible pane already shows it, swap the two.
  const prev = paneTools[paneNum];
  for(let p = 1; p <= splitMode; p++) {
    if(p !== paneNum && paneTools[p] === tool) {
      paneTools[p] = prev;
      const sel = document.getElementById('pane-' + p + '-select');
      if(sel) sel.value = prev;
      paneTools[paneNum] = tool;
      document.getElementById('pane-' + paneNum + '-select').value = tool;
      renderPane(p);
      renderPane(paneNum);
      return;
    }
  }
  paneTools[paneNum] = tool;
  document.getElementById('pane-' + paneNum + '-select').value = tool;
  renderPane(paneNum);
}


// Load generated content into a tool WITHOUT pulling the current pane off the
// Generators. If a visible pane already shows the target tool, use it. Else, in
// a multi-pane view, take another visible pane. Only in single view do we swap
// the generator pane itself.

// Combat and Trackers are now ONE tool with a single ordered list. Older saves
// may hold {round, trackers} under 'trackers' and/or {npcs} under 'combat' —
// fold both into the unified 'trackers' state.
function migrateToolState(tools) {
  if(!tools) return tools;
  const t = tools.trackers, c = tools.combat;
  if(!c && !(t && (t.trackers || t.npcs))) return tools;

  const merged = { round: (t && t.round) || (c && c.round) || 1, items: [] };
  if(t && Array.isArray(t.items)) merged.items = t.items.slice();
  else {
    (((t && t.trackers) || (c && c.trackers) || [])).forEach(x => merged.items.push({ ...x, type: 'tracker' }));
    (((c && c.npcs) || (t && t.npcs) || [])).forEach(x => merged.items.push({ ...x, type: 'npc' }));
  }
  // Re-key ids so a tracker and an NPC that shared id 1 don't collide
  let id = 1;
  merged.items.forEach(x => { x.id = id++; });
  tools.trackers = merged;
  delete tools.combat;
  return tools;
}

function loadIntoTool(tool, dataUrl, fileName) {
  const genPane = parseInt(Object.keys(paneTools).find(k => paneTools[k] === 'gen') || 1);
  let target = null;

  for(let p = 1; p <= splitMode; p++) {
    if(paneTools[p] === tool) { target = p; break; }
  }
  if(target === null && splitMode > 1) {
    for(let p = 1; p <= splitMode; p++) {
      if(p !== genPane) { target = p; break; }
    }
  }
  if(target === null) target = genPane; // single view — nowhere else to put it

  if(paneTools[target] !== tool) setPaneTool(target, tool);

  setTimeout(() => {
    const inst = instances[tool];
    if(inst && inst._loadDataUrl) inst._loadDataUrl(dataUrl, fileName);
  }, 150);
}

function renderPane(paneNum) {
  const content = document.getElementById('pane-' + paneNum + '-content');
  const toolbarSlot = document.getElementById('pane-' + paneNum + '-toolbar');
  const tool = paneTools[paneNum];
  const node = getOrCreateInstance(tool);

  if(node.parentElement !== content) {
    content.appendChild(node);
  }

  Array.from(content.children).forEach(child => {
    child.classList.toggle('active', child === node);
  });
  node.classList.add('active');

  // Clone the tool's toolbar template into the pane header toolbar slot
  if(toolbarSlot) {
    toolbarSlot.innerHTML = '';
    const tpl = node.querySelector('.toolbar-tpl');
    if(tpl) {
      // Clone the children of the hidden div into the toolbar slot
      Array.from(tpl.children).forEach(child => {
        toolbarSlot.appendChild(child.cloneNode(true));
      });
      syncToolbar(toolbarSlot, node);
    }
  }
}

// Wire cloned toolbar elements to the live tool instance elements.
// Each cloned element gets its events proxied to the matching live element.
function syncToolbar(slot, toolNode) {
  // Map by class selector — each cloned element routes to its live twin
  const pairs = [
    // doc tools
    ['.doc-file-input', null],            // handled via label click below
    ['.doc-zoom-out',  '.doc-zoom-out'],
    ['.doc-zoom-in',   '.doc-zoom-in'],
    ['.doc-clear',     '.doc-clear'],
    // trackers + combat — handled by document-level delegation in init_trackers
    ['.cbt-next-round', null],
    ['.cbt-reset',      null],
    // notes
    ['.nts-export',    '.nts-export'],
    ['.nts-clear',     '.nts-clear'],
    ['.nts-md-toggle', '.nts-md-toggle'],
    // dice
    ['.dice-clear',    '.dice-clear'],
    // generators
    ['.gen-roll',      '.gen-roll'],
    ['.aud-clear',     '.aud-clear'],
    ['.aud-tta',       '.aud-tta'],
    ['.aud-npc',       '.aud-npc'],
    ['.aud-wata',      '.aud-wata'],
    ['.aud-ds',        '.aud-ds'],
  ];

  pairs.forEach(([cloneSelector, liveSelector]) => {
    if(!liveSelector) return;
    slot.querySelectorAll(cloneSelector).forEach(cloneEl => {
      const liveEl = toolNode.querySelector(liveSelector);
      if(!liveEl) return;
      if(cloneEl.tagName === 'BUTTON') {
        cloneEl.addEventListener('click', () => {
          liveEl.click();
          // Mirror active state back to clone (e.g. MD toggle)
          if(liveEl.classList.contains('active')) cloneEl.classList.add('active');
          else cloneEl.classList.remove('active');
        });
      }
    });
  });

  // File input: label wraps input in clone — clicking the label opens the live file input
  const cloneLabel = slot.querySelector('label.btn');
  if(cloneLabel) {
    const liveInput = toolNode.querySelector('.doc-file-input');
    if(liveInput) {
      cloneLabel.addEventListener('click', e => {
        e.preventDefault();
        liveInput.click();
      });
      // Update filename display in clone when a file is picked
      liveInput.addEventListener('change', () => {
        const cloneFilename = slot.querySelector('.doc-filename');
        const liveFilename = toolNode.querySelector('.doc-filename');
        if(cloneFilename && liveFilename) {
          // Mirror after a tick so liveFilename has been updated
          setTimeout(() => {
            cloneFilename.textContent = liveFilename.textContent;
            const cloneControls = slot.querySelector('.doc-controls');
            const liveControls = toolNode.querySelector('.doc-controls');
            if(cloneControls && liveControls) {
              cloneControls.style.display = liveControls.style.display;
            }
            const cloneZoom = slot.querySelector('.doc-zoom-label');
            const liveZoom = toolNode.querySelector('.doc-zoom-label');
            if(cloneZoom && liveZoom) cloneZoom.textContent = liveZoom.textContent;
          }, 200);
        }
      });
      // Also mirror zoom label changes on zoom btn clicks
      ['doc-zoom-in','doc-zoom-out'].forEach(cls => {
        const liveBtn = toolNode.querySelector('.' + cls);
        if(liveBtn) liveBtn.addEventListener('click', () => {
          setTimeout(() => {
            const cloneZoom = slot.querySelector('.doc-zoom-label');
            const liveZoom = toolNode.querySelector('.doc-zoom-label');
            if(cloneZoom && liveZoom) cloneZoom.textContent = liveZoom.textContent;
          }, 50);
        });
      });
    }
  }

  // Notes import: cloned label click triggers live file input
  // Generator tabs: wire each clone tab to its live counterpart by data-tab
  slot.querySelectorAll('.gen-tab-select').forEach(cloneSel => {
    const liveSel = toolNode.querySelector('.gen-tab-select');
    if(!liveSel) return;
    cloneSel.value = liveSel.value;
    cloneSel.addEventListener('change', () => {
      liveSel.value = cloneSel.value;
      liveSel.dispatchEvent(new Event('change'));
    });
  });

  const cloneImportLabel = slot.querySelector('label:has(.nts-import-input)');
  const liveImportInput = toolNode.querySelector('.nts-import-input');
  if(cloneImportLabel && liveImportInput) {
    cloneImportLabel.addEventListener('click', e => {
      e.preventDefault();
      liveImportInput.click();
    });
  }

  // Audio URL input: sync typing clone→live, Enter triggers load
  const cloneAudInput = slot.querySelector('.aud-url-input');
  const liveAudInput = toolNode.querySelector('.aud-url-input');
  if(cloneAudInput && liveAudInput) {
    cloneAudInput.addEventListener('input', () => { liveAudInput.value = cloneAudInput.value; });
    cloneAudInput.addEventListener('keydown', e => {
      if(e.key === 'Enter') toolNode.querySelector('.aud-load')?.click();
    });
  }

  // Notes saved indicator: mirror via MutationObserver
  const cloneSaved = slot.querySelector('.nts-saved-indicator');
  const liveSaved = toolNode.querySelector('.nts-saved-indicator');
  if(cloneSaved && liveSaved) {
    const obs = new MutationObserver(() => {
      cloneSaved.textContent = liveSaved.textContent;
      cloneSaved.className = liveSaved.className;
    });
    obs.observe(liveSaved, { attributes: true, childList: true, characterData: true, subtree: true });
  }
}
</script>

<script>
// ══════════════════════════════════════════
// DOCUMENT VIEWER (Adventure + Maps share this)
// ══════════════════════════════════════════
function initDocTool(root) {
  const fileInput = root.querySelector('.doc-file-input');
  const filenameEl = root.querySelector('.doc-filename');
  const emptyEl = root.querySelector('.doc-empty');
  const frameWrap = root.querySelector('.doc-frame-wrap');
  const controls = root.querySelector('.doc-controls');
  const zoomLabel = root.querySelector('.doc-zoom-label');
  const zoomInBtn = root.querySelector('.doc-zoom-in');
  const zoomOutBtn = root.querySelector('.doc-zoom-out');
  const clearBtn = root.querySelector('.doc-clear');
  const isMaps = root.dataset.tool === 'maps';

  let zoom = 1;
  let mediaEl = null;
  let mediaType = null;
  let naturalW = 0, naturalH = 0;
  let savedFileName = '';
  let savedDataUrl = ''; // base64 data URL stored for _getState

  function applyZoom() {
    zoomLabel.textContent = Math.round(zoom * 100) + '%';
    if(!mediaEl) return;
    if(mediaType === 'image' && naturalW) {
      mediaEl.style.width = (naturalW * zoom) + 'px';
      mediaEl.style.height = (naturalH * zoom) + 'px';
    }
  }

  zoomInBtn.addEventListener('click', () => {
    if(mediaType !== 'image') return;
    zoom = Math.min(4, zoom + 0.1);
    applyZoom();
  });
  zoomOutBtn.addEventListener('click', () => {
    if(mediaType !== 'image') return;
    zoom = Math.max(0.05, zoom - 0.1);
    applyZoom();
  });

  function clearDoc() {
    frameWrap.innerHTML = '';
    frameWrap.style.display = 'none';
    frameWrap.classList.remove('pdf-mode');
    emptyEl.style.display = 'flex';
    controls.style.display = 'none';
    filenameEl.textContent = isMaps ? 'No map loaded' : 'No document loaded';
    fileInput.value = '';
    mediaEl = null; mediaType = null; naturalW = 0; naturalH = 0;
    savedFileName = ''; savedDataUrl = '';
  }

  clearBtn.addEventListener('click', clearDoc);

  // Core loader — works from either a File object or a pre-existing data URL
  function loadFromDataUrl(dataUrl, fileName) {
    const ext = fileName.split('.').pop().toLowerCase();
    filenameEl.textContent = fileName;
    emptyEl.style.display = 'none';
    frameWrap.style.display = 'flex';
    controls.style.display = 'flex';
    frameWrap.innerHTML = '';
    frameWrap.classList.remove('pdf-mode');
    zoom = 1;
    naturalW = 0; naturalH = 0;
    savedFileName = fileName;
    savedDataUrl = dataUrl;

    if(ext === 'html' || ext === 'htm') {
      mediaType = 'pdf'; // reuse pdf layout (full iframe, no zoom controls)
      frameWrap.classList.add('pdf-mode');
      const el = document.createElement('iframe');
      el.className = 'doc-frame pdf-frame';
      el.src = dataUrl;
      el.style.border = 'none';
      frameWrap.appendChild(el);
      mediaEl = el;
      zoomInBtn.style.display = 'none';
      zoomOutBtn.style.display = 'none';
      zoomLabel.textContent = '';
    } else if(ext === 'pdf') {
      mediaType = 'pdf';
      frameWrap.classList.add('pdf-mode');
      // On mobile, use <object> which lets the browser's PDF viewer scroll naturally.
      // On desktop, iframe fills the pane with the native viewer.
      const isMobile = window.innerWidth <= 760;
      let el;
      if(isMobile) {
        el = document.createElement('object');
        el.type = 'application/pdf';
        el.data = dataUrl;
        el.className = 'doc-frame pdf-frame';
        el.style.width = '100%';
        el.style.height = '100%';
        // Fallback text inside object tag
        el.innerHTML = '<p style="color:#aaa;padding:16px;">PDF cannot be displayed. <a href="' + dataUrl + '" target="_blank" style="color:#e8c84a">Open PDF ↗</a></p>';
      } else {
        el = document.createElement('iframe');
        el.className = 'doc-frame pdf-frame';
        el.src = dataUrl;
      }
      frameWrap.appendChild(el);
      mediaEl = el;
      zoomInBtn.style.display = 'none';
      zoomOutBtn.style.display = 'none';
      zoomLabel.textContent = 'Native zoom';
    } else if(['png','jpg','jpeg','webp','gif','svg'].includes(ext)) {
      mediaType = 'image';
      zoomInBtn.style.display = '';
      zoomOutBtn.style.display = '';
      const img = document.createElement('img');
      img.className = 'doc-image';
      img.style.width = 'auto';
      img.style.height = 'auto';
      frameWrap.appendChild(img);
      mediaEl = img;
      img.onload = () => {
        naturalW = img.naturalWidth;
        naturalH = img.naturalHeight;
        const padding = 32;
        const availW = frameWrap.clientWidth - padding;
        const availH = frameWrap.clientHeight - padding;
        const fitScale = Math.min(availW / naturalW, availH / naturalH, 1);
        zoom = Math.max(0.05, fitScale);
        applyZoom();
      };
      img.src = dataUrl;
    }
  }

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if(!file) return;
    // Warn immediately if the file is too large to persist across reloads
    const MAX_SAVE_MB = 3.75; // ~5MB as base64 after encoding
    if(file.size > MAX_SAVE_MB * 1024 * 1024) {
      filenameEl.textContent = file.name + ' ⚠ too large to auto-save (will need reloading)';
    }
    const reader = new FileReader();
    reader.onload = e => loadFromDataUrl(e.target.result, file.name);
    reader.readAsDataURL(file);
  });

  // State hooks — save file data as base64 for files under 5MB (encoded).
  // Larger files (like big PDFs) must be reloaded each session.
  const MAX_FILE_BYTES = 5 * 1024 * 1024; // 5MB base64 limit

  root._getState = () => ({
    fileName: savedFileName,
    fileData: savedDataUrl && savedDataUrl.length < MAX_FILE_BYTES ? savedDataUrl : null,
    fileTooLarge: savedDataUrl && savedDataUrl.length >= MAX_FILE_BYTES ? savedFileName : null,
    zoom,
  });
  root._setState = (s) => {
    if(s && s.fileData && s.fileName) {
      loadFromDataUrl(s.fileData, s.fileName);
      if(s.zoom && s.zoom !== 1) {
        setTimeout(() => { zoom = s.zoom; applyZoom(); }, 100);
      }
    } else if(s && s.fileTooLarge) {
      filenameEl.textContent = s.fileTooLarge + ' (too large to auto-restore — reload manually)';
    }
  };
  // Allow other tools to programmatically load an image into this doc viewer
  root._loadDataUrl = (dataUrl, fileName) => loadFromDataUrl(dataUrl, fileName);
}

function init_adventure(root) { initDocTool(root); }
function init_maps(root) { initDocTool(root); }
</script>

<script>
// ══════════════════════════════════════════
// COMBAT & TRACKERS TOOL
// ══════════════════════════════════════════
// ═══ TRACKERS + COMBAT (merged) ═══════════════════════════════════════════
// One ordered list holds both kinds of card:
//   { type:'tracker', kind:'rounds'|'timer', ... }
//   { type:'npc',     hpMode:'standard'|'dcc', ... }
// Cards can be reordered by dragging the ⠿ handle or with the ▲▼ buttons.
function init_trackers(root) {
  let round = 1;
  let items = [];            // unified, ordered
  let nextId = 1;

  const list  = root.querySelector('.cbt-tracker-list');
  const empty = root.querySelector('.cbt-trackers-empty');

  function escAttr(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
  function fmtTime(sec) {
    sec = Math.max(0, sec);
    return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
  }
  function updateRoundDisplay() {
    document.querySelectorAll('.trk-round-num').forEach(el => { el.textContent = round; });
  }
  function npcHpColor(pct) {
    if(pct <= 0)  return '#3a3a3a';
    if(pct <= 25) return '#b82018';
    if(pct <= 50) return '#c08020';
    if(pct <= 75) return '#c8a020';
    return '#4caf50';
  }
  function dccSegColor(index, total) {
    const colors = ['#b82018', '#c08020', '#c8a020', '#4caf50'];
    return colors[Math.min(3, Math.floor((index * 4) / total))];
  }

  // ── Reordering ──
  function moveItem(id, delta) {
    const i = items.findIndex(x => x.id === id);
    const j = i + delta;
    if(i < 0 || j < 0 || j >= items.length) return;
    [items[i], items[j]] = [items[j], items[i]];
    render();
  }
  function reorderHtml(item, idx) {
    const first = idx === 0, last = idx === items.length - 1;
    return `
      <div class="card-reorder">
        <span class="card-drag" title="Drag to reorder">&#10303;</span>
        <button class="card-move card-up" ${first ? 'disabled' : ''} title="Move up">&#9650;</button>
        <button class="card-move card-down" ${last ? 'disabled' : ''} title="Move down">&#9660;</button>
      </div>`;
  }
  function wireReorder(card, item) {
    card.querySelector('.card-up')?.addEventListener('click', () => moveItem(item.id, -1));
    card.querySelector('.card-down')?.addEventListener('click', () => moveItem(item.id, +1));
    const handle = card.querySelector('.card-drag');
    if(handle) {
      handle.addEventListener('pointerdown', () => { card.draggable = true; });
      handle.addEventListener('pointerup',   () => { card.draggable = false; });
    }
    card.addEventListener('dragstart', e => {
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(item.id));
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      card.draggable = false;
      list.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
    });
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drop-target'); });
    card.addEventListener('dragleave', () => card.classList.remove('drop-target'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drop-target');
      const dragId = parseInt(e.dataTransfer.getData('text/plain'));
      if(!dragId || dragId === item.id) return;
      const from = items.findIndex(x => x.id === dragId);
      const to   = items.findIndex(x => x.id === item.id);
      if(from < 0 || to < 0) return;
      const [moved] = items.splice(from, 1);
      items.splice(to, 0, moved);
      render();
    });
  }

  // ── Status checklist (NPC cards) ──
  function statusListHtml(statuses) {
    const rows = (statuses || []).map(s => `
      <div class="status-row" data-status-id="${s.id}">
        <input type="checkbox" class="status-check" ${s.checked ? 'checked' : ''}>
        <input type="text" class="status-text" value="${escAttr(s.text)}" placeholder="Status, condition, recharge...">
        <button class="status-del" title="Remove">&#10005;</button>
      </div>
    `).join('');
    return `<div class="status-list">${rows}</div>
      <button class="btn small ghost status-add">+ Status</button>`;
  }
  function wireStatusList(card, entity) {
    if(!entity.statuses) entity.statuses = [];
    if(!entity._nextStatusId) entity._nextStatusId = 1;
    card.querySelectorAll('.status-row').forEach(row => {
      const id = parseInt(row.dataset.statusId);
      const st = entity.statuses.find(x => x.id === id);
      if(!st) return;
      row.querySelector('.status-check').addEventListener('change', e => { st.checked = e.target.checked; });
      row.querySelector('.status-text').addEventListener('input',  e => { st.text = e.target.value; });
      row.querySelector('.status-del').addEventListener('click', () => {
        entity.statuses = entity.statuses.filter(x => x.id !== id);
        render();
      });
    });
    card.querySelector('.status-add')?.addEventListener('click', () => {
      entity.statuses.push({ id: entity._nextStatusId++, checked: false, text: '' });
      render();
    });
  }

  // ── Tracker card ──
  function buildTrackerCard(t, idx) {
    const card = document.createElement('div');
    card.dataset.id = t.id;
    const expired = t.kind === 'rounds' ? t.rounds <= 0 : t.remainingSeconds <= 0;
    card.className = 'tracker-card' + (t.kind === 'timer' ? ' timer-type' : '') + (expired ? ' expired' : '');

    const bottom = t.kind === 'rounds' ? `
        <button class="tracker-adjust-btn tracker-dec">&minus;</button>
        <div class="tracker-rounds-display">
          <span class="tracker-rounds ${t.rounds<=0?'zero':''}">${t.rounds}</span>
          <span class="tracker-label">rounds</span>
        </div>
        <button class="tracker-adjust-btn tracker-inc">+</button>
        ${t.rounds <= 0 ? '<span class="tracker-expired-tag">Expired</span>' : ''}
      ` : `
        <div class="tracker-rounds-display">
          <span class="timer-display ${t.remainingSeconds<=0?'zero':''}">${fmtTime(t.remainingSeconds)}</span>
          <span class="tracker-label">${t.running ? 'running' : 'paused'}</span>
        </div>
        <div class="timer-controls">
          <button class="tracker-adjust-btn timer-toggle">${t.running ? '&#9208;' : '&#9654;'}</button>
          <button class="tracker-adjust-btn timer-reset">&#8634;</button>
        </div>
        ${t.remainingSeconds <= 0 ? '<span class="tracker-expired-tag">Time&#39;s Up</span>' : ''}
      `;

    card.innerHTML = `
      <div class="tracker-top">
        ${reorderHtml(t, idx)}
        <input type="text" class="tracker-name-input" value="${escAttr(t.name)}" placeholder="Tracker name...">
        <div class="tracker-type-toggle">
          <button class="tracker-type-btn rounds-active ${t.kind==='rounds'?'active':''}" data-kind="rounds">Rounds</button>
          <button class="tracker-type-btn timer-active ${t.kind==='timer'?'active':''}" data-kind="timer">Timer</button>
        </div>
        <button class="tracker-del" title="Remove">&#10005;</button>
      </div>
      <div class="tracker-bottom">${bottom}</div>
      ${t.kind === 'timer' ? `
      <div class="timer-set-row">
        <span class="timer-set-label">Set</span>
        <input type="number" class="timer-set-input timer-min" min="0" value="${Math.floor(t.totalSeconds/60)}">
        <span class="timer-set-label">m</span>
        <input type="number" class="timer-set-input timer-sec" min="0" max="59" value="${t.totalSeconds%60}">
        <span class="timer-set-label">s</span>
        <button class="btn small ghost timer-apply" style="margin-left:6px;">Apply</button>
      </div>` : ''}
    `;

    card.querySelector('.tracker-name-input').addEventListener('input', e => { t.name = e.target.value; });
    card.querySelector('.tracker-del').addEventListener('click', () => { items = items.filter(x => x.id !== t.id); render(); });
    card.querySelectorAll('.tracker-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const kind = btn.dataset.kind;
        if(kind === t.kind) return;
        t.running = false;
        t.kind = kind;
        if(kind === 'timer' && t.totalSeconds === undefined) { t.totalSeconds = 60; t.remainingSeconds = 60; }
        render();
      });
    });
    if(t.kind === 'rounds') {
      card.querySelector('.tracker-dec').addEventListener('click', () => { t.rounds = Math.max(0, t.rounds - 1); render(); });
      card.querySelector('.tracker-inc').addEventListener('click', () => { t.rounds += 1; render(); });
    } else {
      card.querySelector('.timer-toggle').addEventListener('click', () => { t.running = !t.running; render(); });
      card.querySelector('.timer-reset').addEventListener('click',  () => { t.running = false; t.remainingSeconds = t.totalSeconds; render(); });
      card.querySelector('.timer-apply')?.addEventListener('click', () => {
        const min = parseInt(card.querySelector('.timer-min').value) || 0;
        const sec = parseInt(card.querySelector('.timer-sec').value) || 0;
        t.totalSeconds = min * 60 + sec;
        t.remainingSeconds = t.totalSeconds;
        t.running = false;
        render();
      });
    }
    return card;
  }

  // ── NPC / combatant card ──
  function buildNpcCard(n, idx) {
    const card = document.createElement('div');
    card.dataset.id = n.id;
    const mode = n.hpMode || 'standard';
    let hpBlockHtml = '', defeated = false;

    if(mode === 'standard') {
      const pct = n.hpMax > 0 ? Math.max(0, Math.min(100, (n.hpCurrent / n.hpMax) * 100)) : 0;
      defeated = n.hpCurrent <= 0;
      hpBlockHtml = `
        <div class="npc-hp-row">
          <input type="number" class="npc-hp-input npc-hp-current" value="${n.hpCurrent}">
          <span class="npc-hp-slash">/</span>
          <input type="number" class="npc-hp-input npc-hp-max" value="${n.hpMax}">
          <div class="npc-hp-adjust">
            <button class="npc-hp-btn dmg npc-dmg5" title="-5 HP">&minus;5</button>
            <button class="npc-hp-btn dmg npc-dmg1" title="-1 HP">&minus;1</button>
            <button class="npc-hp-btn heal npc-heal1" title="+1 HP">+1</button>
            <button class="npc-hp-btn heal npc-heal5" title="+5 HP">+5</button>
          </div>
        </div>
        <div class="npc-hp-bar-track"><div class="npc-hp-bar-fill" style="width:${pct}%;background:${npcHpColor(pct)};"></div></div>
      `;
    } else {
      const segCount = n.segCount || 10;
      const segHp = n.segHp !== undefined ? n.segHp : 10;
      if(!n.segments || n.segments.length !== segCount) n.segments = Array.from({length: segCount}, () => true);
      defeated = n.segments.filter(Boolean).length === 0;
      const segHtml = n.segments.map((alive, i) => `
          <button class="npc-seg ${alive ? '' : 'dead'}" data-seg-idx="${i}" style="--seg-color:${dccSegColor(i, segCount)};" title="Segment ${i+1}${alive ? '' : ' (down)'}">
            <span class="npc-seg-num">${segHp}</span>
          </button>`).join('');
      hpBlockHtml = `
        <div class="npc-seg-setup">
          <span class="npc-seg-setup-label">Segments</span>
          <input type="number" class="npc-seg-count-input" min="1" max="20" value="${segCount}">
          <span class="npc-seg-setup-label">HP Each</span>
          <input type="number" class="npc-seg-hp-input" min="1" value="${segHp}">
          <button class="btn small ghost npc-seg-apply">Apply</button>
        </div>
        <div class="npc-seg-row">${segHtml}</div>
      `;
    }

    card.className = 'npc-card' + (defeated ? ' defeated' : '');
    card.innerHTML = `
      <div class="npc-top">
        ${reorderHtml(n, idx)}
        <input type="text" class="npc-name-input" value="${escAttr(n.name)}" placeholder="NPC / Monster name...">
        <input type="text" class="npc-tag-input" value="${escAttr(n.tag)}" placeholder="tag">
        <div class="npc-mode-toggle">
          <button class="npc-mode-btn std-active ${mode==='standard'?'active':''}" data-mode="standard">Standard</button>
          <button class="npc-mode-btn dcc-active ${mode==='dcc'?'active':''}" data-mode="dcc">DCC</button>
        </div>
        <button class="npc-del" title="Remove">&#10005;</button>
      </div>
      ${hpBlockHtml}
      ${defeated ? '<div class="npc-defeated-tag">Defeated</div>' : ''}
      ${statusListHtml(n.statuses)}
    `;

    card.querySelector('.npc-name-input').addEventListener('input', e => { n.name = e.target.value; });
    card.querySelector('.npc-tag-input').addEventListener('input', e => { n.tag = e.target.value; });
    card.querySelector('.npc-del').addEventListener('click', () => { items = items.filter(x => x.id !== n.id); render(); });
    card.querySelectorAll('.npc-mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if(btn.dataset.mode === mode) return;
        n.hpMode = btn.dataset.mode;
        render();
      });
    });

    if(mode === 'standard') {
      card.querySelector('.npc-hp-current').addEventListener('change', e => { n.hpCurrent = parseInt(e.target.value) || 0; render(); });
      card.querySelector('.npc-hp-max').addEventListener('change',     e => { n.hpMax = parseInt(e.target.value) || 0; render(); });
      card.querySelector('.npc-hp-current').addEventListener('keydown', e => { if(e.key === 'Enter') e.target.blur(); });
      card.querySelector('.npc-hp-max').addEventListener('keydown',     e => { if(e.key === 'Enter') e.target.blur(); });
      card.querySelector('.npc-dmg5').addEventListener('click',  () => { n.hpCurrent = Math.max(0, n.hpCurrent - 5); render(); });
      card.querySelector('.npc-dmg1').addEventListener('click',  () => { n.hpCurrent = Math.max(0, n.hpCurrent - 1); render(); });
      card.querySelector('.npc-heal1').addEventListener('click', () => { n.hpCurrent = Math.min(n.hpMax, n.hpCurrent + 1); render(); });
      card.querySelector('.npc-heal5').addEventListener('click', () => { n.hpCurrent = Math.min(n.hpMax, n.hpCurrent + 5); render(); });
    } else {
      card.querySelector('.npc-seg-apply').addEventListener('click', () => {
        const count = Math.max(1, Math.min(20, parseInt(card.querySelector('.npc-seg-count-input').value) || 1));
        const hp = Math.max(1, parseInt(card.querySelector('.npc-seg-hp-input').value) || 1);
        n.segCount = count; n.segHp = hp;
        n.segments = Array.from({length: count}, () => true);
        render();
      });
      card.querySelectorAll('.npc-seg').forEach(seg => {
        seg.addEventListener('click', () => {
          const i = parseInt(seg.dataset.segIdx);
          n.segments[i] = !n.segments[i];
          render();
        });
      });
    }
    wireStatusList(card, n);
    return card;
  }

  function render() {
    list.innerHTML = '';
    empty.classList.toggle('show', items.length === 0);
    items.forEach((it, idx) => {
      const card = it.type === 'npc' ? buildNpcCard(it, idx) : buildTrackerCard(it, idx);
      wireReorder(card, it);
      list.appendChild(card);
    });
  }

  // Running timers tick once a second (only re-render if something changed).
  setInterval(() => {
    let dirty = false;
    items.forEach(it => {
      if(it.type === 'tracker' && it.kind === 'timer' && it.running && it.remainingSeconds > 0) {
        it.remainingSeconds = Math.max(0, it.remainingSeconds - 1);
        if(it.remainingSeconds === 0) it.running = false;
        dirty = true;
      }
    });
    if(dirty) render();
  }, 1000);

  function onClick(e) {
    const btn = e.target.closest('.trk-next-round, .trk-reset, .cbt-add-tracker, .cbt-add-npc, .cbt-reset');
    if(!btn) return;
    const paneContent = root.closest('.pane-content');
    const paneNum = paneContent ? paneContent.id.replace('pane-','').replace('-content','') : null;
    const toolbarSlot = paneNum ? document.getElementById('pane-' + paneNum + '-toolbar') : null;
    if(!(root.contains(btn) || (toolbarSlot && toolbarSlot.contains(btn)))) return;

    if(btn.classList.contains('trk-next-round')) {
      round += 1;
      updateRoundDisplay();
      items.forEach(it => { if(it.type === 'tracker' && it.kind === 'rounds') it.rounds = Math.max(0, it.rounds - 1); });
      render();
    } else if(btn.classList.contains('trk-reset') || btn.classList.contains('cbt-reset')) {
      if(!confirm('Reset the round counter and clear all trackers and combatants?')) return;
      round = 1; items = [];
      updateRoundDisplay(); render();
    } else if(btn.classList.contains('cbt-add-tracker')) {
      items.push({ id: nextId++, type: 'tracker', name: '', kind: 'rounds', rounds: 1, totalSeconds: 60, remainingSeconds: 60, running: false });
      render();
    } else if(btn.classList.contains('cbt-add-npc')) {
      items.push({ id: nextId++, type: 'npc', name: '', tag: '', hpMode: 'standard', hpCurrent: 10, hpMax: 10, statuses: [] });
      render();
    }
  }
  document.addEventListener('click', onClick);

  render();
  updateRoundDisplay();

  root._getState = () => ({ round, items });
  root._setState = (st) => {
    if(!st) return;
    round = st.round || 1;
    // Accept the new unified shape, and migrate old saves that kept
    // { trackers: [...] } and { npcs: [...] } in two separate tools.
    let list_ = Array.isArray(st.items) ? st.items.slice() : [];
    if(!list_.length) {
      (st.trackers || []).forEach(t => list_.push({ ...t, type: 'tracker' }));
      (st.npcs || []).forEach(n => list_.push({ ...n, type: 'npc' }));
    }
    items = list_.map(it => ({ ...it, type: it.type || (it.kind ? 'tracker' : 'npc'), running: false }));
    nextId = items.reduce((m, it) => Math.max(m, it.id || 0), 0) + 1;
    items.forEach((it, i) => { if(!it.id) it.id = nextId++; });
    updateRoundDisplay();
    render();
  };
}
window.init_trackers = init_trackers;
// Old sessions may still ask for the 'combat' tool; it's the same tool now.
window.init_combat = init_trackers;
</script>

// ── Rival Crawlers ────────────────────────────────────────────────────────
const RC_NAMES = [
  ...NPC_NAMES.Human,...NPC_NAMES.Dwarf,...NPC_NAMES.Elf,
  ...NPC_NAMES.Goblin,...NPC_NAMES.Halfling,...NPC_NAMES['Half-Orc'],
];
const RC_CLASSES = ['Cleric','Fighter','Thief','Wizard'];
const RC_ANCESTRY = ['Human','Human','Human','Dwarf','Elf','Halfling','Half-Orc','Goblin'];
const RC_GOALS = [
  'hunting the same monster the party is after',
  'searching for a specific magic item',
  'mapping the dungeon for a wealthy patron',
  'fleeing something that killed two of their members',
  'looking for a missing comrade',
  'hired to retrieve a specific object',
  'trying to beat the party to the treasure',
  'in search of a legendary artifact',
  'running from a debt to the Thieves\' Guild',
  'on a holy mission for their deity',
];
const RC_QUIRKS = [
  'over-confident and boastful','secretive about their past',
  'clearly underprepared — out of torches','battle-scarred and wary',
  'surprisingly well-equipped','arguing among themselves',
  'nursing a recent wound','clearly lost','deceptively cheerful',
  'professional and businesslike','visibly afraid of something nearby',
];
const RC_GEAR_HINTS = [
  'well-stocked crawling kits','mostly improvised gear',
  'quality weapons but light armor','heavy armor, slow moving',
  'alchemist\'s fire and rope in abundance','a captured monster on a chain',
  'a treasure map visible on one member','magical light sources (no torches)',
  'someone is carrying something that clanks suspiciously',
];
const RC_DISPOSITION_DETAILS = {
  Hostile:  ['draw weapons immediately','demand the party leave now','have already attacked and take no prisoners'],
  Wary:     ['eye the party with suspicion','keep hands near weapons','ask sharp questions before talking'],
  Neutral:  ['nod curtly and keep moving','exchange basic information if pressed','trade news of the dungeon'],
  Friendly: ['share a rumor they picked up','offer to team up briefly','warn about a danger ahead'],
};

function rollD(max) { return Math.ceil(Math.random()*max); }
function rollTable(tbl, val) { for(const [n,r] of tbl) if(val<=n) return r; return tbl[tbl.length-1][1]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function card(html) { const d=document.createElement('div'); d.className='gen-card'; d.innerHTML=html; return d; }
function row(label, val) { return `<div class="gen-card-row"><span class="gen-card-row-label">${label}</span><span>${esc(val)}</span></div>`; }
function tag(t, v) { return `<span class="gen-card-tag">${esc(t)}: ${esc(v)}</span> `; }

// ── Mundane Loot ──────────────────────────────────────────────────────────
function genMundaneLoot(subtype) {
  if(subtype==='gem') {
    const gem = R(GEMS);
    const isGiant = Math.random() < 0.15;
    const name = isGiant ? 'Giant '+gem.name : gem.name;
    const val  = gem.value.replace(/^(\d+)/, n => isGiant ? n*2 : n);
    return card(`<div class="gen-item-name">${esc(name)}</div><div class="gen-item-desc">Value: ${esc(val)}</div>`);
  }
  if(subtype==='luxury') {
    const feat = R(LUX_FEAT); const pool = R(LUX_ITEM_POOLS); const item = R(pool);
    return card(`<div class="gen-item-name">Luxury Item</div><div class="gen-item-desc">${esc(feat)} ${esc(item)}</div>`);
  }
  return card(`<div class="gen-item-name">Mundane Loot</div><div class="gen-item-desc">${esc(R(MUNDANE_LOOT))}</div>`);
}

// ── Rival Crawlers ────────────────────────────────────────────────────────
function genRivalCrawler(size, disp) {
  const count = size==='random' ? (Math.ceil(Math.random()*4)+1) : parseInt(size);
  const disposition = disp==='random' ? R(['Hostile','Wary','Neutral','Neutral','Friendly']) : disp;
  const goal = R(RC_GOALS);
  const quirk = R(RC_QUIRKS);
  const gear = R(RC_GEAR_HINTS);
  const dispDetail = R(RC_DISPOSITION_DETAILS[disposition]||RC_DISPOSITION_DETAILS.Neutral);
  const members = [];
  for(let i=0;i<count;i++) {
    const anc = R(RC_ANCESTRY);
    const cls = R(RC_CLASSES);
    const name = R(NPC_NAMES[anc]||NPC_NAMES.Human);
    members.push(`${name} (${anc} ${cls})`);
  }
  return card(`
    <div class="gen-card-header"><span class="gen-card-name">Rival Crawlers</span>
    <span class="gen-card-tag">${count} crawlers · ${esc(disposition)}</span></div>
    <div class="gen-card-row"><span class="gen-card-row-label">Members</span>
    <span>${members.map(esc).join('<br>')}</span></div>
    <hr class="gen-card-divider">
    ${row('Goal', goal)} ${row('Quirk', quirk)} ${row('Gear', gear)}
    ${row('Behaviour', dispDetail)}
  `);
}

// ── NPC ───────────────────────────────────────────────────────────────────
function genNPC(ancestry, wealth) {
  const anc  = ancestry==='random'?R(['Human','Human','Human','Dwarf','Elf','Halfling','Half-Orc','Goblin']):ancestry;
  const wlth = wealth==='random'?R(['Poor','Poor','Standard','Standard','Standard','Wealthy']):wealth;
  const pool = NPC_NAMES[anc]||NPC_NAMES.Human;
  const name = R(pool);
  const age  = anc==='Goblin'?`${rollD(20)+5}`:anc==='Elf'?`${rollD(400)+50}`:anc==='Dwarf'?`${rollD(200)+30}`:`${rollD(40)+15}`;
  return card(`
    <div class="gen-card-header"><span class="gen-card-name">${esc(name)}</span><span class="gen-card-tag">${esc(anc)} · ${esc(wlth)}</span></div>
    ${row('Age',age)} ${row('Build',`${R(BUILDS)}, ${R(HAIR)} hair, ${R(EYES)} eyes`)}
    ${row('Dress',R(CLOTHING[wlth]))} ${row('Feature',R(FEATURES))}
    <hr class="gen-card-divider">
    ${row('Occupation',R(OCCUPATIONS))} ${row('Demeanor',R(DEMEANOR))}
    ${row('Quirk',R(QUIRKS))} ${row('Wants',R(WANTS))}
    ${row('Secret',R(SECRETS))} ${row('Coin',COIN[wlth]())}
  `);
}

// ── Treasure ─────────────────────────────────────────────────────────────
function genTreasure(tierKey, type) {
  if(type==='random_all') {
    // Equal chance across all categories
    type = R(['random','random','Weapon','Armor','Wand','Ring','Cloak','Boots',
              'Potion','Scroll','table','mundane','gem','luxury']);
  }
  if(type==='table') {
    const tier = TREASURE_TIERS[tierKey]||TREASURE_T1;
    return card(`<div class="gen-item-name">Treasure Table Roll (Tier ${tierKey})</div><div class="gen-item-desc">${esc(R(tier))}</div>`);
  }
  if(type==='mundane' || type==='gem' || type==='luxury') return genMundaneLoot(type);
  const pool = type==='random'?MAGIC_ITEM_POOLS[R(LOOT_TYPES)]:(MAGIC_ITEM_POOLS[type]||POTIONS);
  const item = R(pool);
  return card(`<div class="gen-item-name">${esc(item.name)}</div><div class="gen-item-desc">${esc(item.desc)}</div>`);
}

// ── Shop/Tavern ──────────────────────────────────────────────────────────
function genShop(type, tier) {
  const t = type==='random'?R(['Shop','Tavern']):type;
  const t2 = tier==='random'?R(['Poor','Standard','Standard','Wealthy']):tier;
  const isShop=t==='Shop';
  const name = R(isShop?SHOP_NAMES[t2]:TAVERN_NAMES[t2]);
  const prop = `${R(NPC_NAMES.Human)}, ${isShop?R(['Shopkeeper','Merchant','Trader']):R(['Innkeeper','Barkeep','Host'])}`;
  if(isShop) {
    const stock=[...SHOP_STOCK[t2]].sort(()=>Math.random()-.5).slice(0,6);
    return card(`<div class="gen-card-header"><span class="gen-card-name">${esc(name)}</span><span class="gen-card-tag">Shop · ${esc(t2)}</span></div>${row('Proprietor',prop)}<hr class="gen-card-divider"><div class="gen-card-row"><span class="gen-card-row-label">Stock</span><span>${stock.map(esc).join('<br>')}</span></div>`);
  } else {
    const menu=[...TAVERN_FOOD[t2]].sort(()=>Math.random()-.5).slice(0,4);
    const rooms=t2==='Poor'?'Shared floor (2 cp/night)':t2==='Wealthy'?'Private room (1 gp/night)':'Shared room (5 cp/night)';
    return card(`<div class="gen-card-header"><span class="gen-card-name">${esc(name)}</span><span class="gen-card-tag">Tavern · ${esc(t2)}</span></div>${row('Proprietor',prop)}<hr class="gen-card-divider"><div class="gen-card-row"><span class="gen-card-row-label">Menu</span><span>${menu.map(esc).join('<br>')}</span></div>${row('Lodging',rooms)}<hr class="gen-card-divider">${row('Rumour',R(TAVERN_RUMORS_EXTRA))}`);
  }
}

// ── Encounter ────────────────────────────────────────────────────────────
function genEncounterItem(type) {
  // Events
  if(type==='happens')  return card(`<div class="gen-item-name">Something Happens!</div><div class="gen-item-desc">${esc(R(HAPPENS))}</div>`);
  if(type==='rumor')    return card(`<div class="gen-item-name">Rumor</div><div class="gen-item-desc">${esc(R(RUMORS))}</div>`);
  if(type==='secret')   return card(`<div class="gen-item-name">Secret</div><div class="gen-item-desc">${esc(R(SECRETS_D1))} ${esc(R(SECRETS_D2))}</div>`);
  if(type==='trap')     return genTrap('trap');
  if(type==='hazard')   return genTrap('hazard');
  // Biome
  const pool = BIOME_ENC_TABLES[type];
  if(pool) return card(`<div class="gen-card-header"><span class="gen-card-name">${esc(type)} Encounter</span></div><div class="gen-item-desc">${esc(R(pool))}</div>`);
  return card(`<div class="gen-empty">Unknown type</div>`);
}

// ── Monster Generator ─────────────────────────────────────────────────────
function genMonster(pl, numMut) {
  pl = parseInt(pl)||1;
  const entry = MON_TABLE[Math.ceil(Math.random()*20)-1];
  const hd_adj = entry.combat==='PL'?0:entry.combat.includes('+')?(parseInt(entry.combat.replace('PL+',''))):(-parseInt(entry.combat.replace('PL-','')));
  const hd = Math.max(1, pl+hd_adj);
  const ac = pl+10;
  const hp = hd*4+hd;
  const atk = Math.min(hd, hd+1);
  const muts = [];
  for(let i=0;i<parseInt(numMut||0);i++) { muts.push(`${R(MON_MUT_1)} / ${R(MON_MUT_2)} / ${R(MON_MUT_3)}`); }
  return card(`
    <div class="gen-card-header"><span class="gen-card-name">${esc(entry.quality)} Creature</span><span class="gen-card-tag">HD ${hd} · PL ${pl}</span></div>
    ${row('AC',`${ac}`)} ${row('HP',`${hp} (${hd}d8)`)} ${row('ATK',`+${atk}, 1d${hd<=3?6:hd<=6?8:10} dmg`)}
    <hr class="gen-card-divider">
    ${row('Strength',entry.strength)} ${row('Weakness',entry.weakness)}
    ${muts.length?'<hr class="gen-card-divider">'+muts.map((m,i)=>`<div class="gen-card-row"><span class="gen-card-row-label">Mutation ${i+1}</span><span>${esc(m)}</span></div>`).join(''):''}
    <hr class="gen-card-divider">
    <div class="gen-card-row"><span class="gen-card-row-label">Treasure</span><span>Roll on Treasure ${hd<=3?'1-3':hd<=6?'4-6':hd<=9?'7-9':'10+'} table (50% chance if random encounter)</span></div>
  `);
}

// ── Trap / Hazard ─────────────────────────────────────────────────────────
function genTrap(type) {
  const t = type==='random' ? R(['trap','hazard']) : type;
  if(t==='trap') {
    const trap = TRAPS[Math.ceil(Math.random()*12)-1];
    return card(`<div class="gen-card-header"><span class="gen-card-name">${esc(trap.trap)}</span><span class="gen-card-tag">Trap</span></div>${row('Trigger',trap.trigger)}${row('Damage/Effect',trap.damage)}`);
  } else {
    const mov = R(HAZARDS_MOV); const dmg = R(HAZARDS_DMG); const wkn = R(HAZARDS_WKN);
    const types = []; if(Math.random()>.3) types.push(mov); if(Math.random()>.4) types.push(dmg); if(Math.random()>.5) types.push(wkn);
    if(!types.length) types.push(mov);
    return card(`<div class="gen-card-header"><span class="gen-card-name">Hazard</span><span class="gen-card-tag">${types.length>1?'Combined':'Single'}</span></div>${types.map((x,i)=>row(['Movement','Damage','Weakening'][i]||'Effect',x)).join('')}`);
  }
}

const ROOM_TAXONOMY = {
  guardian:            ['Fight',     'Guardian'],
  puzzle:              ['Challenge', 'Puzzle'],
  setback:             ['Twist',     'Setback'],
  boss:                ['Fight',     'Boss'],
  reward:              ['Reward',    'Treasure'],
  'Combat Encounter':  () => ['Fight', R(['Sentry','Mooks'])],
  'Exploration Chamber': ['Scenic',  ''],
  'Trap Room':         ['Challenge', 'Trap'],
  'Treasure Cache':    ['Reward',    'Treasure'],
  'Side Chamber':      ['Scenic',    ''],
  'Barracks':          ['Fight',     'Mooks'],
  'Storage Room':      ['Scenic',    ''],
  'Secret Room':       ['Twist',     'Secret Area'],
  'Sub-Boss Lair':     ['Fight',     'Sub-Boss'],
  'Puzzle Room':       ['Challenge', 'Puzzle'],

  'Laboratory':        ['Scenic',    ''],
  'Prison Cells':      ['Challenge', 'Social'],
  'Collapsed Section': ['Twist',     'Environmental'],
  'Natural Cave':      ['Scenic',    ''],
  'Guard Post':        ['Fight',     'Sentry'],
  'Armory':            ['Reward',    'Treasure'],
  'Ritual Chamber':    ['Challenge', 'Environmental'],
};

function roomLabel(num, roleKey) {
  const tax = typeof ROOM_TAXONOMY[roleKey] === 'function'
    ? ROOM_TAXONOMY[roleKey]()
    : (ROOM_TAXONOMY[roleKey] || ['Scenic','']);
  const [type, sub] = tax;
  const subStr = sub ? ` - ${sub}` : '';
  return `${num}. ${type}${subStr}`;
}
