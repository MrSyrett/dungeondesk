function genDungeon(level, motif, numRooms) {
  numRooms = parseInt(numRooms) || 5;
  const mot = motif === 'random' ? R(DUN_MOTIFS) : motif;

  const nameStyle = Math.random();
  let name;
  if(nameStyle < 0.4) name = `The ${R(DUN_NAMES_ADJ)} ${R(DUN_NAMES_NOUN)}`;
  else if(nameStyle < 0.7) name = `${R(DUN_NAMES_ADJ)} ${R(DUN_NAMES_NOUN)} of ${R(DUN_NAMES_OF)}`;
  else name = `The ${R(DUN_NAMES_NOUN)} of ${R(DUN_NAMES_OF)}`;

  const el = document.createElement('div');

  // Header card
  const hdr = document.createElement('div');
  hdr.className = 'gen-card';
  hdr.style.borderColor = 'var(--gold)';
  hdr.innerHTML = `<div class="gen-card-header">
    <span class="gen-card-name" style="font-family:'Cinzel',serif;font-size:15px;color:var(--gold)">${esc(name)}</span>
    <span class="gen-card-tag">Level ${esc(level)} · ${esc(mot)} · ${numRooms} rooms</span>
  </div>`;
  el.appendChild(hdr);

  if(numRooms === 5) {
    // Classic 5-room structure
    const rooms = [
      ['guardian', DUN_R1[mot]||DUN_R1.Abandoned],
      ['puzzle',   DUN_R2[mot]||DUN_R2.Abandoned],
      ['setback',  DUN_R3[mot]||DUN_R3.Abandoned],
      ['boss',     DUN_R4[mot]||DUN_R4.Abandoned],
      ['reward',   DUN_R5[mot]||DUN_R5.Abandoned],
    ];
    rooms.forEach(([roleKey, pool], i) => {
      const c = document.createElement('div'); c.className = 'gen-card';
      const label = roomLabel(i + 1, roleKey);
      c.innerHTML = `<div class="gen-card-name" style="font-weight:700;margin-bottom:5px">${esc(label)}</div>
        <div class="gen-item-desc">${esc(R(pool))}</div>`;
      el.appendChild(c);
    });
  } else {
    // Extended dungeon
    const roomCards = [];

    // Helper: get resolved [type, subtype] for a roleKey
    function getTax(roleKey) {
      const t = ROOM_TAXONOMY[roleKey];
      return typeof t === 'function' ? t() : (t || ['Scenic','']);
    }

    // Room 1: entrance/guardian (always Fight - Guardian)
    roomCards.push(['guardian', R(DUN_R1[mot]||DUN_R1.Abandoned)]);

    // Build mid pool: mandatory (puzzle + setback + optional sub-boss) + random extras
    const mandatory = [
      ['puzzle',  R(DUN_R2[mot]||DUN_R2.Abandoned)],
      ['setback', R(DUN_R3[mot]||DUN_R3.Abandoned)],
    ];
    if(numRooms >= 8) {
      const subDesc = R(DUN_ROOM_CONTENTS['Sub-Boss Lair']).replace(/\$\{mot\}/g, mot);
      mandatory.push(['Sub-Boss Lair', subDesc]);
    }
    const midCount = numRooms - 3; // entrance + boss + reward are fixed
    const extraTypes = [...DUN_ROOM_TYPES].sort(() => Math.random() - 0.5);
    const extras = [];
    let typeIdx = 0;
    for(let i = mandatory.length; i < midCount; i++) {
      const t = extraTypes[typeIdx++ % extraTypes.length];
      const pool = DUN_ROOM_CONTENTS[t] || DUN_ROOM_CONTENTS['Exploration Chamber'];
      const desc = R(pool).replace(/\$\{mot\}/g, mot);
      extras.push([t, desc]);
    }

    // Shuffle mid rooms
    let allMid = [...mandatory, ...extras].sort(() => Math.random() - 0.5);

    // Fix: no two consecutive rooms with same Type+Subtype
    // Simple pass: if a room matches its predecessor, swap it with the next different one
    for(let i = 1; i < allMid.length; i++) {
      const [ta, sa] = getTax(allMid[i-1][0]);
      const [tb, sb] = getTax(allMid[i][0]);
      if(ta === tb && sa === sb) {
        // Find the next room that differs and swap
        let swapped = false;
        for(let j = i+1; j < allMid.length; j++) {
          const [tc, sc] = getTax(allMid[j][0]);
          if(tc !== tb || sc !== sb) {
            [allMid[i], allMid[j]] = [allMid[j], allMid[i]];
            swapped = true; break;
          }
        }
        // If no swap found, just leave it (edge case with very few room types)
      }
    }

    allMid.forEach(r => roomCards.push(r));

    // Boss is always last combat room before reward (guaranteed single boss)
    roomCards.push(['boss',   R(DUN_R4[mot]||DUN_R4.Abandoned)]);
    // Reward is always last
    roomCards.push(['reward', R(DUN_R5[mot]||DUN_R5.Abandoned)]);

    // Final check: boss and reward can't be consecutive same type (they can't be — different types)
    // Render
    roomCards.forEach(([roleKey, desc], i) => {
      const c = document.createElement('div'); c.className = 'gen-card';
      const label = roomLabel(i + 1, roleKey);
      c.innerHTML = `<div class="gen-card-name" style="font-weight:700;margin-bottom:5px">${esc(label)}</div>
        <div class="gen-item-desc">${esc(desc)}</div>`;
      el.appendChild(c);
    });
  }

  return el;
}

// ── Map Generator ──────────────────────────────────────────────────────────
(function() {

function generateDungeonMap(numRooms, style) {
  const CELL = 48;
  const COLS = 22, ROWS = 16;
  const grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  // grid values: 0=wall, 1=corridor, 2=room

  // ── Nodes style: separate layout, early return ────────────────────────────
  if(style === 'nodes') {
    const W = COLS*CELL, H = ROWS*CELL;
    const rng = () => Math.random();
    const ri  = (a,b) => Math.floor(rng()*(b-a+1))+a;

    // Place nodes with tighter spacing in a cluster
    const nodes = [];
    const MIN_DIST = 90;   // minimum centre-to-centre distance
    const SPREAD = 280;    // how far from centre nodes can appear
    const cx = W/2, cy = H/2;

    // Entrance node near a random edge of the cluster
    const angle0 = rng() * Math.PI * 2;
    const ex = Math.round(cx + Math.cos(angle0) * (SPREAD * 0.7));
    const ey = Math.round(cy + Math.sin(angle0) * (SPREAD * 0.7));
    nodes.push({ x:ex, y:ey, r:ri(36,54), id:1, isEntrance:true });

    let attempts = 0;
    while(nodes.length < numRooms && attempts < numRooms*400) {
      attempts++;
      // Bias positions toward cluster centre
      const angle = rng() * Math.PI * 2;
      const dist  = rng() * SPREAD;
      const x = Math.round(cx + Math.cos(angle) * dist);
      const y = Math.round(cy + Math.sin(angle) * dist);
      const r = ri(24, 50);
      // Keep within canvas bounds
      if(x-r<10||x+r>W-10||y-r<10||y+r>H-10) continue;
      const tooClose = nodes.some(n => Math.hypot(n.x-x, n.y-y) < MIN_DIST);
      if(!tooClose) nodes.push({ x, y, r, id:nodes.length+1 });
    }

    // Build spanning tree connections
    const edges = [];
    const connected = new Set([0]);
    for(let i=1; i<nodes.length; i++) {
      const a = nodes[i];
      let best=0, bestD=Infinity;
      for(const ci of connected) {
        const b=nodes[ci], d=Math.hypot(a.x-b.x, a.y-b.y);
        if(d<bestD){bestD=d;best=ci;}
      }
      connected.add(i);
      edges.push([i, best]);
    }
    // Extra cross-connections between nearby nodes (~35% chance)
    for(let i=0; i<nodes.length; i++) {
      for(let j=i+2; j<nodes.length; j++) {
        const d=Math.hypot(nodes[i].x-nodes[j].x, nodes[i].y-nodes[j].y);
        if(d < MIN_DIST*2 && rng()<0.35) edges.push([i,j]);
      }
    }

    // ── Renumber nodes in BFS order from entrance so IDs follow a natural path ──
    // Build adjacency list from spanning tree edges only
    const adj = Array.from({length:nodes.length}, ()=>[]);
    for(const [ai,bi] of edges) {
      // Only use spanning tree edges (those where one endpoint was newly connected)
      adj[ai].push(bi);
      adj[bi].push(ai);
    }
    // BFS from node 0 (entrance)
    const visited = new Array(nodes.length).fill(false);
    const queue = [0];
    const bfsOrder = [];
    visited[0] = true;
    while(queue.length) {
      const cur = queue.shift();
      bfsOrder.push(cur);
      // Sort neighbours by distance to entrance for consistent left-to-right feel
      const neighbours = [...new Set(adj[cur])].filter(n=>!visited[n]);
      neighbours.sort((a,b) => {
        // Primary: clockwise angle from entrance
        const en = nodes[0];
        const angA = Math.atan2(nodes[a].y-en.y, nodes[a].x-en.x);
        const angB = Math.atan2(nodes[b].y-en.y, nodes[b].x-en.x);
        return angA - angB;
      });
      for(const n of neighbours) { visited[n]=true; queue.push(n); }
    }
    // Any nodes not reached (isolated, shouldn't happen) append at end
    for(let i=0;i<nodes.length;i++) if(!visited[i]) bfsOrder.push(i);
    // Apply sequential IDs in BFS order
    const newId = new Array(nodes.length);
    bfsOrder.forEach((origIdx, seq) => { newId[origIdx] = seq+1; });
    nodes.forEach((n,i) => { n.id = newId[i]; });

    // ── Center the cluster in the viewport ───────────────────────────────────
    if(nodes.length > 0) {
      const minX = Math.min(...nodes.map(n=>n.x-n.r));
      const maxX = Math.max(...nodes.map(n=>n.x+n.r));
      const minY = Math.min(...nodes.map(n=>n.y-n.r));
      const maxY = Math.max(...nodes.map(n=>n.y+n.r));
      const pad = 40;
      const offX = (W/2) - (minX+maxX)/2;
      const offY = (H/2) - (minY+maxY)/2;
      // Clamp so nothing goes out of bounds
      const clampX = Math.max(pad-minX-offX, Math.min(W-maxX-offX-pad, offX));
      const clampY = Math.max(pad-minY-offY, Math.min(H-maxY-offY-pad, offY));
      for(const n of nodes){ n.x+=clampX; n.y+=clampY; }
    }

    // Build SVG
    const parts = [];
    parts.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`);
    parts.push(`<rect width="${W}" height="${H}" fill="#12121a"/>`);

    // Connecting lines behind nodes
    for(const [ai,bi] of edges) {
      const a=nodes[ai], b=nodes[bi];
      parts.push(`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="#4a4a6a" stroke-width="2.5" stroke-linecap="round"/>`);
    }

    // Nodes
    for(const node of nodes) {
      const fill   = node.isEntrance ? '#c8a84a' : '#2a2a4a';
      const stroke = node.isEntrance ? '#e8c86a' : '#6a6a9a';
      parts.push(`<circle cx="${node.x}" cy="${node.y}" r="${node.r}" fill="${fill}" stroke="${stroke}" stroke-width="2.5"/>`);
      parts.push(`<text x="${node.x}" y="${node.y+1}" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="monospace" font-weight="bold" font-size="${Math.max(10, node.r*0.55)}">${node.id}</text>`);
    }

    // Entrance dashed ring
    const en=nodes[0];
    parts.push(`<circle cx="${en.x}" cy="${en.y}" r="${en.r+10}" fill="none" stroke="#e8c86a" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>`);

    // Legend
    const legY=H-18;
    parts.push(`<rect x="0" y="${legY-4}" width="${W}" height="22" fill="#12121a" opacity="0.9"/>`);
    parts.push(`<text x="8" y="${legY+10}" fill="white" font-family="monospace" font-size="11" opacity="0.9">Nodes · ${nodes.length} rooms</text>`);
    parts.push(`<text x="${W-8}" y="${legY+10}" text-anchor="end" fill="white" font-family="monospace" font-size="10" opacity="0.6">The Dungeon Desk</text>`);
    parts.push('</svg>');

    return { svg:parts.join(''), rooms:nodes.length, width:W, height:H };
  }

  // ── Standard grid-based styles below ────────────────────────────────────

  // ── Style palettes ────────────────────────────────────────────────────────
  const STYLES = {
    hud:       { wall:'#2a2a32', floor:'#c8c4b0', corridor:'#b0ac9a',
                 roomStroke:'#3a3a44', doorFill:'#1a1a22',
                 numBg:'rgba(26,26,34,0.75)', numFg:'#fff', title:'HUD' },
    parchment: { wall:'#888888', floor:'#EDE4D0', corridor:'#D5C9B0',
                 roomStroke:'#000000', doorFill:'#000000',
                 numBg:'rgba(0,0,0,0.82)', numFg:'#FFF6E9', title:'Dungeon' },
    cave:      { wall:'#1e2420', floor:'#8a9e82', corridor:'#7a8e72',
                 roomStroke:'#2a3a28', doorFill:'#0e1410',
                 numBg:'rgba(14,20,16,0.8)', numFg:'#d0e8d0', title:'Cave' },
  };
  const S = STYLES[style] || STYLES.parchment;

  // ── Room placement ────────────────────────────────────────────────────────
  const rooms = [];
  const rng = () => Math.random();
  const ri = (a,b) => Math.floor(rng()*(b-a+1))+a;

  function markRoom(r) {
    for(let row=r.y; row<r.y+r.h; row++)
      for(let col=r.x; col<r.x+r.w; col++)
        if(row>=0&&row<ROWS&&col>=0&&col<COLS) grid[row][col]=2;
  }
  function overlapsAny(r, pad) {
    for(const ex of rooms) {
      if(r.x-pad < ex.x+ex.w+pad && r.x+r.w+pad > ex.x-pad &&
         r.y-pad < ex.y+ex.h+pad && r.y+r.h+pad > ex.y-pad) return true;
    }
    return false;
  }

  // Entrance: random position on any of the 4 edges
  const eW = ri(3,5), eH = ri(3,4);
  const edge = ri(0,3); // 0=top, 1=right, 2=bottom, 3=left
  const eX = edge===1 ? COLS-eW-1 : edge===3 ? 1 : ri(1, COLS-eW-2);
  const eY = edge===2 ? ROWS-eH-1 : edge===0 ? 1 : ri(1, ROWS-eH-2);
  const entrance = { x:eX, y:eY, w:eW, h:eH, id:1, isEntrance:true, edge };
  rooms.push(entrance);
  markRoom(entrance);

  // Place remaining rooms — retry with shrinking sizes if needed
  let attempts = 0, maxAttempts = numRooms * 200;
  while(rooms.length < numRooms && attempts < maxAttempts) {
    attempts++;
    // Start with larger rooms, shrink to tiny if stuck
    const progress = attempts / maxAttempts;
    const maxW = Math.max(2, Math.floor(6 - progress*3));
    const maxH = Math.max(2, Math.floor(5 - progress*2));
    const w = ri(2, maxW), h = ri(2, maxH);
    const x = ri(1, COLS-w-2), y = ri(1, ROWS-h-2);
    const pad = progress < 0.5 ? 1 : 0;
    if(!overlapsAny({x,y,w,h}, pad)) {
      rooms.push({x,y,w,h,id:rooms.length+1});
      markRoom({x,y,w,h});
    }
  }

  // ── Corridor routing ──────────────────────────────────────────────────────
  function cx(r){ return Math.floor(r.x + r.w/2); }
  function cy(r){ return Math.floor(r.y + r.h/2); }
  function setCorr(row,col) {
    if(row>=0&&row<ROWS&&col>=0&&col<COLS&&grid[row][col]===0) grid[row][col]=1;
  }
  function carve(a, b) {
    let ax=cx(a), ay=cy(a), bx=cx(b), by=cy(b);
    if(rng()>0.5) {
      for(let x=Math.min(ax,bx);x<=Math.max(ax,bx);x++) setCorr(ay,x);
      for(let y=Math.min(ay,by);y<=Math.max(ay,by);y++) setCorr(y,bx);
    } else {
      for(let y=Math.min(ay,by);y<=Math.max(ay,by);y++) setCorr(y,ax);
      for(let x=Math.min(ax,bx);x<=Math.max(ax,bx);x++) setCorr(by,x);
    }
  }

  const connected = new Set([0]);
  const treeAdj = Array.from({length:rooms.length}, ()=>[]); // adjacency for BFS
  for(let i=1;i<rooms.length;i++) {
    const a = rooms[i];
    let best=0, bestD=Infinity;
    for(const ci of connected) {
      const b=rooms[ci], d=Math.abs(cx(a)-cx(b))+Math.abs(cy(a)-cy(b));
      if(d<bestD){bestD=d;best=ci;}
    }
    connected.add(i);
    treeAdj[i].push(best);
    treeAdj[best].push(i);
    carve(rooms[i], rooms[best]);
  }

  // ── Renumber rooms via BFS from entrance so IDs follow a natural path ────
  {
    const visited = new Array(rooms.length).fill(false);
    const queue = [0];
    const bfsOrder = [];
    visited[0] = true;
    while(queue.length) {
      const cur = queue.shift();
      bfsOrder.push(cur);
      // Sort neighbours by distance from entrance room centre for consistent flow
      const ecx = cx(rooms[0]), ecy = cy(rooms[0]);
      const neighbours = treeAdj[cur].filter(n=>!visited[n]);
      neighbours.sort((a,b)=>{
        // Sort by angle from entrance centre so numbering sweeps predictably
        const angA = Math.atan2(cy(rooms[a])-ecy, cx(rooms[a])-ecx);
        const angB = Math.atan2(cy(rooms[b])-ecy, cx(rooms[b])-ecx);
        return angA - angB;
      });
      for(const n of neighbours){ visited[n]=true; queue.push(n); }
    }
    // Any disconnected rooms appended last (shouldn't happen)
    for(let i=0;i<rooms.length;i++) if(!visited[i]) bfsOrder.push(i);
    // Apply sequential IDs in BFS order
    const newId = new Array(rooms.length);
    bfsOrder.forEach((origIdx, seq) => { newId[origIdx] = seq+1; });
    rooms.forEach((r,i) => { r.id = newId[i]; });
  }

  // ── Find door positions: corridor cells touching room boundary ────────────
  // A door is at the exact wall between a corridor cell and an adjacent room cell.
  const doorSegs = []; // [{x1,y1,x2,y2}] in pixel coords
  const doorPlaced = new Set();
  for(let r=0;r<ROWS;r++) {
    for(let c=0;c<COLS;c++) {
      if(grid[r][c]!==1) continue; // only corridor cells
      // Check all 4 neighbours for a room cell
      const neighbors = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
      for(const [nr,nc] of neighbors) {
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
        if(grid[nr][nc]!==2) continue;
        // This corridor cell touches a room — place door at the shared wall
        const key = `${Math.min(r,nr)},${Math.min(c,nc)},${Math.max(r,nr)},${Math.max(c,nc)}`;
        if(doorPlaced.has(key)) continue;
        doorPlaced.add(key);
        // Only place door with ~70% chance per junction
        if(rng()<0.3) continue;
        // The shared wall is between (r,c) and (nr,nc)
        if(nr===r-1||nr===r+1) {
          // Vertical adjacency: shared wall is horizontal line between rows
          const wallY = Math.max(r,nr)*CELL; // top of the lower cell
          const wallX = c*CELL;
          // Door = thin horizontal bar across the corridor width
          doorSegs.push({x1:wallX+CELL*0.15, y1:wallY-3, x2:wallX+CELL*0.85, y2:wallY+3});
        } else {
          // Horizontal adjacency: shared wall is vertical line between cols
          const wallX = Math.max(c,nc)*CELL;
          const wallY = r*CELL;
          doorSegs.push({x1:wallX-3, y1:wallY+CELL*0.15, x2:wallX+3, y2:wallY+CELL*0.85});
        }
      }
    }
  }

  // ── Build SVG ────────────────────────────────────────────────────────────
  const W=COLS*CELL, H=ROWS*CELL;
  const parts=[];
  parts.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">`);
  parts.push(`<rect width="${W}" height="${H}" fill="${S.wall}"/>`);

  // Draw floor cells
  for(let r=0;r<ROWS;r++) {
    for(let c=0;c<COLS;c++) {
      if(grid[r][c]===0) continue;
      const fill = grid[r][c]===1 ? S.corridor : S.floor;
      parts.push(`<rect x="${c*CELL}" y="${r*CELL}" width="${CELL}" height="${CELL}" fill="${fill}"/>`);
    }
  }

  // Room outlines
  for(const room of rooms) {
    const rx=room.x*CELL, ry=room.y*CELL, rw=room.w*CELL, rh=room.h*CELL;
    if(style==='cave') {
      parts.push(`<rect x="${rx+2}" y="${ry+2}" width="${rw-4}" height="${rh-4}" fill="none" stroke="${S.roomStroke}" stroke-width="2" rx="10"/>`);
    } else {
      // HUD and Dungeon/Parchment: solid rectangle outline
      parts.push(`<rect x="${rx}" y="${ry}" width="${rw}" height="${rh}" fill="none" stroke="${S.roomStroke}" stroke-width="2"/>`);
    }
  }

  // Draw doors — thin filled rectangles straddling the wall line
  for(const d of doorSegs) {
    parts.push(`<rect x="${Math.min(d.x1,d.x2)}" y="${Math.min(d.y1,d.y2)}" width="${Math.abs(d.x2-d.x1)}" height="${Math.abs(d.y2-d.y1)}" fill="${S.doorFill}" rx="1"/>`);
  }

  // Room numbers
  for(const room of rooms) {
    const rx=room.x*CELL, ry=room.y*CELL, rw=room.w*CELL, rh=room.h*CELL;
    const numX=rx+rw/2, numY=ry+rh/2;
    const circR=Math.max(10, Math.min(rw,rh)*0.2);
    parts.push(`<circle cx="${numX}" cy="${numY}" r="${circR}" fill="${S.numBg}"/>`);
    parts.push(`<text x="${numX}" y="${numY+1}" text-anchor="middle" dominant-baseline="middle" fill="${S.numFg}" font-family="monospace" font-weight="bold" font-size="${Math.max(9,circR*1.1)}">${room.id}</text>`);
  }

  // Entrance door — thin bar on the exterior wall of room 1 (edge depends on placement)
  (function() {
    const e = rooms[0];
    const ex=e.x*CELL, ey=e.y*CELL, ew=e.w*CELL, eh=e.h*CELL;
    const ed = e.edge||0;
    if(ed===0) // top
      parts.push(`<rect x="${ex+ew/2-CELL*0.35}" y="${ey-4}" width="${CELL*0.7}" height="8" fill="${S.doorFill}" rx="1"/>`);
    else if(ed===1) // right
      parts.push(`<rect x="${ex+ew-4}" y="${ey+eh/2-CELL*0.35}" width="8" height="${CELL*0.7}" fill="${S.doorFill}" rx="1"/>`);
    else if(ed===2) // bottom
      parts.push(`<rect x="${ex+ew/2-CELL*0.35}" y="${ey+eh-4}" width="${CELL*0.7}" height="8" fill="${S.doorFill}" rx="1"/>`);
    else // left
      parts.push(`<rect x="${ex-4}" y="${ey+eh/2-CELL*0.35}" width="8" height="${CELL*0.7}" fill="${S.doorFill}" rx="1"/>`);
  })();

  // Legend bar
  const legY=H-18;
  parts.push(`<rect x="0" y="${legY-4}" width="${W}" height="22" fill="${S.wall}" opacity="0.9"/>`);
  parts.push(`<text x="8" y="${legY+10}" fill="white" font-family="monospace" font-size="11" opacity="0.9">${S.title} · ${rooms.length} rooms</text>`);
  parts.push(`<text x="${W-8}" y="${legY+10}" text-anchor="end" fill="white" font-family="monospace" font-size="10" opacity="0.6">The Dungeon Desk</text>`);

  parts.push('</svg>');
  return { svg:parts.join(''), rooms:rooms.length, width:W, height:H };
}

window._genDungeonMap = generateDungeonMap;

        root._mapSvg    = mapResult.svg;
        root._mapWidth  = mapResult.width;
        root._mapHeight = mapResult.height;
        // Show map preview below rooms
        const wrap = document.createElement('div');
        wrap.style.cssText = 'width:100%;overflow:auto;display:flex;justify-content:center;padding:10px;flex-shrink:0';
        wrap.innerHTML = mapResult.svg;
        const svgEl = wrap.querySelector('svg');
        if(svgEl){ svgEl.style.maxWidth='100%'; svgEl.style.height='auto'; }
        res.appendChild(wrap);
      }

      if(res.children.length === 0) {
        res.innerHTML = '<div class="gen-empty">Nothing generated — select a Motif and/or Map Style.</div>';
      }

      // Show action bar, update Load to Maps button visibility
      if(mapBar) {
        mapBar.style.display = 'flex';
        const mapsBtn = root.querySelector('#gen-dun-maps-btn');
        if(mapsBtn) mapsBtn.style.display = root._mapSvg ? '' : 'none';
      }
    }
  });



  // Wire Load to Maps button
  (function() {
    const mapsBtn = root.querySelector('#gen-dun-maps-btn');
    if(!mapsBtn) return;
    mapsBtn.addEventListener('click', () => {
      const svg = root._mapSvg;
      if(!svg) return;
      const dataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
      loadIntoTool('maps', dataUrl, 'dungeon-map.svg');
    });
  })();

  // Wire Load to Adventure button
  (function() {
    const mapBtn = root.querySelector('#gen-dun-map-btn');
    const regenBtn = root.querySelector('#gen-dun-regen-btn');
    if(!mapBtn) return;
    mapBtn.addEventListener('click', () => {
      const res = root.querySelector('#gen-dun-results');
      if(!res || res.querySelector('.gen-empty')) return;

      const cards    = res.querySelectorAll('.gen-card');
      const hasRooms = Array.from(cards).some(c => c.querySelector('.gen-item-desc'));
      const hasSvg   = !!root._mapSvg;
      if(!hasRooms && !hasSvg) return;

      // Build room cards HTML
      let cardsHtml = '';
      if(hasRooms) {
        cards.forEach(card => {
          const nameEl = card.querySelector('.gen-card-name');
          const descEl = card.querySelector('.gen-item-desc');
          if(!descEl) return;
          const label = nameEl ? nameEl.textContent : '';
          const desc  = descEl.textContent;
          cardsHtml += `<div class="card">
            <div class="card-label">${label.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
            <div class="card-desc">${desc.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          </div>`;
        });
      }

      // Build map section
      let mapHtml = '';
      if(hasSvg) {
        const svgB64 = btoa(unescape(encodeURIComponent(root._mapSvg)));
        mapHtml = `<div class="map-wrap"><img src="data:image/svg+xml;base64,${svgB64}" alt="Dungeon Map" style="max-width:100%;height:auto;display:block;margin:0 auto;"></div>`;
      }

      // Title from first card header
      const titleEl = res.querySelector('.gen-card-name');
      const tagEl   = res.querySelector('.gen-card-tag');
      const title   = titleEl ? titleEl.textContent : 'Dungeon';
      const tag     = tagEl   ? tagEl.textContent   : '';

      // Compose full HTML document
      const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${title}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #161616; color: #ede9e1; font-family: sans-serif; padding: 20px; }
  h1   { font-family: serif; font-size: 24px; color: #c8a020; margin-bottom: 4px; }
  .tag { font-size: 13px; color: #888; margin-bottom: 20px; }
  .card {
    background: #161616; border: 1px solid #262626;
    border-left: 3px solid #c8a020;
    padding: 14px 16px; margin-bottom: 10px; border-radius: 4px;
  }
  .card-label { font-family: monospace; font-weight: bold; font-size: 15px; color: #ede9e1; margin-bottom: 6px; }
  .card-desc  { font-size: 14px; color: #cccccc; line-height: 1.6; }
  .map-wrap   { margin-top: 24px; }
</style>
</head><body>
  <h1>${title}</h1>
  <div class="tag">${tag}</div>
  ${cardsHtml}
  ${mapHtml}
</body></html>`;

      const dataUrl = 'data:text/html;base64,' + btoa(unescape(encodeURIComponent(html)));
      loadIntoTool('adventure', dataUrl, 'dungeon.html');
    });
    if(regenBtn) regenBtn.style.display = 'none';
  })();


  // Wire Adventure Generator → Load generated map to the Maps pane
  (function() {
    const advMapsBtn = root.querySelector('#gen-adv-maps-btn');
    if(!advMapsBtn) return;
    advMapsBtn.addEventListener('click', () => {
      const svg = root._mapSvg;

      loadIntoTool('maps', dataUrl, 'adventure-map.svg');

  // Wire Adventure Generator → Load to Adventure pane
  (function() {
    const loadBtn = root.querySelector('#gen-adv-load-btn');
    if(!loadBtn) return;
    loadBtn.addEventListener('click', () => {
      const res = root.querySelector('#gen-adv-results');

      // Collect sections as HTML
      let bodyHtml = '';
      res.childNodes.forEach(node => {

          bodyHtml += node.outerHTML;
        }
      });

      const html = `<!DOCTYPE html><html><head><meta charset="utf-8">

/* ══ ROUNDED BUTTONS ══════════════════════════════════════════════════════

<script>
// ══════════════════════════════════════════
// AUDIO TOOL — TabletopAudio iframe player
// ══════════════════════════════════════════
function init_audio(root) {
  const urlInput = root.querySelector('.aud-url-input');
  const loadBtn  = root.querySelector('.aud-load');
  const clearBtn = root.querySelector('.aud-clear');
  const frame    = root.querySelector('.aud-frame');
  const empty    = root.querySelector('.aud-empty');

  const ttaBtn   = root.querySelector('.aud-tta');
  const npcBtn   = root.querySelector('.aud-npc');
  const wataBtn  = root.querySelector('.aud-wata');
  const dsBtn    = root.querySelector('.aud-ds');

  function loadUrl(url) {
    url = url.trim();
    if(!url) return;
    // Normalise to https
    url = url.replace(/^http:\/\//i, 'https://');
    if(!url.startsWith('https://')) url = 'https://tabletopaudio.com/' + url;
    frame.src = url;
    frame.style.display = 'block';
    empty.style.display = 'none';
    urlInput.value = url; // update input to show normalised URL
  }

  function clear() {
    frame.src = 'about:blank';
    frame.style.display = 'none';
    empty.style.display = 'flex';
    urlInput.value = '';
  }

  loadBtn.addEventListener('click', () => loadUrl(urlInput.value));
  urlInput.addEventListener('keydown', e => { if(e.key === 'Enter') loadUrl(urlInput.value); });
  ttaBtn.addEventListener('click', () => loadUrl('https://tabletopaudio.com/'));
  npcBtn.addEventListener('click', () => loadUrl('https://www.npcgenerator.com/'));
  wataBtn.addEventListener('click', () => loadUrl('https://watabou.github.io/'));
  dsBtn.addEventListener('click', () => loadUrl('https://app.dungeonscrawl.com/'));
  clearBtn.addEventListener('click', clear);

  root._loadUrl = loadUrl; // expose for other tools (e.g. dungeon map button)
  root._getState = () => ({ url: frame.style.display !== 'none' ? frame.src : '' });
  root._setState = (s) => {
    if(s.url) { urlInput.value = s.url; loadUrl(s.url); }
    else clear();
  };
}
</script>

<script>
// ══════════════════════════════════════════
// NOTES TOOL — rich text with H1 / H2 / Bold
// ══════════════════════════════════════════
function init_notes(root) {
  const editor = root.querySelector('.nts-editor');
  const rawArea = root.querySelector('.nts-raw');
  const mdToggle = root.querySelector('.nts-md-toggle');
  const exportBtn = root.querySelector('.nts-export');
  const importInput = root.querySelector('.nts-import-input');
  const clearBtn = root.querySelector('.nts-clear');
  const savedIndicator = root.querySelector('.nts-saved-indicator');

  if(!editor.innerHTML.trim()) editor.innerHTML = '<p><br></p>';

  let mdMode = false;

  // ── Tabs ──
  const tabBar = root.querySelector('.nts-tabs');
  let tabs = [{ name: 'Notes', md: '' }];
  let activeTab = 0;

  function currentMd() { return mdMode ? rawArea.value : domToMd(editor); }
  function saveActiveTab() { if(tabs[activeTab]) tabs[activeTab].md = currentMd(); }
  function loadActiveTab() {
    const md = (tabs[activeTab] && tabs[activeTab].md) || '';
    editor.innerHTML = md ? mdToDom(md) : '<p><br></p>';
    rawArea.value = md;
  }
  function switchTab(i) {
    if(i === activeTab) return;
    saveActiveTab();
    activeTab = i;
    loadActiveTab();
    renderTabs();
  }
  function renderTabs() {
    tabBar.innerHTML = '';
    tabs.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'nts-tab' + (i === activeTab ? ' active' : '');
      const label = document.createElement('span');
      label.textContent = t.name || 'Untitled';
      if(i === activeTab) {
        // Active tab name is editable in place
        el.title = 'Click name to edit';
        label.contentEditable = 'true';
        label.spellcheck = false;
        label.style.outline = 'none';
        label.style.minWidth = '20px';
        label.style.display = 'inline-block';
        label.addEventListener('click', e => e.stopPropagation());
        label.addEventListener('input', () => { t.name = label.textContent; });
        label.addEventListener('keydown', e => {
          if(e.key === 'Enter') { e.preventDefault(); label.blur(); }
        });
        label.addEventListener('blur', () => {
          t.name = label.textContent.trim() || 'Untitled';
          renderTabs();
        });
      }
      el.appendChild(label);
      if(tabs.length > 1) {
        const x = document.createElement('span');
        x.className = 'nts-tab-x';
        x.textContent = '✕';
        x.title = 'Close tab';
        x.onclick = (e) => {
          e.stopPropagation();
          const hasContent = (i === activeTab ? currentMd() : (t.md || '')).trim();
          if(hasContent && !confirm('Close tab "' + (t.name||'Untitled') + '"? Its notes will be deleted.')) return;
          const wasActive = (i === activeTab);
          tabs.splice(i, 1);
          if(i < activeTab) activeTab--;
          if(activeTab >= tabs.length) activeTab = tabs.length - 1;
          if(wasActive) loadActiveTab();
          renderTabs();
        };
        el.appendChild(x);
      }
      el.onclick = () => switchTab(i);
      tabBar.appendChild(el);
    });
    const add = document.createElement('button');
    add.className = 'nts-tab-add';
    add.textContent = '+';
    add.title = 'New tab';
    add.onclick = () => {
      saveActiveTab();
      tabs.push({ name: 'Tab ' + (tabs.length + 1), md: '' });
      activeTab = tabs.length - 1;
      loadActiveTab();
      renderTabs();
    };
    tabBar.appendChild(add);
  }
  renderTabs();

  mdToggle.addEventListener('click', () => {
    mdMode = !mdMode;
    mdToggle.classList.toggle('active', mdMode);
    if(mdMode) {
      // Switch to raw MD view: convert DOM → markdown
      rawArea.value = domToMd(editor);
      editor.style.display = 'none';
      rawArea.style.display = 'flex';
      rawArea.style.flex = '1';
      rawArea.focus();
    } else {
      // Switch back to preview: parse markdown → DOM
      editor.innerHTML = mdToDom(rawArea.value);
      rawArea.style.display = 'none';
      editor.style.display = '';
      editor.focus();
    }
  });

  // ── Helpers ──
  function getSelection() { return window.getSelection(); }
  function getCursorBlock() {
    const sel = getSelection();
    if(!sel.rangeCount) return null;
    let node = sel.getRangeAt(0).startContainer;
    while(node && node !== editor) {
      if(node.parentNode === editor) return node;
      node = node.parentNode;
    }
    return null;
  }
  function setCursorAtEnd(el) {
    const range = document.createRange();
    const sel = getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
  function setCursorAtStart(el) {
    const range = document.createRange();
    const sel = getSelection();
    range.setStart(el, 0);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  // ── Inline markdown: convert **bold**, *italic*, `code` ──
  // Called after the closing delimiter is typed. Replaces block content
  // and places cursor in a fresh text node AFTER the inline element.
  function applyInline(block) {
    let text = '';
    block.childNodes.forEach(n => {
      if(n.nodeType === 3) text += n.textContent;
      else if(n.nodeName === 'STRONG') text += '**' + n.textContent + '**';
      else if(n.nodeName === 'EM') text += '*' + n.textContent + '*';
      else if(n.nodeName === 'CODE') text += '`' + n.textContent + '`';
      else text += n.textContent;
    });

    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Only replace if something actually changes
    const rendered = esc(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/(?<!\*)\*(.+?)\*(?!\*)/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
    if(rendered === esc(text)) return; // nothing to convert

    // Rebuild the block — append a trailing plain text node so the cursor
    // lands outside the inline element, not inside it
    block.innerHTML = rendered;
    const trail = document.createTextNode('\u200B'); // zero-width space as anchor
    block.appendChild(trail);
    const range = document.createRange();
    const sel = getSelection();
    range.setStartAfter(trail);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  // ── Block-level conversion: triggered on Enter for heading/quote prefixes ──
  function tryBlockConvert(block) {
    const text = block.textContent.replace(/\u200B/g, ''); // strip zero-width spaces
    let newTag = null, newText = null;

    if(/^# (.+)/.test(text))        { newTag = 'h1'; newText = text.slice(2).trim(); }
    else if(/^## (.+)/.test(text))  { newTag = 'h2'; newText = text.slice(3).trim(); }
    else if(/^### (.+)/.test(text)) { newTag = 'h3'; newText = text.slice(4).trim(); }
    else if(/^> (.*)/.test(text))   { newTag = 'blockquote'; newText = text.slice(2).trim(); }
    else if(/^[-*] (.*)/.test(text)){ newTag = 'li-ul'; newText = text.replace(/^[-*] /,'').trim(); }
    else if(/^---+$/.test(text.trim())) { newTag = 'hr'; newText = ''; }

    if(!newTag) return false;

    const newEl = document.createElement(newTag === 'li-ul' ? 'li' : (newTag === 'hr' ? 'hr' : newTag));

    if(newTag === 'hr') {
      editor.insertBefore(newEl, block);
      const p = document.createElement('p'); p.innerHTML = '<br>';
      editor.insertBefore(p, block);
      block.remove();
      setCursorAtStart(p);
    } else if(newTag === 'li-ul') {
      const prev = block.previousSibling;
      let ul = (prev && prev.nodeName === 'UL') ? prev : null;
      if(!ul) { ul = document.createElement('ul'); editor.insertBefore(ul, block); }
      newEl.innerHTML = newText || '<br>';
      ul.appendChild(newEl);
      block.remove();
      setCursorAtEnd(newEl);
    } else {
      newEl.innerHTML = newText || '<br>';
      editor.insertBefore(newEl, block);
      block.remove();
      setCursorAtEnd(newEl);
    }
    return true;
  }

  // ── Enter key handler ──
  editor.addEventListener('keydown', e => {
    if(e.key === 'Enter') {
      const block = getCursorBlock();
      if(!block) return;
      const tag = block.nodeName;
      const text = block.textContent.replace(/\u200B/g,'');

      // If current block has a heading/blockquote prefix → convert it first, then make new para
      if(tag === 'P' || tag === 'DIV') {
        if(/^#{1,3} .+/.test(text) || /^> /.test(text) || /^[-*] /.test(text) || /^---+$/.test(text.trim())) {
          e.preventDefault();
          const converted = tryBlockConvert(block);
          if(converted) {
            // After conversion, the new block is already focused — add a paragraph after it
            const focused = getCursorBlock();
            if(focused && focused.nodeName !== 'P') {
              const p = document.createElement('p'); p.innerHTML = '<br>';
              focused.after(p);
              setCursorAtStart(p);
            }
          }
          return;
        }
      }

      // Headings/blockquotes already converted → Enter exits to new paragraph
      if(['H1','H2','H3','BLOCKQUOTE'].includes(tag)) {
        e.preventDefault();
        const p = document.createElement('p'); p.innerHTML = '<br>';
        block.after(p);
        setCursorAtStart(p);
        return;
      }

      // Empty list item → exit list
      if(tag === 'LI' && !text.trim()) {
        e.preventDefault();
        const ul = block.closest('ul,ol');
        const p = document.createElement('p'); p.innerHTML = '<br>';
        ul.after(p);
        block.remove();
        if(!ul.children.length) ul.remove();
        setCursorAtStart(p);
      }
    }

    // Backspace at start of heading → back to paragraph
    if(e.key === 'Backspace') {
      const sel = getSelection();
      if(!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      const block = getCursorBlock();
      if(!block) return;
      const tag = block.nodeName;
      if(['H1','H2','H3','BLOCKQUOTE'].includes(tag) && range.startOffset === 0 && range.collapsed) {
        e.preventDefault();
        const p = document.createElement('p');
        p.innerHTML = block.innerHTML || '<br>';
        editor.insertBefore(p, block);
        block.remove();
        setCursorAtStart(p);
      }
    }
  });

  // ── Input handler: inline markdown only ──
  editor.addEventListener('input', () => {
    if(!editor.innerHTML.trim() || editor.innerHTML === '<br>') {
      editor.innerHTML = '<p><br></p>';
    }
    const block = getCursorBlock();
    if(block && block.nodeType === 1) {
      const text = block.textContent.replace(/\u200B/g,'');
      // Inline conversion: fire when a closing delimiter is completed
      const hasBold   = (text.match(/\*\*/g)||[]).length >= 2;
      const hasItalic = (text.match(/(?<!\*)\*(?!\*)/g)||[]).length >= 2;
      const hasCode   = (text.match(/`/g)||[]).length >= 2;
      if(hasBold || hasItalic || hasCode) applyInline(block);
    }
    flashSaved();
  });

  let saveTimeout;
  function flashSaved() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      savedIndicator.textContent = '✓ Up to date';
      savedIndicator.classList.add('show');
      setTimeout(() => savedIndicator.classList.remove('show'), 1500);
    }, 800);
  }

  // ── Export: walk DOM → Markdown ──
  function domToMd(el) {
    let md = '';
    el.childNodes.forEach(node => {
      if(node.nodeType === 3) { md += node.textContent; return; }
      const t = node.nodeName;
      const inner = node.textContent;
      if(t === 'H1') md += '# ' + inner + '\n\n';
      else if(t === 'H2') md += '## ' + inner + '\n\n';
      else if(t === 'H3') md += '### ' + inner + '\n\n';
      else if(t === 'BLOCKQUOTE') md += '> ' + inner + '\n\n';
      else if(t === 'HR') md += '---\n\n';
      else if(t === 'UL') { node.querySelectorAll('li').forEach(li => { md += '- ' + li.textContent + '\n'; }); md += '\n'; }
      else if(t === 'OL') { let i=1; node.querySelectorAll('li').forEach(li => { md += (i++) + '. ' + li.textContent + '\n'; }); md += '\n'; }
      else if(t === 'P' || t === 'DIV') {
        // Inline: reconstruct with markdown markers
        let line = '';
        node.childNodes.forEach(c => {
          if(c.nodeType === 3) line += c.textContent;
          else if(c.nodeName === 'STRONG') line += '**' + c.textContent + '**';
          else if(c.nodeName === 'EM') line += '*' + c.textContent + '*';
          else if(c.nodeName === 'CODE') line += '`' + c.textContent + '`';
          else line += c.textContent;
        });
        if(line.trim()) md += line + '\n\n';
      }
    });
    return md.trim();
  }

  // ── Import: Markdown → DOM ──
  function mdToDom(md) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const inline = s => esc(s)
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code>$1</code>');
    let html = '';
    const lines = md.split('\n');
    let ulOpen = false;
    const closeUl = () => { if(ulOpen){ html += '</ul>'; ulOpen = false; } };
    lines.forEach(line => {
      if(/^# (.+)/.test(line))       { closeUl(); html += `<h1>${inline(line.slice(2))}</h1>`; }
      else if(/^## (.+)/.test(line)) { closeUl(); html += `<h2>${inline(line.slice(3))}</h2>`; }
      else if(/^### (.+)/.test(line)){ closeUl(); html += `<h3>${inline(line.slice(4))}</h3>`; }
      else if(/^> (.*)/.test(line))  { closeUl(); html += `<blockquote>${inline(line.slice(2))}</blockquote>`; }
      else if(/^---+$/.test(line.trim())){ closeUl(); html += '<hr>'; }
      else if(/^[-*] (.+)/.test(line)){ if(!ulOpen){html+='<ul>';ulOpen=true;} html += `<li>${inline(line.replace(/^[-*] /,''))}</li>`; }
      else if(line.trim() === '')    { closeUl(); html += '<p><br></p>'; }
      else                           { closeUl(); html += `<p>${inline(line)}</p>`; }
    });
    closeUl();
    return html || '<p><br></p>';
  }

  exportBtn.addEventListener('click', () => {
    const md = mdMode ? rawArea.value.trim() : domToMd(editor);
    if(!md) { alert('No notes to export yet.'); return; }
    const blob = new Blob([md], {type: 'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `session_notes_${new Date().toISOString().slice(0,10)}.md`; a.click();
    URL.revokeObjectURL(url);
  });

  if(importInput) {
    importInput.addEventListener('change', () => {
      const file = importInput.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const hasContent = mdMode ? rawArea.value.trim() : editor.textContent.trim();
        if(hasContent && !confirm('Replace current notes with imported content?')) { importInput.value=''; return; }
        if(mdMode) {
          rawArea.value = e.target.result;
        } else {
          editor.innerHTML = mdToDom(e.target.result);
        }
        importInput.value = '';
      };
      reader.readAsText(file);
    });
  }

  clearBtn.addEventListener('click', () => {
    const hasContent = mdMode ? rawArea.value.trim() : editor.textContent.trim();
    if(!hasContent) return;
    if(confirm('Clear all session notes? This cannot be undone.')) {
      editor.innerHTML = '<p><br></p>';
      rawArea.value = '';
      if(mdMode) { rawArea.style.display='flex'; rawArea.style.flex='1'; }
    }
  });

  // ── State: store as Markdown ──
  root._getState = () => {
    saveActiveTab();
    return { tabs: tabs.map(t => ({ name: t.name, md: t.md })), active: activeTab };
  };
  root._setState = (s) => {
    if(!s) return;
    if(Array.isArray(s.tabs) && s.tabs.length) {
      tabs = s.tabs.map(t => ({ name: t.name || 'Notes', md: t.md || '' }));
      activeTab = Math.min(s.active || 0, tabs.length - 1);
    } else if(s.md !== undefined) {
      tabs = [{ name: 'Notes', md: s.md }];
      activeTab = 0;
    } else if(s.html) {
      editor.innerHTML = s.html;
      tabs = [{ name: 'Notes', md: domToMd(editor) }];
      activeTab = 0;
    }
    loadActiveTab();
    renderTabs();
  };
}
</script>


<script>
// All init_* functions are now defined — safe to render the first pane.
// Also bust bfcache so mobile browsers don't restore stale state.
window.addEventListener('pageshow', function(e) {
  if(e.persisted) window.location.reload();
});
renderPane(1);

// ══════════════════════════════════════════
// SESSION SAVE / LOAD
// Collects state from all live tool instances and writes to a JSON file.
// On load, restores state into each instance (creating them first if needed).
// Note: Loaded media (PDFs, images) cannot be saved — only text/data state.
// ══════════════════════════════════════════
function saveSession() {
  const data = {
    version: 1,
    saved: new Date().toISOString(),
    paneTools,
    splitMode: splitPref,
    tools: {}
  };

  // Collect state from every instantiated tool
  Object.entries(instances).forEach(([type, node]) => {
    if(node._getState) {
      try { data.tools[type] = node._getState(); } catch(e) {}
    }
  });

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `dungeon_desk_session_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadSession(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.version) throw new Error('Unrecognised file');

      // Restore pane layout
      if(data.splitMode) setSplit(data.splitMode);
      if(data.paneTools) {
        setPaneTool(1, data.paneTools[1] || 'adventure');
        setPaneTool(2, data.paneTools[2] || 'trackers');
      }

      // Restore each tool's state (instantiate it first if not yet created)
      if(data.tools) {
        migrateToolState(data.tools);
        Object.entries(data.tools).forEach(([type, state]) => {
          const node = getOrCreateInstance(type);
          if(node._setState) {
            try { node._setState(state); } catch(err) { console.warn('setState failed for', type, err); }
          }
        });
      }

      // Re-render panes so restored state is visible
      renderPane(1);
      for(let p = 2; p <= (data.splitMode || 1); p++) renderPane(p);

    } catch(err) {
      alert('Could not load session file: ' + err.message);
    }
    input.value = ''; // reset so the same file can be loaded again
  };
  reader.readAsText(file);
}

// ── Server persistence hooks (used by the injected shim when running on Dungeon Desk) ──
// __gmScreenGetState: returns the full session state as a plain object
window.__gmScreenGetState = function() {
  const data = { version: 1, paneTools, splitMode: splitPref, tools: {} };
  Object.entries(instances).forEach(([type, node]) => {
    if(node._getState) try { data.tools[type] = node._getState(); } catch(e) {}
  });
  return data;
};

// __gmScreenSetState: restores a previously saved state object
window.__gmScreenSetState = function(data) {
  if(!data || !data.version) return;
  if(data.splitMode) setSplit(data.splitMode);
  if(data.paneTools) {
    setPaneTool(1, data.paneTools[1] || 'adventure');
    setPaneTool(2, data.paneTools[2] || 'trackers');
  }
  if(data.tools) {
    migrateToolState(data.tools);
    Object.entries(data.tools).forEach(([type, state]) => {
      const node = getOrCreateInstance(type);
      if(node._setState) try { node._setState(state); } catch(e) {}
    });
  }
  renderPane(1);
  for(let p = 2; p <= (data.splitMode || 1); p++) renderPane(p);
};

});

// ═══ DICE TRAY & ROLL LOG ═══════════════════════════════════════════════════
function init_dice(root) {
  const trayEl = root.querySelector('.dice-tray');
  const poolEl = root.querySelector('.dice-pool');
  const logEl = root.querySelector('.dice-log');
  const clearBtn = root.querySelector('.dice-clear');

  let pool = {};       // {6: 2, 20: 1}
  let modifier = 0;
  let advMode = 'none'; // none | adv | dis
  let log = [];         // [{label, detail, total, crit, adv, remote?, source?}]

  // ── Campaign link ──
  let campaign = null; // {id, code, name}
  const clientKey = 'gm-' + Math.random().toString(36).slice(2, 12);
  let campLastId = 0;
  let campTimer = null;
  let hideRolls = false; // GM can hide their rolls from the campaign
  let campPanelOpen = false;

  function campBroadcast(entry) {
    if(!campaign || hideRolls) return;
    fetch('/api/campaigns/' + campaign.id + '/rolls', {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({
        clientKey, source: 'GM',
        label: entry.label, result: String(entry.total),
        detail: entry.detail, type: entry.crit || 'normal'
      })
    }).catch(()=>{});
  }
  async function campPoll() {
    if(!campaign) return;
    try {
      const url = '/api/campaigns/' + campaign.id + '/rolls' + (campLastId ? '?since='+campLastId : '');
      const r = await fetch(url, { credentials: 'same-origin' });
      if(!r.ok) return;
      const data = await r.json();
      let added = false;
      (data.rolls||[]).forEach(roll=>{
        if(roll.clientKey === clientKey) return;
        log.unshift({ label: roll.label, detail: roll.detail, total: roll.result,
                      crit: roll.type==='normal' ? '' : roll.type, adv: 'none',
                      remote: true, source: roll.source });
        added = true;
      });
      if(log.length > 100) log.length = 100;
      if(data.last) campLastId = data.last;
      if(added) renderLog();
    } catch(e) {}
  }
  function campStart() {
    if(campTimer) clearInterval(campTimer);
    campPoll();
    campTimer = setInterval(campPoll, 4000);
  }
  function campStop() { if(campTimer) { clearInterval(campTimer); campTimer = null; } }

  const DICE = [4, 6, 8, 10, 12, 20, 100];

  function poolLabel() {
    const parts = Object.entries(pool).filter(([,n])=>n>0).map(([d,n])=>n+'d'+d);
    let s = parts.join(' + ');
    if(modifier) s += (s?' ':'') + (modifier>0?'+':'') + modifier;
    return s;
  }

  function renderTray() {
    const label = poolLabel();
    let h = '<div class="dice-pool-label-row"><span class="dice-pool-label">'+(label||'Tap dice to build a roll')+'</span></div>';
    h += '<div class="dice-btn-row">';
    DICE.forEach(d=>{
      const n = pool[d]||0;
      h += '<button class="dice-die'+(n?' has':'')+'" data-d="'+d+'">d'+d+(n?'<span class="dice-count">'+n+'</span>':'')+'</button>';
    });
    h += '</div>';
    trayEl.innerHTML = h;
    trayEl.querySelectorAll('.dice-die').forEach(b=>{
      b.onclick = ()=>{ const d = parseInt(b.dataset.d); pool[d]=(pool[d]||0)+1; renderTray(); renderPool(); };
      b.oncontextmenu = (e)=>{ e.preventDefault(); const d = parseInt(b.dataset.d); if(pool[d]) pool[d]--; renderTray(); renderPool(); };
    });
  }

  function renderPool() {
    let h = '<div class="dice-pool-row">';
    // Order: Link · Bonus · ADV · DIS · ✕ · Roll
    h += '<button class="dice-camp-btn'+(campaign?' on':'')+'" title="'+(campaign?'Campaign: '+campaign.name:'Campaign link')+'">🔗</button>';
    if(campaign) h += '<button class="dice-hide-btn'+(hideRolls?' on':'')+'" title="'+(hideRolls?'Rolls hidden from campaign — click to share':'Rolls shared with campaign — click to hide')+'">'+(hideRolls?'🙈':'👁')+'</button>';
    h += '<input type="number" class="dice-mod" value="'+(modifier||'')+'" placeholder="+0" title="Bonus">';
    h += '<button class="dice-advbtn'+(advMode==='adv'?' on-adv':'')+'" data-m="adv" title="Advantage (d20)">ADV</button>';
    h += '<button class="dice-advbtn'+(advMode==='dis'?' on-dis':'')+'" data-m="dis" title="Disadvantage (d20)">DIS</button>';
    h += '<button class="dice-pool-clear" title="Clear pool">✕</button>';
    h += '<button class="dice-roll-go" title="Roll">🎲 Roll</button>';
    h += '</div>';
    h += '<div class="dice-camp-panel" style="display:'+(campPanelOpen?'block':'none')+';"></div>';
    poolEl.innerHTML = h;
    if(campPanelOpen) renderCampPanel(poolEl.querySelector('.dice-camp-panel'));
    poolEl.querySelector('.dice-mod').onchange = (e)=>{ modifier = parseInt(e.target.value)||0; renderTray(); };
    poolEl.querySelectorAll('.dice-advbtn').forEach(b=>{
      b.onclick = ()=>{ advMode = advMode===b.dataset.m ? 'none' : b.dataset.m; renderPool(); };
    });
    poolEl.querySelector('.dice-roll-go').onclick = doRoll;
    poolEl.querySelector('.dice-pool-clear').onclick = ()=>{ pool={}; modifier=0; advMode='none'; renderTray(); renderPool(); };
    const hideBtn = poolEl.querySelector('.dice-hide-btn');
    if(hideBtn) hideBtn.onclick = ()=>{ hideRolls = !hideRolls; renderPool(); };
    poolEl.querySelector('.dice-camp-btn').onclick = ()=>{
      campPanelOpen = !campPanelOpen;
      renderPool();
    };
  }

  function renderCampPanel(panel) {
    const inputStyle = 'flex:1;min-width:80px;padding:6px 8px;background:var(--panel);border:1px solid var(--border);border-radius:4px;color:var(--light);font-family:Montserrat,sans-serif;font-size:10px;outline:none;';
    const btnStyle = 'padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:900;font-size:9px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;';
    if(campaign) {
      panel.innerHTML = '<div class="dice-camp-row">'
        + '<span style="font-family:Montserrat,sans-serif;font-size:10px;color:var(--gold);flex:1;">🔗 <b>'+campaign.name+'</b> · code <b style="letter-spacing:.15em;">'+campaign.code+'</b></span>'
        + '<button class="camp-leave" style="'+btnStyle+'background:#3a1a1a;color:#df8a8a;border:1px solid #7a2d2d;">Leave</button>'
        + '</div>';
      panel.querySelector('.camp-leave').onclick = ()=>{
        campStop(); campaign = null; campLastId = 0;
        campPanelOpen = false; renderPool();
      };
    } else {
      panel.innerHTML = '<div class="dice-camp-row">'
        + '<input type="text" class="camp-name" placeholder="Campaign name..." style="'+inputStyle+'">'
        + '<button class="camp-create" style="'+btnStyle+'background:var(--gold);color:#1a1a1a;">Create</button>'
        + '</div><div class="dice-camp-row">'
        + '<input type="text" class="camp-code" placeholder="Join code..." maxlength="6" style="'+inputStyle+'text-transform:uppercase;letter-spacing:.12em;">'
        + '<button class="camp-join" style="'+btnStyle+'background:#1a5a7a;color:#fff;">Join</button>'
        + '</div><div class="camp-err" style="font-family:Montserrat,sans-serif;font-size:9px;color:#df6a6a;padding:2px 0;"></div>';
      const err = (m)=>{ panel.querySelector('.camp-err').textContent = m; };
      panel.querySelector('.camp-create').onclick = async ()=>{
        const name = panel.querySelector('.camp-name').value.trim() || 'New Campaign';
        try {
          const r = await fetch('/api/campaigns', { method:'POST', credentials:'same-origin',
            headers:{'content-type':'application/json'}, body: JSON.stringify({name}) });
          if(!r.ok) throw 0;
          campaign = await r.json(); campLastId = 0; campStart(); campPanelOpen = false; renderPool();
        } catch(e) { err('Could not create — are you signed in?'); }
      };
      panel.querySelector('.camp-join').onclick = async ()=>{
        const code = panel.querySelector('.camp-code').value.trim().toUpperCase();
        if(!code) { err('Enter a join code.'); return; }
        try {
          const r = await fetch('/api/campaigns?code=' + encodeURIComponent(code), { credentials:'same-origin' });
          if(r.status === 404) { err('No campaign with that code.'); return; }
          if(!r.ok) throw 0;
          campaign = await r.json(); campLastId = 0; campStart(); campPanelOpen = false; renderPool();
        } catch(e) { err('Could not join — are you signed in?'); }
      };
    }
  }

  function doRoll() {
    const dice = Object.entries(pool).filter(([,n])=>n>0).map(([d,n])=>[parseInt(d), n]);
    if(!dice.length && !modifier) return;
    let detailParts = [];
    let total = modifier;
    let crit = '';
    const isSingleD20 = dice.length===1 && dice[0][0]===20 && dice[0][1]===1;
    dice.forEach(([d, n])=>{
      if(d===20 && isSingleD20 && advMode!=='none') {
        const r1 = 1+Math.floor(Math.random()*20), r2 = 1+Math.floor(Math.random()*20);
        const keep = advMode==='adv' ? Math.max(r1,r2) : Math.min(r1,r2);
        detailParts.push('d20('+r1+','+r2+' '+(advMode==='adv'?'▲':'▼')+' '+keep+')');
        total += keep;
        if(keep===20) crit='crit'; else if(keep===1) crit='fumble';
      } else {
        const rolls = [];
        for(let i=0;i<n;i++){ rolls.push(1+Math.floor(Math.random()*d)); }
        detailParts.push(n+'d'+d+'('+rolls.join(',')+')');
        total += rolls.reduce((a,b)=>a+b,0);
        if(d===20 && n===1) { if(rolls[0]===20) crit='crit'; else if(rolls[0]===1) crit='fumble'; }
      }
    });
    if(modifier) detailParts.push((modifier>0?'+':'')+modifier);
    const entry = {
      label: poolLabel() || String(modifier),
      adv: isSingleD20 ? advMode : 'none',
      detail: detailParts.join(' '),
      total, crit
    };
    log.unshift(entry);
    if(log.length > 100) log.length = 100;
    renderLog();
    campBroadcast(entry);
  }

  function renderLog() {
    if(!log.length) {
      logEl.innerHTML = '<div class="dice-log-hint">Tap dice and roll — results appear here</div>';
      return;
    }
    logEl.innerHTML = log.map(e=>{
      const critTag = e.crit==='crit' ? ' ★ NAT 20' : e.crit==='fumble' ? ' ✗ NAT 1' : '';
      const advTag = e.adv==='adv' ? ' <span style="color:#6dbf6d;font-size:8px;">▲ADV</span>'
                   : e.adv==='dis' ? ' <span style="color:#df6a6a;font-size:8px;">▼DIS</span>' : '';
      const srcTag = e.remote ? '<span style="color:#8a7ac8;">'+String(e.source||'').replace(/</g,'&lt;')+'</span> · ' : '';
      return '<div class="dice-log-entry'+(e.remote?' remote':'')+(e.crit==='crit'?' crit':e.crit==='fumble'?' fumble':'')+'">'
        + '<div class="roll-label">'+srcTag+String(e.label).replace(/</g,'&lt;')+critTag+advTag+'</div>'
        + '<div class="roll-result">'+e.total+'</div>'
        + '<div class="roll-detail">'+e.detail+'</div>'
        + '</div>';
    }).join('');
    logEl.scrollTop = 0;
  }

  clearBtn.addEventListener('click', ()=>{ log = []; renderLog(); });

  root._getState = () => ({ log, campaign, hideRolls });
  root._setState = (s) => {
    if(!s) return;
    if(Array.isArray(s.log)) log = s.log;
    if(s.campaign && s.campaign.id) { campaign = s.campaign; campStart(); }
    if(typeof s.hideRolls === 'boolean') hideRolls = s.hideRolls;
    renderLog();
    renderPool();
  };

  renderTray();
  renderPool();
  renderLog();
}
window.init_dice = init_dice;

</script>
