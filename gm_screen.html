function rollD(max) { return Math.ceil(Math.random()*max); }
function rollTable(tbl, val) { for(const [n,r] of tbl) if(val<=n) return r; return tbl[tbl.length-1][1]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function card(html) { const d=document.createElement('div'); d.className='gen-card'; d.innerHTML=html; return d; }
function row(label, val) { return `<div class="gen-card-row"><span class="gen-card-row-label">${label}</span><span>${esc(val)}</span></div>`; }
function tag(t, v) { return `<span class="gen-card-tag">${esc(t)}: ${esc(v)}</span> `; }

// ── Mundane Loot ──────────────────────────────────────────────────────────
function genMundaneLoot(subtype) {
  if(subtype==='gem') {
    const gem = R(GEMS);
    const isGiant = Math.random() < 0.15;
    const name = isGiant ? 'Giant '+gem.name : gem.name;
    const val  = gem.value.replace(/^(\d+)/, n => isGiant ? n*2 : n);
    return card(`<div class="gen-item-name">${esc(name)}</div><div class="gen-item-desc">Value: ${esc(val)}</div>`);
  }
  if(subtype==='luxury') {
    const feat = R(LUX_FEAT); const pool = R(LUX_ITEM_POOLS); const item = R(pool);
    return card(`<div class="gen-item-name">Luxury Item</div><div class="gen-item-desc">${esc(feat)} ${esc(item)}</div>`);
  }
  return card(`<div class="gen-item-name">Mundane Loot</div><div class="gen-item-desc">${esc(R(MUNDANE_LOOT))}</div>`);
}

// ── Rival Crawlers ────────────────────────────────────────────────────────
function genRivalCrawler(size, disp) {
  const count = size==='random' ? (Math.ceil(Math.random()*4)+1) : parseInt(size);
  const disposition = disp==='random' ? R(['Hostile','Wary','Neutral','Neutral','Friendly']) : disp;
  const goal = R(RC_GOALS);
  const quirk = R(RC_QUIRKS);
  const gear = R(RC_GEAR_HINTS);
  const dispDetail = R(RC_DISPOSITION_DETAILS[disposition]||RC_DISPOSITION_DETAILS.Neutral);
  const members = [];
  for(let i=0;i<count;i++) {
    const anc = R(RC_ANCESTRY);
    const cls = R(RC_CLASSES);
    const name = R(NPC_NAMES[anc]||NPC_NAMES.Human);
    members.push(`${name} (${anc} ${cls})`);
  }
  return card(`
    <div class="gen-card-header"><span class="gen-card-name">Rival Crawlers</span>
    <span class="gen-card-tag">${count} crawlers · ${esc(disposition)}</span></div>
    <div class="gen-card-row"><span class="gen-card-row-label">Members</span>
    <span>${members.map(esc).join('<br>')}</span></div>
    <hr class="gen-card-divider">
    ${row('Goal', goal)} ${row('Quirk', quirk)} ${row('Gear', gear)}
    ${row('Behaviour', dispDetail)}
  `);
}

// ── NPC ───────────────────────────────────────────────────────────────────
function genNPC(ancestry, wealth) {
  const anc  = ancestry==='random'?R(['Human','Human','Human','Dwarf','Elf','Halfling','Half-Orc','Goblin']):ancestry;
  const wlth = wealth==='random'?R(['Poor','Poor','Standard','Standard','Standard','Wealthy']):wealth;
  const pool = NPC_NAMES[anc]||NPC_NAMES.Human;
  const name = R(pool);
  const age  = anc==='Goblin'?`${rollD(20)+5}`:anc==='Elf'?`${rollD(400)+50}`:anc==='Dwarf'?`${rollD(200)+30}`:`${rollD(40)+15}`;
  return card(`
    <div class="gen-card-header"><span class="gen-card-name">${esc(name)}</span><span class="gen-card-tag">${esc(anc)} · ${esc(wlth)}</span></div>
    ${row('Age',age)} ${row('Build',`${R(BUILDS)}, ${R(HAIR)} hair, ${R(EYES)} eyes`)}
    ${row('Dress',R(CLOTHING[wlth]))} ${row('Feature',R(FEATURES))}
    <hr class="gen-card-divider">
    ${row('Occupation',R(OCCUPATIONS))} ${row('Demeanor',R(DEMEANOR))}
    ${row('Quirk',R(QUIRKS))} ${row('Wants',R(WANTS))}
    ${row('Secret',R(SECRETS))} ${row('Coin',COIN[wlth]())}
  `);
}

// ── Treasure ─────────────────────────────────────────────────────────────
function genTreasure(tierKey, type) {
  if(type==='random_all') {
    // Equal chance across all categories
    type = R(['random','random','Weapon','Armor','Wand','Ring','Cloak','Boots',
              'Potion','Scroll','table','mundane','gem','luxury']);
  }
  if(type==='table') {
    const tier = TREASURE_TIERS[tierKey]||TREASURE_T1;
    return card(`<div class="gen-item-name">Treasure Table Roll (Tier ${tierKey})</div><div class="gen-item-desc">${esc(R(tier))}</div>`);
  }
  if(type==='mundane' || type==='gem' || type==='luxury') return genMundaneLoot(type);
  const pool = type==='random'?MAGIC_ITEM_POOLS[R(LOOT_TYPES)]:(MAGIC_ITEM_POOLS[type]||POTIONS);
  const item = R(pool);
  return card(`<div class="gen-item-name">${esc(item.name)}</div><div class="gen-item-desc">${esc(item.desc)}</div>`);
}

// ── Shop/Tavern ──────────────────────────────────────────────────────────
function genShop(type, tier) {
  const t = type==='random'?R(['Shop','Tavern']):type;
  const t2 = tier==='random'?R(['Poor','Standard','Standard','Wealthy']):tier;
  const isShop=t==='Shop';
  const name = R(isShop?SHOP_NAMES[t2]:TAVERN_NAMES[t2]);
  const prop = `${R(NPC_NAMES.Human)}, ${isShop?R(['Shopkeeper','Merchant','Trader']):R(['Innkeeper','Barkeep','Host'])}`;
  if(isShop) {
    const stock=[...SHOP_STOCK[t2]].sort(()=>Math.random()-.5).slice(0,6);
    return card(`<div class="gen-card-header"><span class="gen-card-name">${esc(name)}</span><span class="gen-card-tag">Shop · ${esc(t2)}</span></div>${row('Proprietor',prop)}<hr class="gen-card-divider"><div class="gen-card-row"><span class="gen-card-row-label">Stock</span><span>${stock.map(esc).join('<br>')}</span></div>`);
  } else {
    const menu=[...TAVERN_FOOD[t2]].sort(()=>Math.random()-.5).slice(0,4);
    const rooms=t2==='Poor'?'Shared floor (2 cp/night)':t2==='Wealthy'?'Private room (1 gp/night)':'Shared room (5 cp/night)';
    return card(`<div class="gen-card-header"><span class="gen-card-name">${esc(name)}</span><span class="gen-card-tag">Tavern · ${esc(t2)}</span></div>${row('Proprietor',prop)}<hr class="gen-card-divider"><div class="gen-card-row"><span class="gen-card-row-label">Menu</span><span>${menu.map(esc).join('<br>')}</span></div>${row('Lodging',rooms)}<hr class="gen-card-divider">${row('Rumour',R(TAVERN_RUMORS_EXTRA))}`);
  }
}

// ── Encounter ────────────────────────────────────────────────────────────
function genEncounter(danger, chamod, biome) {
  const distRoll = rollD(6);
  const dist = rollTable(ENC_DISTANCE, distRoll);
  const actRoll = rollD(6)+rollD(6);
  const act = rollTable(ENC_ACTIVITY, actRoll);
  const reacRoll = rollD(6)+rollD(6)+parseInt(chamod||0);
  const reac = ENC_REACTION(reacRoll);
  const hasTreasure = Math.random()>=0.5;
  let biomeRows = '';
  if(biome && biome !== 'none') {
    const creatures = BIOME_CREATURES[biome]||[];
    const features  = BIOME_FEATURES[biome]||[];
    const biomeLabel = biome.charAt(0).toUpperCase()+biome.slice(1);
    if(creatures.length) biomeRows += row('Creature', R(creatures));
    if(features.length)  biomeRows += row('Feature',  R(features));
  }
  const biomeTag = (biome && biome!=='none') ? ' · '+(biome.charAt(0).toUpperCase()+biome.slice(1)) : '';
  return card(`
    <div class="gen-card-header"><span class="gen-card-name">Random Encounter</span>
    <span class="gen-card-tag">${esc(danger)}${esc(biomeTag)}</span></div>
    ${row('Distance',dist)} ${row('Activity',act)}
    ${row('Reaction',`${reac} (rolled ${reacRoll})`)}
    ${row('Treasure',hasTreasure?'Yes (roll on treasure table)':'None (50% chance — no treasure)')}
    ${biomeRows}
    <hr class="gen-card-divider">
    <div class="gen-card-row"><span class="gen-card-row-label">Check</span>
    <span>Roll 1d6 every ${danger==='Unsafe'?'3':danger==='Risky'?'2':'1'} round(s). Encounter on a 1.</span></div>
  `);
}

// ── Monster Generator ─────────────────────────────────────────────────────
function genMonster(pl, numMut) {
  pl = parseInt(pl)||1;
  const entry = MON_TABLE[rollD(20)-1];
  const hd_adj = entry.combat==='PL'?0:entry.combat.includes('+')?(parseInt(entry.combat.replace('PL+',''))):(-parseInt(entry.combat.replace('PL-','')));
  const hd = Math.max(1, pl+hd_adj);
  const ac = pl+10;
  const hp = hd*4+hd;
  const atk = Math.min(hd, hd+1);
  const muts = [];
  for(let i=0;i<parseInt(numMut||0);i++) { muts.push(`${R(MON_MUT_1)} / ${R(MON_MUT_2)} / ${R(MON_MUT_3)}`); }
  return card(`
    <div class="gen-card-header"><span class="gen-card-name">${esc(entry.quality)} Creature</span><span class="gen-card-tag">HD ${hd} · PL ${pl}</span></div>
    ${row('AC',`${ac}`)} ${row('HP',`${hp} (${hd}d8)`)} ${row('ATK',`+${atk}, 1d${hd<=3?6:hd<=6?8:10} dmg`)}
    <hr class="gen-card-divider">
    ${row('Strength',entry.strength)} ${row('Weakness',entry.weakness)}
    ${muts.length?'<hr class="gen-card-divider">'+muts.map((m,i)=>`<div class="gen-card-row"><span class="gen-card-row-label">Mutation ${i+1}</span><span>${esc(m)}</span></div>`).join(''):''}
    <hr class="gen-card-divider">
    <div class="gen-card-row"><span class="gen-card-row-label">Treasure</span><span>Roll on Treasure ${hd<=3?'1-3':hd<=6?'4-6':hd<=9?'7-9':'10+'} table (50% chance if random encounter)</span></div>
  `);
}

// ── Trap / Hazard ─────────────────────────────────────────────────────────
function genTrap(type) {
  const t = type==='random'?R(['trap','hazard']):type;
  if(t==='trap') {
    const trap = TRAPS[rollD(12)-1];
    return card(`<div class="gen-card-header"><span class="gen-card-name">${esc(trap.trap)}</span><span class="gen-card-tag">Trap</span></div>${row('Trigger',trap.trigger)}${row('Damage/Effect',trap.damage)}`);
  } else {
    const mov = R(HAZARDS_MOV); const dmg = R(HAZARDS_DMG); const wkn = R(HAZARDS_WKN);
    const types = []; if(Math.random()>.3) types.push(mov); if(Math.random()>.4) types.push(dmg); if(Math.random()>.5) types.push(wkn);
    if(!types.length) types.push(mov);
    return card(`<div class="gen-card-header"><span class="gen-card-name">Hazard</span><span class="gen-card-tag">${types.length>1?'Combined':'Single'}</span></div>${types.map((x,i)=>row(['Movement Restriction','Damage','Weakening'][i]||'Effect',x)).join('')}`);
  }
}

// ── Events ────────────────────────────────────────────────────────────────
function genHappens(type, bonus) {
  if(type==='happens') return card(`<div class="gen-item-name">Something Happens!</div><div class="gen-item-desc">${esc(R(HAPPENS))}</div>`);
  if(type==='rumor')   return card(`<div class="gen-item-name">Rumor</div><div class="gen-item-desc">${esc(R(RUMORS))}</div>`);
  if(type==='oath')    return card(`<div class="gen-item-name">Oath Boon</div><div class="gen-item-desc">${esc(R(OATHS))}</div>`);
  if(type==='blessing')return card(`<div class="gen-item-name">Blessing</div><div class="gen-item-desc">${esc(R(BLESSINGS))}</div>`);
  if(type==='secret') {
    return card(`<div class="gen-item-name">Secret</div><div class="gen-item-desc">${esc(R(SECRETS_D1))} ${esc(R(SECRETS_D2))}</div>`);
  }
  if(type==='luxury') {
    const feat = R(LUX_FEAT); const pool = R(LUX_ITEM_POOLS); const item = R(pool);
    return card(`<div class="gen-item-name">Luxury Item</div><div class="gen-item-desc">${esc(feat)} ${esc(item)}</div>`);
  }
  if(type==='carousing') {
    const roll = rollD(8)+parseInt(bonus||0);
    const entry = CAROUSING[Math.min(roll-1, CAROUSING.length-1)];
    return card(`<div class="gen-card-header"><span class="gen-card-name">Carousing Outcome</span><span class="gen-card-tag">Rolled ${roll} (d8+${bonus})</span></div>${row('Outcome',entry.outcome)}${row('Benefit',entry.benefit)}`);
  }
  return card('<div class="gen-empty">Unknown table</div>');
}

// ── Main init ─────────────────────────────────────────────────────────────
window.init_gen = function(root) {
  const tabs   = root.querySelectorAll('.gen-tab');
  const panels = root.querySelectorAll('.gen-panel');
  const rollBtn = root.querySelector('.gen-roll');
  let activeTab = 'npc';

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      activeTab = tab.dataset.tab;
      tabs.forEach(t => t.classList.toggle('active', t===tab));
      panels.forEach(p => p.classList.toggle('active', p.dataset.panel===activeTab));
    });
  });

  // Show/hide carousing bonus selector
  const hapType = root.querySelector('#gen-hap-type');
  const hapBonusLabel = root.querySelector('#gen-hap-bonus-label');
  if(hapType && hapBonusLabel) {
    hapType.addEventListener('change', () => {
      hapBonusLabel.style.display = hapType.value==='carousing'?'':'none';
    });
  }

  rollBtn.addEventListener('click', () => {
    if(activeTab==='npc') {
      const anc=root.querySelector('#gen-npc-ancestry').value;
      const wlth=root.querySelector('#gen-npc-wealth').value;
      const count=parseInt(root.querySelector('#gen-npc-count').value)||1;
      const res=root.querySelector('#gen-npc-results'); res.innerHTML='';
      for(let i=0;i<count;i++) res.appendChild(genNPC(anc,wlth));

    } else if(activeTab==='loot') {
      const tier=root.querySelector('#gen-treasure-tier').value;
      const type=root.querySelector('#gen-loot-type').value;
      const count=parseInt(root.querySelector('#gen-loot-count').value)||1;
      const res=root.querySelector('#gen-loot-results'); res.innerHTML='';
      for(let i=0;i<count;i++) res.appendChild(genTreasure(tier,type,count));

    } else if(activeTab==='shop') {
      const type=root.querySelector('#gen-shop-type').value;
      const tier=root.querySelector('#gen-shop-tier').value;
      const res=root.querySelector('#gen-shop-results'); res.innerHTML='';
      res.appendChild(genShop(type,tier));

    } else if(activeTab==='encounter') {
      const danger=root.querySelector('#gen-enc-danger').value;
      const cha=root.querySelector('#gen-enc-cha').value;
      const biome=root.querySelector('#gen-enc-biome').value;
      const res=root.querySelector('#gen-enc-results'); res.innerHTML='';
      res.appendChild(genEncounter(danger,cha,biome));

    } else if(activeTab==='rival') {
      const size=root.querySelector('#gen-rival-size').value;
      const disp=root.querySelector('#gen-rival-disp').value;
      const res=root.querySelector('#gen-rival-results'); res.innerHTML='';
      res.appendChild(genRivalCrawler(size,disp));

    } else if(activeTab==='monster') {
      const pl=root.querySelector('#gen-mon-pl').value;
      const mut=root.querySelector('#gen-mon-mut').value;
      const res=root.querySelector('#gen-mon-results'); res.innerHTML='';
      res.appendChild(genMonster(pl,mut));

    } else if(activeTab==='trap') {
      const type=root.querySelector('#gen-trap-type').value;
      const res=root.querySelector('#gen-trap-results'); res.innerHTML='';
      res.appendChild(genTrap(type));

    } else if(activeTab==='happens') {
      const type=root.querySelector('#gen-hap-type').value;
      const bonus=root.querySelector('#gen-hap-bonus').value;
      const res=root.querySelector('#gen-hap-results'); res.innerHTML='';
      res.appendChild(genHappens(type,bonus));
    }
  });

  root._getState = () => ({});
  root._setState = () => {};
};

})();

</script>

<script>
// ══════════════════════════════════════════
// AUDIO TOOL — TabletopAudio iframe player
// ══════════════════════════════════════════
function init_audio(root) {
  const urlInput = root.querySelector('.aud-url-input');
  const loadBtn  = root.querySelector('.aud-load');
  const clearBtn = root.querySelector('.aud-clear');
  const frame    = root.querySelector('.aud-frame');
  const empty    = root.querySelector('.aud-empty');

  const ttaBtn   = root.querySelector('.aud-tta');
  const sdlBtn   = root.querySelector('.aud-sdl');
  const dndbBtn  = root.querySelector('.aud-dndb');
  const sdtBtn   = root.querySelector('.aud-sdt');

  function loadUrl(url) {
    url = url.trim();
    if(!url) return;
    // Normalise to https
    url = url.replace(/^http:\/\//i, 'https://');
    if(!url.startsWith('https://')) url = 'https://tabletopaudio.com/' + url;
    frame.src = url;
    frame.style.display = 'block';
    empty.style.display = 'none';
    urlInput.value = url; // update input to show normalised URL
  }

  function clear() {
    frame.src = 'about:blank';
    frame.style.display = 'none';
    empty.style.display = 'flex';
    urlInput.value = '';
  }

  loadBtn.addEventListener('click', () => loadUrl(urlInput.value));
  urlInput.addEventListener('keydown', e => { if(e.key === 'Enter') loadUrl(urlInput.value); });
  ttaBtn.addEventListener('click', () => loadUrl('https://tabletopaudio.com/'));
  sdlBtn.addEventListener('click', () => loadUrl('https://shadowdarklings.net/#!'));
  dndbBtn.addEventListener('click', () => loadUrl('https://www.dndbeyond.com/'));
  sdtBtn.addEventListener('click', () => loadUrl('https://www.shadowdarktools.com/tools'));
  clearBtn.addEventListener('click', clear);

  root._getState = () => ({ url: frame.style.display !== 'none' ? frame.src : '' });
  root._setState = (s) => {
    if(s.url) { urlInput.value = s.url; loadUrl(s.url); }
    else clear();
  };
}
</script>

<script>
// ══════════════════════════════════════════
// NOTES TOOL — rich text with H1 / H2 / Bold
// ══════════════════════════════════════════
function init_notes(root) {
  const editor = root.querySelector('.nts-editor');
  const rawArea = root.querySelector('.nts-raw');
  const mdToggle = root.querySelector('.nts-md-toggle');
  const exportBtn = root.querySelector('.nts-export');
  const importInput = root.querySelector('.nts-import-input');
  const clearBtn = root.querySelector('.nts-clear');
  const savedIndicator = root.querySelector('.nts-saved-indicator');

  if(!editor.innerHTML.trim()) editor.innerHTML = '<p><br></p>';

  let mdMode = false;

  mdToggle.addEventListener('click', () => {
    mdMode = !mdMode;
    mdToggle.classList.toggle('active', mdMode);
    if(mdMode) {
      // Switch to raw MD view: convert DOM → markdown
      rawArea.value = domToMd(editor);
      editor.style.display = 'none';
      rawArea.style.display = 'flex';
      rawArea.style.flex = '1';
      rawArea.focus();
    } else {
      // Switch back to preview: parse markdown → DOM
      editor.innerHTML = mdToDom(rawArea.value);
      rawArea.style.display = 'none';
      editor.style.display = '';
      editor.focus();
    }
  });

  // ── Helpers ──
  function getSelection() { return window.getSelection(); }
  function getCursorBlock() {
    const sel = getSelection();
    if(!sel.rangeCount) return null;
    let node = sel.getRangeAt(0).startContainer;
    while(node && node !== editor) {
      if(node.parentNode === editor) return node;
      node = node.parentNode;
    }
    return null;
  }
  function setCursorAtEnd(el) {
    const range = document.createRange();
    const sel = getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
  function setCursorAtStart(el) {
    const range = document.createRange();
    const sel = getSelection();
    range.setStart(el, 0);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  // ── Inline markdown: convert **bold**, *italic*, `code` ──
  // Called after the closing delimiter is typed. Replaces block content
  // and places cursor in a fresh text node AFTER the inline element.
  function applyInline(block) {
    let text = '';
    block.childNodes.forEach(n => {
      if(n.nodeType === 3) text += n.textContent;
      else if(n.nodeName === 'STRONG') text += '**' + n.textContent + '**';
      else if(n.nodeName === 'EM') text += '*' + n.textContent + '*';
      else if(n.nodeName === 'CODE') text += '`' + n.textContent + '`';
      else text += n.textContent;
    });

    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Only replace if something actually changes
    const rendered = esc(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/(?<!\*)\*(.+?)\*(?!\*)/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
    if(rendered === esc(text)) return; // nothing to convert

    // Rebuild the block — append a trailing plain text node so the cursor
    // lands outside the inline element, not inside it
    block.innerHTML = rendered;
    const trail = document.createTextNode('\u200B'); // zero-width space as anchor
    block.appendChild(trail);
    const range = document.createRange();
    const sel = getSelection();
    range.setStartAfter(trail);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  // ── Block-level conversion: triggered on Enter for heading/quote prefixes ──
  function tryBlockConvert(block) {
    const text = block.textContent.replace(/\u200B/g, ''); // strip zero-width spaces
    let newTag = null, newText = null;

    if(/^# (.+)/.test(text))        { newTag = 'h1'; newText = text.slice(2).trim(); }
    else if(/^## (.+)/.test(text))  { newTag = 'h2'; newText = text.slice(3).trim(); }
    else if(/^### (.+)/.test(text)) { newTag = 'h3'; newText = text.slice(4).trim(); }
    else if(/^> (.*)/.test(text))   { newTag = 'blockquote'; newText = text.slice(2).trim(); }
    else if(/^[-*] (.*)/.test(text)){ newTag = 'li-ul'; newText = text.replace(/^[-*] /,'').trim(); }
    else if(/^---+$/.test(text.trim())) { newTag = 'hr'; newText = ''; }

    if(!newTag) return false;

    const newEl = document.createElement(newTag === 'li-ul' ? 'li' : (newTag === 'hr' ? 'hr' : newTag));

    if(newTag === 'hr') {
      editor.insertBefore(newEl, block);
      const p = document.createElement('p'); p.innerHTML = '<br>';
      editor.insertBefore(p, block);
      block.remove();
      setCursorAtStart(p);
    } else if(newTag === 'li-ul') {
      const prev = block.previousSibling;
      let ul = (prev && prev.nodeName === 'UL') ? prev : null;
      if(!ul) { ul = document.createElement('ul'); editor.insertBefore(ul, block); }
      newEl.innerHTML = newText || '<br>';
      ul.appendChild(newEl);
      block.remove();
      setCursorAtEnd(newEl);
    } else {
      newEl.innerHTML = newText || '<br>';
      editor.insertBefore(newEl, block);
      block.remove();
      setCursorAtEnd(newEl);
    }
    return true;
  }

  // ── Enter key handler ──
  editor.addEventListener('keydown', e => {
    if(e.key === 'Enter') {
      const block = getCursorBlock();
      if(!block) return;
      const tag = block.nodeName;
      const text = block.textContent.replace(/\u200B/g,'');

      // If current block has a heading/blockquote prefix → convert it first, then make new para
      if(tag === 'P' || tag === 'DIV') {
        if(/^#{1,3} .+/.test(text) || /^> /.test(text) || /^[-*] /.test(text) || /^---+$/.test(text.trim())) {
          e.preventDefault();
          const converted = tryBlockConvert(block);
          if(converted) {
            // After conversion, the new block is already focused — add a paragraph after it
            const focused = getCursorBlock();
            if(focused && focused.nodeName !== 'P') {
              const p = document.createElement('p'); p.innerHTML = '<br>';
              focused.after(p);
              setCursorAtStart(p);
            }
          }
          return;
        }
      }

      // Headings/blockquotes already converted → Enter exits to new paragraph
      if(['H1','H2','H3','BLOCKQUOTE'].includes(tag)) {
        e.preventDefault();
        const p = document.createElement('p'); p.innerHTML = '<br>';
        block.after(p);
        setCursorAtStart(p);
        return;
      }

      // Empty list item → exit list
      if(tag === 'LI' && !text.trim()) {
        e.preventDefault();
        const ul = block.closest('ul,ol');
        const p = document.createElement('p'); p.innerHTML = '<br>';
        ul.after(p);
        block.remove();
        if(!ul.children.length) ul.remove();
        setCursorAtStart(p);
      }
    }

    // Backspace at start of heading → back to paragraph
    if(e.key === 'Backspace') {
      const sel = getSelection();
      if(!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      const block = getCursorBlock();
      if(!block) return;
      const tag = block.nodeName;
      if(['H1','H2','H3','BLOCKQUOTE'].includes(tag) && range.startOffset === 0 && range.collapsed) {
        e.preventDefault();
        const p = document.createElement('p');
        p.innerHTML = block.innerHTML || '<br>';
        editor.insertBefore(p, block);
        block.remove();
        setCursorAtStart(p);
      }
    }
  });

  // ── Input handler: inline markdown only ──
  editor.addEventListener('input', () => {
    if(!editor.innerHTML.trim() || editor.innerHTML === '<br>') {
      editor.innerHTML = '<p><br></p>';
    }
    const block = getCursorBlock();
    if(block && block.nodeType === 1) {
      const text = block.textContent.replace(/\u200B/g,'');
      // Inline conversion: fire when a closing delimiter is completed
      const hasBold   = (text.match(/\*\*/g)||[]).length >= 2;
      const hasItalic = (text.match(/(?<!\*)\*(?!\*)/g)||[]).length >= 2;
      const hasCode   = (text.match(/`/g)||[]).length >= 2;
      if(hasBold || hasItalic || hasCode) applyInline(block);
    }
    flashSaved();
  });

  let saveTimeout;
  function flashSaved() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      savedIndicator.textContent = '✓ Up to date';
      savedIndicator.classList.add('show');
      setTimeout(() => savedIndicator.classList.remove('show'), 1500);
    }, 800);
  }

  // ── Export: walk DOM → Markdown ──
  function domToMd(el) {
    let md = '';
    el.childNodes.forEach(node => {
      if(node.nodeType === 3) { md += node.textContent; return; }
      const t = node.nodeName;
      const inner = node.textContent;
      if(t === 'H1') md += '# ' + inner + '\n\n';
      else if(t === 'H2') md += '## ' + inner + '\n\n';
      else if(t === 'H3') md += '### ' + inner + '\n\n';
      else if(t === 'BLOCKQUOTE') md += '> ' + inner + '\n\n';
      else if(t === 'HR') md += '---\n\n';
      else if(t === 'UL') { node.querySelectorAll('li').forEach(li => { md += '- ' + li.textContent + '\n'; }); md += '\n'; }
      else if(t === 'OL') { let i=1; node.querySelectorAll('li').forEach(li => { md += (i++) + '. ' + li.textContent + '\n'; }); md += '\n'; }
      else if(t === 'P' || t === 'DIV') {
        // Inline: reconstruct with markdown markers
        let line = '';
        node.childNodes.forEach(c => {
          if(c.nodeType === 3) line += c.textContent;
          else if(c.nodeName === 'STRONG') line += '**' + c.textContent + '**';
          else if(c.nodeName === 'EM') line += '*' + c.textContent + '*';
          else if(c.nodeName === 'CODE') line += '`' + c.textContent + '`';
          else line += c.textContent;
        });
        if(line.trim()) md += line + '\n\n';
      }
    });
    return md.trim();
  }

  // ── Import: Markdown → DOM ──
  function mdToDom(md) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const inline = s => esc(s)
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      .replace(/`(.+?)`/g,'<code>$1</code>');
    let html = '';
    const lines = md.split('\n');
    let ulOpen = false;
    const closeUl = () => { if(ulOpen){ html += '</ul>'; ulOpen = false; } };
    lines.forEach(line => {
      if(/^# (.+)/.test(line))       { closeUl(); html += `<h1>${inline(line.slice(2))}</h1>`; }
      else if(/^## (.+)/.test(line)) { closeUl(); html += `<h2>${inline(line.slice(3))}</h2>`; }
      else if(/^### (.+)/.test(line)){ closeUl(); html += `<h3>${inline(line.slice(4))}</h3>`; }
      else if(/^> (.*)/.test(line))  { closeUl(); html += `<blockquote>${inline(line.slice(2))}</blockquote>`; }
      else if(/^---+$/.test(line.trim())){ closeUl(); html += '<hr>'; }
      else if(/^[-*] (.+)/.test(line)){ if(!ulOpen){html+='<ul>';ulOpen=true;} html += `<li>${inline(line.replace(/^[-*] /,''))}</li>`; }
      else if(line.trim() === '')    { closeUl(); html += '<p><br></p>'; }
      else                           { closeUl(); html += `<p>${inline(line)}</p>`; }
    });
    closeUl();
    return html || '<p><br></p>';
  }

  exportBtn.addEventListener('click', () => {
    const md = mdMode ? rawArea.value.trim() : domToMd(editor);
    if(!md) { alert('No notes to export yet.'); return; }
    const blob = new Blob([md], {type: 'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `session_notes_${new Date().toISOString().slice(0,10)}.md`; a.click();
    URL.revokeObjectURL(url);
  });

  if(importInput) {
    importInput.addEventListener('change', () => {
      const file = importInput.files[0]; if(!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const hasContent = mdMode ? rawArea.value.trim() : editor.textContent.trim();
        if(hasContent && !confirm('Replace current notes with imported content?')) { importInput.value=''; return; }
        if(mdMode) {
          rawArea.value = e.target.result;
        } else {
          editor.innerHTML = mdToDom(e.target.result);
        }
        importInput.value = '';
      };
      reader.readAsText(file);
    });
  }

  clearBtn.addEventListener('click', () => {
    const hasContent = mdMode ? rawArea.value.trim() : editor.textContent.trim();
    if(!hasContent) return;
    if(confirm('Clear all session notes? This cannot be undone.')) {
      editor.innerHTML = '<p><br></p>';
      rawArea.value = '';
      if(mdMode) { rawArea.style.display='flex'; rawArea.style.flex='1'; }
    }
  });

  // ── State: store as Markdown ──
  root._getState = () => ({ md: mdMode ? rawArea.value : domToMd(editor) });
  root._setState = (s) => {
    if(s.md !== undefined) { editor.innerHTML = mdToDom(s.md); rawArea.value = s.md; }
    else if(s.html) editor.innerHTML = s.html;
  };
}
</script>


<script>
// All init_* functions are now defined — safe to render the first pane.
// Also bust bfcache so mobile browsers don't restore stale state.
window.addEventListener('pageshow', function(e) {
  if(e.persisted) window.location.reload();
});
renderPane(1);

// ══════════════════════════════════════════
// SESSION SAVE / LOAD
// Collects state from all live tool instances and writes to a JSON file.
// On load, restores state into each instance (creating them first if needed).
// Note: Loaded media (PDFs, images) cannot be saved — only text/data state.
// ══════════════════════════════════════════
function saveSession() {
  const data = {
    version: 1,
    saved: new Date().toISOString(),
    paneTools,
    splitMode,
    tools: {}
  };

  // Collect state from every instantiated tool
  Object.entries(instances).forEach(([type, node]) => {
    if(node._getState) {
      try { data.tools[type] = node._getState(); } catch(e) {}
    }
  });

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `dungeon_desk_session_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadSession(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.version) throw new Error('Unrecognised file');

      // Restore pane layout
      if(data.splitMode) setSplit(data.splitMode);
      if(data.paneTools) {
        setPaneTool(1, data.paneTools[1] || 'adventure');
        setPaneTool(2, data.paneTools[2] || 'combat');
      }

      // Restore each tool's state (instantiate it first if not yet created)
      if(data.tools) {
        Object.entries(data.tools).forEach(([type, state]) => {
          const node = getOrCreateInstance(type);
          if(node._setState) {
            try { node._setState(state); } catch(err) { console.warn('setState failed for', type, err); }
          }
        });
      }

      // Re-render panes so restored state is visible
      renderPane(1);
      if(data.splitMode === 2) renderPane(2);

    } catch(err) {
      alert('Could not load session file: ' + err.message);
    }
    input.value = ''; // reset so the same file can be loaded again
  };
  reader.readAsText(file);
}

// ── Server persistence hooks (used by the injected shim when running on Dungeon Desk) ──
// __gmScreenGetState: returns the full session state as a plain object
window.__gmScreenGetState = function() {
  const data = { version: 1, paneTools, splitMode, tools: {} };
  Object.entries(instances).forEach(([type, node]) => {
    if(node._getState) try { data.tools[type] = node._getState(); } catch(e) {}
  });
  return data;
};

// __gmScreenSetState: restores a previously saved state object
window.__gmScreenSetState = function(data) {
  if(!data || !data.version) return;
  if(data.splitMode) setSplit(data.splitMode);
  if(data.paneTools) {
    setPaneTool(1, data.paneTools[1] || 'adventure');
    setPaneTool(2, data.paneTools[2] || 'combat');
  }
  if(data.tools) {
    Object.entries(data.tools).forEach(([type, state]) => {
      const node = getOrCreateInstance(type);
      if(node._setState) try { node._setState(state); } catch(e) {}
    });
  }
  renderPane(1);
  if(data.splitMode === 2) renderPane(2);
};

// Trigger auto-save whenever Next Round is clicked or notes are edited
document.addEventListener('click', function(e) {
  if(e.target.closest('.cbt-next-round, .cbt-reset, .cbt-add-tracker, .cbt-add-npc, .nts-clear')) {
    if(window.__ddScheduleSave) setTimeout(window.__ddScheduleSave, 300);
  }
});
document.addEventListener('input', function(e) {
  if(e.target.closest('.nts-editor, .tracker-name-input, .npc-name-input, .npc-hp-input, .npc-seg-count-input')) {
    if(window.__ddScheduleSave) setTimeout(window.__ddScheduleSave, 1000);
  }
});
</script>
</body>
