<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Prep Builder — Shadowdark RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&family=MedievalSharp&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Shadowdark RPG palette — high contrast, clean, brutal */
    --ink: #0a0a0a; --paper: #f8f8f6; --accent: #1a1a1a; --accent-dark: #000000;
    --accent-red: #1a1a1a; --accent-red-dark: #000000;
    --muted: #444; --rule: #c0c0c0; --box-bg: #efefed; --read-bg: #1a1a1a;
    --read-text: #f8f8f6; --highlight: #e8c84a; --green: #1a3a1a; --blue-npc: #1a2a3a;
    --section-hdr: #0a0a0a; --table-hdr: #1a1a1a;
    /* UI sidebar — dark stone */
    --ui-bg: #111112; --ui-panel: #1a1a1c; --ui-border: #2e2e32;
    --ui-text: #e8e8e4; --ui-muted: #7a7a7a; --ui-accent: #e8c84a; --ui-highlight: #e8c84a;
  }
  body { font-family: 'Montserrat', sans-serif; background: var(--ui-bg); color: var(--ui-text); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 320px; min-width: 320px; background: var(--ui-panel); border-right: 1px solid var(--ui-border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.25s, min-width 0.25s; }
  .sidebar.collapsed { width: 42px; min-width: 42px; }
  .sidebar.collapsed .sidebar-content,
  .sidebar.collapsed .sidebar-tabs,
  .sidebar.collapsed .sidebar-footer,
  .sidebar.collapsed .save-indicator,
  .sidebar.collapsed .sidebar-sub,
  .sidebar.collapsed .sidebar-title,
  .sidebar.collapsed .toggle-row { display: none; }
  .collapse-btn { background: none; border: none; color: var(--ui-muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 4px 6px; border-radius: 3px; transition: color 0.15s; flex-shrink: 0; }
  .collapse-btn:hover { color: var(--ui-accent); }
  .sidebar-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--ui-border); background: var(--ui-bg); }
  .sidebar-title { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ui-accent); white-space: nowrap; }
  .sidebar-sub { font-family: 'Montserrat', sans-serif; font-size: 9px; color: var(--ui-muted); letter-spacing: 0.1em; margin-top: 2px; }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--ui-border); }
  .tab-btn { flex: 1; padding: 8px 2px; background: none; border: none; color: var(--ui-muted); font-family: 'Montserrat', sans-serif; font-size: 7.5px; letter-spacing: 0.03em; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
  .tab-btn.active { color: var(--ui-highlight); border-bottom-color: var(--ui-highlight); }
  .tab-btn:hover:not(.active) { color: var(--ui-text); }
  .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }
  .sidebar-content::-webkit-scrollbar { width: 4px; }
  .sidebar-content::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 2px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* FORM */
  .field-group { margin-bottom: 12px; }
  .field-label { font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ui-muted); margin-bottom: 4px; display: block; }
  .field-label.accent { color: var(--ui-accent); }
  .field-label.gold { color: var(--ui-highlight); }
  .field-label.green { color: #4caf7d; }
  input[type="text"], textarea { width: 100%; background: var(--ui-bg); border: 1px solid var(--ui-border); border-radius: 3px; color: var(--ui-text); font-family: 'Montserrat', sans-serif; font-size: 11px; padding: 6px 8px; outline: none; transition: border-color 0.15s; resize: vertical; }
  input[type="text"]:focus, textarea:focus { border-color: var(--ui-accent); }
  textarea { min-height: 60px; line-height: 1.5; }
  textarea.short { min-height: 40px; }
  .section-divider { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ui-text); background: var(--ui-border); padding: 4px 8px; margin: 14px -12px 10px; border-left: 3px solid var(--ui-accent); }
  .section-divider.green { border-left-color: #4caf7d; }
  .section-divider.gold { border-left-color: var(--ui-highlight); }
  .entity-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .entity-card { background: var(--ui-bg); border: 1px solid var(--ui-border); border-radius: 3px; padding: 8px; }
  .entity-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .entity-name-input { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; background: none; border: none; border-bottom: 1px solid var(--ui-border); color: var(--ui-text); padding: 2px 0; width: 180px; outline: none; }
  .entity-name-input:focus { border-bottom-color: var(--ui-accent); }
  .btn-remove { background: none; border: none; color: var(--ui-muted); cursor: pointer; font-size: 14px; line-height: 1; padding: 2px 4px; border-radius: 2px; }
  .btn-remove:hover { color: var(--ui-accent); }
  .btn-add { width: 100%; background: none; border: 1px dashed var(--ui-border); border-radius: 3px; color: var(--ui-muted); font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px; cursor: pointer; transition: all 0.15s; margin-top: 2px; }
  .btn-add:hover { border-color: var(--ui-accent); color: var(--ui-accent); }
  .location-card { background: var(--ui-bg); border: 1px solid var(--ui-border); border-left: 2px solid var(--accent-red); border-radius: 3px; padding: 8px; margin-bottom: 6px; }
  .sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--ui-border); display: flex; gap: 8px; }
  .btn-primary { flex: 1; background: var(--ui-accent); border: none; color: white; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 8px; border-radius: 3px; cursor: pointer; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-secondary { flex: 1; background: none; border: 1px solid var(--ui-border); color: var(--ui-text); font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 8px; border-radius: 3px; cursor: pointer; }
  .btn-secondary:hover { border-color: var(--ui-text); }
  .save-indicator { font-family: 'Montserrat', sans-serif; font-size: 8px; color: var(--ui-muted); letter-spacing: 0.08em; text-align: center; padding: 4px; transition: color 0.3s; }
  .save-indicator.saved { color: #4caf7d; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .checkbox-row label { font-family: 'Montserrat', sans-serif; font-size: 9px; color: var(--ui-muted); text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; margin: 0; }

  /* Dark mode toggle */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .toggle-label { font-family: 'Montserrat', sans-serif; font-size: 9px; color: var(--ui-muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .toggle { position: relative; width: 34px; height: 18px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--ui-border); border-radius: 18px; cursor: pointer; transition: background 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--ui-accent); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

  /* Page dark mode */
  .page.dark-mode { background: #1a1a1e; }
  .page.dark-mode .adventure-subtitle { color: #1a1a1a; }
  .page.dark-mode .header-meta { color: #1a1a1a; }
  .page.dark-mode .header-meta span { color: #1a1a1a; }
  .page.dark-mode .page-banner { background: #0a0a0a; }
  .page.dark-mode .adventure-title { color: #1a1a1a; }
  .page.dark-mode .p-text { color: #d0ccc4; }
  .page.dark-mode .entry-name { color: #0a0a0a; }
  .page.dark-mode .entry-desc { color: #222; }
  .page.dark-mode .reward-stats { color: #222; }
  .page.dark-mode .entry-meta { color: #555; }
  .page.dark-mode .loc-tag { color: #888; }
  .page.dark-mode .loc-desc { color: #b0aca4; }
  .page.dark-mode .npc-block { background: var(--box-bg); }
  .page.dark-mode .mob-block { background: var(--box-bg); }
  .page.dark-mode .clue-item { background: #2a2010; color: #d0ccc4; }
  .page.dark-mode .hook-item { background: #1e1a10; color: #d0ccc4; }
  .page.dark-mode .clue-hdr { color: #e8e4dc; }
  .page.dark-mode .stat-block { background: #ffffff; }
  .page.dark-mode .sb-name { color: var(--ink); }
  .page.dark-mode .sb-type { color: #444; }
  .page.dark-mode .sb-table td { background: #ffffff; color: #0a0a0a; border-color: rgba(0,0,0,0.1); }
  .page.dark-mode .sb-ability { color: var(--ink); }
  .page.dark-mode .sb-warning { background: #1a2a3a; color: #7aaadd; border-color: #1a4a8a; }
  .page.dark-mode .sb-notes { color: var(--ink); }
  .page.dark-mode .adventure-title { color: #ffffff; }
  .page.dark-mode .adventure-subtitle { color: #ffffff; }
  .page.dark-mode .header-meta span { color: #ffffff; }
  .page.dark-mode .sl { color: #f8f8f6; background: #000000; }
  .page.dark-mode .location-block { border-bottom-color: #3a3a3e; }
  .page.dark-mode .p-footer { border-top-color: #F7941D; }
  .page.dark-mode .p2-footer { border-top-color: #F7941D; }
  .page.dark-mode .p2-footer p { color: #888; }
  .page.dark-mode .map-placeholder { background: #2a2a2e; color: #F7941D; border-color: #F7941D; }
  .page.dark-mode .columns { color: #d0ccc4; }



  /* PREVIEW */
  .preview-area { flex: 1; overflow: auto; background: #1a1a1c; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .preview-area::-webkit-scrollbar { width: 6px; height: 6px; }
  .preview-area::-webkit-scrollbar-thumb { background: #0e0e10; border-radius: 3px; }

  /* PAGES */
  .page { background: var(--paper); width: 816px; min-width: 816px; min-height: 1056px; padding: 0; box-shadow: 0 4px 24px rgba(0,0,0,0.4); flex-shrink: 0; display: flex; flex-direction: column; }
  .page-inner { padding: 28px 36px 24px; flex: 1; display: flex; flex-direction: column; }
  .page-two { display: flex; flex-direction: column; }

  /* DCW cyan banner header */
  .page-banner { background: var(--accent); padding: 10px 36px 8px; display: flex; justify-content: space-between; align-items: center; }
  .adventure-title { font-family: 'UnifrakturMaguntia', cursive; font-size: 26px; font-weight: 400; color: #f8f8f6; line-height: 1; letter-spacing: 0.04em; }
  .adventure-subtitle { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 500; color: #aaaaaa; text-transform: uppercase; letter-spacing: 0.12em; margin-top: 3px; }
  .header-meta { text-align: right; font-family: 'Montserrat', sans-serif; font-size: 9px; color: rgba(255,255,255,0.85); line-height: 1.7; }
  .header-meta span { display: block; }

  /* Page bottom band */
  .page-bottom-band { background: var(--accent); height: 12px; margin-top: auto; }

  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* Section labels - GMT style: bold condensed orange-red, underlined with orange */
  .sl { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #f8f8f6; background: #0a0a0a; padding: 3px 8px; margin-bottom: 6px; display: block; border-bottom: none; }
  .sl.dark { color: var(--ink); border-bottom-color: var(--ink); }
  .sl.sl-green { color: var(--green); border-bottom-color: var(--green); }
  .sl.gold { color: #7a5a00; border-bottom-color: #c89020; }

  .p-text { font-size: 9.5px; color: var(--ink); line-height: 1.65; font-family: 'Montserrat', sans-serif; }

  /* Read-aloud: cyan background */
  .read-aloud { background: #1a1a1a; border-left: 4px solid #e8c84a; padding: 8px 10px; margin-bottom: 6px; }
  .read-aloud p { color: #f4edd8; font-size: 9px; font-style: italic; line-height: 1.65; }

  /* Flavor text on stat blocks also cyan */
  .sb-flavor { font-size: 8.5px; font-style: italic; color: #f4edd8; background: #2a1a08; line-height: 1.5; margin-bottom: 7px; padding: 6px 8px; border: none; }

  /* NPC/mob blocks - grey-green GMT boxes */
  .npc-block { background: var(--box-bg); border: none; border-left: 4px solid var(--blue-npc); padding: 7px 9px; margin-bottom: 6px; }
  .mob-block { background: var(--box-bg); border: none; border-left: 4px solid var(--accent-red); padding: 7px 9px; margin-bottom: 6px; }
  .entry-name { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--ink); margin-bottom: 1px; }
  .entry-meta { font-family: 'Montserrat', sans-serif; font-size: 8px; color: var(--accent-dark); letter-spacing: 0.06em; margin-bottom: 4px; }
  .entry-desc { font-size: 9px; color: var(--ink); line-height: 1.55; }

  .location-block { margin-bottom: 9px; padding-bottom: 9px; border-bottom: 1px solid var(--rule); break-inside: avoid; column-break-inside: avoid; }
  .location-block:last-child { border-bottom: none; }
  .p-section { margin-bottom: 12px; break-inside: avoid; column-break-inside: avoid; }
  .loc-name { font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
  .loc-tag { font-family: 'Montserrat', sans-serif; font-size: 7.5px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 3px; }
  .loc-desc { font-size: 9px; color: var(--ink); line-height: 1.55; margin-top: 3px; }

  .clue-item { font-size: 9px; color: var(--ink); margin-bottom: 5px; padding: 4px 8px 4px 10px; border-left: 3px solid #0a0a0a; background: #fdf5e8; line-height: 1.5; }
  .hook-item { background: #fdf8ec; }
  .reward-stats { color: var(--ink); }
  .clue-hdr { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--ink); }

  .p-footer { border-top: 2px solid var(--accent); margin-top: 14px; padding-top: 10px; }
  .flowchart { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
  .flow-node { padding: 4px 7px; border-radius: 2px; text-align: center; flex: 1; }
  .flow-label { font-family: 'Montserrat', sans-serif; font-size: 7px; letter-spacing: 0.08em; }
  .flow-name { font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 600; text-transform: uppercase; }
  .flow-arrow { color: var(--accent); font-size: 11px; font-weight: 700; }

  .map-container { margin-bottom: 14px; }
  .map-container img { width: 100%; height: auto; display: block; border: 2px solid var(--accent); }
  .map-placeholder { width: 100%; height: 280px; background: var(--box-bg); border: 2px dashed var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; font-size: 10px; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 14px; }

  /* Stat blocks - GMT grey-green boxes with dark header rows */
  /* D&D 5e Stat Blocks */
  .statblocks { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat-block { background: var(--box-bg); border: 1px solid var(--rule); border-top: 3px solid #0a0a0a; padding: 10px 12px; width: calc(50% - 6px); flex: 0 0 calc(50% - 6px); }
  .stat-block.full-width { width: 100%; flex: 0 0 100%; }
  .sb-name { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink); border-bottom: 1.5px solid #0a0a0a; padding-bottom: 3px; margin-bottom: 2px; }
  .sb-type { font-family: 'Montserrat', sans-serif; font-size: 9.5px; font-style: italic; color: var(--muted); margin-bottom: 5px; }
  .sb-stat-line { font-size: 9px; color: var(--ink); margin-bottom: 3px; line-height: 1.45; font-family: 'Montserrat', sans-serif; }
  .sb-stat-line strong { font-weight: 700; font-family: 'Montserrat', sans-serif; font-size: 7.5px; letter-spacing: 0.04em; }
  .sb-divider { border: none; border-top: 1px solid var(--accent-red); margin: 5px 0; }
  .sb-score-table { width: 100%; border-collapse: collapse; margin: 4px 0 5px; }
  .sb-score-table th { font-family: 'Montserrat', sans-serif; font-size: 8px; font-weight: 700; color: #0a0a0a; font-weight: 700; text-align: center; padding: 2px; background: none; border: none; }
  .sb-score-table td { font-family: 'Montserrat', sans-serif; font-size: 9px; text-align: center; color: var(--ink); border: none; padding: 1px 2px; }
  .sb-section-label { font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; color: var(--accent-red); border-bottom: 1.5px solid #0a0a0a; display: block; margin: 6px 0 4px; padding-bottom: 1px; }
  .sb-ability { font-size: 9px; color: var(--ink); margin-bottom: 4px; line-height: 1.5; font-family: 'Montserrat', sans-serif; }
  .sb-ability strong { font-style: italic; }
  .sb-flavor { font-size: 9px; font-style: italic; color: #f4f4f2; line-height: 1.5; margin-bottom: 5px; font-family: 'Montserrat', sans-serif; }
  .sb-warning { background: rgba(255,255,255,0.5); border-left: 3px solid var(--blue-npc); padding: 4px 8px; font-size: 8px; color: var(--blue-npc); margin-bottom: 6px; }
  .sb-notes { font-size: 8.5px; color: var(--ink); line-height: 1.6; column-count: 2; column-gap: 16px; font-family: 'Montserrat', sans-serif; }
  .sb-hp-row { display: none; }
  .hp-pip { display: none; }
  .sb-table { display: none; }
  .p2-footer { border-top: 2px solid var(--accent); margin-top: 14px; padding-top: 6px; display: flex; justify-content: space-between; }
  .p2-footer p { font-family: 'Montserrat', sans-serif; font-size: 7.5px; color: var(--muted); letter-spacing: 0.08em; }

  /* Fixed letter-size pages */
  .page { height: 1056px; max-height: 1056px; overflow: hidden; }
  .page-inner { overflow: hidden; flex: 1; min-height: 0; padding: 20px 36px 16px; }
  .page-banner { flex-shrink: 0; }
  .page-bottom-band { flex-shrink: 0; margin-top: 0; }
  /* Continuation pages added by pagination engine */
  .page-cont { margin-top: 20px; }
  .page-cont .page-inner { overflow: hidden; flex: 1; min-height: 0; padding: 20px 36px 16px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-header-row" style="align-items:center;">
      <div style="flex:1;min-width:0;">
        <div class="sidebar-title" style="white-space:nowrap;">Session Prep Builder</div>
        <div class="sidebar-sub">Shadowdark RPG</div>
      </div>
      <button class="collapse-btn" id="collapse-btn" onclick="toggleSidebar()" title="Hide controls">◀</button>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Dark Mode</span>
      <label class="toggle">
        <input type="checkbox" id="dark-mode-toggle" onchange="toggleDarkMode(this)">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
  <div class="sidebar-tabs">
    <button class="tab-btn active" onclick="switchTab('basics')">Basics</button>
    <button class="tab-btn" onclick="switchTab('encounters')">Encounters</button>
    <button class="tab-btn" onclick="switchTab('maps')">Maps</button>
    <button class="tab-btn" onclick="switchTab('monsters')">NPCs/Mobs</button>
  </div>
  <div class="sidebar-content">

    <!-- BASICS -->
    <div class="tab-panel active" id="tab-basics">
      <div class="section-divider">Header</div>
      <div class="field-group">
        <label class="field-label accent">Adventure Title</label>
        <input type="text" id="f-title" placeholder="e.g. Crawler's First Steps" oninput="autosave()">
      </div>
      <div class="field-group">
        <label class="field-label">Subtitle</label>
        <input type="text" id="f-subtitle" placeholder="e.g. A One-Session Adventure..." oninput="autosave()">
      </div>
      <div class="field-group">
        <label class="field-label">Session</label><input type="text" id="f-session" placeholder="01" oninput="autosave()">
      </div>
      <div style="display:flex; gap:8px;" class="field-group">
        <div style="flex:1"><label class="field-label">Players</label><input type="text" id="f-players" placeholder="3–5" oninput="autosave()"></div>
        <div style="flex:1"><label class="field-label">Duration</label><input type="text" id="f-duration" placeholder="~3 HRS" oninput="autosave()"></div>
      </div>
      <div class="section-divider">Overview</div>
      <div class="field-group">
        <label class="field-label">Overview Text</label>
        <textarea id="f-overview" placeholder="Brief summary of the adventure..." oninput="autosave()"></textarea>
      </div>

<script>
const DEFAULT_STATE = {
  title:'', subtitle:'', floor:'', session:'', players:'', duration:'',
  overview:'', mappath:'', maps:[],
  clues:[], rewards:[], hooks:[], notes:'', strongopen:[], locations:[], statblocks:[]
};
let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
let saveTimer = null;

function loadState() {
  const saved = localStorage.getItem('dcw_builder_v5');
  if (saved) try { state = {...DEFAULT_STATE,...JSON.parse(saved)}; } catch(e){}
}
function saveState() {
  const toSave={...state, mappath:state.mappath?'__has_map__':'', maps:(state.maps||[]).map(m=>({...m,src:m.src?'__has_map__':''}))};
  try { localStorage.setItem('dcw_builder_v5', JSON.stringify(toSave)); } catch(e) {}
  const ind = document.getElementById('save-indicator');
  ind.textContent='Saved ✓'; ind.classList.add('saved');
  setTimeout(()=>{ ind.textContent='All changes saved'; ind.classList.remove('saved'); },1500);
}
function autosave() { readFields(); renderPreview(); clearTimeout(saveTimer); saveTimer=setTimeout(saveState,600); }

// ── PAGINATION ENGINE ──
function paginatePages() {
  document.querySelectorAll('.page-cont').forEach(p=>p.remove());
  document.querySelectorAll('[data-paginated-hidden]').forEach(el=>{
    el.style.display=''; el.removeAttribute('data-paginated-hidden');
  });

  const isDark = document.getElementById('page-one').classList.contains('dark-mode');
  const PAGE_TOTAL = 1056;
  const BANNER_H   = document.querySelector('.page-banner')?.offsetHeight || 52;
  const BAND_H     = 12;
  const PADDING_V  = 40;
  const FOOTER_H   = document.querySelector('.p-footer')?.offsetHeight || 44;
  const USABLE_H   = PAGE_TOTAL - BANNER_H - BAND_H - PADDING_V - 20;
  const COL_H      = USABLE_H - FOOTER_H;

  // PAGE 1: two explicit divs — re-distribute if right column overflows
  const leftEl  = document.getElementById('p1-left');
  const rightEl = document.getElementById('p1-right');
  if(leftEl && rightEl) {
    // Check if right column overflows
    const rightItems = [...rightEl.children].filter(c=>c.offsetHeight>0);
    if(rightItems.length) {
      let rightH = rightItems.reduce((s,c)=>s+c.offsetHeight+getMargin(c),0);
      if(rightH > COL_H) {
        // Find what fits in right column and move rest to continuation page
        const buckets = [[]];
        let cur=0;
        rightItems.forEach(k=>{
          const h=k.offsetHeight+getMargin(k);
          if(cur+h>COL_H && buckets[buckets.length-1].length>0){buckets.push([]);cur=0;}
          buckets[buckets.length-1].push(k); cur+=h;
        });
        if(buckets.length>1){
          const keep=new Set(buckets[0]);
          rightItems.forEach(k=>{if(!keep.has(k)){k.style.display='none';k.setAttribute('data-paginated-hidden','1');}});
          let after=document.getElementById('page-one');
          for(let i=1;i<buckets.length;i++){
            const cp=buildContinuationPage(document.getElementById('page-one'),'p1'+i,isDark,false);
            const cc=cp.querySelector('.cont-container');
            cc.style.cssText='display:flex;gap:14px;flex:1;min-height:0;overflow:hidden;';
            const cLeft=document.createElement('div'); cLeft.style.cssText='flex:1;min-width:0;overflow:hidden;';
            const cRight=document.createElement('div'); cRight.style.cssText='flex:1;min-width:0;overflow:hidden;';
            cc.appendChild(cLeft); cc.appendChild(cRight);
            buckets[i].forEach(k=>{const cl=k.cloneNode(true);cl.style.display='';cl.removeAttribute('data-paginated-hidden');cLeft.appendChild(cl);});
            const fc=document.createElement('div');fc.className='p-footer';fc.style.flexShrink='0';
            fc.innerHTML='<div class="flowchart">'+(document.getElementById('p-flowchart')?.innerHTML||'')+'</div>';
            cp.querySelector('.page-inner').appendChild(fc);
            after.insertAdjacentElement('afterend',cp); after=cp;
          }
        }
      }
    }
  }

  // PAGE 2: Encounters (working - keep as-is)
  const locsEl=document.getElementById('p-locations');
  if(locsEl) runPagination(locsEl,COL_H*2,'p2',isDark,null,document.getElementById('page-two'),false);

  // PAGE 4: Stat blocks
  const sbEl=document.getElementById('p-statblocks');
  if(sbEl) runPagination(sbEl,USABLE_H,'p4S',isDark,null,document.getElementById('page-four'),false);

  // PAGE 3: Maps
  const mapsEl=document.getElementById('p-maps-container');
  if(mapsEl) runPagination(mapsEl,USABLE_H,'p3M',isDark,null,document.getElementById('page-three'),false);
}


function measureAndPaginateColumn(containerId, maxH, key, isDark, preview, sourcePage) {
  const container = document.getElementById(containerId);
  if(!container) return;

  const isTwoCol = (key === 'p1' || key === 'p2');
  const maxTotal = isTwoCol ? maxH * 2 : maxH;

  // Get children to measure
  const kids = [...container.children].filter(c => !c.getAttribute('data-paginated-hidden'));
  if(!kids.length) return;

  // Measure each child by temporarily making it position:absolute off-screen
  // inside the actual page so it inherits all CSS correctly
  const pageInner = sourcePage.querySelector('.page-inner');
  if(!pageInner) return;

  // Create a single-column measuring wrapper inside page-inner
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:absolute;visibility:hidden;top:-99999px;left:36px;right:36px;column-count:1;';
  pageInner.appendChild(wrap);
  kids.forEach(k => wrap.appendChild(k.cloneNode(true)));
  void wrap.offsetHeight;

  const heights = [...wrap.children].map(c => {
    const s = getComputedStyle(c);
    return c.offsetHeight + parseFloat(s.marginTop) + parseFloat(s.marginBottom);
  });
  const totalH = heights.reduce((a,b) => a+b, 0);
  pageInner.removeChild(wrap);

  console.log('[SPB]', containerId, 'kids:', kids.length, 'heights:', heights, 'totalH:', totalH, 'maxTotal:', maxTotal, 'overflow:', totalH > maxTotal);

  if(totalH <= maxTotal) return;

  // Split into buckets
  const buckets = [[]];
  let cur = 0;
  kids.forEach((kid, i) => {
    const h = heights[i];
    if(cur + h > maxTotal && buckets[buckets.length-1].length > 0) {
      buckets.push([]);
      cur = 0;
    }
    buckets[buckets.length-1].push(kid);
    cur += h;
  });
  if(buckets.length <= 1) return;

  // Hide overflow from original
  const keep = new Set(buckets[0]);
  kids.forEach(k => {
    if(!keep.has(k)) { k.style.display='none'; k.setAttribute('data-paginated-hidden','1'); }
  });

  // Build continuation pages
  let after = sourcePage;
  for(let i=1; i<buckets.length; i++) {
    const cp = buildContinuationPage(sourcePage, key+i, isDark, false);
    const cc = cp.querySelector('.cont-container');
    if(isTwoCol) {
      cc.style.cssText = 'column-count:2;column-gap:14px;column-fill:auto;flex:1;min-height:0;height:'+maxH+'px;overflow:hidden;';
    } else {
      cc.style.cssText = 'flex:1;min-height:0;overflow:hidden;';
    }
    buckets[i].forEach(k => {
      const cl = k.cloneNode(true);
      cl.style.display = '';
      cl.removeAttribute('data-paginated-hidden');
      cc.appendChild(cl);
    });
    if(key==='p1'||key==='p2') {
      const fcId = key==='p1'?'p-flowchart':'p-flowchart-2';
      const fc = document.createElement('div');
      fc.className='p-footer'; fc.style.flexShrink='0';
      fc.innerHTML='<div class="flowchart">'+(document.getElementById(fcId)?.innerHTML||'')+'</div>';
      cp.querySelector('.page-inner').appendChild(fc);
    }
    cp.querySelectorAll('.sb-hp-row').forEach(row=>{
      const pips=row.querySelectorAll('.hp-pip');const tot=pips.length;
      pips.forEach((pip,i)=>{
        const t=tot===1?1:i/(tot-1);let r,g,b=10;
        if(t<0.33){const s=t/0.33;r=170;g=Math.round(50*s);}
        else if(t<0.66){const s=(t-0.33)/0.33;r=170;g=Math.round(50+100*s);}
        else{const s=(t-0.66)/0.34;r=Math.round(170*(1-s));g=160;}
        pip.style.background=`rgb(${r},${g},${b})`;pip.style.borderColor='rgba(0,0,0,0.3)';
      });
    });
    after.insertAdjacentElement('afterend', cp);
    after = cp;
  }
}


// For CSS column containers: measure with column:1 unconstrained, then paginate.
// Called AFTER caller has already reset height/overflow/columnCount to unconstrained state.
function runColumnPagination(container, maxColH, key, isDark, preview, sourcePage) {
  if(!container) return;
  const children = [...container.children].filter(c=>c.offsetHeight>0);
  if(!children.length) return;

  // Total height with single column (already set by caller)
  const totalH = children.reduce((sum,c)=>sum+c.offsetHeight+getMargin(c),0);
  const maxTotal = maxColH * 2;
  if(totalH <= maxTotal) return;

  // Split into page buckets: each bucket fills up to 2 columns (maxColH * 2)
  const buckets = [[]];
  let currentH = 0;
  for(const child of children) {
    const h = child.offsetHeight + getMargin(child);
    if(currentH + h > maxTotal && buckets[buckets.length-1].length > 0) {
      buckets.push([]);
      currentH = 0;
    }
    buckets[buckets.length-1].push(child);
    currentH += h;
  }
  if(buckets.length <= 1) return;

  // Hide overflow items from original container
  const keepSet = new Set(buckets[0]);
  children.forEach(c => {
    if(!keepSet.has(c)){
      c.style.display='none';
      c.setAttribute('data-paginated-hidden','1');
    }
  });

  // Build continuation pages for overflow buckets
  let insertAfter = sourcePage;
  for(let i=1; i<buckets.length; i++) {
    const contPage = buildContinuationPage(sourcePage, key+i, isDark, false);
    const contContainer = contPage.querySelector('.cont-container');
    contContainer.style.columnCount = '2';
    contContainer.style.columnGap = '14px';
    contContainer.style.columnFill = 'auto';
    contContainer.style.flex = '1';
    contContainer.style.minHeight = '0';
    contContainer.style.height = maxColH + 'px';
    contContainer.style.overflow = 'hidden';

    buckets[i].forEach(item=>{
      const clone = item.cloneNode(true);
      clone.style.display='';
      clone.removeAttribute('data-paginated-hidden');
      contContainer.appendChild(clone);
    });

    // Add flowchart footer to overview (p1) and encounter (p2) continuation pages
    if(key==='p1' || key==='p2') {
      const fcSourceId = key==='p1' ? 'p-flowchart' : 'p-flowchart-2';
      const fc = document.createElement('div');
      fc.className = 'p-footer';
      fc.style.flexShrink = '0';
      fc.innerHTML = '<div class="flowchart">'+(document.getElementById(fcSourceId)?.innerHTML||'')+'</div>';
      contPage.querySelector('.page-inner').appendChild(fc);
    }

    insertAfter.insertAdjacentElement('afterend', contPage);
    insertAfter = contPage;
  }
}

function runPagination(container, maxH, key, isDark, preview, sourcePage, isPage2) {
  if(!container) return;
  const children = [...container.children].filter(c=>c.offsetHeight > 0);
  if(!children.length) return;

  // Measure total height of all visible children
  const totalH = children.reduce((sum, c) => sum + c.offsetHeight + getMargin(c), 0);
  if(totalH <= maxH) return; // No overflow, nothing to do

  // Split children into page buckets
  const buckets = [[]];
  let currentH = 0;

  for(const child of children) {
    const h = child.offsetHeight + getMargin(child);
    if(currentH + h > maxH && buckets[buckets.length-1].length > 0) {
      buckets.push([]);
      currentH = 0;
    }
    buckets[buckets.length-1].push(child);
    currentH += h;
  }

  if(buckets.length <= 1) return;

  // Hide overflow items from original container
  const keepItems = new Set(buckets[0]);
  children.forEach(c => {
    if(!keepItems.has(c)) {
      c.style.display = 'none';
      c.setAttribute('data-paginated-hidden', '1');
    }
  });

  // Build a continuation page for each overflow bucket
  let insertAfter = sourcePage;
  for(let i = 1; i < buckets.length; i++) {
    const contPage = buildContinuationPage(sourcePage, key+i, isDark, isPage2);
    const contContainer = contPage.querySelector('.cont-container');

    buckets[i].forEach(item => {
      const clone = item.cloneNode(true);
      clone.style.display = '';
      clone.removeAttribute('data-paginated-hidden');
      contContainer.appendChild(clone);
    });

    insertAfter.insertAdjacentElement('afterend', contPage);
    insertAfter = contPage;

    // Re-apply HP gradients
    contPage.querySelectorAll('.sb-hp-row').forEach(row => {
      const pips=row.querySelectorAll('.hp-pip');const total=pips.length;
      pips.forEach((pip,i)=>{
        const t=total===1?1:i/(total-1);let r,g,b=10;
        if(t<0.33){const s=t/0.33;r=170;g=Math.round(50*s);}
        else if(t<0.66){const s=(t-0.33)/0.33;r=170;g=Math.round(50+100*s);}
        else{const s=(t-0.66)/0.34;r=Math.round(170*(1-s));g=160;}
        pip.style.background=`rgb(${r},${g},${b})`;pip.style.borderColor='rgba(0,0,0,0.3)';
      });
    });
  }
}

function getMargin(el) {
  const style = window.getComputedStyle(el);
  return parseInt(style.marginTop||0) + parseInt(style.marginBottom||0);
}

function buildContinuationPage(sourcePage, key, isDark, isPage2) {
  const page = document.createElement('div');
  page.className = 'page page-cont' + (isDark?' dark-mode':'') + (isPage2?' page-two':'');
  page.setAttribute('data-key', key);

  // Clone banner
  const banner = sourcePage.querySelector('.page-banner').cloneNode(true);
  const sub = banner.querySelector('.adventure-subtitle');
  if(sub) sub.textContent = (sub.textContent||'').replace(' (cont.)','') + ' (cont.)';
  // Remove IDs from cloned banner to avoid duplicates
  banner.querySelectorAll('[id]').forEach(el=>el.removeAttribute('id'));
  page.appendChild(banner);

  // Inner area
  const inner = document.createElement('div');
  inner.className = 'page-inner';
  inner.style.overflow = 'hidden';
  const contContainer = document.createElement('div');
  contContainer.className = 'cont-container';
  inner.appendChild(contContainer);
  page.appendChild(inner);

  // Bottom band
  const band = document.createElement('div');
  band.className = 'page-bottom-band';
  page.appendChild(band);

  return page;
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.getAttribute('onclick').includes("'"+name+"'")));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function setVal(id,val){const el=document.getElementById(id);if(el)el.value=val||'';}
function setText(id,text){const el=document.getElementById(id);if(el)el.textContent=text||'';}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function readFields() {
  state.title=v('f-title'); state.subtitle=v('f-subtitle');
 state.session=v('f-session');
  state.players=v('f-players'); state.duration=v('f-duration');
  state.overview=v('f-overview');
  state.maps = collectMaps();
  state.clues=[...document.querySelectorAll('#clues-list .entity-card')].map(c=>({
    header:c.querySelector('.clue-hdr-input')?.value.trim()||'',

  state.rewards=[...document.querySelectorAll('#rewards-list .entity-card')].map(c=>({
    name:c.querySelector('.reward-name-input')?.value.trim()||'',
    flavor:c.querySelector('.reward-flavor-input')?.value.trim()||'',
    stats:c.querySelector('.reward-stats-input')?.value.trim()||''
  })).filter(r=>r.name||r.flavor);
  state.notes=document.getElementById('f-notes')?.value||'';
  state.hooks=[...document.querySelectorAll('#hooks-list .entity-card')].map(c=>({
    header:c.querySelector('.hook-hdr-input')?.value.trim()||'',
    text:c.querySelector('.hook-text-input')?.value.trim()||''
  })).filter(h=>h.header||h.text);
  state.strongopen=[...document.querySelectorAll('#strongopen-list .location-card')].map(c=>({
    name:c.querySelector('.so-name-input')?.value.trim()||'',
    tag:c.querySelector('.so-tag-input')?.value.trim()||'',
    readaloud:c.querySelector('.so-ra-input')?.value.trim()||'',
    desc:c.querySelector('.so-desc-input')?.value.trim()||'',
    type:c.querySelector('.so-type-input:checked')?.value||'combat'
  })).filter(s=>s.name);
  state.locations=[...document.querySelectorAll('#locations-list .location-card')].map(c=>({
    name:c.querySelector('.loc-name-input')?.value.trim()||'',

  const _el_hooks_list=document.getElementById('hooks-list'); if(_el_hooks_list) _el_hooks_list.innerHTML='';

  const _el_strongopen_list=document.getElementById('strongopen-list'); if(_el_strongopen_list) _el_strongopen_list.innerHTML='';

  const _el_locations_list=document.getElementById('locations-list'); if(_el_locations_list) _el_locations_list.innerHTML='';

  const _el_statblocks_list=document.getElementById('statblocks-list'); if(_el_statblocks_list) _el_statblocks_list.innerHTML='';
  state.statblocks.forEach(s=>addStatBlock(s));
}

// Format text: line breaks → <br>, lines with "Label: text" → bold label
function fmtText(str) {
  if(!str) return '';
  return str.split('\n').map(line => {
    const idx = line.indexOf(':');
    if(idx > 0 && idx < 40) {
      const label = escH(line.slice(0, idx));
      const rest = escH(line.slice(idx + 1).trim());
      return `<strong>${label}:</strong> ${rest}`;
    }
    return escH(line);
  }).join('<br>');
}

  setText('p-title',state.title||'Adventure Title');

  setText('p-session',state.session?'SESSION: '+state.session:'');
  setText('p-players',state.players?'PLAYERS: '+state.players:'');

  setText('p2-players',state.players?'PLAYERS: '+state.players:'');

  setText('p4-players',state.players?'PLAYERS: '+state.players:'');
  setText('p4-duration',state.duration?'DURATION: '+state.duration:'');
  // Overview with formatting
  // Build all p1 items, measure, fill left then right
  (function() {
    const leftEl  = document.getElementById('p1-left');
    const rightEl = document.getElementById('p1-right');
    if(!leftEl || !rightEl) return;

    const sbt={mob:'#C0392B',boss:'#6a2d8a',npc:'#1a4a8a'};
    const soc={'combat':'#cc2222','exploration':'#1a7a1a','npc':'#1a4a8a'};
    const npcs=state.statblocks.filter(s=>s.sbtype==='npc');
    const mobs=state.statblocks.filter(s=>s.sbtype!=='npc');

    // Build HTML strings for each section
    const sections = [];

    // Overview
    sections.push('<div class="p-section"><div class="sl">Overview</div><p class="p-text">'+fmtText(state.overview)+'</p></div>');

    // Secrets & Clues
    if((state.clues||[]).length){
      let h='<div class="p-section"><div class="sl" style="color:#f8f8f6;background:#0a0a0a;padding:3px 8px;">Secrets &amp; Clues</div>';
      (state.clues||[]).forEach(c=>{h+='<div class="clue-item">'+(c.header?'<span class="clue-hdr">'+escH(c.header)+'</span>'+(c.text?' — ':''): '')+fmtText(c.text)+'</div>';});
      sections.push(h+'</div>');
    }

    // Loot & Rewards
    if((state.rewards||[]).length){
      let h='<div class="p-section"><div class="sl" style="color:#f8f8f6;background:#0a0a0a;padding:3px 8px;">Loot &amp; Rewards</div>';
      (state.rewards||[]).forEach(r=>{h+='<div class="npc-block" style="border-left-color:#C4700A;"><div class="entry-name">'+escH(r.name)+'</div>'+(r.flavor?'<div class="sb-flavor" style="margin-bottom:5px;padding:5px 7px;">'+fmtText(r.flavor)+'</div>':'')+(r.stats?'<p class="entry-desc reward-stats" style="font-family:Montserrat,sans-serif;font-size:8px;margin-top:3px;">'+fmtText(r.stats)+'</p>':'')+'</div>';});
      sections.push(h+'</div>');
    }

    // NPCs & Mobs
    if(npcs.length||mobs.length){
      let h='<div class="p-section"><div class="sl" style="color:#f8f8f6;background:#0a0a0a;padding:3px 8px;">NPCs &amp; Mobs</div>';
      npcs.forEach(e=>{h+='<div class="npc-block" style="border-left-color:'+sbt.npc+';"><div class="entry-name">'+escH(e.name)+'</div>'+(e.type?'<div class="entry-meta">'+escH(e.type)+'</div>':'')+'</div>';});
      mobs.forEach(e=>{h+='<div class="mob-block" style="border-left-color:'+(sbt[e.sbtype]||sbt.mob)+';"><div class="entry-name">'+escH(e.name)+'</div>'+(e.type?'<div class="entry-meta">'+escH(e.type)+'</div>':'')+'</div>';});
      sections.push(h+'</div>');
    }

    // Notes
    if(state.notes && state.notes.trim()){
      sections.push('<div class="p-section"><div class="sl">Notes</div><p class="p-text">'+fmtText(state.notes)+'</p></div>');
    }

    // Hooks
    if((state.hooks||[]).length){
      let h='<div class="p-section"><div class="sl" style="color:#f8f8f6;background:#0a0a0a;padding:3px 8px;">Hooks</div>';
      (state.hooks||[]).forEach(hk=>{h+='<div class="clue-item hook-item" style="border-left-color:#c89020;">'+(hk.header?'<span class="clue-hdr">'+escH(hk.header)+'</span>'+(hk.text?' — ':''): '')+fmtText(hk.text)+'</div>';});
      sections.push(h+'</div>');
    }

    // Strong Open items - one per section
    (state.strongopen||[]).forEach(s=>{
      const sc=soc[s.type]||soc.combat;
      sections.push('<div class="location-block"><div class="loc-name" style="color:'+sc+';border-bottom:1.5px solid '+sc+';padding-bottom:1px;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:4px;">'+escH(s.name)+'</div>'+(s.tag?'<div class="loc-tag">'+escH(s.tag)+'</div>':'')+(s.readaloud?'<div class="read-aloud"><p>'+fmtText(s.readaloud)+'</p></div>':'')+(s.desc?'<p class="loc-desc">'+fmtText(s.desc)+'</p>':'')+'</div>');
    });

    // Put all items in left first to measure real heights
    leftEl.innerHTML = sections.join('');
    rightEl.innerHTML = '';

    // Measure each item's actual rendered height
    const items = [...leftEl.children];
    const colH = leftEl.offsetHeight; // flex:1 gives us the correct column height

    // Fill left column, overflow into right
    let leftH = 0;
    let rightStart = -1;
    for(let i=0; i<items.length; i++){
      const h = items[i].offsetHeight + getMargin(items[i]);
      if(rightStart === -1 && leftH + h > colH){
        rightStart = i;
        break;
      }
      leftH += h;
    }

    // Move overflow items to right column
    if(rightStart > 0 && rightStart < items.length){
      const toMove = items.slice(rightStart);
      toMove.forEach(el => rightEl.appendChild(el));
    }
  })();

  // Locations
  const typeColors={'combat':'#cc2222','exploration':'#1a7a1a','npc':'#1a4a8a'};
  document.getElementById('p-locations').innerHTML=state.locations.map(l=>`
    <div class="location-block">
      <div class="loc-name" style="color:${typeColors[l.type]||typeColors.combat};border-bottom:1.5px solid ${typeColors[l.type]||typeColors.combat};padding-bottom:1px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:4px;">${escH(l.name)}</div>
      ${l.tag?`<div class="loc-tag">${escH(l.tag)}</div>`:''}
      ${l.readaloud?`<div class="read-aloud"><p>${fmtText(l.readaloud)}</p></div>`:''}
      ${l.desc?`<p class="loc-desc">${fmtText(l.desc)}</p>`:''}
    </div>`).join('');

  // Flowchart - render on both page 1 and page 2
  const renderFlowchart = (fcId) => {
    const fc=document.getElementById(fcId);
    if(!fc) return;
    const soNodes=state.strongopen.map(s=>({name:s.name,tag:s.tag||'STRONG OPEN',type:s.type||'combat'}));
    const locNodes=state.locations.map(l=>({name:l.name,tag:l.tag,type:l.type||'combat'}));
    const allNodes=[...soNodes,...locNodes];
    if(!allNodes.length){fc.innerHTML='';return;}
    const typeNodeColors={
      combat:{bg:'#C0392B',lbl:'rgba(255,255,255,0.8)',txt:'white'},
      exploration:{bg:'#2d6a2d',lbl:'rgba(255,255,255,0.8)',txt:'white'},
      npc:{bg:'#1a4a8a',lbl:'rgba(255,255,255,0.8)',txt:'white'},
    };
    fc.innerHTML=allNodes.map((n,i)=>{
      const c=typeNodeColors[n.type]||typeNodeColors.combat;
      const tag=n.tag?n.tag.split('//')[0].trim().toUpperCase():n.type.toUpperCase();
      return `<div class="flow-node" style="background:${c.bg};">
        <div class="flow-label" style="color:${c.lbl}">${tag}</div>
        <div class="flow-name" style="color:${c.txt}">${escH(n.name.substring(0,14))}</div>
      </div>${i<allNodes.length-1?'<div class="flow-arrow">→</div>':''}`;
    }).join('');
  };
  renderFlowchart('p-flowchart');
  renderFlowchart('p-flowchart-2');

  // Maps - render each map on page 3
  const mapsContainer=document.getElementById('p-maps-container');
  if(mapsContainer){
    if(state.maps&&state.maps.length>0){
      mapsContainer.innerHTML=state.maps.map(m=>`
        <div style="margin-bottom:16px;break-inside:avoid;">
          ${m.title?`<div class="sl" style="margin-bottom:6px;">${escH(m.title)}</div>`:''}
          <img src="${escA(m.src)}" alt="${escA(m.title||'Map')}" style="width:100%;height:auto;display:block;border:2px solid var(--accent);">
        </div>`).join('');
    } else {
      mapsContainer.innerHTML=`<div class="map-placeholder">MAP IMAGES WILL APPEAR HERE</div>`;
    }
  }

  // Stat blocks page 2
  const sbEl=document.getElementById('p-statblocks');
  if(sbEl) {
  sbEl.innerHTML='';
  const half=state.statblocks.filter(s=>!s.fullwidth);
  const full=state.statblocks.filter(s=>s.fullwidth);  if(half.length){const row=document.createElement('div');row.className='statblocks';half.forEach(s=>row.appendChild(buildSB(s)));sbEl.appendChild(row);}
  if(full.length){const row=document.createElement('div');row.className='statblocks';row.style.marginTop='12px';full.forEach(s=>row.appendChild(buildSB(s)));sbEl.appendChild(row);}
  }
  applyGradients();
  // Run pagination after DOM has painted
  requestAnimationFrame(()=>requestAnimationFrame(paginatePages));
}

function buildSB(s) {
  const div = document.createElement('div');
  const sbtypeColors = {mob:'#0a0a0a', boss:'#333', npc:'#555'};
  div.className = 'stat-block' + (s.fullwidth ? ' full-width' : '');
  div.style.borderTopColor = sbtypeColors[s.sbtype] || sbtypeColors.mob;

  let html = '';

  // Name
  html += '<div class="sb-name">' + escH(s.name) + '</div>';

  // Flavor / Description — italic, right under name
  if(s.flavor) html += '<div class="sb-flavor">' + fmtText(s.flavor) + '</div>';

  html += '<hr class="sb-divider">';

  // AC / HP / MV on one line
  const acHpParts = [];
  if(s.hpval)   acHpParts.push('<strong>AC</strong> ' + escH(s.hpval));
  if(s.hpcount) acHpParts.push('<strong>HP</strong> ' + escH(s.hpcount));
  if(s.move)    acHpParts.push('<strong>MV</strong> ' + escH(s.move));
  if(acHpParts.length) html += '<div class="sb-stat-line">' + acHpParts.join('&ensp;|&ensp;') + '</div>';

  html += '<hr class="sb-divider">';

  // Six ability scores
  html += '<table class="sb-score-table"><tr><th>STR</th><th>DEX</th><th>CON</th><th>INT</th><th>WIS</th><th>CHA</th></tr>';
  html += '<tr>'
    + '<td>' + escH(s.str||'—') + '</td>'
    + '<td>' + escH(s.dex||'—') + '</td>'
    + '<td>' + escH(s.con||'—') + '</td>'
    + '<td>' + escH(s.int||'—') + '</td>'
    + '<td>' + escH(s.evade||'—') + '</td>'
    + '<td>' + escH(s.cha||'—') + '</td>'
    + '</tr></table>';

  html += '<hr class="sb-divider">';

  // Abilities
  if(s.abilities) {
    s.abilities.split('\n').filter(Boolean).forEach(line => {
      const ci = line.indexOf(':');
      if(ci < 0 || ci === line.length - 1) {
        html += '<span class="sb-section-label">' + escH(line.replace(':','')) + '</span>';
      } else {
        html += '<div class="sb-ability"><strong>' + escH(line.slice(0,ci)) + '.</strong> ' + fmtText(line.slice(ci+1).trim()) + '</div>';
      }
    });
  }

  // NPC notes
  if(s.isnpc && s.notes) {
    html += '<hr class="sb-divider">';
    html += s.fullwidth
      ? '<div class="sb-notes">' + fmtText(s.notes) + '</div>'
      : '<div style="font-size:8.5px;color:var(--ink);line-height:1.6;">' + fmtText(s.notes) + '</div>';
  }

  div.innerHTML = html;
  return div;
}


function applyGradients() {
  document.querySelectorAll('.sb-hp-row').forEach(row=>{
    const pips=row.querySelectorAll('.hp-pip');const total=pips.length;
    pips.forEach((pip,i)=>{
      const t=total===1?1:i/(total-1);let r,g,b=10;
      if(t<0.33){const s=t/0.33;r=170;g=Math.round(50*s);}
      else if(t<0.66){const s=(t-0.33)/0.33;r=170;g=Math.round(50+100*s);}
      else{const s=(t-0.66)/0.34;r=Math.round(170*(1-s));g=160;}
      pip.style.background=`rgb(${r},${g},${b})`;pip.style.borderColor='rgba(0,0,0,0.3)';
    });
  });
}

  const allPages=[...document.querySelectorAll('.preview-area .page')].map(p=>p.outerHTML).join('\n');

function importHTML(input) {
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const html=e.target.result;
    const match=html.match(/data-spb="([^"]+)"/);
    if(!match){
      alert("This HTML file does not contain Session Prep Builder data.\n\nOnly files exported from this builder can be imported.");
      input.value="";
      return;
    }
    try {
      const decoded=decodeURIComponent(escape(atob(match[1])));
      const imported=JSON.parse(decoded);
      state={...DEFAULT_STATE,...imported};
      if(!Array.isArray(state.maps)) state.maps=[];
      if(!Array.isArray(state.clues)) state.clues=[];
      if(!Array.isArray(state.rewards)) state.rewards=[];
      if(!Array.isArray(state.hooks)) state.hooks=[];
      if(!Array.isArray(state.strongopen)) state.strongopen=[];
      if(!Array.isArray(state.locations)) state.locations=[];
      if(!Array.isArray(state.statblocks)) state.statblocks=[];
      try {
        const toSave={...state, mappath:"", maps:[]};
        localStorage.setItem("dcw_builder_v5", JSON.stringify(toSave));
      } catch(e) {}
      buildSidebarFromState();
      renderPreview();
      const ind=document.getElementById("save-indicator");
      if(ind){ ind.textContent="Imported ✓"; ind.classList.add("saved"); setTimeout(()=>{ ind.textContent="All changes saved"; ind.classList.remove("saved"); },2000); }
    } catch(err) {
      alert("Failed to parse the imported file: "+err.message+" | Stack: "+err.stack);
    }
    input.value="";
  };
  reader.readAsText(file);
}
function captureScreenshot() {
  const btn = document.getElementById('screenshot-btn');
  btn.textContent = '⏳ Capturing...';
  btn.disabled = true;

  const pages = [...document.querySelectorAll('.preview-area .page')];
  const filename = (state.title || 'adventure').replace(/[^a-z0-9]/gi, '_').toLowerCase();
  const opts = { scale: 2, useCORS: true, allowTaint: true, backgroundColor: null, logging: false };

  Promise.all(pages.map(p => html2canvas(p, opts))).then(canvases => {
    const gap = 20;
    const totalW = Math.max(...canvases.map(c=>c.width));
    const totalH = canvases.reduce((sum,c)=>sum+c.height,0) + gap*(canvases.length-1);
    const combined = document.createElement('canvas');
    combined.width = totalW; combined.height = totalH;
    const ctx = combined.getContext('2d');
    ctx.fillStyle = '#888888';
    ctx.fillRect(0, 0, totalW, totalH);
    let y = 0;
    canvases.forEach(c => { ctx.drawImage(c, 0, y); y += c.height + gap; });
    combined.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename + '_screenshot.png';
      a.click(); URL.revokeObjectURL(url);
      btn.textContent = 'Save PNG'; btn.disabled = false;
    }, 'image/png');
  }).catch(err => {
    alert('Screenshot failed: ' + err.message);
    btn.textContent = 'Save PNG'; btn.disabled = false;
  });
}

function savePDF() {
  const btn=document.getElementById('pdf-btn');
  btn.textContent='⏳ Generating...';
  btn.disabled=true;

  const pages=[...document.querySelectorAll('.preview-area .page')];
  const filename=(state.title||'adventure').replace(/[^a-z0-9]/gi,'_').toLowerCase();
  const opts={scale:2,useCORS:true,allowTaint:true,backgroundColor:null,logging:false};

  Promise.all(pages.map(p=>html2canvas(p,opts))).then(canvases=>{
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});
    const pageW=pdf.internal.pageSize.getWidth();
    const pageH=pdf.internal.pageSize.getHeight();

    canvases.forEach((canvas,i)=>{
      if(i>0) pdf.addPage();
      const img=canvas.toDataURL('image/png');
      const ratio=Math.min(pageW/canvas.width, pageH/canvas.height);
      const w=canvas.width*ratio;
      const h=canvas.height*ratio;
      pdf.addImage(img,'PNG',(pageW-w)/2,(pageH-h)/2,w,h);
    });

    pdf.save(filename+'.pdf');
    btn.textContent='Save PDF';
    btn.disabled=false;
  }).catch(err=>{
    alert('PDF generation failed: '+err.message);
    btn.textContent='Save PDF';
    btn.disabled=false;
  });
}

function toggleSidebar() {
  const sidebar=document.querySelector('.sidebar');
  const btn=document.getElementById('collapse-btn');
  const collapsed=sidebar.classList.toggle('collapsed');
  btn.textContent=collapsed?'▶':'◀';
  btn.title=collapsed?'Show controls':'Hide controls';
}

function toggleDarkMode(cb) {
  document.querySelectorAll('.preview-area .page').forEach(p=>{
    p.classList.toggle('dark-mode', cb.checked);
  });
  // Re-run pagination so continuation pages also get dark mode
  requestAnimationFrame(()=>requestAnimationFrame(paginatePages));
}

function clearAll() {
  if(!confirm('Clear all adventure data?')) return;
  state=JSON.parse(JSON.stringify(DEFAULT_STATE));
  const mapStatus=document.getElementById('map-status');
  const mapLbl=document.querySelector('label[for="f-mapfile"]');
  const fileInput=document.getElementById('f-mapfile');
  if(mapStatus){mapStatus.textContent='No image loaded';mapStatus.style.color='var(--ui-muted)';}
  if(mapLbl) mapLbl.textContent='Click to upload map image';
  if(fileInput) fileInput.value='';
  document.getElementById('maps-list').innerHTML='';
  document.getElementById('hooks-list').innerHTML='';
  document.getElementById('strongopen-list').innerHTML='';
  saveState();buildSidebarFromState();renderPreview();
}
