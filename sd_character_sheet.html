<!DOCTYPE html>
<html lang="en">
<head>
<!-- BUILD: SD Character Sheet — 2026-07-13 02:50 UTC -->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowdark Character Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f8f8f6; --ink:#0a0a0a; --muted:#555; --rule:#c0c0c0;
  --red:#c0251e; --gold:#c8a020; --black:#0a0a0a;
  --box:#efefed; --input-bg:#fff; --border:#0a0a0a;
  --log-bg:#111; --log-text:#e8e4dc;
  --section-bar:#0a0a0a; --section-bar-text:#f8f8f6;
}
body.dark {
  --bg:#141414; --ink:#e8e4dc; --muted:#999; --rule:#333;
  --box:#1e1e1e; --input-bg:#1a1a1a; --border:#444;
  --section-bar:#000; --section-bar-text:#e8e4dc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;transition:background .2s,color .2s;}

.app-wrap{display:flex;flex:1;min-height:0;}
.sheet-wrap{flex:1;overflow-y:auto;padding:16px;}
.roll-log{width:250px;flex-shrink:0;background:var(--log-bg);display:flex;flex-direction:column;border-left:3px solid var(--black);position:sticky;top:0;height:100vh;overflow:hidden;}
/* collapse */
.roll-log{transition:width .2s ease;}
.roll-log.collapsed{width:0!important;overflow:hidden;border:none;}
#log-collapse-btn{position:fixed;right:260px;top:50%;transform:translateY(-50%);z-index:201;background:var(--red);color:white;border:none;cursor:pointer;width:20px;height:56px;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;border-radius:4px 0 0 4px;box-shadow:-2px 0 6px rgba(0,0,0,.3);transition:right .2s ease;}

.log-header{padding:10px 12px;background:var(--black);display:flex;justify-content:space-between;align-items:center;gap:6px;}
.log-title{font-family:'Montserrat',sans-serif;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:white;}
.log-clear{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;cursor:pointer;}
.log-clear:hover{background:var(--red);}
.log-actions{display:flex;gap:3px;padding:6px 8px;border-bottom:1px solid #222;}
.log-action-btn{flex:1;padding:5px 3px;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;}
.log-action-btn.save{background:#1e3a1e;color:#6dbf6d;border:1px solid #2d5a2d;}
.log-action-btn.save:hover{background:#2d5a2d;color:white;}
.log-action-btn.export{background:#1a2a3a;color:#6aabdf;border:1px solid #1a4a8a;}
.log-action-btn.export:hover{background:#1a4a8a;color:white;}
.log-action-btn.pdf{background:#241f10;color:#c8a020;border:1px solid #7a5a00;}
.log-action-btn.pdf:hover{background:#7a5a00;color:white;}
.log-action-btn.import{background:#2a1a1a;color:#df6a6a;border:1px solid #5a1a1a;}
.log-action-btn.import:hover{background:#5a1a1a;color:white;}
.log-action-btn.newchar{background:#1a1a2e;color:#8888dd;border:1px solid #2a2a5a;}
.log-action-btn.newchar:hover{background:#2a2a5a;color:white;}
.log-entries{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column-reverse;gap:5px;justify-content:flex-start;}
.log-entry{background:#1e1e1e;border:1px solid #333;padding:7px 9px;}
.log-entry .roll-label{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#777;margin-bottom:2px;}
.log-entry .roll-result{font-family:'Montserrat',monospace;font-size:22px;font-weight:900;color:var(--log-text);line-height:1;}
.log-entry .roll-detail{font-size:9px;color:#555;margin-top:2px;font-family:'Montserrat',sans-serif;}
.log-entry.crit .roll-result{color:#ffd700;}.log-entry.fumble .roll-result{color:#ff4444;}
.log-entry.remote{border-left:3px solid #8a7ac8;background:#1c1a24;}
.log-entry.crit{border-color:#ffd700;}.log-entry.fumble{border-color:#ff4444;}
.log-hint{color:#333;font-size:10px;font-family:'Montserrat',sans-serif;text-align:center;padding:16px 8px;text-transform:uppercase;letter-spacing:.08em;}

/* DICE TRAY */
.dice-tray{border-top:2px solid #222;padding:8px;background:#0e0e0e;flex-shrink:0;}
.dice-tray-label{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#444;margin-bottom:5px;}
.adv-btns{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:5px;}
.adv-btn{padding:4px;background:#1a1a1a;border:1px solid #333;color:#777;font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:.06em;}
.adv-btn.adv-active{background:#1a3a1a;border-color:#2d7a2d;color:#6dbf6d;}
.adv-btn.dis-active{background:#3a1a1a;border-color:#7a2d2d;color:#df6a6a;}
.dice-btns{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-bottom:5px;}
.dice-btn{min-width:0;padding:4px 1px;background:#1a1a1a;border:1px solid #333;color:#999;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;cursor:pointer;text-align:center;}
.dice-btn:hover{background:var(--red);border-color:var(--red);color:white;}
.dice-pool-display{font-size:9px;color:#666;min-height:14px;margin-bottom:5px;font-family:'Montserrat',sans-serif;}
.dice-pool-display span{color:#c8a020;}
.dice-tray-actions{display:flex;gap:3px;}
.dice-roll-btn{flex:1;padding:5px;background:var(--black);border:none;color:white;font-family:'Montserrat',sans-serif;font-weight:900;font-size:11px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;}
.dice-roll-btn:hover{background:var(--red);}
.dice-clear-btn{padding:5px 8px;background:#1a1a1a;border:1px solid #333;color:#555;font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;cursor:pointer;}
.dice-clear-btn:hover{background:#333;color:#aaa;}
.btn-die{font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;font-size:1.05em;line-height:1;vertical-align:-1px;}

/* DARK TOGGLE */
.dm-toggle-wrap{display:flex;align-items:center;gap:5px;}
.dm-label{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.6);}
.dm-toggle-btn{width:32px;height:16px;background:#333;border:1px solid #555;border-radius:8px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.dm-toggle-btn.on{background:var(--red);}
.dm-toggle-btn::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;background:white;border-radius:50%;transition:left .2s;}
.dm-toggle-btn.on::after{left:18px;}

/* SHEET */
.sheet{background:var(--bg);border:2px solid var(--border);max-width:900px;margin:0 auto;}
.sl{font-family:'Montserrat',sans-serif;font-weight:900;font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:var(--section-bar-text);background:var(--section-bar);padding:3px 8px;display:block;}

/* HEADER */
.sheet-title{background:var(--black);padding:12px 16px;display:flex;align-items:baseline;gap:12px;}
.sheet-title-text{font-family:'UnifrakturMaguntia',cursive;font-size:32px;color:white;line-height:1;}
.sheet-title-sub{font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:#888;}
.hdr-fields{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:2px solid var(--border);}
.hdr-field{padding:4px 8px 5px;border-right:1px solid var(--rule);}
.hdr-field:last-child{border-right:none;}
.hdr-field label{display:block;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:2px;}
.hdr-field input{width:100%;border:none;border-bottom:1px solid var(--rule);background:transparent;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;color:var(--ink);outline:none;padding:1px 0;}
.hdr-fields-2{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:2px solid var(--border);}

/* MAIN BODY */
.main-body{display:grid;grid-template-columns:220px 1fr 230px;grid-template-rows:auto auto;border-bottom:2px solid var(--border);}

/* LEFT — stats + info */
.left-col{grid-column:1;grid-row:1;border-right:2px solid var(--border);}

/* STATS BLOCK */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--rule);}
.stat-cell{padding:8px 10px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);display:flex;flex-direction:column;align-items:stretch;}
.stat-cell:nth-child(2n){border-right:none;}
.stat-cell:nth-last-child(-n+2){border-bottom:none;}
.stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:4px;text-align:center;align-self:stretch;}
.stat-val-row{display:flex;align-items:center;justify-content:center;gap:6px;}
.stat-val{width:44px;height:36px;border:2px solid var(--border);background:var(--input-bg);font-family:'Montserrat',sans-serif;font-size:18px;font-weight:900;text-align:center;color:var(--ink);outline:none;}
.stat-mod{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:700;color:var(--ink);min-width:28px;background:var(--box);border:1px solid var(--rule);text-align:center;padding:2px 4px;cursor:pointer;}
.stat-mod:hover{background:var(--black);color:white;}

/* LEFT INFO */
.info-field{padding:5px 8px;border-bottom:1px solid var(--rule);}
.info-field label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);display:block;margin-bottom:2px;}
.info-field input,.info-field textarea{width:100%;border:none;border-bottom:1px solid var(--rule);background:transparent;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;color:var(--ink);outline:none;resize:none;}

/* HP / AC */
.hp-ac-row{display:flex;border-bottom:1px solid var(--rule);}
.hp-box,.ac-box{flex:0 0 50%;padding:5px 6px;display:flex;flex-direction:column;align-items:center;gap:2px;box-sizing:border-box;overflow:hidden;}
.hp-box{border-right:1px solid var(--rule);}
.hpac-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);}
.hpac-inputs{display:flex;align-items:center;justify-content:center;gap:2px;overflow:hidden;}
.hpac-input{width:36px;min-width:0;height:34px;border:2px solid var(--border);background:var(--input-bg);font-family:'Montserrat',sans-serif;font-size:16px;font-weight:900;text-align:center;color:var(--ink);outline:none;}
.hpac-slash{font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0;}
.hpac-max{width:30px;min-width:0;height:28px;border:1px solid var(--rule);background:var(--box);font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;text-align:center;color:var(--ink);outline:none;}

/* XP + LUCK */
.xp-row{display:flex;align-items:center;border-bottom:1px solid var(--rule);}
.xp-half{flex:0 0 50%;display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 8px;box-sizing:border-box;}
.xp-half:first-child{border-right:1px solid var(--rule);}
.xp-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);flex-shrink:0;}
.xp-input{width:32px;height:22px;border:1px solid var(--rule);background:var(--input-bg);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-align:center;color:var(--ink);outline:none;}
.xp-slash{font-size:12px;color:var(--muted);}
.lk-input{width:30px;height:22px;border:1px solid var(--rule);background:var(--input-bg);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;text-align:center;color:var(--ink);outline:none;}
.lk-btn{width:18px;height:22px;background:var(--box);border:1px solid var(--rule);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;color:var(--muted);line-height:1;padding:0;}
.lk-btn:hover{background:var(--black);color:white;}

/* COIN */
.coin-row{display:flex;border-bottom:1px solid var(--rule);}
.coin-cell{flex:1;padding:4px 6px;border-right:1px solid var(--rule);display:flex;flex-direction:column;align-items:center;gap:2px;}
.coin-cell:last-child{border-right:none;}
.coin-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.coin-input{width:100%;border:none;border-bottom:1px solid var(--rule);background:transparent;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;text-align:center;color:var(--ink);outline:none;}

/* CENTER — attacks + gear */
.center-col{grid-column:2;grid-row:1;display:flex;flex-direction:column;border-right:2px solid var(--border);}
.attacks-section-wrap{flex-shrink:0;}
.talents-section-wrap{flex:1;display:flex;flex-direction:column;}
.attacks-section,.gear-section{display:flex;flex-direction:column;}
.attacks-table,.gear-table{width:100%;border-collapse:collapse;}
.attacks-table th,.gear-table th{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:3px 6px;border-bottom:1px solid var(--rule);text-align:left;background:var(--bg);}
.attacks-table td,.gear-table td{border-bottom:1px solid var(--rule);padding:1px 4px;}
.attacks-table td input,.gear-table td input{width:100%;border:none;background:transparent;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;outline:none;padding:4px 2px;color:var(--ink);}
.atk-roll-btn{padding:2px 5px;background:transparent;border:1px solid var(--rule);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;color:var(--muted);}
.atk-roll-btn:hover{background:var(--black);border-color:var(--black);color:white;}

/* RIGHT — talents + spells */
.right-col{grid-column:3;grid-row:1/3;border-left:2px solid var(--border);}
.talents-section{padding:0;}
.talents-area{flex:1;padding:0;display:flex;flex-direction:column;}
.talents-area textarea{width:100%;flex:1;min-height:260px;border:none;background:transparent;resize:none;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;outline:none;color:var(--ink);padding:6px 10px;box-sizing:border-box;}
.spells-list{padding:0;}
/* Spell rows use grid for perfect column alignment */
.spell-row{display:grid;grid-template-columns:16px 1fr 26px 30px 48px 60px 60px 20px 20px 24px;align-items:center;gap:2px;padding:1px 6px;border-bottom:1px solid var(--rule);}
.spell-row.lost{opacity:.4;}
.spell-row.lost .spell-input{text-decoration:line-through;color:var(--muted);}
.spell-input{border:none;background:transparent;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:500;outline:none;color:var(--ink);padding:3px 2px;min-width:0;}
.spell-level{width:100%;border:1px solid var(--rule);background:var(--input-bg);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;text-align:center;color:var(--ink);outline:none;padding:1px 0;}
.spell-cast-btn{padding:1px 3px;background:transparent;border:1px solid var(--rule);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;color:var(--muted);width:100%;}
.spell-cast-btn:hover{background:var(--black);color:white;}
.spell-adv-btn{padding:1px 2px;background:transparent;border:1px solid var(--rule);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:8px;font-weight:900;color:var(--muted);width:100%;text-align:center;}
.spell-adv-btn.on{background:#1a3a1a;border-color:#2d7a2d;color:#6dbf6d;}
.spell-lost-btn{padding:1px 2px;background:transparent;border:1px solid var(--rule);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:8px;font-weight:900;color:var(--muted);width:100%;text-align:center;}
.spell-lost-btn.on{background:#3a1a1a;border-color:#7a2d2d;color:#df6a6a;}
.atk-adv-btn{padding:2px 4px;background:transparent;border:1px solid var(--rule);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:900;color:var(--muted);}
.atk-adv-btn.on{background:#1a3a1a;border-color:#2d7a2d;color:#6dbf6d;}

.spells-bottom{grid-column:1/3;grid-row:2;}
.spell-desc{border:none;background:transparent;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:500;outline:none;color:var(--muted);padding:1px 2px;resize:none;min-height:16px;width:100%;}
.gear-slot-disabled .gear-name{text-decoration:line-through;opacity:0.35;color:var(--muted);pointer-events:none;}
.gear-slot-disabled .gear-qty{opacity:0.35;pointer-events:none;}
.gear-slot-disabled{background:repeating-linear-gradient(135deg,transparent,transparent 4px,rgba(128,128,128,0.07) 4px,rgba(128,128,128,0.07) 5px);}
.gear-disable-btn{padding:1px 3px;background:transparent;border:1px solid var(--rule);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;color:var(--muted);border-radius:2px;flex-shrink:0;}
.gear-disable-btn.on{background:#3a1a1a;border-color:#7a2d2d;color:#df6a6a;}
/* FREE TO CARRY */
.free-carry{border-top:2px solid var(--border);}
.free-carry-inner{padding:6px 10px;}
.free-carry-inner textarea{width:100%;min-height:60px;border:none;background:transparent;resize:none;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;color:var(--ink);}

/* ROLL BTN */
.stat-roll-row{margin-top:3px;}
.stat-roll-btn{width:100%;margin-top:5px;padding:5px 0;background:var(--black);color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;line-height:1.2;}
.stat-roll-btn:hover{background:var(--red);}

/* dark mode inputs */
body.dark input, body.dark textarea{color:var(--ink);}
#spell-stat option{background:#fff;color:#111;}
body.dark #spell-stat option{background:#141414;color:#eee;}
body.dark .stat-val, body.dark .hpac-input, body.dark .hpac-max, body.dark .xp-input, body.dark .coin-input{background:var(--input-bg);color:var(--ink);}

/* ── Mobile roll toast ── */
#roll-toast {
  display: none;
  position: fixed;
  bottom: 52px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  background: rgba(10,10,12,0.93);
  border: 2px solid var(--red, #b82018);
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
  min-width: 160px;
  max-width: 82vw;
  pointer-events: none;
  box-shadow: 0 4px 24px rgba(0,0,0,0.7);
}
#roll-toast.show { display: block; animation: _toast-in 0.18s ease; }
#roll-toast.crit { border-color: #6dbf6d; }
#roll-toast.fumble { border-color: #df6a6a; }
#roll-toast .t-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #8a8a93; margin-bottom: 3px; }
#roll-toast .t-result { font-family: 'Share Tech Mono', monospace; font-size: 30px; font-weight: 900; color: #e8c84a; line-height: 1; }
#roll-toast.crit .t-result { color: #6dbf6d; }
#roll-toast.fumble .t-result { color: #df6a6a; }
#roll-toast .t-detail { font-size: 11px; color: #a0a0aa; margin-top: 3px; }
@keyframes _toast-in {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>
</head>
<body>
<div id="roll-toast"><div class="t-label"></div><div class="t-result"></div><div class="t-detail"></div></div>
<div class="app-wrap">

<!-- ═══ SHEET ═══ -->
<div class="sheet-wrap">
<div class="sheet">

  <!-- TITLE -->
  <div class="sheet-title">
    <div class="sheet-title-text">Shadowdark</div>
    <button onclick="takeRest()" style="margin-left:auto;padding:6px 14px;background:#1a2e3a;color:#6ac8df;border:1px solid #1a5a7a;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;align-self:center;margin-right:6px;" onmouseover="this.style.background='#1a5a7a';this.style.color='white'" onmouseout="this.style.background='#1a2e3a';this.style.color='#6ac8df'">🌙 Rest</button>
    <button id="hdr-create-btn" onclick="startCharWizard()" style="padding:6px 14px;background:#241f10;color:#c8a020;border:1px solid #7a5a00;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;align-self:center;" onmouseover="this.style.background='#7a5a00';this.style.color='white'" onmouseout="this.style.background='#241f10';this.style.color='#c8a020'">⚒ Create</button>

// ── Druid spells: neutral wizards; Mage spells: lawful wizards (in addition
//    to the standard wizard list) ─────────────────────────────────────────
function sheetAlignment() {
  return (document.getElementById('f-alignment')?.value || '').trim().toLowerCase();
}
// Can a character of this class + alignment learn spell s?
function spellAllowed(s, cls, alignment) {
  const al = (alignment || '').trim().toLowerCase();
  if(s.caster === 'Both')  return cls==='Wizard' || cls==='Priest';
  if(s.caster === 'Druid') return cls==='Wizard' && al === 'neutral';
  if(s.caster === 'Mage')  return cls==='Wizard' && al === 'lawful';
  if(s.caster === 'Sorcerer') return cls==='Wizard' && al === 'chaotic';
  return s.caster === cls;
}

// ── Caster-aware spell lookup (witch shares 5 names with wizard/priest) ────
function findSpell(name, prefCaster) {
  if(typeof SD_SPELLS === 'undefined') return null;
  const hits = SD_SPELLS.filter(x=>x.name===name);
  if(!hits.length) return null;
  if(prefCaster) {
    const m = hits.find(x=>x.caster===prefCaster);
    if(m) return m;
  }
  return hits[0];
}

];
function rollDiabolicalMishap(tier) {
  const t = parseInt(tier) || 1;
  const table = t >= 4 ? SD_MISHAPS_4_5 : SD_MISHAPS_1_3;
  const roll = Math.ceil(Math.random()*12);
  return { roll: roll, tableName: (t>=4?'4-5':'1-3'), text: table[roll-1] };
}


function weaponOptions() {
  return '<option value="">— Select Weapon —</option>' +
    SD_WEAPONS.map(w=>`<option value="${w.name}">${w.name} (${w.damage})</option>`).join('');
}

function spellOptions() {
  const sorted = SD_SPELLS.slice().sort((a,b)=>parseInt(a.tier)-parseInt(b.tier)||a.name.localeCompare(b.name));
  let html = '<option value="">— Select Spell —</option>';
  let curTier = '';
  sorted.forEach(s=>{
    if(s.tier !== curTier) {
      curTier = s.tier;
      html += `<optgroup label="Tier ${s.tier}">`;
    }
    html += `<option value="${s.name}::${s.caster}">${s.name} (${s.caster})</option>`;
  });
  return html;
}


function pickWeapon(sel) {
  const name = sel.value;
  if(!name) return;
  const w = SD_WEAPONS.find(x=>x.name===name);
  if(!w) return;
  addAttackRow();
  const tbody = document.getElementById('attacks-body');
  const row = tbody.lastElementChild;
  const cells = row.querySelectorAll('td input, td select');
  // cells: [name, bonus, stat, damage, ...]
  if(cells[0]) cells[0].value = w.name;
  if(cells[1]) cells[1].value = '+0';
  if(cells[2]) {
    // Auto-select DEX for ranged/finesse, STR for melee
    const isRanged = w.type === 'R';
    const isFinesse = w.props.toLowerCase().includes('finesse');
    cells[2].value = (isRanged || isFinesse) ? 'dex' : 'str';
  }
  if(cells[3]) cells[3].value = w.damage;
  sel.value = '';
}

function removeLastAttack() {
  const tbody = document.getElementById('attacks-body');
  if(tbody && tbody.lastElementChild) tbody.lastElementChild.remove();
}

function addAttackWithPicker() {
  const sel = document.getElementById('weapon-picker');
  const name = sel ? sel.value : '';
  addAttackRow();
  if(name && typeof SD_WEAPONS !== 'undefined') {
    const w = SD_WEAPONS.find(x=>x.name===name);
    if(w) {
      const tbody = document.getElementById('attacks-body');
      const row = tbody.lastElementChild;
      const inputs = row.querySelectorAll('td input');
      const selects = row.querySelectorAll('td select');
      // inputs: [0]=name, [1]=bonus, [2]=damage
      // selects: [0]=stat, [1]=range
      if(inputs[0]) inputs[0].value = w.name;
      if(inputs[1]) inputs[1].value = '+0';
      if(inputs[2]) inputs[2].value = w.damage;
      if(selects[0]) selects[0].value = (w.type==='R'||w.props.toLowerCase().includes('finesse'))?'dex':'str';
      // Range: use last part of range string (e.g. 'Close/Near' -> 'Near', 'Far' -> 'Far')
      if(selects[1]) {
        const parts = w.range.split('/');
        selects[1].value = parts[parts.length-1].trim();
      }
    }
  }
  if(sel) sel.value = '';
}

function populateWeaponPicker() {
  const sel = document.getElementById('weapon-picker');
  if(!sel) return;
  sel.options.length = 0;
  sel.add(new Option('— Select Weapon —', ''));
  if(typeof SD_WEAPONS === 'undefined') return;
  SD_WEAPONS.forEach(function(w) {
    sel.add(new Option(w.name + ' (' + w.damage + ', ' + w.range + ')', w.name));
  });
}


function pickSpell(sel) {
  const raw = sel.value;
  if(!raw) return;
  const [name, caster] = raw.split('::');
  const s = findSpell(name, caster);
  if(!s) return;
  // Find first empty spell row or add a new one
  const rows = [...document.querySelectorAll('#spells-list .spell-row')];
  let row = rows.find(r=>!r.querySelector('.spell-input')?.value);
  if(!row) {
    _spellCount++;
    row = addSpellRow(_spellCount);
  }
  if(!row) return;
  const inp  = row.querySelector('.spell-input');
  const lvl  = row.querySelector('.spell-level');
  const rng  = row.querySelector('.spell-range');
  const dur  = row.querySelector('.spell-duration');
  const dmg  = row.querySelector('.spell-damage');
  const dsc  = row.querySelector('.spell-desc');
  if(inp) inp.value = s.name;
  if(lvl) lvl.value = s.tier;
  if(rng) rng.value = s.range;
  if(dur) dur.value = s.duration;
  if(dmg) dmg.value = s.damage || '';
  if(dsc) { dsc.value = s.desc; autoResizeDesc(dsc); }
  sel.value = '';
  try{ saveSheet(false); } catch(e){}
}

function populateSpellPicker() {
  const sel = document.getElementById('spell-picker');
  if(!sel) return;
  // Clear all existing options and optgroups
  while(sel.firstChild) sel.removeChild(sel.firstChild);
  sel.add(new Option('— Select Spell —', ''));
  if(typeof SD_SPELLS === 'undefined') return;
  const sorted = SD_SPELLS.slice().sort(function(a,b){
    return parseInt(a.tier)-parseInt(b.tier)||a.name.localeCompare(b.name);
  });
  let curTier = '';
  let grp = null;
  sorted.forEach(function(s) {
    if(s.tier !== curTier) {
      curTier = s.tier;
      grp = document.createElement('optgroup');
      grp.label = 'Tier ' + s.tier;
      sel.appendChild(grp);
    }
    const opt = document.createElement('option');
    opt.value = s.name + '::' + s.caster;
    opt.textContent = s.name + ' (' + s.caster + ')';
    grp.appendChild(opt);
  });
}

  const v = parseInt(val);
  if(isNaN(v)) return null;
  return Math.floor((v - 10) / 2);
}
function fmtMod(m) {
  if(m === null) return '—';
  return (m >= 0 ? '+' : '') + m;
}

// ── ADV/DIS ──
let advState = null;
function toggleAdv(mode) {
  advState = advState === mode ? null : mode;
  document.getElementById('adv-btn').className = 'adv-btn' + (advState==='advantage'?' adv-active':'');
  document.getElementById('dis-btn').className = 'adv-btn' + (advState==='disadvantage'?' dis-active':'');
}
function clearAdv() {
  advState = null;
  document.getElementById('adv-btn').className = 'adv-btn';
  document.getElementById('dis-btn').className = 'adv-btn';
}
function rollWithAdv(sides) {
  const r1 = Math.floor(Math.random()*sides)+1;
  if(sides !== 20 || !advState) return {result:r1, detail:null};
  const r2 = Math.floor(Math.random()*sides)+1;
  return advState==='advantage'
    ? {result:Math.max(r1,r2), detail:`adv[${r1},${r2}]→${Math.max(r1,r2)}`}
    : {result:Math.min(r1,r2), detail:`dis[${r1},${r2}]→${Math.min(r1,r2)}`};
}
function d(s){return Math.floor(Math.random()*s)+1;}
function parseMod(v){if(!v)return 0;const n=parseInt((v+'').replace(/\s/g,''));return isNaN(n)?0:n;}

// ── LOG ──

// ── Roll toast: shown on mobile when log is collapsed ──
var _toastTimer = null;
function showRollToast(label, result, detail, type) {
  if (window.innerWidth > 768) return;
  var log = document.querySelector('.roll-log');
  if (!log || !log.classList.contains('collapsed')) return;
  var t = document.getElementById('roll-toast');
  if (!t) return;
  t.className = 'show' + (type === 'crit' ? ' crit' : type === 'fumble' ? ' fumble' : '');
  t.querySelector('.t-label').textContent = label;
  t.querySelector('.t-result').textContent = result;
  t.querySelector('.t-detail').textContent = detail;
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.className = ''; }, 3500);
}

function addLog(label, result, detail, type='normal') {
  const entries = document.getElementById('log-entries');
  const hint = entries.querySelector('.log-hint');
  if(hint) hint.remove();
  const div = document.createElement('div');
  div.className = 'log-entry'+(type==='crit'?' crit':type==='fumble'?' fumble':'');
  const advLabel = advState==='advantage'?' <span style="color:#6dbf6d;font-size:8px;">▲ADV</span>'
                 : advState==='disadvantage'?' <span style="color:#df6a6a;font-size:8px;">▼DIS</span>':'';
  div.innerHTML = `<div class="roll-label">${label}${advLabel}</div><div class="roll-result">${result}</div><div class="roll-detail">${detail}</div>`;
  if(typeof campaignBroadcast === 'function') campaignBroadcast(label, result, detail, type);
  entries.insertBefore(div, entries.firstChild);
  entries.scrollTop = 0;
  showRollToast(label, result, detail, type);
  clearAdv();
}
function clearLog() {
  document.getElementById('log-entries').innerHTML = '<div class="log-hint">Click a stat or roll button</div>';
}

// ── ROLLS ──
function rollStat(id, name) {
  const mod = getStatMod(id);
  const {result:roll, detail:advDetail} = rollWithAdv(20);
  const total = roll + mod;
  let type = roll===20?'crit':roll===1?'fumble':'normal';
  const base = advDetail||`d20(${roll})`;
  addLog(`${name} Check`+(roll===20?' ★ NAT 20':roll===1?' ✗ NAT 1':''), total,
    `${base} + Mod(${fmtMod(mod)}) = ${total}`, type);
}

function rollAttack(btn) {
  const row = btn.closest('tr');
  const inputs = row.querySelectorAll('input[type="text"]');
  const sel = row.querySelector('select');
  const name = inputs[0].value||'Attack';
  const bonus = parseMod(inputs[1].value);
  const statId = sel?.value||'';
  const statMod = statId ? getStatMod(statId) : 0;
  const diceStr = inputs[2].value||'d6';

  const atkAdvBtn = btn.closest('tr').querySelector('.atk-adv-btn');
  const hasAtkAdv = atkAdvBtn?.classList.contains('on');
  const prevAdv = advState;
  if(hasAtkAdv && !advState) advState = 'advantage';
  const {result:hitRoll, detail:advDetail} = rollWithAdv(20);
  advState = prevAdv;
  const hitTotal = hitRoll + bonus + statMod;
  const hitBase = advDetail||`d20(${hitRoll})`;
  const statLabel = statId?`+${statId.toUpperCase()}(${fmtMod(statMod)})`:'';
  let type = hitRoll===20?'crit':hitRoll===1?'fumble':'normal';

  let dmgTotal = null, dmgBreakdown = '';
  const dm = diceStr.match(/^(\d*)d(\d+)([+-]\d+)?$/i);
  if(dm) {
    const num=parseInt(dm[1]||'1'), sides=parseInt(dm[2]), bonus2=parseInt(dm[3]||'0');
    const rolls=Array.from({length:num},()=>d(sides));
    dmgTotal = rolls.reduce((a,b)=>a+b,0)+bonus2;
    dmgBreakdown = `${diceStr}(${rolls.join('+')})${bonus2?((bonus2>0?'+':'')+bonus2):''}=${dmgTotal}`;
  }

  // Bold result: clean totals only
  const resultStr = dmgTotal !== null
    ? `Hit: ${hitTotal}  |  Dmg: ${dmgTotal}`
    : `Hit: ${hitTotal}`;

  // Detail: full breakdown, not bold
  const detailStr = `${hitBase}+Bonus(${bonus})${statLabel}=${hitTotal}`
    + (dmgBreakdown ? `  |  ${dmgBreakdown}` : '');

  addLog(`${name}`+(hitRoll===20?' ★ NAT 20':hitRoll===1?' ✗ NAT 1':''),
    resultStr, detailStr, type);
}

function rollSpell(btn) {
  const row = btn.closest('.spell-row');
  const name       = row.querySelector('.spell-input').value || 'Spell';
  const spellLevel = parseInt(row.querySelector('.spell-level')?.value) || 1;
  const bonusStr   = row.querySelector('.spell-bonus')?.value.trim() || '';
  const dmgStr     = row.querySelector('.spell-damage')?.value.trim() || '';
  const dc         = 10 + spellLevel;
  const isAdvSpell = row.querySelector('.spell-adv-btn')?.classList.contains('on');
  const isLost     = row.querySelector('.spell-lost-btn')?.classList.contains('on');

  if(isLost) {
    addLog(`${name}`, '✗ LOST', 'This spell is lost until you rest', 'fumble');
    return;
  }

  // Parse bonus (accepts "+3", "3", "-1")
  const bonus = parseInt(bonusStr.replace(/^\+/, '')) || 0;

  // Global casting stat mod (INT wizards, WIS priests, CHA bards)
  const castStat = document.getElementById('spell-stat')?.value || '';
  const castMod = castStat ? getStatMod(castStat) : 0;
  const gBonus = parseInt((document.getElementById('spell-gbonus')?.value||'').replace(/^\+/,'')) || 0;

  // Spell advantage stacks with global adv state
  const prevAdv = advState;
  if(isAdvSpell && !advState) advState = 'advantage';
  const {result:roll, detail:advDetail} = rollWithAdv(20);
  advState = prevAdv;

  const total   = roll + bonus + castMod + gBonus;
  const success = total >= dc;
  const type    = !success ? 'fumble' : roll===20 ? 'crit' : 'normal';
  const base    = advDetail || `d20(${roll})`;
  const verdict = success ? `✓ HIT (DC ${dc})` : `✗ MISS (DC ${dc}) — spell lost!`;
  const bonusPart = [bonus !== 0 ? `${bonus>=0?'+':''}${bonus}` : '', castMod !== 0 ? `${castMod>=0?'+':''}${castMod} (${castStat.toUpperCase()})` : '', gBonus !== 0 ? `${gBonus>=0?'+':''}${gBonus}` : ''].filter(Boolean).join(' ');

  // Mark as lost if failed
  if(!success) {
    row.querySelector('.spell-lost-btn')?.classList.add('on');
    row.classList.add('lost');
  }

  // Diabolical Mishap — natural 1 on a witch spell (Cursed Scroll 1)
  const _cls = (document.getElementById('f-class')?.value || '').trim().toLowerCase();
  const _isWitchSpell = _cls==='witch' || _cls==='warlock' || /knight of st\.? ydris/.test(_cls)
                     || !!(typeof SD_SPELLS!=='undefined' && SD_SPELLS.find(x=>x.name===name && x.caster==='Witch'));
  if(roll === 1 && _isWitchSpell) {
    const m = rollDiabolicalMishap(spellLevel);
    addLog('Diabolical Mishap ('+m.tableName+')', 'd12 → '+m.roll, m.text, 'fumble');
  }

  // Roll damage if spell succeeded and damage field has a dice string
  let dmgTotal = null, dmgBreakdown = '';
  if(success && dmgStr) {
    const dm = dmgStr.match(/^(\d*)d(\d+)([+-]\d+)?$/i);
    if(dm) {
      const num = parseInt(dm[1]||'1'), sides = parseInt(dm[2]), mod = parseInt(dm[3]||'0');
      const rolls = Array.from({length:num}, ()=>d(sides));
      dmgTotal = rolls.reduce((a,b)=>a+b,0) + mod;
      dmgBreakdown = `${dmgStr}(${rolls.join('+')})${mod?(mod>0?'+':'')+mod:''}=${dmgTotal}`;
    }
  }

  const resultStr = dmgTotal !== null
    ? `${total} — ${verdict}  |  Dmg: ${dmgTotal}`
    : `${total} — ${verdict}`;
  const detailStr = `${base}${bonusPart} vs DC ${dc} (10+${spellLevel})`
    + (dmgBreakdown ? `  |  ${dmgBreakdown}` : '');

  addLog(`${name} (Tier ${spellLevel})${isAdvSpell?' ▲':''}`, resultStr, detailStr, type);
}

let dicePool=[];
function addDie(s){dicePool.push(s);updateDicePoolDisplay();}
function updateDicePoolDisplay(){
  const el=document.getElementById('dice-pool-display');
  if(!dicePool.length){el.innerHTML='<span>Empty</span>';return;}
  const c={};dicePool.forEach(s=>c[s]=(c[s]||0)+1);
  el.innerHTML=Object.entries(c).sort((a,b)=>b[0]-a[0]).map(([s,n])=>`<span>${n}d${s}</span>`).join(' + ');
}
function rollDicePool(){
  if(!dicePool.length){addLog('Dice Tray','—','No dice in pool');return;}
  const rolls=dicePool.map(s=>{
    if(s===20&&advState){const r=rollWithAdv(20);return{sides:s,result:r.result,detail:r.detail};}
    return{sides:s,result:d(s),detail:null};
  });
  const total=rolls.reduce((sum,r)=>sum+r.result,0);
  const c={};dicePool.forEach(s=>c[s]=(c[s]||0)+1);
  const label=Object.entries(c).sort((a,b)=>b[0]-a[0]).map(([s,n])=>`${n}d${s}`).join('+');
  const detail=rolls.map(r=>r.detail||`d${r.sides}(${r.result})`).join(' + ')+' = '+total;
  addLog(`Dice Tray: ${label}`,total,detail,'normal');
}
function clearDicePool(){dicePool=[];updateDicePoolDisplay();}

// ── SAVE / EXPORT / IMPORT ──
function collectSheet(){
  // Build a Shadowdarklings-compatible export
  const statsMap = {};
  STATS.forEach(s => {
    const v = parseInt(document.getElementById(s.id+'-val')?.value) || 0;
    statsMap[s.name] = v;
  });

  const gearItems = [];
  document.querySelectorAll('#gear-list .gear-name').forEach((el, i) => {
    const qty = document.querySelectorAll('#gear-list .gear-qty')[i]?.value || '1';
    if(el.value.trim()) gearItems.push({
      instanceId: 'sheet'+(i+1),
      gearId: 'g'+(i+1),
      name: el.value.trim(),
      type: 'sundry',
      quantity: parseInt(qty) || 1,
      totalUnits: 1,
      slots: 1,
      cost: 0,
      currency: 'gp'
    });
  });
  // Free to carry items → slots:0
  const freeCarry = document.getElementById('free-carry')?.value || '';
  if(freeCarry.trim()) {
    freeCarry.split(',').forEach((item, i) => {
      const name = item.trim();
      if(name) gearItems.push({
        instanceId: 'free'+(i+1),
        gearId: 'f'+(i+1),
        name,
        type: 'sundry',
        quantity: 1,
        totalUnits: 1,
        slots: 0,
        cost: 0,
        currency: 'gp'
      });
    });
  }

  // Attacks as strings
  const attackStrings = [];
  document.querySelectorAll('#attacks-body tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input[type="text"]');
    const sels = tr.querySelectorAll('select');
    const sel = sels[0];
    const name = inputs[0]?.value.trim();
    const bonus = inputs[1]?.value.trim();
    const stat = sel?.value ? sel.value.toUpperCase() : '';
    const range = sels[1]?.value || '';
    const dmg = inputs[2]?.value.trim();
    if(name) {
      const statMod = stat ? getStatMod(stat.toLowerCase()) : 0;
      const totalBonus = (parseInt(bonus)||0) + statMod;
      const bonusStr = totalBonus >= 0 ? '+'+totalBonus : String(totalBonus);
      attackStrings.push(`${name.toUpperCase()}: ${bonusStr}${dmg ? ', '+dmg : ''}`);
    }
  });

  // Spells
  // Collect spells with level, adv, lost state
  const spellRows = [...document.querySelectorAll('#spells-list .spell-row')];
  const spellData = spellRows.map(row => ({
    name:     row.querySelector('.spell-input')?.value.trim() || '',
    level:    row.querySelector('.spell-level')?.value.trim() || '1',
    adv:      row.querySelector('.spell-adv-btn')?.classList.contains('on') || false,
    lost:     row.querySelector('.spell-lost-btn')?.classList.contains('on') || false,
    desc:     row.querySelector('.spell-desc')?.value.trim() || '',
    bonus:    row.querySelector('.spell-bonus')?.value.trim() || '',
    damage:   row.querySelector('.spell-damage')?.value.trim() || '',
    range:    row.querySelector('.spell-range')?.value || '',
    duration: row.querySelector('.spell-duration')?.value.trim() || '',
  }));
  const spellsList = spellData.filter(s => s.name).map(s => s.name);
  const spellsKnown = spellsList.join(', ');

  // Build bonuses from talents textarea
  const talentsText = document.getElementById('talents-text')?.value || '';
  const bonuses = [];
  let langLine = '';
  talentsText.split('\n').forEach(line => {
    line = line.trim();
    if(!line) return;
    if(line.startsWith('Languages:')) {
      langLine = line.replace('Languages:', '').trim();
    } else {
      const colonIdx = line.indexOf(':');
      if(colonIdx > 0) {
        bonuses.push({
          sourceType: 'Class',
          sourceName: document.getElementById('f-class')?.value || '',
          sourceCategory: 'Talent',
          gainedAtLevel: parseInt(document.getElementById('f-level')?.value) || 1,
          name: line.slice(colonIdx+1).trim(),
          bonusTo: line.slice(0, colonIdx).trim(),
          bonusName: line.slice(colonIdx+1).trim(),
        });
      }
    }
  });
  // Add spells as bonuses
  spellsList.forEach((sp, i) => {
    bonuses.push({
      sourceType: 'Class',
      sourceName: document.getElementById('f-class')?.value || '',
      sourceCategory: 'Ability',
      gainedAtLevel: 1,
      name: `Spell: ${sp}`,
      bonusTo: `Tier:1, Spell:${i+1}`,
      bonusName: sp,
    });
  });

  const level = parseInt(document.getElementById('f-level')?.value) || 1;
  const hp = parseInt(document.getElementById('hp-max')?.value) || 0;

  return {
    name:             document.getElementById('f-name')?.value || '',
    stats:            statsMap,
    rolledStats:      {...statsMap},
    ancestry:         document.getElementById('f-ancestry')?.value || '',
    class:            document.getElementById('f-class')?.value || '',
    level,
    levels: [{
      level,
      talentRolledDesc: '',
      talentRolledName: '',
      Rolled12TalentOrTwoStatPoints: '',
      Rolled12ChosenTalentDesc: '',
      Rolled12ChosenTalentName: '',
      HitPointRoll: hp,
      stoutHitPointRoll: 0,
    }],
    XP:               parseInt(document.getElementById('xp-current')?.value) || 0,
    ambitionTalentLevel: {
      level, talentRolledDesc:'', talentRolledName:'',
      Rolled12TalentOrTwoStatPoints:'', Rolled12ChosenTalentDesc:'', Rolled12ChosenTalentName:'',
      HitPointRoll:0, stoutHitPointRoll:0
    },
    title:            document.getElementById('f-title')?.value || '',
    alignment:        document.getElementById('f-alignment')?.value || '',
    background:       document.getElementById('f-background')?.value || '',
    deity:            document.getElementById('f-deity')?.value || '',
    maxHitPoints:     hp,
    armorClass:       parseInt(document.getElementById('ac-val')?.value) || 0,
    gearSlotsTotal:   10,
    gearSlotsUsed:    gearItems.filter(g=>g.slots>0).length,
    bonuses,
    goldRolled:       0,
    gold:             parseInt(document.getElementById('coin-gp')?.value) || 0,
    silver:           parseInt(document.getElementById('coin-sp')?.value) || 0,
    copper:           parseInt(document.getElementById('coin-cp')?.value) || 0,
    gear:             gearItems,
    treasures:        [],
    magicItems:       [],
    attacks:          attackStrings,
    ledger:           [],
    spellsKnown,
    languages:        langLine,
    creationMethod:   'Sheet',
    coreRulesOnly:    true,
    activeSources:    ['SD'],
    edits:            [],
    // Extra field for our sheet's own data not in Shadowdarklings format
    _sheet: {
      hpCurrent: document.getElementById('hp-current')?.value || '',
      xpNext:    document.getElementById('xp-next')?.value || '',
      luckPts:   document.getElementById('lk-val')?.value || '',
      spellData: spellData,
      gearQtys: [...document.querySelectorAll('#gear-list .gear-qty')].map(el => el.value || ''),
      gearDisabled: [...document.querySelectorAll('#gear-list > div')].map(row => row.classList.contains('gear-slot-disabled')),
      acBonus: document.getElementById('ac-bonus')?.value || '',
      spellStat: document.getElementById('spell-stat')?.value || '',
      spellGBonus: document.getElementById('spell-gbonus')?.value || '',
      campaign: _campaign ? { id: _campaign.id, code: _campaign.code, name: _campaign.name } : null,
      mastery: Array.isArray(_charMastery) ? _charMastery : [],
      acBonusOn: _acBonusOn,
    }
  };
}

function applySheet(data){
  // Route through importShadowdarklings logic directly (handles both formats)
  _applySDData(data);
}

function _applySDData(d){
  const set = (id, val) => { const el=document.getElementById(id); if(el && val!==undefined && val!==null) el.value = String(val); };

  // Header — Shadowdarklings format uses top-level keys
  set('f-name',       d.name || d['f-name'] || '');
  set('f-ancestry',   d.ancestry || d['f-ancestry'] || '');
  set('f-class',      d.class || d['f-class'] || '');
  set('f-title',      d.title || d['f-title'] || '');
  set('f-alignment',  d.alignment || d['f-alignment'] || '');
  set('f-background', d.background || d['f-background'] || '');
  set('f-deity',      d.deity || d['f-deity'] || '');
  set('f-level',      d.level || d['f-level'] || 1);

  // Stats — Shadowdarklings: d.stats.STR etc
  const sm = d.stats || {};
  STATS.forEach(s => {
    const val = sm[s.name]; // s.name = 'STR','DEX' etc
    const el = document.getElementById(s.id+'-val');
    if(el && val !== undefined) { el.value = String(val); onStatChange(s.id); }
  });

  // HP
  const maxHP = d.maxHitPoints ?? d.hp?.max ?? '';
  const curHP = d._sheet?.hpCurrent ?? d.hp?.current ?? maxHP;
  set('hp-max',     maxHP);
  set('hp-current', curHP);

  // AC
  const ac = d.armorClass ?? d.ac ?? '';
  set('ac-val', ac);

  // XP / Level
  set('xp-current', d.XP ?? d.xp?.current ?? 0);
  set('xp-next',    d._sheet?.xpNext ?? d.xp?.next ?? '');
  set('lk-val',     d._sheet?.luckPts ?? '');
  // xp-level field removed

  // Coins
  set('coin-gp', d.gold   ?? d.coins?.gp ?? 0);
  set('coin-sp', d.silver ?? d.coins?.sp ?? 0);
  set('coin-cp', d.copper ?? d.coins?.cp ?? 0);

  // Gear
  const gearSlotted = (d.gear || []).filter(g => (g.slots ?? 1) > 0);
  const gearFree    = (d.gear || []).filter(g => (g.slots ?? 1) === 0);
  const gearNameInputs = document.querySelectorAll('#gear-list .gear-name');
  const gearQtyInputs  = document.querySelectorAll('#gear-list .gear-qty');
  gearNameInputs.forEach((el, i) => {
    el.value = gearSlotted[i] ? (gearSlotted[i].name || '') : '';
  });
  gearQtyInputs.forEach((el, i) => {
    const qty = d._sheet?.gearQtys?.[i] || (gearSlotted[i]?.quantity > 1 ? String(gearSlotted[i].quantity) : '');
    el.value = qty;
    const gearDisabledArr = d._sheet?.gearDisabled || [];
    if(gearDisabledArr[i]) {
      const gRow = el.closest('div');
      if(gRow) {
        gRow.classList.add('gear-slot-disabled');
        const dbtn = gRow.querySelector('.gear-disable-btn');
        const nameEl = gRow.querySelector('.gear-name');
        const qtyEl  = gRow.querySelector('.gear-qty');
        if(dbtn)   { dbtn.classList.add('on'); dbtn.title='Enable slot'; }
        if(nameEl) nameEl.disabled = true;
        if(qtyEl)  qtyEl.disabled  = true;
      }
    }
  });
  const freeText = d.freeCary || gearFree.map(g => g.name).join(', ') || '';
  set('free-carry', freeText);
    const acBonusEl = document.getElementById('ac-bonus');
    if(acBonusEl) acBonusEl.value = d._sheet?.acBonus || '';
    const spellStatEl = document.getElementById('spell-stat');
    if(spellStatEl) spellStatEl.value = d._sheet?.spellStat || '';
    const spellGBEl = document.getElementById('spell-gbonus');
    if(spellGBEl) spellGBEl.value = d._sheet?.spellGBonus || '';
    _charMastery = Array.isArray(d._sheet?.mastery) ? d._sheet.mastery.slice() : [];
    if(typeof campaignRestore === 'function') campaignRestore(d._sheet?.campaign);
    if(typeof refreshGearSlots === 'function') refreshGearSlots();
    _acBonusOn = !!(d._sheet?.acBonusOn);
    if(typeof _acToggleVisual==='function') _acToggleVisual(_acBonusOn);

  // Spells
  let spells = [];
  if(d.spellsKnown) spells = d.spellsKnown.split(',').map(s => s.trim()).filter(Boolean);
  else if(d.spells) spells = d.spells;
  else if(d.bonuses) spells = d.bonuses.filter(b => b.name?.startsWith('Spell:')).map(b => b.bonusName).filter(Boolean);
  // Ensure enough rows exist
  const neededSpells = Math.max(0, spells.length, (d._sheet?.spellData||[]).filter(s=>s&&s.name).length);
  while(_spellCount < neededSpells) { _spellCount++; addSpellRow(_spellCount); }
  document.querySelectorAll('#spells-list .spell-row').forEach((row, i) => {
    row.querySelector('.spell-input').value = spells[i] || '';
    const sd = d._sheet?.spellData?.[i];
    if(sd) {
      const lvlEl   = row.querySelector('.spell-level');
      const advBtn  = row.querySelector('.spell-adv-btn');
      const lostBtn = row.querySelector('.spell-lost-btn');
      const descEl  = row.querySelector('.spell-desc');
      const rangeEl = row.querySelector('.spell-range');
      const durEl   = row.querySelector('.spell-duration');
      if(lvlEl)  lvlEl.value = sd.level || '1';
      if(advBtn)  advBtn.classList.toggle('on', !!sd.adv);
      if(lostBtn) { lostBtn.classList.toggle('on', !!sd.lost); row.classList.toggle('lost', !!sd.lost); }
      if(descEl && sd.desc)     { descEl.value = sd.desc; autoResizeDesc(descEl); }
      const bonusEl  = row.querySelector('.spell-bonus');
      const damageEl = row.querySelector('.spell-damage');
      if(bonusEl && sd.bonus)   bonusEl.value  = sd.bonus;
      if(damageEl && sd.damage) damageEl.value = sd.damage;
      if(rangeEl && sd.range)   rangeEl.value  = sd.range;
      if(durEl && sd.duration)  durEl.value    = sd.duration;
    }
  });

  // Talents
  if(d.talents) {
    // Old format: plain string
    set('talents-text', d.talents);
  } else {
    const tLines = [];
    if(d.languages) tLines.push('Languages: ' + d.languages);
    if(d.bonuses) d.bonuses.filter(b => b.sourceCategory === 'Talent').forEach(b => {
      if(b.bonusTo && b.bonusName) tLines.push(b.bonusTo + ': ' + b.bonusName.replace(/([A-Z])/g,' $1').trim());
    });
    if(d.levels) d.levels.forEach(lv => { if(lv.talentRolledDesc) tLines.push(`Lvl ${lv.level}: ${lv.talentRolledDesc}`); });
    if(d.ambitionTalentLevel?.talentRolledDesc) tLines.push('Ambition: ' + d.ambitionTalentLevel.talentRolledDesc);
    if(tLines.length) set('talents-text', tLines.join('\n'));
  }

  // Attacks
  const tbody = document.getElementById('attacks-body');
  tbody.innerHTML = '';
  if(d.attacks && d.attacks.length) {
    d.attacks.forEach(atk => {
      addAttackRow();
      const tr = tbody.lastElementChild;
      const inputs = tr.querySelectorAll('input[type="text"]');
      const rowSels = tr.querySelectorAll('select');
      if(typeof atk === 'string') {
        // Try to parse "WEAPON: +bonus, damage"
        const m = atk.match(/^([^:]+):\s*([+\-]?\d+)(?:,\s*([\dd()\s+\-]+))?/i);
        if(m) {
          inputs[0].value = m[1].trim();
          if(m[2]) inputs[1].value = m[2].trim();
          if(m[3]) inputs[2].value = m[3].trim();
        } else {
          // Full text attack (e.g. "SPELLS: To cast...") — put name before colon, rest in effects
          const colonIdx = atk.indexOf(':');
          if(colonIdx > 0) {
            inputs[0].value = atk.slice(0, colonIdx).trim();
            // Put the description in the damage/effects field if it fits
            const rest = atk.slice(colonIdx+1).trim();
            inputs[2].value = rest.substring(0, 60);
          } else {
            inputs[0].value = atk.substring(0, 60);
          }
        }
      } else {
        inputs[0].value = atk.name||''; inputs[1].value = atk.bonus||'';
        if(rowSels[0]) rowSels[0].value = atk.stat||'';
        if(rowSels[1] && atk.range) rowSels[1].value = atk.range;
        inputs[2].value = atk.damage||'';
      }
    });
  }  // end if(d.attacks)
  // New character: start with no attack rows

  // Portrait
  if(d.portrait || d._sheet?.portrait) {
    const src = d.portrait || d._sheet?.portrait;
    if(src && src !== '') {
      const img = document.getElementById('portrait-img');
      if(img) { img.src = src; img.style.display = 'block'; }
    }
  }
}

function importShadowdarklings(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      _applySDData(d);
      const charName = d.name || 'Character';
      const charClass = d.class || '';
      const charLevel = d.level || 1;
      addLog('Imported', '↑', `${charName} — Lvl ${charLevel} ${charClass}`, 'normal');
    } catch(err) { alert('Import failed: ' + err.message); }
    input.value = '';
  };
  reader.readAsText(file);
}


// ── AC Bonus toggle (shield, Mage Armor, etc.) ─────────────────────────────
let _acBonusOn = false;
function _acToggleVisual(on) {
  const sw = document.getElementById('ac-bonus-toggle');
  const knob = document.getElementById('ac-bonus-knob');
  if(!sw || !knob) return;
  sw.style.background = on ? '#2d7a2d' : 'var(--rule)';
  knob.style.left = on ? '14px' : '2px';
  knob.style.background = on ? '#6adf6a' : 'var(--muted)';
}
function toggleAcBonus() {
  const bonusEl = document.getElementById('ac-bonus');
  const acEl = document.getElementById('ac-val');
  const bonus = parseInt(bonusEl?.value) || 0;
  if(!acEl) return;
  const ac = parseInt(acEl.value) || 0;
  if(!_acBonusOn) {
    acEl.value = String(ac + bonus);
    _acBonusOn = true;
  } else {
    acEl.value = String(ac - bonus);
    _acBonusOn = false;
  }
  _acToggleVisual(_acBonusOn);
  saveSheet(false);
}

// ── Rest: restore HP to max, regain lost spells ───────────────────────────
// Gear slots = max(10, STR). Fighters add their CON modifier (Hauler), if positive.
function gearSlotCount() {
  const str = parseInt(document.getElementById('str-val')?.value) || 10;
  let slots = Math.max(10, str);
  const cls = (document.getElementById('f-class')?.value || '').trim().toLowerCase();
  if(cls === 'fighter') {
    const conMod = getStatMod('con');
    if(conMod > 0) slots += conMod;   // Hauler
  }
  return Math.min(20, slots);
}
function refreshGearSlots() { ccwSetGearSlots(null); }

function ccwSetGearSlots(str) {
  const slots = (str === null || str === undefined) ? gearSlotCount()
              : (function(){
                  let s = Math.max(10, parseInt(str)||10);
                  const cls = (document.getElementById('f-class')?.value || '').trim().toLowerCase();
                  if(cls === 'fighter') { const c = getStatMod('con'); if(c > 0) s += c; }
                  return Math.min(20, s);
                })();
  const rows = document.querySelectorAll('#gear-list > div');
  // rows[0] is the header; gear slots are rows[1..20]
  for(let i=1; i<rows.length; i++) {
    const row = rows[i];
    const btn = row.querySelector('.gear-disable-btn');
    const disable = i > slots;
    row.classList.toggle('gear-slot-disabled', disable);
    if(btn) {
      btn.classList.toggle('on', disable);
      btn.title = disable ? 'Enable slot' : 'Disable slot (beyond your carry limit)';
    }
  }
}

function takeRest() {
  // A rest requires a ration (Shadowdark, pg. 86)
  let rationRow = null;
  document.querySelectorAll('#gear-list .gear-slot').forEach(row => {
    if(rationRow) return;
    const name = (row.querySelector('.gear-name')?.value || '').trim().toLowerCase();
    if(/ration/.test(name)) {
      const qty = parseInt(row.querySelector('.gear-qty')?.value) || 0;
      if(qty > 0) rationRow = row;
    }
  });
  if(!rationRow) {
    if(!confirm('You have no rations. Rest anyway?')) return;
  }

  const notes = [];

  // Consume the ration
  if(rationRow) {
    const qtyEl = rationRow.querySelector('.gear-qty');
    const left = (parseInt(qtyEl.value) || 1) - 1;
    if(left > 0) { qtyEl.value = left; }
    else {
      rationRow.querySelector('.gear-name').value = '';
      qtyEl.value = '';
    }
    notes.push('1 ration eaten');
  }

  // HP to max
  const hpMax = document.getElementById('hp-max')?.value || '';
  const hpCur = document.getElementById('hp-current');
  if(hpCur && hpMax) { hpCur.value = hpMax; notes.push('HP restored to ' + hpMax); }

  // Lost spells return
  let regained = 0;
  document.querySelectorAll('#spells-list .spell-row').forEach(row => {
    const lostBtn = row.querySelector('.spell-lost-btn');
    if(lostBtn && lostBtn.classList.contains('on')) {
      lostBtn.classList.remove('on');
      row.classList.remove('lost');
      regained++;
    }
  });
  if(regained) notes.push(regained + ' spell' + (regained>1?'s':'') + ' regained');

  // Stat damage is temporary — a successful rest clears it
  let statsHealed = 0;
  STATS.forEach(s => {
    const el = document.getElementById(s.id + '-val');
    const dmg = el && el.dataset.damage ? parseInt(el.dataset.damage) : 0;
    if(dmg) {
      el.value = (parseInt(el.value) || 0) + dmg;
      delete el.dataset.damage;
      el.classList.remove('stat-damaged');
      statsHealed++;
    }
  });
  if(statsHealed) {
    notes.push('stat damage healed');
    STATS.forEach(s => onStatChange(s.id));
  }
  if(typeof refreshGearSlots === 'function') refreshGearSlots();

  saveSheet(false);
  addLog('Rest', '🌙', notes.length ? notes.join(', ') : 'Rested', 'normal');
}

function saveSheet(manual=false){
  const data = collectSheet();
  const toSave = {...data, _sheet: {...(data._sheet||{}), portrait: ''}};
  const json = JSON.stringify(toSave);
  try { localStorage.setItem('sd_sheet', json); } catch(e) {}
  if(window.__ddSave) window.__ddSave({ sd_sheet: json });
  if(manual) addLog('Sheet Saved','💾','Saved','normal');
}

// ═══ PRINTER-FRIENDLY PDF EXPORT ══════════════════════════════════════════
// Rather than screenshotting the dark UI, this rebuilds the sheet as a clean
// black-on-white letter-sized document and hands it to the browser's print
// dialog ("Save as PDF"). The result is real, selectable text — a few KB
// instead of a multi-megabyte raster, and it actually reads on paper.

// ═══ PDF EXPORT — OFFICIAL FILLABLE SHEET ═════════════════════════════════
// Fills The Arcane Library's fillable character sheet (an AcroForm PDF served
// from /shadowdark-sheet-fillable.pdf) with pdf-lib, then downloads it. The
// fields stay editable, so it can still be tweaked in any PDF reader.
// If the form or the library can't be loaded, falls back to exportPrintable().
let _pdfLibPromise = null;
function loadPdfLib() {
  if(window.PDFLib) return Promise.resolve(window.PDFLib);
  if(_pdfLibPromise) return _pdfLibPromise;
  _pdfLibPromise = new Promise((resolve, reject) => {
    const sc = document.createElement('script');
    sc.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
    sc.onload  = () => resolve(window.PDFLib);
    sc.onerror = () => reject(new Error('pdf-lib failed to load'));
    document.head.appendChild(sc);
  });
  return _pdfLibPromise;
}

async function exportPDF() {
  const V = id => (document.getElementById(id)?.value || '').trim();

  try {
    const [PDFLib, bytes] = await Promise.all([
      loadPdfLib(),
      fetch('/shadowdark-sheet-fillable.pdf').then(r => {
        if(!r.ok) throw new Error('sheet template ' + r.status);
        return r.arrayBuffer();
      })
    ]);

    const pdf  = await PDFLib.PDFDocument.load(bytes);
    const form = pdf.getForm();
    const set  = (field, value) => {
      if(value === undefined || value === null || value === '') return;
      try { form.getTextField(field).setText(String(value)); } catch(e) { /* field absent */ }
    };

    // ── Header ──
    set('Name',       V('f-name'));
    set('Race',       V('f-ancestry'));
    set('Class',      V('f-class'));
    set('Title',      V('f-title'));
    set('Level',      V('f-level'));
    set('Alignment',  V('f-alignment'));
    set('Background', V('f-background'));
    set('Deity',      V('f-deity'));
    set('XP Current', V('xp-current'));
    set('XP Target',  V('xp-next'));

    // ── Stats: the form wants full names ──
    const STAT_FIELD = { STR:'Strength', DEX:'Dexterity', CON:'Constitution',
                         INT:'Intelligence', WIS:'Wisdom', CHA:'Charisma' };
    STATS.forEach(st => {
      const full = STAT_FIELD[st.name];
      if(!full) return;
      set(full + ' Total',    document.getElementById(st.id+'-val')?.value || '');
      set(full + ' Modifier', document.getElementById(st.id+'-mod')?.textContent || '');
    });

    // ── Vitals ──
    const hpCur = V('hp-current'), hpMax = V('hp-max');
    set('Hit Points', hpMax ? (hpCur || '0') + ' / ' + hpMax : hpCur);
    set('Armor Class', V('ac-val'));
    set('Gold Pieces',   V('coin-gp'));
    set('Silver Pieces', V('coin-sp'));
    set('Copper Pieces', V('coin-cp'));

    // ── Attacks (multiline box) ──
    const attacks = [...document.querySelectorAll('#attacks-body tr')].map(tr => {
      const txt = tr.querySelectorAll('input[type="text"]');
      const sel = tr.querySelectorAll('select');
      const name = (txt[0]?.value || '').trim();
      if(!name) return null;
      const bonus = (txt[1]?.value || '').trim();
      const stat  = (sel[0]?.value || '').toUpperCase();
      const range = (sel[1]?.value || '').trim();
      const dmg   = (txt[2]?.value || '').trim();
      const adv   = tr.querySelector('.atk-adv-btn.on') ? ' [ADV]' : '';
      const bits  = [bonus && (bonus.startsWith('+') || bonus.startsWith('-') ? bonus : '+' + bonus),
                     stat && '(' + stat + ')', dmg, range].filter(Boolean).join(' ');
      return name + (bits ? ', ' + bits : '') + adv;
    }).filter(Boolean);
    set('Attacks', attacks.join('\n'));

    // ── Talents / Spells (multiline box) ──
    const spells = [...document.querySelectorAll('#spells-list .spell-row')].map(row => {
      const nm = (row.querySelector('.spell-input')?.value || '').trim();
      if(!nm) return null;
      const tier = row.querySelector('.spell-level')?.value || '';
      const rng  = row.querySelector('.spell-range')?.value || '';
      const dur  = row.querySelector('.spell-duration')?.value || '';
      const dmg  = row.querySelector('.spell-damage')?.value || '';
      const meta = [tier && 'T' + tier, rng, dur, dmg].filter(Boolean).join(', ');
      return (row.classList.contains('lost') ? '(lost) ' : '') + nm + (meta ? ' — ' + meta : '');
    }).filter(Boolean);

    const talentBlock = [
      V('talents-text'),
      spells.length ? 'SPELLS\n' + spells.join('\n') : ''
    ].filter(t => t && t.trim()).join('\n\n');
    set('Talents / Spells', talentBlock);

    // ── Gear: 20 numbered lines ──
    const gear = [...document.querySelectorAll('#gear-list > div')].map(row => {
      const nm = (row.querySelector('.gear-name')?.value || '').trim();
      if(!nm) return null;
      const qty = (row.querySelector('.gear-qty')?.value || '').trim();
      const off = row.classList.contains('gear-slot-disabled');
      return (off ? '— ' : '') + nm + (qty && qty !== '1' ? ' x' + qty : '');
    }).filter(Boolean);
    gear.slice(0, 20).forEach((item, i) => set('Gear ' + (i + 1), item));
    if(gear.length > 20) set('Gear 20', gear.slice(19).join(' · '));   // don't silently drop the tail

    set('Free To Carry', V('free-carry'));

    // Bake the values into the field appearances so every reader shows them
    try { form.updateFieldAppearances(); } catch(e) {}

    const out  = await pdf.save();
    const blob = new Blob([out], { type: 'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = ((V('f-name') || 'shadowdark-character').replace(/[^a-z0-9]+/gi, '_').toLowerCase()) + '.pdf';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);

    addLog('Sheet Exported', '🖨', 'Official sheet PDF', 'normal');
  } catch(err) {
    console.warn('Fillable-form export failed, falling back to print view:', err);
    exportPrintable();
  }
}

  fdoc.open(); fdoc.write(doc); fdoc.close();

  const go = () => {
    try {
      frame.contentWindow.focus();
      frame.contentWindow.print();
    } catch(e) {
      // Sandboxed contexts can refuse to print an iframe — fall back to a tab
      const w = window.open('', '_blank');
      if(w) { w.document.write(doc); w.document.close(); w.focus(); w.print(); }
      else alert('Your browser blocked the print window. Allow pop-ups for this page and try again.');

  else frame.onload = () => setTimeout(go, 120);

function exportSheet(){
  const data = collectSheet();
  const name = data.name || 'character';
  const filename = name.replace(/[^a-z0-9]/gi,'_').toLowerCase() + '_shadowdark.json';
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
  addLog('Exported','↓ JSON', filename, 'normal');
}

function newCharacter(){
  if(!confirm('Clear sheet and start a new character?')) return;
  ['f-name','f-ancestry','f-class','f-title','f-alignment','f-background','f-deity','f-level'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  STATS.forEach(s=>{const el=document.getElementById(s.id+'-val');if(el){el.value='';onStatChange(s.id);}});
  ['hp-current','hp-max','ac-val','xp-current','xp-next','xp-level','lk-val','coin-gp','coin-sp','coin-cp'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('talents-text').value='';
  _charMastery = [];
  document.getElementById('free-carry').value='';
  document.querySelectorAll('#spells-list .spell-row').forEach(row => row.remove());
  _spellCount = 0;
  document.querySelectorAll('#gear-list .gear-name').forEach(el=>el.value='');
  document.querySelectorAll('#gear-list .gear-qty').forEach(el=>el.value='');

  addLog('New Character','✦','Sheet cleared','normal');
}

function autoLoad(){
  var saved = null;
  if(window.__ddState !== undefined) {
    // Deck mode: only use server state; a new document starts empty
    saved = window.__ddState['sd_sheet'] || null;
  } else {
    // Standalone mode: use localStorage
    saved = localStorage.getItem('sd_sheet');
  }
  if(!saved) return;
  try {
    const data = JSON.parse(saved);
    applySheet(data);
  } catch(e) {
  }
}

<script>
function toggleLogCollapse() {
  const log = document.querySelector('.roll-log');
  const btn = document.getElementById('log-collapse-btn');
  const isMobile = window.innerWidth <= 768;
  log.classList.toggle('collapsed');
  const collapsed = log.classList.contains('collapsed');
  if(isMobile) {
    btn.textContent = collapsed ? '▼ Log' : '▲ Log';
  } else {
    btn.textContent = collapsed ? '▶' : '◀';
    btn.style.right = collapsed ? '0' : '250px';
  }
}

document.querySelector('.log-header').addEventListener('click', function(e) {
  if(window.innerWidth <= 768 && !e.target.closest('button,.dm-toggle-btn')) {
    toggleLogCollapse();
  }
});

(function(){
  const btn = document.getElementById('log-collapse-btn');
  const isMobile = window.innerWidth <= 768;
  if(isMobile) {
    document.querySelector('.roll-log').classList.add('collapsed');
    btn.textContent = '▼ Log';
  } else {
    btn.style.right = '250px';
  }
})();

// ── AUTO-SAVE ON EXIT / BACKGROUND ──
var _pageReady = false;
setTimeout(function() { _pageReady = true; }, 3000);

function autoSaveOnExit() {
  if(!_pageReady) return;
  try { saveSheet(); } catch(e) {}
}
window.addEventListener('beforeunload', autoSaveOnExit);
document.addEventListener('visibilitychange', function() {
  if(document.visibilityState === 'hidden') autoSaveOnExit();
});

// Auto-save 1.5s after any input — primary save strategy on mobile
(function() {
  var t = null;
  function go() {
    if(!_pageReady) return;
    if(t) clearTimeout(t);
    t = setTimeout(function() { try { saveSheet(); } catch(e) {} }, 1500);
  }
  document.addEventListener('input', go);
  document.addEventListener('change', go);
})();
</script>

const SPELL_SOURCES = ['Wizard','Priest','Witch','Druid','Mage','Sorcerer'];
const RC_T1_BY_SOURCE = {
  Wizard: RC_WIZARD_SPELLS_T1,
  Priest: RC_PRIEST_SPELLS_T1,
  Witch:  RC_WITCH_SPELLS_T1,
  Druid:  RC_DRUID_SPELLS_T1,
  Mage:   RC_MAGE_SPELLS_T1,
  Sorcerer: RC_SORC_SPELLS_T1,
};

// Which lists are ticked by default for a class (the rules-legal ones).
function defaultSpellSources(cls, alignment) {
  const src = { Wizard:false, Priest:false, Witch:false, Druid:false, Mage:false, Sorcerer:false };
  if(cls==='Wizard') {
    src.Wizard = true;
    // Neutral wizards get the druid list for free (Cursed Scroll 4)
    if(String(alignment||'').toLowerCase()==='neutral') src.Druid = true;
    // Lawful wizards get the mage list for free (Cursed Scroll 6)
    if(String(alignment||'').toLowerCase()==='lawful')  src.Mage  = true;
    // Chaotic wizards get the sorcerer list for free (Cursed Scroll 5)
    if(String(alignment||'').toLowerCase()==='chaotic') src.Sorcerer = true;
  }
  else if(cls==='Priest') src.Priest = true;
  else if(cls==='Witch')  src.Witch  = true;
  return src;
}

// Does a spell belong to any ticked source?
function spellInSources(s, src) {
  if(!src) return false;
  if(s.caster==='Both')   return !!(src.Wizard || src.Priest);
  if(s.caster==='Wizard') return !!src.Wizard;
  if(s.caster==='Priest') return !!src.Priest;
  if(s.caster==='Witch')  return !!src.Witch;
  if(s.caster==='Druid')  return !!src.Druid;
  if(s.caster==='Mage')   return !!src.Mage;
  if(s.caster==='Sorcerer') return !!src.Sorcerer;
  return false;
}

// Checkbox bar. `cls` drives which box is the "own" list (shown but locked on,
// so a caster can't accidentally cut themselves off from their own spells).
function spellSourceBar(src, cls, onToggle) {
  const own = { Wizard:'Wizard', Priest:'Priest', Witch:'Witch' }[cls] || '';
  let h = '<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:0 0 10px;padding:8px 10px;background:#141414;border:1px solid #2a2a2a;border-radius:5px;">';
  h += '<span style="font-family:Montserrat,sans-serif;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#c8a020;">Spell lists</span>';
  SPELL_SOURCES.forEach(name=>{
    const isOwn = (name===own);
    const on = !!src[name];
    const dis = isOwn ? ' disabled' : '';
    const col = isOwn ? '#c8a020' : (on ? '#eee' : '#777');
    h += '<label style="display:flex;align-items:center;gap:4px;cursor:'+(isOwn?'default':'pointer')+';'
       + 'font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;color:'+col+';">'
       + '<input type="checkbox"'+(on?' checked':'')+dis
       + ' onchange="'+onToggle+'(\''+name+'\', this.checked)" style="accent-color:#c8a020;cursor:'+(isOwn?'default':'pointer')+';">'
       + name
       + '</label>';
  });
  h += '<span style="font-family:Montserrat,sans-serif;font-size:9px;color:#666;flex-basis:100%;">Ticking another list lets you pick from it — that\'s a house-rule / GM call.</span>';
  h += '</div>';
  return h;
}

const RC_ALIGNMENTS = ['Lawful','Lawful','Lawful','Neutral','Neutral','Chaotic'];
const RC_DEITIES = {
  Lawful:  ['Saint Terragnis','Gede','Madeera the Covenant','Ord'],
  Neutral: ['Ord','Memnon'],
  Chaotic: ['Shune the Vile','Ramlaat','Memnon'],
};

function _rc_3d6() { return [0,0,0].reduce(s=>s+Math.ceil(Math.random()*6),0); }
function _rc_mod(v) {
  if(v<=3)return -4;if(v<=5)return -3;if(v<=7)return -2;if(v<=9)return -1;
  if(v<=11)return 0;if(v<=13)return 1;if(v<=15)return 2;if(v<=17)return 3;return 4;
}
function _rc_roll(pool) { return pool[Math.floor(Math.random()*pool.length)]; }
function _rc_weighted(table) {
  const total = table.reduce((s,e)=>s+e.w,0);
  let r = Math.floor(Math.random()*total);
  for(const e of table){ r-=e.w; if(r<0) return e.v; }
  return table[table.length-1].v;
}
function _rc_talent(cls) {
  const t = RC_CLASS_INFO[cls]?.talent || [];
  // Roll 2d6 mapped to talent table
  const roll = Math.ceil(Math.random()*6)+Math.ceil(Math.random()*6);
  if(roll===2) return t[0];
  if(roll<=6) return t[1];
  if(roll<=9) return t[6];
  if(roll<=11) return t[9];
  return t[11];
}

function randomCharacter() {
  // Stats
  const statNames = ['STR','DEX','CON','INT','WIS','CHA'];
  const statVals = statNames.map(()=>_rc_3d6());
  const statMods = statVals.map(_rc_mod);
  const statsObj = {};
  statNames.forEach((n,i)=>{ statsObj[n]={val:statVals[i],mod:statMods[i]}; });

  // Ancestry
  const ancestry = _rc_weighted(RC_ANCESTRY.table);

  // Class
  const cls = _rc_roll(RC_CLASSES);
  const ci = RC_CLASS_INFO[cls];

  // Alignment
  const alignment = RC_ALIGNMENTS[Math.floor(Math.random()*RC_ALIGNMENTS.length)];

  // HP
  const hdNum = parseInt(ci.hd.split('d')[1]);
  let hp = Math.ceil(Math.random()*hdNum) + statsObj.CON.mod;
  if(ancestry==='Dwarf') hp += 2;
  hp = Math.max(1,hp);

  // Name
  const name = _rc_roll(RC_NAMES[ancestry]||RC_NAMES.Human);

  // Background
  const background = RC_BACKGROUNDS[Math.floor(Math.random()*RC_BACKGROUNDS.length)];

  // Title (level 1)
  const titleList = RC_TITLES[cls]?.[alignment] || [];
  const title = titleList[0] || '';

  // Talent roll
  const talent = _rc_talent(cls);
  // Bonus talent for Human
  const talent2 = ancestry==='Human' ? _rc_talent(cls) : null;

  // Starting spells
  let spells = [];
  if(cls==='Priest') {
    const pool = [...RC_PRIEST_SPELLS_T1];
    const s1 = _rc_roll(pool); spells.push(s1);
    const s2 = _rc_roll(pool.filter(s=>s!==s1)); spells.push(s2);
    spells.push('Turn Undead (free)');
  } else if(cls==='Wizard') {
    const pool = [...RC_WIZARD_SPELLS_T1];
    for(let i=0;i<3;i++){ const s=_rc_roll(pool.filter(x=>!spells.includes(x))); spells.push(s); }
  } else if(cls==='Witch') {
    const pool = [...RC_WITCH_SPELLS_T1];
    for(let i=0;i<3;i++){ const s=_rc_roll(pool.filter(x=>!spells.includes(x))); spells.push(s); }
  }

  // Deity (priests or any character with religious background)
  let deity = null;
  if(cls==='Priest'||background==='Acolyte') {
    deity = _rc_roll(RC_DEITIES[alignment]||RC_DEITIES.Neutral);
  }

  // Gear (standard 1st level random)
  const gearItems = ['Crawling kit','1 weapon (your choice)'];
  if(['Fighter','Priest','Bard','Ranger','Dwarf'].includes(cls)||['Fighter','Priest','Bard','Ranger'].includes(cls)) {
    if(ci.armor!=='None') gearItems.push('Leather armor');
  }
  gearItems.push('5 gp');

  return {
    name, ancestry, cls, alignment, title, background, deity,
    stats: statsObj, hp, hd: ci.hd,
    weapons: ci.weapons, armor: ci.armor,
    features: ci.features,
    talent, talent2, spells, gear: gearItems,
    ancestryAbility: RC_ANCESTRY.ability[ancestry],
    languages: RC_ANCESTRY.languages[ancestry],
  };
}

function applyRandomCharacter(skipConfirm) {
  // Check if sheet has any content worth warning about
  const hasContent = (document.getElementById('f-name')?.value.trim()) ||
    (document.getElementById('f-class')?.value.trim()) ||
    (document.getElementById('str-val')?.value.trim()) ||
    (document.querySelectorAll('#spells-list .spell-row').length > 0) ||
    (document.querySelector('#attacks-body tr') !== null);
  if(!skipConfirm && hasContent && !confirm('Generate a random character? This will overwrite the current sheet.')) return;
  const c = randomCharacter();
  const set = (id,v) => { const el=document.getElementById(id); if(el) el.value=v; };

  // Header fields
  set('f-name',       c.name);
  set('f-class',      c.cls);
  set('f-ancestry',   c.ancestry);
  set('f-title',      c.title);
  set('f-alignment',  c.alignment);
  set('f-background', c.background);
  set('f-deity',      c.deity || '');

  // Level (find xp-level field)
  set('xp-level', '1');

  // Stats
  const statIds = {STR:'str-val',DEX:'dex-val',CON:'con-val',INT:'int-val',WIS:'wis-val',CHA:'cha-val'};
  Object.entries(c.stats).forEach(([k,v])=>{ set(statIds[k], v.val); });

  // Trigger stat recalculation if it exists
  document.querySelectorAll('.stat-val').forEach(el=>el.dispatchEvent(new Event('input')));

  // Auto-calculate AC: 10 + DEX mod + armor bonus
  const dexMod = c.stats.DEX.mod;
  const armorStr = (RC_CLASS_INFO[c.cls]?.armor || '').toLowerCase();
  let armorBonus = 0;
  if(armorStr === 'none') {
    armorBonus = 0; // Wizard — no armor
  } else if(armorStr.includes('all armor') || armorStr.includes('chainmail')) {
    armorBonus = 4; // Chainmail is best non-plate armor in SD
  } else if(armorStr.includes('leather')) {
    armorBonus = 1; // Leather armor
  }
  const ac = 10 + dexMod + armorBonus;
  set('ac-val', ac);

  // HP
  set('hp-current', c.hp);
  set('hp-max',     c.hp);
  const talentLines = [
    '— Class Features —',
    ...c.features,
    '',
    '— Ancestry: ' + c.ancestry + ' —',
    c.ancestryAbility,
    '',
    '— Languages —',
    c.languages,
    '',
    '— Talent Roll —',
    c.talent,
    ...(c.talent2 ? ['','— Bonus Talent (Human) —', c.talent2] : []),
  ];
  set('talents-text', talentLines.join('\n'));

  // Spells — ensure enough rows exist for spellcasters
  if(c.spells.length > 0) {
    while(_spellCount < c.spells.length) { _spellCount++; addSpellRow(_spellCount); }
  }
  // Clear then fill all fields
  document.querySelectorAll('#spells-list .spell-row').forEach(row=>{
    const inp = row.querySelector('.spell-input');
    const lvl = row.querySelector('.spell-level');
    const rng = row.querySelector('.spell-range');
    const dur = row.querySelector('.spell-duration');
    const dmg = row.querySelector('.spell-damage');
    const dsc = row.querySelector('.spell-desc');
    if(inp) inp.value = '';
    if(lvl) lvl.value = '1';
    if(rng) rng.value = '';
    if(dur) dur.value = '';
    if(dmg) dmg.value = '';
    if(dsc) { dsc.value = ''; autoResizeDesc(dsc); }
  });
  const spellRows = document.querySelectorAll('#spells-list .spell-row');
  c.spells.forEach((sp, i) => {
    if(!spellRows[i]) return;
    const row = spellRows[i];
    const data = RC_SPELL_DATA[sp] || {};
    const inp = row.querySelector('.spell-input');
    const lvl = row.querySelector('.spell-level');
    const rng = row.querySelector('.spell-range');
    const dur = row.querySelector('.spell-duration');
    const dmg = row.querySelector('.spell-damage');
    const dsc = row.querySelector('.spell-desc');
    if(inp) inp.value = sp;
    if(lvl && data.level) lvl.value = data.level;
    if(rng && data.range) rng.value = data.range;
    if(dur && data.duration) dur.value = data.duration;
    if(dmg && data.damage) dmg.value = data.damage;
    if(dsc && data.desc) { dsc.value = data.desc; autoResizeDesc(dsc); }
  });

  // GP: put in coin field not gear
  const gpField = document.getElementById('coin-gp');
  if(gpField) gpField.value = '5';

  // Gear: expand crawling kit into individual items (7 slots), skip 5gp entry
  const crawlingKit = [
    {name:'Torch',          qty:'3'},
    {name:'Rations',        qty:'3'},
    {name:'Rope (60 ft)',   qty:'1'},
    {name:'Flint & Steel',  qty:'1'},
    {name:'Grappling Hook', qty:'1'},
    {name:'Crowbar',        qty:'1'},
    {name:'Lantern',        qty:'1'},
    {name:'Iron Spikes',    qty:'10'},
  ];
  const gearItems = [];
  c.gear.forEach(function(g) {
    if(g === '5 gp') return; // handled by coin field
    if(g === 'Crawling kit') { gearItems.push(...crawlingKit); }
    else if(g === '1 weapon (your choice)') { gearItems.push({name:'Weapon (your choice)', qty:'1'}); }
    else if(g === 'Leather armor') { gearItems.push({name:'Leather armor', qty:'1'}); }
    else { gearItems.push({name:g, qty:'1'}); }
  });
  document.querySelectorAll('#gear-list .gear-name').forEach(function(el){ el.value=''; });
  document.querySelectorAll('#gear-list .gear-qty').forEach(function(el){ el.value=''; });
  const gearNameInputs = document.querySelectorAll('#gear-list .gear-name');
  const gearQtyInputs  = document.querySelectorAll('#gear-list .gear-qty');
  gearItems.forEach(function(g, i) {
    if(gearNameInputs[i]) gearNameInputs[i].value = g.name;
    if(gearQtyInputs[i])  gearQtyInputs[i].value  = g.qty !== '1' ? g.qty : '';
  });

  // Backpack goes in Free to Carry
  if(c.gear.includes('Crawling kit')) {
    const fc = document.getElementById('free-carry');
    if(fc) fc.value = 'Backpack';
  }

  saveSheet(false);
  addLog('Random Character', '🎲', `${c.name} the ${c.ancestry} ${c.cls} (${c.alignment} ${c.title})`, 'normal');
}

</script>

<script>
// ═══ CHARACTER CREATION WIZARD ═══════════════════════════════════════════
const CCW_BG_DESC = {
  'Urchin': 'You grew up in the merciless streets of a large city',
  'Wanted': "There's a price on your head, but you have allies",
  'Cult Initiate': 'You know blasphemous secrets and rituals',

  'Banished': 'Your people cast you out for supposed crimes',
