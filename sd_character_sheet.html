};

let _shopMagicSub = 'Potions, Scrolls & Wands';

// Tap-to-expand full descriptions (shop + spellbook)
function toggleFullDesc(el) {
  const short = el.querySelector('.desc-short');
  const full = el.querySelector('.desc-full');
  if(!full) return;
  const open = full.style.display !== 'none';
  full.style.display = open ? 'none' : 'block';
  if(short) short.style.display = open ? 'block' : 'none';
}
function shopMagicItems() { return SHOP_MAGIC[_shopMagicSub] || []; }
function shopSetMagicSub(s) { _shopMagicSub = s; shopRender(); }


function shopRender() {
  // Tabs
  const tabBar = document.getElementById('shop-tabs');
  tabBar.innerHTML = SHOP_TABS.map(t=>
    '<button onclick="shopSetTab(\''+t.id+'\')" style="flex:1;padding:8px 4px;background:'+(_shopTab===t.id?'#c8a020':'#141414')+';color:'+(_shopTab===t.id?'#1a1a1a':'#888')+';border:none;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:900;font-size:9px;letter-spacing:.08em;text-transform:uppercase;">'+t.label+'</button>'
  ).join('');

  // Magic subtabs
  const subBar = document.getElementById('shop-subtabs');
  if(_shopTab==='magic') {
    subBar.style.display = 'flex';
    subBar.innerHTML = SHOP_MAGIC_SUBS.map(s=>
      '<button onclick="shopSetMagicSub(\''+s.replace(/'/g,"\\'")+'\')" style="flex:1 0 auto;padding:5px 6px;background:'+(_shopMagicSub===s?'#3a3320':'#0f0f0f')+';color:'+(_shopMagicSub===s?'#c8a020':'#666')+';border:none;border-bottom:2px solid '+(_shopMagicSub===s?'#c8a020':'transparent')+';cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:8px;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;">'+s+'</button>'
    ).join('');
  } else {
    subBar.style.display = 'none';
    subBar.innerHTML = '';
  }

  // GP display
  const gp = document.getElementById('coin-gp')?.value || '0';
  const sp = document.getElementById('coin-sp')?.value || '0';
  const cp = document.getElementById('coin-cp')?.value || '0';
  document.getElementById('shop-coins').textContent = '💰 '+(gp||0)+' gp · '+(sp||0)+' sp · '+(cp||0)+' cp';

  // Items
  const items = _shopTab==='weapons' ? SHOP_WEAPONS
              : _shopTab==='armor'   ? SHOP_ARMOR
              : _shopTab==='basic'   ? SHOP_BASIC
              : shopMagicItems();
  const body = document.getElementById('shop-body');
  body.innerHTML = items.map((it,i)=>{
    const cost = shopFmtCost(it);
    const canBuy = shopCostCp(it) > 0;
    const hasFull = !!it.full;
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1e1e1e;">'
      + '<div style="flex:1;min-width:0;'+(hasFull?'cursor:pointer;':'')+'" '+(hasFull?'onclick="toggleFullDesc(this)"':'')+'>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#eee;">'+it.name+(it.qty?' ('+it.qty+')':'')+'</div>'
      +   (it.note?'<div class="desc-short" style="font-family:Montserrat,sans-serif;font-size:9px;color:#888;line-height:1.3;">'+it.note+(hasFull?' <span style="color:#c8a020;">▸ more</span>':'')+'</div>':'')
      +   (hasFull?'<div class="desc-full" style="display:none;font-family:Montserrat,sans-serif;font-size:9px;color:#bbb;line-height:1.45;">'+it.full+' <span style="color:#c8a020;">▾ less</span></div>':'')
      + '</div>'
      + '<div style="font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;color:#c8a020;width:44px;text-align:right;flex-shrink:0;">'+cost+'</div>'
      + (canBuy
          ? '<button onclick="shopBuy(\''+_shopTab+'\','+i+')" style="padding:5px 10px;background:#1a2e3a;color:#6ac8df;border:1px solid #1a5a7a;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Buy</button>'
          : '<span style="width:44px;flex-shrink:0;"></span>')
      + '<button onclick="shopAdd(\''+_shopTab+'\','+i+')" style="padding:5px 10px;background:#241f10;color:#c8a020;border:1px solid #7a5a00;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Add</button>'
      + '</div>';
  }).join('');
}

function shopGetItem(tab, i) {
  const items = tab==='weapons' ? SHOP_WEAPONS : tab==='armor' ? SHOP_ARMOR : tab==='basic' ? SHOP_BASIC : shopMagicItems();
  return items[i];
}

function shopNextSlot() {
  const rows = document.querySelectorAll('#gear-list > div');
  for(let i=1;i<rows.length;i++){
    const row = rows[i];
    if(row.classList.contains('gear-slot-disabled')) continue;
    const nameEl = row.querySelector('.gear-name');
    if(nameEl && !nameEl.value.trim()) return row;
  }
  return null;
}

function shopAddToGear(it) {
  if(it.kit) {
    // Crawling kit: expand into items; Backpack to Free Carry if empty
    const kit = [{name:'Flint & Steel'},{name:'Torch',qty:'2'},{name:'Rations',qty:'3'},{name:'Iron Spikes',qty:'10'},{name:'Grappling Hook'},{name:'Rope (60 ft)'}];
    const fc = document.getElementById('free-carry');
    if(fc && !fc.value.trim()) fc.value = 'Backpack';
    else kit.unshift({name:'Backpack'});
    let placed = 0;
    for(const k of kit) {
      const row = shopNextSlot();
      if(!row) break;
      row.querySelector('.gear-name').value = k.name;
      const q = row.querySelector('.gear-qty');
      if(q) q.value = k.qty || '';
      placed++;
    }
    if(placed < kit.length) alert('Not enough free gear slots for the whole kit — added what fits.');
    return true;
  }
  const row = shopNextSlot();
  if(!row) { alert('No free gear slots available.'); return false; }
  row.querySelector('.gear-name').value = it.name;
  const q = row.querySelector('.gear-qty');
  if(q) q.value = it.qty || '';
  return true;
}

function shopAdd(tab, i) {
  const it = shopGetItem(tab, i);
  if(!it) return;
  if(it.pick) { openSpellPick(it.pick); return; }
  if(shopAddToGear(it)) {
    if(tab==='weapons') shopAddAttack(it.name);
    saveSheet(false); closeShop();
  }
}

function shopBuy(tab, i) {
  const it = shopGetItem(tab, i);
  if(!it) return;
  const cost = shopCostCp(it);
  const gpEl = document.getElementById('coin-gp');
  const spEl = document.getElementById('coin-sp');
  const cpEl = document.getElementById('coin-cp');
  const total = (parseInt(gpEl?.value)||0)*100 + (parseInt(spEl?.value)||0)*10 + (parseInt(cpEl?.value)||0);
  if(total < cost) { alert('Not enough coin! '+it.name+' costs '+shopFmtCost(it)+'.'); return; }
  if(!shopAddToGear(it)) return;
  if(tab==='weapons') shopAddAttack(it.name);
  const left = total - cost;
  if(gpEl) gpEl.value = String(Math.floor(left/100));
  if(spEl) spEl.value = String(Math.floor((left%100)/10));
  if(cpEl) cpEl.value = String(left%10);
  addLog('Purchase','🛒',it.name+' — '+shopFmtCost(it),'normal');
  saveSheet(false);
  closeShop();
}

// ── Weapon purchases also become attack rows ──
function shopAddAttack(name) {
  const w = (typeof SD_WEAPONS!=='undefined' ? SD_WEAPONS : []).find(x=>x.name===name);
  if(!w || typeof addAttackRow!=='function') return;
  addAttackRow();
  const tbody = document.getElementById('attacks-body');
  const row = tbody ? tbody.lastElementChild : null;
  if(!row) return;
  const inputs = row.querySelectorAll('td input');
  const selects = row.querySelectorAll('td select');
  const isFinesse = (w.props||'').toLowerCase().includes('finesse');
  const useDex = (w.type==='R') || (isFinesse && getStatMod('dex') > getStatMod('str'));
  if(inputs[0]) inputs[0].value = w.name;
  if(inputs[1]) inputs[1].value = '';
  if(inputs[2]) inputs[2].value = w.damage;
  if(selects[0]) selects[0].value = useDex ? 'dex' : 'str';
  if(selects[1]) { const parts=(w.range||'').split('/'); selects[1].value = parts[parts.length-1].trim(); }
}

// ── Spell pick for generic Scroll / Wand ──
let _spellPickKind = 'Scroll';
function openSpellPick(kind) {
  _spellPickKind = kind;
  document.getElementById('spellpick-title').textContent = 'Choose Spell for ' + (kind==='Scroll' ? 'Spell Scroll' : 'Magic Wand');
  const body = document.getElementById('spellpick-body');
  const spells = (typeof SD_SPELLS!=='undefined' ? SD_SPELLS : []).slice().sort((a,b)=> a.tier===b.tier ? a.name.localeCompare(b.name) : a.tier.localeCompare(b.tier));
  body.innerHTML = spells.map(s=>{
    const meta = ['T'+s.tier, s.caster, s.range?'Range: '+s.range:'', s.duration?'Dur: '+s.duration:'', s.damage?'Dmg: '+s.damage:''].filter(Boolean).join(' · ');
    const pFull = (typeof SD_SPELL_FULL!=='undefined' && SD_SPELL_FULL[s.name]) || '';
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1e1e1e;">'
      + '<div style="flex:1;min-width:0;'+(pFull?'cursor:pointer;':'')+'" '+(pFull?'onclick="toggleFullDesc(this)"':'')+'>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#eee;">'+s.name+'</div>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:8px;color:#9a7ac8;line-height:1.3;">'+meta+'</div>'
      +   (s.desc?'<div class="desc-short" style="font-family:Montserrat,sans-serif;font-size:9px;color:#888;line-height:1.3;">'+s.desc+(pFull?' <span style="color:#b89ae0;">▸ more</span>':'')+'</div>':'')
      +   (pFull?'<div class="desc-full" style="display:none;font-family:Montserrat,sans-serif;font-size:9px;color:#bbb;line-height:1.45;">'+pFull+' <span style="color:#b89ae0;">▾ less</span></div>':'')
      + '</div>'
      + '<button onclick="spellPickChoose(\''+s.name.replace(/'/g,"\\'")+'\',\''+s.tier+'\')" style="padding:5px 10px;background:#2a1a3a;color:#b89ae0;border:1px solid #5a3a8a;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Choose</button>'
      + '</div>';
  }).join('');
  document.getElementById('spellpick-overlay').style.display = 'flex';
}
function closeSpellPick() { document.getElementById('spellpick-overlay').style.display = 'none'; }
function spellPickChoose(name, tier) {
  const it = { name: _spellPickKind + ': ' + name };
  if(shopAddToGear(it)) {
    addLog('Item Added','🛒',it.name+' (T'+tier+')','normal');
    saveSheet(false);
  }
  closeSpellPick();
  closeShop();
}

</script>

<!-- ═══ SPELL LEARN SHOP ═══ -->
<div id="spellshop-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;padding:16px;">
  <div style="background:#1a1a1a;border:2px solid #5a3a8a;max-width:520px;width:100%;height:85vh;display:flex;flex-direction:column;">
    <div style="background:#0a0a0a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-family:'UnifrakturMaguntia',cursive;font-size:20px;color:#b89ae0;line-height:1;">Spellbook</div>
      <button onclick="closeSpellShop()" style="background:transparent;border:none;color:#888;font-size:20px;cursor:pointer;padding:0 4px;">✕</button>
    </div>
    <div id="spellshop-tabs" style="display:flex;flex-shrink:0;"></div>
    <div id="spellshop-filters" style="display:flex;gap:16px;padding:7px 14px;background:#0f0f0f;flex-shrink:0;border-bottom:1px solid #2a2a2a;"></div>
    <div id="spellshop-body" style="padding:6px 14px;overflow-y:auto;flex:1;"></div>
  </div>
</div>

<script>

// ═══ SPELL LEARN SHOP ═══════════════════════════════════════════════════════
let _spellShopTier = '1';
let _spellShopWiz = true;
let _spellShopPri = true;

function openSpellShop() {
  document.getElementById('spellshop-overlay').style.display = 'flex';
  spellShopRender();
}
function closeSpellShop() { document.getElementById('spellshop-overlay').style.display = 'none'; }
function spellShopSetTier(t) { _spellShopTier = t; spellShopRender(); }

function spellShopRender() {
  const tabBar = document.getElementById('spellshop-tabs');
  tabBar.innerHTML = ['1','2','3','4','5'].map(t=>
    '<button onclick="spellShopSetTier(\''+t+'\')" style="flex:1;padding:8px 4px;background:'+(_spellShopTier===t?'#5a3a8a':'#141414')+';color:'+(_spellShopTier===t?'#fff':'#888')+';border:none;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:900;font-size:9px;letter-spacing:.08em;text-transform:uppercase;">Tier '+t+'</button>'
  ).join('');

  // Caster filter checkboxes
  const filterBar = document.getElementById('spellshop-filters');
  filterBar.innerHTML =
    '<label style="display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;cursor:pointer;"><input type="checkbox" '+(_spellShopWiz?'checked':'')+' onchange="_spellShopWiz=this.checked;spellShopRender()" style="accent-color:#5a3a8a;">Wizard</label>'
    + '<label style="display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;cursor:pointer;"><input type="checkbox" '+(_spellShopPri?'checked':'')+' onchange="_spellShopPri=this.checked;spellShopRender()" style="accent-color:#5a3a8a;">Priest</label>';

  const known = new Set([...document.querySelectorAll('#spells-list .spell-row .spell-input')].map(el=>el.value.trim()).filter(Boolean));
  const body = document.getElementById('spellshop-body');
  const casterOk = (s) =>
    s.caster==='Both' ? (_spellShopWiz || _spellShopPri)
    : s.caster==='Wizard' ? _spellShopWiz
    : s.caster==='Priest' ? _spellShopPri
    : true;
  const spells = (typeof SD_SPELLS!=='undefined' ? SD_SPELLS : []).filter(s=>s.tier===_spellShopTier && casterOk(s)).sort((a,b)=>a.name.localeCompare(b.name));

  body.innerHTML = spells.map(s=>{
    const meta = [s.caster, s.range?'Range: '+s.range:'', s.duration?'Dur: '+s.duration:'', s.damage?'Dmg: '+s.damage:''].filter(Boolean).join(' · ');
    const isKnown = known.has(s.name);
    const sFull = (typeof SD_SPELL_FULL!=='undefined' && SD_SPELL_FULL[s.name]) || '';
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1e1e1e;">'
      + '<div style="flex:1;min-width:0;'+(sFull?'cursor:pointer;':'')+'" '+(sFull?'onclick="toggleFullDesc(this)"':'')+'>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#eee;">'+s.name+'</div>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:8px;color:#9a7ac8;line-height:1.3;">'+meta+'</div>'
      +   (s.desc?'<div class="desc-short" style="font-family:Montserrat,sans-serif;font-size:9px;color:#888;line-height:1.3;">'+s.desc+(sFull?' <span style="color:#b89ae0;">▸ more</span>':'')+'</div>':'')
      +   (sFull?'<div class="desc-full" style="display:none;font-family:Montserrat,sans-serif;font-size:9px;color:#bbb;line-height:1.45;">'+sFull+' <span style="color:#b89ae0;">▾ less</span></div>':'')
      + '</div>'
      + (isKnown
          ? '<button onclick="unlearnSpell(\''+s.name.replace(/'/g,"\\'")+'\')" style="padding:5px 10px;background:#3a1a1a;color:#df8a8a;border:1px solid #7a2d2d;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Unlearn</button>'
          : '<button onclick="learnSpell(\''+s.name.replace(/'/g,"\\'")+'\')" style="padding:5px 10px;background:#2a1a3a;color:#b89ae0;border:1px solid #5a3a8a;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Learn</button>')
      + '</div>';
  }).join('') || '<p style="font-family:Montserrat,sans-serif;font-size:10px;color:#888;padding:10px;">No spells at this tier.</p>';
}

function learnSpell(name) {
  const s = (typeof SD_SPELLS!=='undefined' ? SD_SPELLS : []).find(x=>x.name===name);
  if(!s) return;
  _spellCount++;
  const row = addSpellRow(_spellCount);
  if(row) {
    const q = (cl)=>row.querySelector(cl);
    const inp=q('.spell-input'); if(inp) inp.value=s.name;
    const lvl=q('.spell-level'); if(lvl) lvl.value=s.tier;
    const rng=q('.spell-range'); if(rng) rng.value=s.range;
    const dur=q('.spell-duration'); if(dur) dur.value=s.duration;
    const dmg=q('.spell-damage'); if(dmg) dmg.value=s.damage||'';
    const dsc=q('.spell-desc'); if(dsc){dsc.value=s.desc;autoResizeDesc(dsc);}
    if(s.name==='Magic Missile') {
      const ab = q('.spell-adv-btn');
      if(ab) ab.classList.add('on');
    }
  }
  addLog('Spell Learned','📖',s.name+' (Tier '+s.tier+')','normal');
  saveSheet(false);
  closeSpellShop();
}

function unlearnSpell(name) {
  const rows = [...document.querySelectorAll('#spells-list .spell-row')];
  const row = rows.find(r => (r.querySelector('.spell-input')?.value.trim()||'') === name);
  if(!row) return;
  row.remove();
  _spellCount = Math.max(0, _spellCount - 1);
  addLog('Spell Unlearned','📖',name,'normal');
  saveSheet(false);
  spellShopRender();
}

</script>

<!-- ═══ SCROLL/WAND SPELL PICK ═══ -->
<div id="spellpick-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1001;align-items:center;justify-content:center;padding:16px;">
  <div style="background:#1a1a1a;border:2px solid #9a7ac8;max-width:420px;width:100%;height:70vh;display:flex;flex-direction:column;">
    <div style="background:#0a0a0a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;">
      <div id="spellpick-title" style="font-family:'Montserrat',sans-serif;font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;"></div>
      <button onclick="closeSpellPick()" style="background:transparent;border:none;color:#888;font-size:20px;cursor:pointer;padding:0 4px;">✕</button>
    </div>
    <div id="spellpick-body" style="overflow-y:auto;flex:1;padding:4px 8px;"></div>
  </div>
</div>
</body>
