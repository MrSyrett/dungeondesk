    <div id="spellshop-body" style="padding:6px 14px;overflow-y:auto;flex:1;"></div>
  </div>
</div>

<script>

// ═══ SPELL LEARN SHOP ═══════════════════════════════════════════════════════
let _spellShopTier = '1';
let _spellShopWiz = true;
let _spellShopPri = true;
let _spellShopWit = true;
let _spellShopDru = true;
let _spellShopMag = true;
let _spellShopSor = true;

function openSpellShop() {
  // Default the caster filters to the character's own class, if it's a caster
  const cls = (document.getElementById('f-class')?.value || '').trim().toLowerCase();
  if(cls==='wizard' || cls==='priest' || cls==='witch') {
    _spellShopWiz = (cls==='wizard');
    _spellShopPri = (cls==='priest');
    _spellShopWit = (cls==='witch');
    _spellShopDru = (cls==='wizard' && sheetAlignment()==='neutral');
    _spellShopMag = (cls==='wizard' && sheetAlignment()==='lawful');
    _spellShopSor = (cls==='wizard' && sheetAlignment()==='chaotic');
  }
  document.getElementById('spellshop-overlay').style.display = 'flex';
  spellShopRender();
}
function closeSpellShop() { document.getElementById('spellshop-overlay').style.display = 'none'; }
function spellShopSetTier(t) { _spellShopTier = t; spellShopRender(); }

function spellShopRender() {
  const tabBar = document.getElementById('spellshop-tabs');
  tabBar.innerHTML = ['1','2','3','4','5'].map(t=>
    '<button onclick="spellShopSetTier(\''+t+'\')" style="flex:1;padding:8px 4px;background:'+(_spellShopTier===t?'#5a3a8a':'#141414')+';color:'+(_spellShopTier===t?'#fff':'#888')+';border:none;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:900;font-size:9px;letter-spacing:.08em;text-transform:uppercase;">Tier '+t+'</button>'
  ).join('');

  // Caster filter checkboxes
  const filterBar = document.getElementById('spellshop-filters');
  filterBar.innerHTML =
    '<label style="display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;cursor:pointer;"><input type="checkbox" '+(_spellShopWiz?'checked':'')+' onchange="_spellShopWiz=this.checked;spellShopRender()" style="accent-color:#5a3a8a;">Wizard</label>'
    + '<label style="display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;cursor:pointer;"><input type="checkbox" '+(_spellShopPri?'checked':'')+' onchange="_spellShopPri=this.checked;spellShopRender()" style="accent-color:#5a3a8a;">Priest</label>'
    + '<label style="display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;cursor:pointer;"><input type="checkbox" '+(_spellShopWit?'checked':'')+' onchange="_spellShopWit=this.checked;spellShopRender()" style="accent-color:#5a3a8a;">Witch</label>'
    + '<label title="Druid spells: neutral wizards only" style="display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;cursor:pointer;"><input type="checkbox" '+(_spellShopDru?'checked':'')+' onchange="_spellShopDru=this.checked;spellShopRender()" style="accent-color:#5a3a8a;">Druid</label>'
    + '<label title="Mage spells: lawful wizards only" style="display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;cursor:pointer;"><input type="checkbox" '+(_spellShopMag?'checked':'')+' onchange="_spellShopMag=this.checked;spellShopRender()" style="accent-color:#5a3a8a;">Mage</label>'
    + '<label title="Sorcerer spells: chaotic wizards only" style="display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#b89ae0;cursor:pointer;"><input type="checkbox" '+(_spellShopSor?'checked':'')+' onchange="_spellShopSor=this.checked;spellShopRender()" style="accent-color:#5a3a8a;">Sorcerer</label>';

  const known = new Set([...document.querySelectorAll('#spells-list .spell-row .spell-input')].map(el=>el.value.trim()).filter(Boolean));
  const body = document.getElementById('spellshop-body');
  const casterOk = (s) =>
    s.caster==='Both' ? (_spellShopWiz || _spellShopPri)
    : s.caster==='Wizard' ? _spellShopWiz
    : s.caster==='Priest' ? _spellShopPri
    : s.caster==='Witch' ? _spellShopWit
    : s.caster==='Druid' ? _spellShopDru
    : s.caster==='Mage' ? _spellShopMag
    : s.caster==='Sorcerer' ? _spellShopSor
    : true;
  const spells = (typeof SD_SPELLS!=='undefined' ? SD_SPELLS : []).filter(s=>s.tier===_spellShopTier && casterOk(s)).sort((a,b)=>a.name.localeCompare(b.name));

  body.innerHTML = spells.map(s=>{
    const meta = [s.caster, s.range?'Range: '+s.range:'', s.duration?'Dur: '+s.duration:'', s.damage?'Dmg: '+s.damage:''].filter(Boolean).join(' · ');
    const isKnown = known.has(s.name);
    const sFull = (typeof SD_SPELL_FULL!=='undefined' && SD_SPELL_FULL[s.name]) || '';
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1e1e1e;">'
      + '<div style="flex:1;min-width:0;'+(sFull?'cursor:pointer;':'')+'" '+(sFull?'onclick="toggleFullDesc(this)"':'')+'>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#eee;">'+s.name+'</div>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:8px;color:#9a7ac8;line-height:1.3;">'+meta+'</div>'
      +   (s.desc?'<div class="desc-short" style="font-family:Montserrat,sans-serif;font-size:9px;color:#888;line-height:1.3;">'+s.desc+(sFull?' <span style="color:#b89ae0;">▸ more</span>':'')+'</div>':'')
      +   (sFull?'<div class="desc-full" style="display:none;font-family:Montserrat,sans-serif;font-size:9px;color:#bbb;line-height:1.45;">'+sFull+' <span style="color:#b89ae0;">▾ less</span></div>':'')
      + '</div>'
      + (isKnown
          ? '<button onclick="unlearnSpell(\''+s.name.replace(/'/g,"\\'")+'\')" style="padding:5px 10px;background:#3a1a1a;color:#df8a8a;border:1px solid #7a2d2d;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Unlearn</button>'
          : '<button onclick="learnSpell(\''+s.name.replace(/'/g,"\\'")+'\',\''+s.caster+'\')" style="padding:5px 10px;background:#2a1a3a;color:#b89ae0;border:1px solid #5a3a8a;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Learn</button>')
      + '</div>';
  }).join('') || '<p style="font-family:Montserrat,sans-serif;font-size:10px;color:#888;padding:10px;">No spells at this tier.</p>';
}

function learnSpell(name, caster) {
  const s = findSpell(name, caster);
  if(!s) return;
  _spellCount++;
  const row = addSpellRow(_spellCount);
  if(row) {
    const q = (cl)=>row.querySelector(cl);
    const inp=q('.spell-input'); if(inp) inp.value=s.name;
    const lvl=q('.spell-level'); if(lvl) lvl.value=s.tier;
    const rng=q('.spell-range'); if(rng) rng.value=s.range;
    const dur=q('.spell-duration'); if(dur) dur.value=s.duration;
    const dmg=q('.spell-damage'); if(dmg) dmg.value=s.damage||'';
    const dsc=q('.spell-desc'); if(dsc){dsc.value=s.desc;autoResizeDesc(dsc);}
    if(s.name==='Magic Missile') {
      const ab = q('.spell-adv-btn');
      if(ab) ab.classList.add('on');
    }
  }
  addLog('Spell Learned','📖',s.name+' (Tier '+s.tier+')','normal');
  saveSheet(false);
  closeSpellShop();
}

function unlearnSpell(name) {
  const rows = [...document.querySelectorAll('#spells-list .spell-row')];
  const row = rows.find(r => (r.querySelector('.spell-input')?.value.trim()||'') === name);
  if(!row) return;
  row.remove();
  _spellCount = Math.max(0, _spellCount - 1);
  addLog('Spell Unlearned','📖',name,'normal');
  saveSheet(false);
  spellShopRender();
}

</script>

<script>
// ═══ CAMPAIGN LINK (shared roll log) ════════════════════════════════════════
let _campaign = null; // {id, code, name}
const _campaignClientKey = 'ck-' + Math.random().toString(36).slice(2, 12);
let _campaignLastId = 0;
let _campaignTimer = null;
let _campaignOnline = true;

function campaignPlayerName() {
  return document.getElementById('f-name')?.value.trim() || 'Player';
}

function campaignUpdateBtn() {
  const btn = document.getElementById('campaign-btn');
  if(!btn) return;
  if(_campaign) {
    btn.textContent = '🔗 ' + _campaign.name;
    btn.style.background = '#241f10'; btn.style.color = '#c8a020'; btn.style.borderColor = '#7a5a00';
  } else {
    btn.textContent = '🔗 Campaign';
    btn.style.background = 'transparent'; btn.style.color = 'var(--muted)'; btn.style.borderColor = 'var(--rule)';
  }
}

function openCampaign() {
  document.getElementById('campaign-overlay').style.display = 'flex';
  campaignRenderModal();
}
function closeCampaign() { document.getElementById('campaign-overlay').style.display = 'none'; }

function campaignRenderModal() {
  const body = document.getElementById('campaign-body');
  const inputStyle = 'width:100%;padding:8px 10px;background:#141414;border:1px solid #2a2a2a;color:#eee;font-family:Montserrat,sans-serif;font-size:12px;outline:none;box-sizing:border-box;';
  const btnStyle = 'padding:8px 14px;border:none;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:900;font-size:10px;letter-spacing:.1em;text-transform:uppercase;';
  if(_campaign) {
    body.innerHTML =
      '<p class="ccw-hint">Connected — rolls are shared with everyone in this campaign.</p>'
      + '<div style="background:#0f0f0f;border:1px solid #7a5a00;padding:12px;margin-bottom:12px;">'
      + '<div style="font-family:Montserrat,sans-serif;font-size:13px;font-weight:900;color:#c8a020;">'+_campaign.name+'</div>'
      + '<div style="font-family:Montserrat,sans-serif;font-size:10px;color:#888;margin-top:4px;">Join code: <b style="color:#eee;font-size:14px;letter-spacing:.2em;">'+_campaign.code+'</b></div>'
      + '<div style="font-family:Montserrat,sans-serif;font-size:9px;color:#666;margin-top:4px;">Share this code with your table.</div>'
      + '</div>'
      + '<button onclick="campaignLeave()" style="'+btnStyle+'background:#3a1a1a;color:#df8a8a;border:1px solid #7a2d2d;width:100%;">Leave Campaign</button>';
  } else {
    body.innerHTML =
      '<p class="ccw-hint">Create a campaign and share the code, or join with a code from your GM. Rolls will appear in everyone\'s roll logs.</p>'
      + '<div style="margin-bottom:14px;">'
      + '<div style="font-family:Montserrat,sans-serif;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:#c8a020;margin-bottom:5px;">Create New</div>'
      + '<div style="display:flex;gap:6px;"><input type="text" id="campaign-name-input" placeholder="Campaign name..." style="'+inputStyle+'flex:1;">'
      + '<button onclick="campaignCreate()" style="'+btnStyle+'background:#c8a020;color:#1a1a1a;flex-shrink:0;">Create</button></div>'
      + '</div>'
      + '<div>'
      + '<div style="font-family:Montserrat,sans-serif;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:#6ac8df;margin-bottom:5px;">Join Existing</div>'
      + '<div style="display:flex;gap:6px;"><input type="text" id="campaign-code-input" placeholder="Join code (e.g. K7XP2M)" maxlength="6" style="'+inputStyle+'flex:1;text-transform:uppercase;letter-spacing:.15em;">'
      + '<button onclick="campaignJoin()" style="'+btnStyle+'background:#1a5a7a;color:#fff;flex-shrink:0;">Join</button></div>'
      + '</div>'
      + '<div id="campaign-error" style="font-family:Montserrat,sans-serif;font-size:10px;color:#df6a6a;margin-top:10px;"></div>';
  }
}

function campaignError(msg) {
  const el = document.getElementById('campaign-error');
  if(el) el.textContent = msg;
}

async function campaignCreate() {
  const name = document.getElementById('campaign-name-input')?.value.trim() || 'New Campaign';
  try {
    const r = await fetch('/api/campaigns', {
      method: 'POST', credentials: 'same-origin',
      headers: {'content-type':'application/json'},
      body: JSON.stringify({ name })
    });
    if(!r.ok) throw new Error(r.status);
    _campaign = await r.json();
    campaignConnected();
  } catch(e) {
    campaignError('Could not create campaign — are you signed in to the app?');
  }
}

async function campaignJoin() {
  const code = (document.getElementById('campaign-code-input')?.value || '').trim().toUpperCase();
  if(!code) { campaignError('Enter a join code.'); return; }
  try {
    const r = await fetch('/api/campaigns?code=' + encodeURIComponent(code), { credentials: 'same-origin' });
    if(r.status === 404) { campaignError('No campaign found with that code.'); return; }
    if(!r.ok) throw new Error(r.status);
    _campaign = await r.json();
    campaignConnected();
  } catch(e) {
    campaignError('Could not join — are you signed in to the app?');
  }
}

function campaignConnected() {
  _campaignLastId = 0;
  campaignUpdateBtn();
  campaignRenderModal();
  campaignStartPolling();
  addLog('Campaign', '🔗', 'Connected to "'+_campaign.name+'" ('+_campaign.code+')', 'normal');
  saveSheet(false);
}

function campaignLeave() {
  if(_campaignTimer) { clearInterval(_campaignTimer); _campaignTimer = null; }
  const name = _campaign ? _campaign.name : '';
  _campaign = null;
  _campaignLastId = 0;
  campaignUpdateBtn();
  campaignRenderModal();
  addLog('Campaign', '🔗', 'Left "'+name+'"', 'normal');
  saveSheet(false);
}

// Broadcast local rolls (called from inside addLog for local entries).
// Only actual dice rolls and campaign joins are shared — sheet housekeeping
// events (purchases, level ups, saves, etc.) stay local.
const CAMPAIGN_SKIP_LABELS = new Set([
  'Character Created','Exported','Imported','Item Added','Level Up',
  'New Character','Purchase','Random Character','Rest','Sheet Exported','Sheet Saved',
  'Spell Learned','Spell Unlearned'
]);
function campaignBroadcast(label, result, detail, type) {
  if(!_campaign) return;
  if(CAMPAIGN_SKIP_LABELS.has(String(label))) return;
  fetch('/api/campaigns/' + _campaign.id + '/rolls', {
    method: 'POST', credentials: 'same-origin',
    headers: {'content-type':'application/json'},
    body: JSON.stringify({
      clientKey: _campaignClientKey,
      source: campaignPlayerName(),
      label: String(label), result: String(result), detail: String(detail||''), type: type||'normal'
    })
  }).catch(()=>{});
}

// Remote entries render directly (never through addLog, so they don't rebroadcast)
function campaignAddRemote(roll) {
  const entries = document.getElementById('log-entries');
  if(!entries) return;
  const hint = entries.querySelector('.log-hint');
  if(hint) hint.remove();
  const div = document.createElement('div');
  div.className = 'log-entry remote' + (roll.type==='crit'?' crit':roll.type==='fumble'?' fumble':'');
  const esc = (s)=>String(s).replace(/</g,'&lt;');
  div.innerHTML = '<div class="roll-label"><span style="color:#8a7ac8;">'+esc(roll.source)+'</span> · '+esc(roll.label)+'</div>'
    + '<div class="roll-result">'+esc(roll.result)+'</div>'
    + (roll.detail?'<div class="roll-detail">'+esc(roll.detail)+'</div>':'');
  entries.insertBefore(div, entries.firstChild);
  entries.scrollTop = 0;
  while(entries.children.length > 60) entries.removeChild(entries.lastChild);
}

async function campaignPoll() {
  if(!_campaign) return;
  try {
    const url = '/api/campaigns/' + _campaign.id + '/rolls' + (_campaignLastId ? '?since='+_campaignLastId : '');
    const r = await fetch(url, { credentials: 'same-origin' });
    if(!r.ok) return;
    const data = await r.json();
    (data.rolls||[]).forEach(roll=>{
      if(roll.clientKey !== _campaignClientKey) campaignAddRemote(roll);
    });
    if(data.last) _campaignLastId = data.last;
  } catch(e) {}
}

function campaignStartPolling() {
  if(_campaignTimer) clearInterval(_campaignTimer);
  campaignPoll();
  _campaignTimer = setInterval(campaignPoll, 4000);
}

// Restore connection on load (called from _applySDData path via campaignRestore)
function campaignRestore(saved) {
  if(saved && saved.id && saved.code) {
    _campaign = { id: saved.id, code: saved.code, name: saved.name || 'Campaign' };
    campaignStartPolling();
  }
  campaignUpdateBtn();
}

// Self-restore: the sheet's autoLoad ran before this block existed, so read
// the saved campaign directly from the same source autoLoad used.
(function(){
  try {
    let saved = null;
    if(window.__ddState !== undefined) saved = window.__ddState['sd_sheet'] || null;
    else saved = localStorage.getItem('sd_sheet');
    if(saved) {
      const d = typeof saved === 'string' ? JSON.parse(saved) : saved;
      if(d && d._sheet && d._sheet.campaign) { campaignRestore(d._sheet.campaign); return; }
    }
  } catch(e) {}
  campaignUpdateBtn();
})();

</script>
</body>
