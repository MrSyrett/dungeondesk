  'Jeweler': 'You can easily appraise value and authenticity',
  'Herbalist': 'You know plants, medicines, and poisons',
  'Barbarian': 'You left the horde, but it never quite left you',
  'Mercenary': 'You fought friend and foe alike for your coin',
  'Sailor': 'Pirate, privateer, or merchant — the seas are yours',
  'Acolyte': "You're well trained in religious rites and doctrines",
  'Soldier': 'You served as a fighter in an organized army',
  'Ranger': 'The woods and wilds are your true home',
  'Scout': 'You survived on stealth, observation, and speed',
  'Minstrel': "You've traveled far with your charm and talent",
  'Scholar': 'You know much about ancient history and lore',
  'Noble': 'A famous name has opened many doors for you',
  'Chirurgeon': 'You know anatomy, surgery, and first aid',
};

const CCW_COMMON_LANGS = ['Dwarvish','Elvish','Giant','Goblin','Merran','Orcish','Reptilian','Sylvan','Thanian'];
const CCW_RARE_LANGS   = ['Celestial','Diabolic','Draconic','Primordial'];
const CCW_ARMOR_TYPES  = ['Leather armor','Chainmail','Plate mail','Shield'];
const CCW_REMEDIES     = ['Salve','Stimulant','Foebane','Restorative','Curative'];
const CCW_ALL_STATS    = ['STR','DEX','CON','INT','WIS','CHA'];

// ── Talent choice resolver ─────────────────────────────────────────────────
// Analyzes talent text and returns a "pending" object describing needed choices
function ccwAnalyzeTalent(text, cls) {
  const p = { text: text, kind: 'none', options: [], picked: null, picked2: null, final: text, statBoost: {}, sub: null };
  if(!text) return p;

  if(/^Choose a talent/i.test(text)) {
    p.kind = 'meta';
    p.hasStatAlt = /\+2/.test(text);
    p.final = null;
    return p;
  }
  if(/\+2 points? to (distribute to )?(any )?stats/i.test(text)) {
    p.kind = 'distribute'; p.final = null; return p;
  }
  // Barbarian: "+2 to Strength or Constitution stat, or +1 to melee attacks" — 3-way pick
  if(/^\+2 to Strength or Constitution stat, or \+1 to melee attacks/i.test(text)) {
    p.kind = 'ortwo';
    p.options = ['+2 to Strength stat', '+2 to Constitution stat', '+1 to melee attacks'];
    p.final = null; return p;
  }
  if(/ stat or \+1 to /i.test(text)) {
    // e.g. "+2 to Intelligence stat or +1 to spellcasting checks"
    const parts = text.split(/ or /);
    p.kind = 'ortwo'; p.options = [parts[0].trim(), parts.slice(1).join(' or ').trim()];
    p.final = null; return p;
  }
  if(/attacks or \+1 to Magical Dabbler/i.test(text)) {
    const parts = text.split(/ or /);
    p.kind = 'ortwo'; p.options = [parts[0].trim(), parts.slice(1).join(' or ').trim()];
    p.final = null; return p;
  }
  const statMatch = text.match(/\+2 to ([A-Za-z, ]+?) stat/);
  if(statMatch && /,| or /.test(statMatch[1])) {
    p.kind = 'statpick';
    p.options = statMatch[1].split(/,| or /).map(s=>s.trim()).filter(Boolean);
    p.final = null; return p;
  }
  if(/melee or ranged/i.test(text)) {
    p.kind = 'meleeranged'; p.final = null; return p;
  }
  if(/weapon type/i.test(text)) {
    p.kind = 'weapon'; p.final = null; return p;
  }
  if(/one spell you know/i.test(text)) {
    p.kind = 'spellknown'; p.final = null; return p;
  }
  if(/additional wizard spell/i.test(text)) {
    p.kind = 'wizspell'; p.final = null; return p;
  }
  if(/additional witch spell/i.test(text)) {
    p.kind = 'witchspell'; p.final = null; return p;
  }
  if(/armor type/i.test(text)) {
    p.kind = 'armor'; p.final = null; return p;
  }
  if(/remedy you choose/i.test(text)) {
    p.kind = 'remedy'; p.final = null; return p;
  }
  if(/priest or wizard wand/i.test(text)) {
    p.kind = 'wand'; p.final = null; return p;
  }
  return p;
}

      }
    }
  }
  if(p.final) h += '<div class="ccw-result" style="margin-top:6px;border-left-color:#4caf7d;">✓ '+p.final+'</div>';

// Computes .final and .statBoost from picks
function ccwResolve(p) {
  if(!p) return;
  p.statBoost = {};
  p.final = null;
  switch(p.kind) {
    case 'none': p.final = p.text; break;
    case 'ortwo':
      if(p.picked) {
        p.final = p.picked;
        const m = p.picked.match(/\+2 to (\w+) stat/);
        if(m) { const st = m[1].slice(0,3).toUpperCase(); p.statBoost[st] = 2; }
      }
      break;
    case 'statpick':
      if(p.picked) { p.final = '+2 to '+p.picked+' stat'; p.statBoost[p.picked.slice(0,3).toUpperCase()] = 2; }
      break;
    case 'distribute':
      if(p.picked && p.picked2) {
        p.final = '+1 '+p.picked+', +1 '+p.picked2;
        p.statBoost[p.picked] = (p.statBoost[p.picked]||0)+1;
        p.statBoost[p.picked2] = (p.statBoost[p.picked2]||0)+1;
      }
      break;
    case 'meleeranged':
      if(p.picked) p.final = p.text.replace(/melee or ranged/i, p.picked);
      break;
    case 'weapon': case 'spellknown': case 'wizspell': case 'witchspell': case 'armor': case 'remedy': case 'wand':
      if(p.picked) p.final = p.text + ' — ' + p.picked;
      break;
    case 'meta':
      if(p.picked==='talent' && p.sub) {
        ccwResolve(p.sub);
        if(p.sub.final) { p.final = p.sub.final; p.statBoost = p.sub.statBoost; }
      } else if(p.picked==='stats' && p.pickedA && p.pickedB) {
        p.final = '+1 '+p.pickedA+', +1 '+p.pickedB;
        p.statBoost[p.pickedA] = (p.statBoost[p.pickedA]||0)+1;
        p.statBoost[p.pickedB] = (p.statBoost[p.pickedB]||0)+1;
      }
      break;
  }
}

// Which weapons a class may use
function ccwClassWeapons(cls) {
  const w = (RC_CLASS_INFO[cls]?.weapons||'').toLowerCase();
  const names = SD_WEAPONS.map(x=>x.name).filter(n=>n!=='Unarmed');   // Unarmed isn't gear you buy
  if(w.includes('all weapons')) return names;
  return names.filter(n=>w.includes(n.toLowerCase()));
}
// Which armor a class may wear
function ccwClassArmor(cls) {
  const a = (RC_CLASS_INFO[cls]?.armor||'').toLowerCase();
  if(a.includes('all armor')) {
    return a.includes('shield') ? ['Leather armor','Chainmail','Plate mail','Shield'] : ['Leather armor','Chainmail','Plate mail'];
  }
  const out = [];
  if(a.includes('leather')) out.push('Leather armor');
  if(a.includes('chainmail')) out.push('Chainmail');
  if(a.includes('plate')) out.push('Plate mail');
  if(a.includes('shield')) out.push('Shield');
  return out;
}

function ccwGearSpent() {
  let spent = 0;
  if(_ccw.buyKit) spent += 7;
  _ccw.buyWeapons.forEach(n=>{ spent += ccwCostGp(CCW_WEAPON_COSTS[n]||{}); });
  _ccw.buyArmor.forEach(n=>{ const a=CCW_ARMOR_SHOP.find(x=>x.name===n); if(a) spent += a.gp; });
  return spent;
}
function ccwGear() {
  if(_ccw.gold===null) {
    return '<p class="ccw-hint">Roll 2d6 × 5 for your starting gold, or take the flat 35 gp, then buy your gear.</p>'
      + '<div style="display:flex;gap:6px;">'

    h += '<p class="ccw-hint" style="color:#c8a020;font-weight:700;margin-top:10px;">Armor</p>';
    h += '<div class="ccw-choice-grid">';
    allowedArmor.forEach(n=>{
      const a = CCW_ARMOR_SHOP.find(x=>x.name===n);

    });
    h += '</div>';
  } else {
    h += '<p class="ccw-hint" style="margin-top:8px;">'+_ccw.cls+'s wear no armor.</p>';
  }
  return h;

  const c = { common: 0, rare: 0, priest: false };
  if(_ccw.ancestry==='Human') c.common += 1;

  else if(name==='Class') body.innerHTML = ccwClass();
  else if(name==='Background') body.innerHTML = ccwBackground();

// ── Randomly resolve a pending talent choice ──
function ccwRandResolve(p, cls, knownSpells) {
  if(!p || p.kind==='none') return;
  const rand = (arr) => arr[Math.floor(Math.random()*arr.length)];
  switch(p.kind) {
    case 'ortwo':      p.picked = rand(p.options); break;
    case 'statpick':   p.picked = rand(p.options); break;
    case 'distribute': p.picked = rand(CCW_ALL_STATS); p.picked2 = rand(CCW_ALL_STATS); break;
    case 'meleeranged':p.picked = rand(['melee','ranged']); break;
    case 'weapon':     p.picked = rand(SD_WEAPONS.map(w=>w.name)); break;
    case 'spellknown': {
      const eligible = (knownSpells||[]).filter(sp=>sp!=='Magic Missile');
      if(eligible.length) p.picked = rand(eligible);
      else { p.final = p.text; return; }
      break;
    }
    case 'wizspell':   p.picked = rand(SD_SPELLS.filter(s=>s.caster==='Wizard'||s.caster==='Both').map(s=>s.name)); break;
    case 'witchspell': p.picked = rand(SD_SPELLS.filter(s=>s.caster==='Witch').map(s=>s.name)); break;
    case 'armor':      p.picked = rand(CCW_ARMOR_TYPES); break;
    case 'remedy':     p.picked = rand(CCW_REMEDIES); break;
    case 'wand':       p.picked = rand(['Priest wand','Wizard wand']); break;
    case 'meta':
      if(p.hasStatAlt && Math.random()<0.5) {
        p.picked = 'stats'; p.pickedA = rand(CCW_ALL_STATS); p.pickedB = rand(CCW_ALL_STATS);
      } else {
        p.picked = 'talent';
        const rows = (RC_CLASS_INFO[cls]?.talent||[]);
        const opts = [rows[0], rows[1], rows[6], rows[9]].filter(Boolean);
        p.sub = ccwAnalyzeTalent(rand(opts), cls);
        ccwRandResolve(p.sub, cls, knownSpells);
      }
      break;
  }
  ccwResolve(p);
}

// ── Fully random character through the wizard pipeline ──
function ccwRandomize() {
  const rand = (arr) => arr[Math.floor(Math.random()*arr.length)];
  const roll2d6 = () => Math.ceil(Math.random()*6)+Math.ceil(Math.random()*6);

  // Stats (3d6 in order)
  _ccw.rolled = [0,0,0,0,0,0].map(()=>_rc_3d6());
  _ccw.statMode = 'order';
  _ccw.assign = [0,1,2,3,4,5];
  ccwSyncStats();

  // Ancestry / class / background / alignment / deity
  _ccw.ancestry  = _rc_weighted(RC_ANCESTRY.table);
  _ccw.elfFarsight = _ccw.ancestry==='Elf' ? rand(['ranged','spell']) : null;
  _ccw.beastNatural = _ccw.ancestry==='Beastfolk' ? rand(['attack','ac']) : null;
  _ccw.koboldKnack  = _ccw.ancestry==='Kobold' ? rand(['spell','luck']) : null;
  // Class follows the highest stat so builds make sense
  const CLASS_BY_STAT = {
    STR: ['Fighter','Ranger','Barbarian'],
    DEX: ['Ranger','Thief'],
    CON: ['Fighter','Barbarian'],
    INT: ['Wizard'],
    WIS: ['Priest'],
    CHA: ['Bard','Witch'],
  };
  const maxVal = Math.max(...CCW_ALL_STATS.map(k=>_ccw.stats[k]));
  const topStats = CCW_ALL_STATS.filter(k=>_ccw.stats[k]===maxVal);
  _ccw.cls = rand(CLASS_BY_STAT[rand(topStats)]);
  _ccw.grit = _ccw.cls==='Fighter' ? rand(['Strength','Dexterity']) : null;
  _ccw.mastery = _ccw.cls==='Fighter' ? rand(SD_WEAPONS).name : null;
  _ccw.background= rand(RC_BACKGROUNDS);
  _ccw.alignment = rand(['Lawful','Neutral','Chaotic']);
  const deities  = RC_DEITIES[_ccw.alignment] || [];
  _ccw.deity     = (_ccw.cls==='Priest' && deities.length) ? rand(deities)
                 : (deities.length && Math.random()<0.5 ? rand(deities) : '');

  // Spells first (so talent "spell you know" has options)
  _ccw.spells = [];
  let spellPool = _ccw.cls==='Priest' ? RC_PRIEST_SPELLS_T1 : _ccw.cls==='Wizard' ? RC_WIZARD_SPELLS_T1 : _ccw.cls==='Witch' ? RC_WITCH_SPELLS_T1 : null;
  if(_ccw.cls==='Wizard' && _ccw.alignment==='Neutral') spellPool = [...spellPool, ...RC_DRUID_SPELLS_T1];
  if(spellPool) {
    const needed = _ccw.cls==='Priest' ? 2 : 3;
    const pool = [...spellPool];
    while(_ccw.spells.length < needed && pool.length) {
      const i = Math.floor(Math.random()*pool.length);
      _ccw.spells.push(pool.splice(i,1)[0]);
    }
  }

  // Talent (+ Human bonus), randomly resolving choices
  const pickRow = (roll) => { const r = ccwTalentRows().find(x=>roll>=x.lo && roll<=x.hi); return r ? r.text : ''; };
  _ccw.talentRoll = roll2d6();
  _ccw.talent = pickRow(_ccw.talentRoll);
  _ccw.tres = ccwAnalyzeTalent(_ccw.talent, _ccw.cls);
  ccwRandResolve(_ccw.tres, _ccw.cls, _ccw.spells);
  if(_ccw.ancestry==='Human') {
    _ccw.talent2Pick = null;
    _ccw.talent2Roll = roll2d6();
    _ccw.talent2 = pickRow(_ccw.talent2Roll);
    _ccw.tres2 = ccwAnalyzeTalent(_ccw.talent2, _ccw.cls);
    ccwRandResolve(_ccw.tres2, _ccw.cls, _ccw.spells);
  } else { _ccw.talent2 = null; _ccw.tres2 = null; _ccw.talent2Roll = null; }

  // Languages
  _ccw.langCommon = []; _ccw.langRare = []; _ccw.langPriest = '';
  const lc = ccwLangChoices();
  { const pool = [...CCW_COMMON_LANGS];
    while(_ccw.langCommon.length < lc.common && pool.length) _ccw.langCommon.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]); }
  { const pool = [...CCW_RARE_LANGS];
    while(_ccw.langRare.length < lc.rare && pool.length) _ccw.langRare.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]); }
  if(lc.priest) _ccw.langPriest = rand(['Celestial','Diabolic','Primordial']);

  // Gear: roll 2d6 × 5 gp and shop within the budget like a designed character
  _ccw.gold = roll2d6() * 5;
  _ccw.buyWeapons = [];
  _ccw.buyArmor = [];
  let remaining = _ccw.gold;
  // Crawling kit first (7 gp) if affordable
  _ccw.buyKit = remaining >= 7;
  if(_ccw.buyKit) remaining -= 7;
  // One random affordable class weapon
  const affordableWeapons = ccwClassWeapons(_ccw.cls).filter(n => ccwCostGp(CCW_WEAPON_COSTS[n]||{}) <= remaining);
  if(affordableWeapons.length) {
    const wpick = rand(affordableWeapons);
    _ccw.buyWeapons.push(wpick);
    remaining -= ccwCostGp(CCW_WEAPON_COSTS[wpick]||{});
  }
  // Leather armor if allowed and affordable
  const allowedArmor = ccwClassArmor(_ccw.cls);
  if(allowedArmor.includes('Leather armor') && remaining >= 10) {
    _ccw.buyArmor.push('Leather armor');
    remaining -= 10;
  }
  // Shield 50% of the time if allowed and affordable
  if(allowedArmor.includes('Shield') && remaining >= 10 && Math.random() < 0.5) {
    _ccw.buyArmor.push('Shield');
    remaining -= 10;
  }

  // Name & HP
  _ccw.name = _rc_roll(RC_NAMES[_ccw.ancestry] || RC_NAMES.Human);
  const eff = ccwEffStats();
  const hdNum = parseInt(RC_CLASS_INFO[_ccw.cls].hd.split('d')[1]);
  let hp = Math.ceil(Math.random()*hdNum) + _rc_mod(eff.CON);
  if(_ccw.ancestry==='Dwarf') hp += 2;
  _ccw.hp = Math.max(1, hp);

  ccwApply();
}

function ccwBack() { if(_ccw.step > 0) { _ccw.step--; ccwRender(); } }

function ccwNext() {
  const steps = ccwStepList();
  const name = steps[_ccw.step];
  if(name==='Method') { alert('Choose Random or Design to continue.'); return; }
  if(name==='Ability Scores' && !_ccw.stats) { alert('Roll your ability scores first.'); return; }
  if(name==='Ancestry') {
    if(!_ccw.ancestry) { alert('Choose an ancestry.'); return; }
    if(_ccw.ancestry==='Elf' && !_ccw.elfFarsight) { alert('Choose your Farsight option.'); return; }
    if(_ccw.ancestry==='Beastfolk' && !_ccw.beastNatural) { alert('Choose your Natural Selection option.'); return; }
    if(_ccw.ancestry==='Kobold' && !_ccw.koboldKnack) { alert('Choose your Knack option.'); return; }
  }
  if(name==='Class') {
    if(!_ccw.cls) { alert('Choose a class.'); return; }
    if(_ccw.cls==='Fighter' && !_ccw.mastery) { alert('Fighters must choose a weapon type for Weapon Mastery.'); return; }
    if(_ccw.cls==='Fighter' && !_ccw.grit) { alert('Fighters must choose Grit: Strength or Dexterity.'); return; }
  }
  if(name==='Background' && !_ccw.background) { alert('Choose a background.'); return; }
  if(name==='Alignment & Deity' && !_ccw.alignment) { alert('Choose an alignment.'); return; }
  if(name==='Talent') {
    if(!_ccw.talent) { alert('Roll or choose your talent first.'); return; }
    if(_ccw.ancestry==='Human' && !_ccw.talent2) { alert('Humans gain a bonus talent (Ambitious) — roll or choose it.'); return; }
    if(_ccw.tres) ccwResolve(_ccw.tres);
    if(_ccw.tres2) ccwResolve(_ccw.tres2);
    if(_ccw.tres && _ccw.tres.kind!=='none' && !_ccw.tres.final) { alert('Resolve your talent choice first.'); return; }
    if(_ccw.tres2 && _ccw.tres2.kind!=='none' && !_ccw.tres2.final) { alert('Resolve your bonus talent choice first.'); return; }
  }
  if(name==='Languages') {
    const lc = ccwLangChoices();
    if(_ccw.langCommon.length < lc.common) { alert('Choose '+lc.common+' common language'+(lc.common>1?'s':'')+'.'); return; }
    if(_ccw.langRare.length < lc.rare) { alert('Choose '+lc.rare+' rare language'+(lc.rare>1?'s':'')+'.'); return; }
    if(lc.priest && !_ccw.langPriest) { alert('Choose your priest language.'); return; }
  }
  if(name==='Spells') {
    const needed = _ccw.cls==='Priest' ? 2 : 3;
    if(_ccw.spells.length < needed) { alert('Choose ' + needed + ' spells.'); return; }
  }
  if(name==='Gear & Weapons') {
    if(_ccw.gold===null) { alert('Roll your starting gold first.'); return; }
    if(ccwGearSpent() > _ccw.gold) { alert('You have overspent your gold — remove something.'); return; }
  }
  if(name==='Name & Finish') { ccwApply(); return; }
  _ccw.step++;
  ccwRender();
}

// ── Step: Stats ──
function ccwStats() {
  let h = '<p class="ccw-hint">Roll 3d6 six times, or take the standard array. Assign in order (classic) or place each value where you want.</p>';
  h += '<div style="display:flex;gap:6px;margin-bottom:10px;">';
  h += '<button class="ccw-roll-btn" style="flex:1;margin:0;" onclick="ccwRollStats()">🎲 Roll 3d6 × 6</button>';

  h += '</div>';
  if(_ccw.rolled) {
    if(!_ccw.isArray) {
      h += '<div style="display:flex;gap:6px;margin-bottom:10px;">';
      h += '<button class="ccw-choice'+(_ccw.statMode==='order'?' selected':'')+'" style="flex:1;text-align:center;" onclick="ccwSetStatMode(\'order\')"><div class="ccw-choice-name" style="font-size:10px;">In Order (as rolled)</div></button>';
      h += '<button class="ccw-choice'+(_ccw.statMode==='assign'?' selected':'')+'" style="flex:1;text-align:center;" onclick="ccwSetStatMode(\'assign\')"><div class="ccw-choice-name" style="font-size:10px;">Assign Manually</div></button>';
      h += '</div>';
    }
    if(_ccw.statMode==='assign') {
      const poolLabel = _ccw.isArray ? 'Standard array' : 'Rolled pool';
      h += '<p class="ccw-hint" style="font-size:10px;">'+poolLabel+': <b style="color:#c8a020;">'+_ccw.rolled.join(' · ')+'</b>. Pick a value for each stat (selecting a used value swaps them).</p>';
      h += '<div class="ccw-stat-grid">';
      CCW_ALL_STATS.forEach((n,si)=>{
        const idx = _ccw.assign[si];
        const v = _ccw.rolled[idx];
        const m = _rc_mod(v);
        h += '<div class="ccw-stat"><div class="ccw-stat-name">'+n+'</div>';
        h += '<select onchange="ccwAssignStat('+si+',this.value)" style="width:100%;background:#0f0f0f;border:1px solid #2a2a2a;color:#eee;font-family:Montserrat,sans-serif;font-size:15px;font-weight:900;text-align:center;padding:3px 0;outline:none;">';
        _ccw.rolled.forEach((rv,ri)=>{ h += '<option value="'+ri+'"'+(ri===idx?' selected':'')+'>'+rv+'</option>'; });
        h += '</select>';
        h += '<div class="ccw-stat-mod">'+(m>=0?'+':'')+m+'</div></div>';
      });
      h += '</div>';
    } else {
      h += '<div class="ccw-stat-grid">';
      CCW_ALL_STATS.forEach((n,si)=>{
        const v = _ccw.rolled[si];
        const m = _rc_mod(v);
        h += '<div class="ccw-stat"><div class="ccw-stat-name">'+n+'</div><div class="ccw-stat-val">'+v+'</div><div class="ccw-stat-mod">'+(m>=0?'+':'')+m+'</div></div>';
      });
      h += '</div>';
    }
    if(!_ccw.isArray) {
      const has14 = _ccw.rolled.some(v=>v>=14);
      if(!has14) h += '<p class="ccw-hint" style="color:#df6a6a;margin-top:8px;">No score is 14+ — you may reroll!</p>';
    }
  }
  return h;
}
const CCW_STANDARD_ARRAY = [15,14,13,12,10,8];
function ccwRollStats() {
  _ccw.rolled = [0,0,0,0,0,0].map(()=>_rc_3d6());
  _ccw.isArray = false;
  _ccw.statMode = _ccw.statMode==='assign' ? 'assign' : 'order';
  _ccw.assign = [0,1,2,3,4,5];
  ccwSyncStats();
  ccwRender();
}
function ccwStandardArray() {
  _ccw.rolled = CCW_STANDARD_ARRAY.slice();
  _ccw.isArray = true;
  _ccw.statMode = 'assign';   // an array is only meaningful when you place it
  _ccw.assign = [0,1,2,3,4,5];
  ccwSyncStats();
  ccwRender();
}
function ccwSetStatMode(m) { _ccw.statMode = m; ccwSyncStats(); ccwRender(); }
function ccwAssignStat(statIdx, poolIdxStr) {
  const poolIdx = parseInt(poolIdxStr);
  const other = _ccw.assign.indexOf(poolIdx);
  const cur = _ccw.assign[statIdx];
  if(other >= 0 && other !== statIdx) _ccw.assign[other] = cur;
  _ccw.assign[statIdx] = poolIdx;
  ccwSyncStats();
  ccwRender();
}
function ccwSyncStats() {
  if(!_ccw.rolled) { _ccw.stats = null; return; }
  _ccw.stats = {};
  const order = _ccw.statMode==='assign' ? _ccw.assign : [0,1,2,3,4,5];
  CCW_ALL_STATS.forEach((n,i)=>{ _ccw.stats[n] = _ccw.rolled[order[i]]; });
}
// Effective stats = base + talent boosts
function ccwEffStats() {
  const out = {..._ccw.stats};
  [_ccw.tres, _ccw.tres2].forEach(p=>{
    if(p && p.statBoost) Object.entries(p.statBoost).forEach(([k,v])=>{ if(out[k]!==undefined) out[k]+=v; });
  });
  return out;
}

// Alignment drives which bonus spell list a wizard gets (Druid = neutral,
// Mage = lawful, Sorcerer = chaotic). Changing it must re-derive the ticked

function ccwSetAlignment(a) {

    const def = defaultSpellSources(_ccw.cls, a);

// ── Step: Talent ──
// Talent tables: most classes roll 2 / 3-6 / 7-9 / 10-11 / 12, but some (the
// Witch) use different bands. A class can override via RC_CLASS_INFO.talentBands.
// Row text always comes from these fixed slots in the 12-entry talent array.
const CCW_DEFAULT_BANDS = [[2,2],[3,6],[7,9],[10,11],[12,12]];
const CCW_TALENT_TEXT_IDX = [0, 1, 6, 9, 11];
function ccwBuildTalentRows(cls) {
  const info = RC_CLASS_INFO[cls] || {};
  const t = info.talent || [];
  const bands = info.talentBands || CCW_DEFAULT_BANDS;
  return bands.map((b, i) => {
    const lo = b[0], hi = b[1];
    return {
      range: (lo === hi) ? String(lo) : (lo + '\u2013' + hi),
      lo: lo,
      hi: hi,
      text: t[CCW_TALENT_TEXT_IDX[i]] || '',   // '' guard: never let .slice() throw
    };
  });
}

function ccwTalentRows() {
  return ccwBuildTalentRows(_ccw.cls);
}

// Pick a talent directly instead of rolling (GM's discretion / point-buy tables)
function ccwPickTalent(idx) {

function ccwRollTalent() {
  const roll2d6 = () => Math.ceil(Math.random()*6)+Math.ceil(Math.random()*6);
  const pick = (roll) => {
    const r = ccwTalentRows().find(x=>roll>=x.lo && roll<=x.hi);
    return r ? r.text : '';
  };
  _ccw.talentPick = null;
  _ccw.talentRoll = roll2d6();
  _ccw.talent = pick(_ccw.talentRoll);
  _ccw.tres = ccwAnalyzeTalent(_ccw.talent, _ccw.cls);
  ccwResolve(_ccw.tres);
  if(_ccw.ancestry==='Human') {
    _ccw.talent2Pick = null;
    _ccw.talent2Roll = roll2d6();
    _ccw.talent2 = pick(_ccw.talent2Roll);
    _ccw.tres2 = ccwAnalyzeTalent(_ccw.talent2, _ccw.cls);
    ccwResolve(_ccw.tres2);
  } else { _ccw.talent2Roll = null; _ccw.talent2 = null; _ccw.tres2 = null; }
  ccwRender();
}

// ── Step: Spells ──
function ccwSpells() {
  const cls = _ccw.cls;
  const needed = cls==='Priest' ? 2 : 3;
  if(!_ccw.spellSrc) _ccw.spellSrc = defaultSpellSources(cls, _ccw.alignment);

  // Build the tier-1 pool from every ticked list. If a name appears on two
  // lists (e.g. Charm Person is both wizard and witch), the character's own
  // list wins so a selection is never ambiguous.
  const pool = [];
  const seen = new Set();
  const own = { Wizard:'Wizard', Priest:'Priest', Witch:'Witch' }[cls] || '';
  const order = [own, ...SPELL_SOURCES.filter(s=>s!==own)].filter(Boolean);
  order.forEach(srcName=>{
    if(!_ccw.spellSrc[srcName]) return;
    (RC_T1_BY_SOURCE[srcName]||[]).forEach(sp=>{
      if(seen.has(sp)) return;
      seen.add(sp);
      pool.push({ name: sp, src: srcName });
    });
  });

  let h = '<p class="ccw-hint">Choose '+needed+' tier 1 spells.'+(cls==='Priest'?' Turn Undead is free.':'')+' ('+_ccw.spells.length+'/'+needed+' selected)</p>';
  h += spellSourceBar(_ccw.spellSrc, cls, 'ccwToggleSpellSrc');
  if(!pool.length) return h + '<p class="ccw-hint">No spell lists selected.</p>';
  h += '<div class="ccw-choice-grid">';
  pool.forEach(item=>{
    const sp = item.name;
    const sel = _ccw.spells.includes(sp) ? ' selected' : '';
    const data = findSpell(sp, item.src) || RC_SPELL_DATA[sp] || {};
    const meta = [data.range?'Range: '+data.range:'', data.duration?'Dur: '+data.duration:'', data.damage?'Dmg: '+data.damage:''].filter(Boolean).join(' · ');
    const tag = (item.src !== own)
      ? '<span style="color:#8a7ac8;font-size:8px;font-weight:700;"> · '+item.src+'</span>' : '';
    h += '<button class="ccw-choice'+sel+'" onclick="ccwToggleSpell(\''+sp.replace(/'/g,"\\'")+'\',\''+item.src+'\')"><div class="ccw-choice-name" style="font-size:11px;">'+sp+tag+'</div>'+(meta?'<div class="ccw-choice-desc" style="color:#c8a020;font-size:8px;">'+meta+'</div>':'')+'<div class="ccw-choice-desc">'+(data.desc||'')+'</div></button>';
  });
  h += '</div>';
  return h;
}
function ccwToggleSpellSrc(name, on) {
  if(!_ccw.spellSrc) _ccw.spellSrc = defaultSpellSources(_ccw.cls, _ccw.alignment);
  _ccw.spellSrc[name] = !!on;
  // Drop any picked spell that no longer belongs to a ticked list
  _ccw.spells = _ccw.spells.filter(sp=>{
    const src = _ccw.spellSrcOf[sp];
    if(src && !_ccw.spellSrc[src]) { delete _ccw.spellSrcOf[sp]; return false; }
    return true;
  });
  ccwRender();
}
function ccwToggleSpell(sp, src) {
  const needed = _ccw.cls==='Priest' ? 2 : 3;
  const i = _ccw.spells.indexOf(sp);
  if(i >= 0) { _ccw.spells.splice(i,1); delete _ccw.spellSrcOf[sp]; }
  else if(_ccw.spells.length < needed) {

}

  // folds into the base AC rather than the removable bonus.
  const dexMod = _rc_mod(eff.DEX);
  const natAC  = (c.beastNatural==='ac') ? 1 : 0;
  const baseAC = 10 + dexMod + natAC;
  let armoredAC = 10 + dexMod;
  if(c.buyArmor.includes('Plate mail')) armoredAC = 15;
  else if(c.buyArmor.includes('Chainmail')) armoredAC = 13 + dexMod;
  else if(c.buyArmor.includes('Leather armor')) armoredAC = 11 + dexMod;
  if(c.buyArmor.includes('Shield')) armoredAC += 2;
  armoredAC += natAC;
  let _armorTalent = 0;
  [c.tres, c.tres2].forEach(p=>{
    const f = (p && p.final) || '';
    const m = f.match(/Choose one armor type, get \+1 AC from it — (.+)$/i);
    if(m && c.buyArmor.includes(m[1].trim())) _armorTalent += 1;
  });
  const acBonus = Math.max(0, armoredAC - baseAC) + _armorTalent;
  set('ac-val', baseAC + acBonus);
  set('ac-bonus', acBonus > 0 ? String(acBonus) : '');
  _acBonusOn = acBonus > 0;
  if(typeof _acToggleVisual === 'function') _acToggleVisual(_acBonusOn);

  // Languages line
  const extraLangs = [...c.langCommon, ...c.langRare, ...(c.langPriest?[c.langPriest]:[])];
  const langLine = RC_ANCESTRY.languages[c.ancestry] + (extraLangs.length ? ', ' + extraLangs.join(', ') : '');

  const ci = RC_CLASS_INFO[c.cls];
  const talentFinal  = (c.tres && c.tres.final) || c.talent;
  const talent2Final = (c.tres2 && c.tres2.final) || c.talent2;
  // Fighter's Grit names the chosen stat
  const features = (ci.features || []).map(f => {
    if(c.cls === 'Fighter' && c.grit && /^Grit[:.]/i.test(f))
      return 'Grit (' + c.grit + '): Advantage on ' + c.grit + ' checks to overcome an opposing force.';
    if(c.cls === 'Fighter' && c.mastery && /^Weapon Mastery[:.]/i.test(f))
      return 'Weapon Mastery (' + c.mastery + '): +1 to attack and damage, plus half your level (round down).';
    return f;
  });
  const lines = ['— Class Features —', ...features, '',
    '— Ancestry: '+c.ancestry+' —',
    ancestryLine(c), '',
    '— Languages —', langLine, '',
    '— Talent Roll —', talentFinal,
    ...(talent2Final?['','— Bonus Talent (Human) —',talent2Final]:[])];
  set('talents-text', lines.join('\n'));

  const allSpells = [...c.spells];
  if(c.cls==='Priest') allSpells.push('Turn Undead');
  // Wizard talent "Learn one additional wizard spell" — add the chosen spell
  [c.tres, c.tres2].forEach(p=>{
    if(p && (p.kind==='wizspell'||p.kind==='witchspell') && p.picked && !allSpells.includes(p.picked)) allSpells.push(p.picked);
    if(p && p.sub && (p.sub.kind==='wizspell'||p.sub.kind==='witchspell') && p.sub.picked && !allSpells.includes(p.sub.picked)) allSpells.push(p.sub.picked);
  });
  allSpells.forEach(sp=>{
    _spellCount++;
    const row = addSpellRow(_spellCount);
    if(!row) return;
    const picked = (c.spellSrcOf && c.spellSrcOf[sp]) || null;
    const data = (picked ? findSpell(sp, picked)
                : c.cls==='Witch' ? findSpell(sp,'Witch')
                : RC_DRUID_SPELLS_T1.includes(sp) ? findSpell(sp,'Druid')
                : RC_MAGE_SPELLS_T1.includes(sp) ? findSpell(sp,'Mage')
                : (RC_SORC_SPELLS_T1.includes(sp) && sheetAlignment()==='chaotic') ? findSpell(sp,'Sorcerer')
                : (RC_SPELL_DATA[sp] || findSpell(sp, c.cls))) || {};
    const q = (cl)=>row.querySelector(cl);
    const inp=q('.spell-input'); if(inp) inp.value=sp;
    const lvl=q('.spell-level'); if(lvl&&(data.level||data.tier)) lvl.value=data.level||data.tier;
    const rng=q('.spell-range'); if(rng&&data.range) rng.value=data.range;
    const dur=q('.spell-duration'); if(dur&&data.duration) dur.value=data.duration;
    const dmg=q('.spell-damage'); if(dmg&&data.damage) dmg.value=data.damage;
    const dsc=q('.spell-desc'); if(dsc&&data.desc){dsc.value=data.desc;autoResizeDesc(dsc);}
  });

  // Auto-toggle advantage: talent-chosen spells + Magic Missile (always adv)
  const advSpells = new Set(['Magic Missile']);
  [c.tres, c.tres2, c.tres && c.tres.sub, c.tres2 && c.tres2.sub].forEach(p=>{
    if(p && p.kind==='spellknown' && p.picked) advSpells.add(p.picked);
  });
  document.querySelectorAll('#spells-list .spell-row').forEach(row=>{
    const nm = row.querySelector('.spell-input')?.value.trim();
    if(nm && advSpells.has(nm)) {
      const ab = row.querySelector('.spell-adv-btn');
      if(ab) ab.classList.add('on');
    }
  });

  // Gold remaining after purchases
  const goldLeft = Math.max(0, Math.round((c.gold - ccwGearSpent())*100)/100);
  set('coin-gp', String(Math.floor(goldLeft)));
  const spRemainder = Math.round((goldLeft - Math.floor(goldLeft))*10);
  if(spRemainder > 0) set('coin-sp', String(spRemainder));

  // Gear list from purchases
  document.querySelectorAll('#gear-list .gear-name').forEach(el=>el.value='');
  document.querySelectorAll('#gear-list .gear-qty').forEach(el=>el.value='');
  const gearItems = [];
  if(c.buyKit) CCW_KIT_ITEMS.forEach(k=>{ if(k.name!=='Backpack') gearItems.push(k); });
  c.buyArmor.forEach(a=>gearItems.push({name:a, qty:'1'}));
  c.buyWeapons.forEach(w=>{
    const existing = gearItems.find(g=>g.name===w);
    if(existing) existing.qty = String(parseInt(existing.qty)+1);
    else gearItems.push({name:w, qty:'1'});
  });
  // Expand bulky items (2-slot weapons, chainmail, plate) into continuation rows
  const gearRows = [];
  gearItems.forEach(g=>{
    const qty = parseInt(g.qty) || 1;
    const cost = itemSlotCost(g.name);
    gearRows.push({name:g.name, qty:g.qty});
    // one item of N slots takes N-1 extra rows; multiples multiply that
    const extras = (cost - 1) * qty;
    for(let s = 0; s < extras; s++) gearRows.push({name:'↳ ' + g.name, qty:'1'});
  });
  const gn=document.querySelectorAll('#gear-list .gear-name');
  const gq=document.querySelectorAll('#gear-list .gear-qty');
  gearRows.forEach((g,i)=>{ if(gn[i])gn[i].value=g.name; if(gq[i])gq[i].value=g.qty!=='1'?g.qty:''; });
  const fc=document.getElementById('free-carry'); if(fc) fc.value=c.buyKit?'Backpack':'';

  // Gear slots: max(10, STR) available; disable the rest from slot 20 downward
  ccwSetGearSlots(eff.STR);


  // Talent/ancestry attack + spell bonuses (stat mod comes from the Stat dropdown, not here)
  const atkBonus = { melee:0, ranged:0, meleeDmg:0, rangedDmg:0 };
  const masterySet = new Set();   // Weapon Mastery: +1 atk/dmg with weapon
  const d12Set = new Set();       // Ranger: d12 damage with weapon
  let spellChkBonus = 0;
  let backstabExtraDice = 0;
  let armorTalentAC = 0;
  if(c.cls==='Fighter' && c.mastery) masterySet.add(c.mastery);  // Weapon Mastery (class feature)
  if(c.ancestry==='Half-Orc') { atkBonus.melee += 1; atkBonus.meleeDmg += 1; } // Mighty
  if(c.elfFarsight==='ranged') atkBonus.ranged += 1;      // Farsight
  if(c.elfFarsight==='spell')  spellChkBonus += 1;        // Farsight
  if(c.koboldKnack==='spell')  spellChkBonus += 1;        // Kobold: Knack
  [c.tres, c.tres2].forEach(p=>{
    const f = (p && p.final) || '';
    if(/\+1 to melee and ranged attacks/i.test(f) || /\+1 to melee\/ranged attacks/i.test(f)) { atkBonus.melee+=1; atkBonus.ranged+=1; }
    else if(/\+1 to melee attacks/i.test(f)) { atkBonus.melee+=1; if(/and damage/i.test(f)) atkBonus.meleeDmg+=1; }
    else if(/\+1 to ranged attacks/i.test(f)) { atkBonus.ranged+=1; if(/and damage/i.test(f)) atkBonus.rangedDmg+=1; }
    if(/\+1 to (priest |witch )?spellcasting checks/i.test(f) || /Magical Dabbler/i.test(f)) spellChkBonus += 1;
    if(/Backstab deals \+1 dice/i.test(f)) backstabExtraDice += 1;
    let m = f.match(/Weapon Mastery with one additional weapon type — (.+)$/i);
    if(m) masterySet.add(m[1].trim());
    m = f.match(/d12 damage with one weapon type you choose — (.+)$/i);
    if(m) d12Set.add(m[1].trim());
    m = f.match(/Choose one armor type, get \+1 AC from it — (.+)$/i);
    if(m && c.buyArmor.includes(m[1].trim())) armorTalentAC += 1;
  });
  // Global spell check bonus field
  set('spell-gbonus', spellChkBonus > 0 ? '+'+spellChkBonus : '');

  // Attack rows for purchased weapons
  const _fillAtkRow = (name, w, dmgOverride) => {
    addAttackRow();
    const tbody2 = document.getElementById('attacks-body');
    const row = tbody2.lastElementChild;
    if(!row) return;
    const inputs = row.querySelectorAll('td input');
    const selects = row.querySelectorAll('td select');
    const isFinesse = w.props.toLowerCase().includes('finesse');
    const useDex = (w.type==='R') || (isFinesse && _rc_mod(eff.DEX) > _rc_mod(eff.STR));
    const isRangedWeapon = w.type==='R';
    let bonus = isRangedWeapon ? atkBonus.ranged : atkBonus.melee;
    let dmgBonus = isRangedWeapon ? atkBonus.rangedDmg : atkBonus.meleeDmg;
    if(masterySet.has(w.name)) { const mb = masteryBonus(1); bonus += mb; dmgBonus += mb; }
    let dmg = dmgOverride || w.damage;
    if(d12Set.has(w.name)) dmg = dmg.replace(/d\d+/g, 'd12');
    if(dmgBonus > 0) dmg = dmg.split('/').map(d=>d+'+'+dmgBonus).join('/');
    if(inputs[0]) inputs[0].value = name;
    if(inputs[1]) inputs[1].value = bonus > 0 ? '+'+bonus : '';
    if(inputs[2]) inputs[2].value = dmg;
    if(selects[0]) selects[0].value = useDex ? 'dex' : 'str';
    if(selects[1]) { const parts=w.range.split('/'); selects[1].value = parts[parts.length-1].trim(); }
  };
  // Unarmed attack row: Beastfolk's Natural Selection upgrades the die to 1d6.
  const _unarmed = SD_WEAPONS.find(x=>x.name==='Unarmed');
  const hasUnarmed = (c.beastNatural==='attack' || masterySet.has('Unarmed'));
  const unarmedDie = c.beastNatural==='attack' ? '1d6' : (_unarmed ? _unarmed.damage : '1d4');
  if(hasUnarmed) _fillAtkRow('Unarmed', _unarmed, unarmedDie);
  const uniqueWeapons = [...new Set(c.buyWeapons)];
  uniqueWeapons.forEach(wname=>{
    const w = SD_WEAPONS.find(x=>x.name===wname);
    if(w) _fillAtkRow(w.name, w);
  });
  // Thief: Backstab attack for every chosen weapon (extra weapon die vs unaware
  // targets, +talent dice) — including natural/mastered unarmed strikes.
  if(c.cls==='Thief') {
    const bsDice = 1 + 1 + Math.floor(1/2) + backstabExtraDice;   // weapon die + extra die + half level
    const bsList = [...(hasUnarmed ? ['Unarmed'] : []), ...uniqueWeapons];
    bsList.forEach(wname=>{
      const bw = SD_WEAPONS.find(x=>x.name===wname);
      if(!bw) return;
      const baseDmg = (wname==='Unarmed') ? unarmedDie : bw.damage;
      let bsDmg = d12Set.has(bw.name) ? baseDmg.replace(/d\d+/g,'d12') : baseDmg;
      bsDmg = bsDmg.replace(/1d/g, bsDice+'d');
      _fillAtkRow('Backstab ('+bw.name+')', bw, bsDmg);
    });
  }

  _charMastery = [...masterySet];

  saveSheet(false);
  addLog('Character Created','⚒',c.name+' the '+c.ancestry+' '+c.cls,'normal');
  ccwClose();
  if(typeof updateHeaderButton==='function') updateHeaderButton();
}

</script>

<!-- ═══ LEVEL UP WIZARD ═══ -->
<div id="lvl-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;padding:16px;">
  <div style="background:#1a1a1a;border:2px solid #6ac8df;max-width:560px;width:100%;max-height:88vh;display:flex;flex-direction:column;">
    <div style="background:#0a0a0a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:'UnifrakturMaguntia',cursive;font-size:20px;color:#6ac8df;line-height:1;">Level Up</div>
        <div id="lvl-step" style="font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:#888;margin-top:3px;"></div>
      </div>
      <button onclick="lvlClose()" style="background:transparent;border:none;color:#888;font-size:20px;cursor:pointer;padding:0 4px;">✕</button>
    </div>
    <div id="lvl-body" style="padding:14px 16px;overflow-y:auto;flex:1;"></div>
    <div style="padding:10px 16px;background:#141414;border-top:1px solid #2a2a2a;display:flex;justify-content:space-between;">
      <button id="lvl-back" onclick="lvlBack()" style="padding:7px 16px;background:transparent;color:#888;border:1px solid #2a2a2a;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;">← Back</button>
      <button id="lvl-next" onclick="lvlNext()" style="padding:7px 16px;background:#6ac8df;color:#1a1a1a;border:none;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:900;font-size:10px;letter-spacing:.1em;text-transform:uppercase;">Next →</button>
    </div>
  </div>
</div>

<script>
// ═══ LEVEL UP WIZARD ═══════════════════════════════════════════════════════


const CCW_PRIEST_SPELLS_KNOWN = {1:[2,0,0,0,0],2:[3,0,0,0,0],3:[3,1,0,0,0],4:[3,2,0,0,0],5:[3,2,1,0,0],6:[3,2,2,0,0],7:[3,3,2,1,0],8:[3,3,2,2,0],9:[3,3,2,2,1],10:[3,3,3,2,2]};
const CCW_WIZARD_SPELLS_KNOWN = {1:[3,0,0,0,0],2:[4,0,0,0,0],3:[4,1,0,0,0],4:[4,2,0,0,0],5:[4,2,1,0,0],6:[4,3,2,0,0],7:[4,3,2,1,0],8:[4,4,2,2,0],9:[4,4,3,2,1],10:[4,4,4,2,2]};
const CCW_WITCH_SPELLS_KNOWN  = {1:[3,0,0,0,0],2:[4,0,0,0,0],3:[4,1,0,0,0],4:[4,2,0,0,0],5:[4,2,1,0,0],6:[4,3,2,0,0],7:[4,3,2,1,0],8:[4,4,2,2,0],9:[4,4,3,2,1],10:[4,4,4,2,2]};

let _lvl = null;

function startLevelUp() {
  const curLevel = parseInt(document.getElementById('f-level')?.value) || parseInt(document.getElementById('xp-level')?.value) || 1;
  if(curLevel >= 10) { alert('Already at maximum level (10).'); return; }
  const cls = document.getElementById('f-class')?.value.trim() || '';
  const clsKey = Object.keys(RC_CLASS_INFO).find(k=>k.toLowerCase()===cls.toLowerCase());
  if(!clsKey) { alert('Set a valid class on the sheet first (Fighter, Priest, Thief, Wizard, Bard, Ranger, Witch, or Barbarian).'); return; }
  const newLevel = curLevel + 1;
  _lvl = {
    step: 0,
    cls: clsKey,
    oldLevel: curLevel,
    newLevel: newLevel,
    hpRoll: null,
    gainsTalent: newLevel % 2 === 1, // talents at odd levels (3,5,7,9)
    talent: null, talentRoll: null, tres: null,
    newSpells: [], spellSrc: null, spellSrcOf: {}, spellsNeeded: 0, spellTiers: [],
  };
  // Spell gains for casters
  const table = clsKey==='Priest' ? CCW_PRIEST_SPELLS_KNOWN : clsKey==='Wizard' ? CCW_WIZARD_SPELLS_KNOWN : clsKey==='Witch' ? CCW_WITCH_SPELLS_KNOWN : null;
  if(table) {
    const oldRow = table[_lvl.oldLevel] || [0,0,0,0,0];
    const newRow = table[_lvl.newLevel] || oldRow;
    for(let t=0;t<5;t++){
      const gain = (newRow[t]||0)-(oldRow[t]||0);
      for(let g=0;g<gain;g++) _lvl.spellTiers.push(t+1);
    }
    _lvl.spellsNeeded = _lvl.spellTiers.length;
  }
  document.getElementById('lvl-overlay').style.display = 'flex';
  lvlRender();
}

function lvlClose() { document.getElementById('lvl-overlay').style.display = 'none'; _lvl = null; }

function lvlSteps() {
  const steps = ['Hit Points'];
  if(_lvl.spellsNeeded > 0) steps.push('New Spells');
  if(_lvl.gainsTalent) steps.push('Talent');
  steps.push('Finish');
  return steps;
}

function lvlRender() {
  const steps = lvlSteps();
  document.getElementById('lvl-step').textContent = 'Level ' + _lvl.oldLevel + ' → ' + _lvl.newLevel + ' · Step ' + (_lvl.step+1) + ' of ' + steps.length + ' — ' + steps[_lvl.step];
  const body = document.getElementById('lvl-body');
  const name = steps[_lvl.step];
  if(name==='Hit Points') body.innerHTML = lvlHP();
  else if(name==='Talent') body.innerHTML = lvlTalent();
  else if(name==='New Spells') body.innerHTML = lvlSpells();
  else body.innerHTML = lvlFinish();
  document.getElementById('lvl-back').style.visibility = _lvl.step > 0 ? 'visible' : 'hidden';
  document.getElementById('lvl-next').textContent = name==='Finish' ? '⬆ Apply Level Up' : 'Next →';
}

function lvlBack() { if(_lvl.step > 0) { _lvl.step--; lvlRender(); } }

function lvlNext() {
  const steps = lvlSteps();
  const name = steps[_lvl.step];
  if(name==='Hit Points' && _lvl.hpRoll===null) { alert('Roll, max, or enter your hit points first.'); return; }
  if(name==='Talent') {
    if(!_lvl.talent) { alert('Roll or choose your talent first.'); return; }
    if(_lvl.tres) ccwResolve(_lvl.tres);
    if(_lvl.tres && _lvl.tres.kind!=='none' && !_lvl.tres.final) { alert('Resolve your talent choice first.'); return; }
  }
  if(name==='New Spells' && _lvl.newSpells.length < _lvl.spellsNeeded) { alert('Choose '+_lvl.spellsNeeded+' new spell'+(_lvl.spellsNeeded>1?'s':'')+'.'); return; }
  if(name==='Finish') { lvlApply(); return; }
  _lvl.step++;
  lvlRender();
}

function lvlHP() {
  const hd = RC_CLASS_INFO[_lvl.cls].hd;
  const conMod = _rc_mod(parseInt(document.getElementById('con-val')?.value)||10);
  let h = '<p class="ccw-hint">Roll your class hit die (1'+hd.slice(1)+') '+(conMod!==0?((conMod>0?'+':'')+conMod+' CON '):'')+'and add the result to your maximum HP (minimum 1).</p>';
  h += '<div style="display:flex;gap:6px;align-items:stretch;margin-bottom:10px;">';
  h += '<button class="ccw-roll-btn" style="flex:1;margin:0;" onclick="lvlRollHP()">🎲 Roll 1'+hd.slice(1)+'</button>';
  h += '<button style="flex:0 0 auto;margin:0;padding:0 12px;background:#1a3a4a;border:1px solid #2d6a7a;color:#8ad4e0;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;" onclick="lvlMaxHP()" title="Take the maximum die result">⬆ Max</button>';
  h += '<div style="display:flex;align-items:center;gap:5px;background:#141414;border:1px solid #2a2a2a;padding:0 8px;">';
  h += '<span style="font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;">+HP</span>';
  h += '<input type="number" id="lvl-hp-input" min="1" value="'+(_lvl.hpRoll!==null?_lvl.hpRoll:'')+'" placeholder="—" oninput="_lvl.hpRoll=Math.max(1,parseInt(this.value)||0)" style="width:46px;background:transparent;border:none;color:#eee;font-family:Montserrat,sans-serif;font-size:16px;font-weight:900;text-align:center;outline:none;">';
  h += '</div></div>';
  if(_lvl.hpRoll!==null) h += '<div class="ccw-result">+'+_lvl.hpRoll+' max HP</div>';
  return h;
}
// Take the maximum hit die result instead of rolling
function lvlMaxHP() {
  const hdNum = parseInt(RC_CLASS_INFO[_lvl.cls].hd.split('d')[1]);
  const conMod = _rc_mod(parseInt(document.getElementById('con-val')?.value)||10);
  _lvl.hpRoll = Math.max(1, hdNum + conMod);
  lvlRender();
}
function lvlRollHP() {
  const hdNum = parseInt(RC_CLASS_INFO[_lvl.cls].hd.split('d')[1]);
  const conMod = _rc_mod(parseInt(document.getElementById('con-val')?.value)||10);
  _lvl.hpRoll = Math.max(1, Math.ceil(Math.random()*hdNum) + conMod);
  lvlRender();
}


function lvlTalentRows() {
  return ccwBuildTalentRows(_lvl.cls);
}
function lvlTalent() {
  if(_lvl.tres) ccwResolve(_lvl.tres);
  let h = '<p class="ccw-hint">Level '+_lvl.newLevel+' grants a talent. Roll 2d6 on the <b>'+_lvl.cls+'</b> talent table.</p>';
  h += '<table style="width:100%;border-collapse:collapse;margin-bottom:10px;">';
  h += '<tr><th style="font-family:Montserrat,sans-serif;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#c8a020;text-align:left;padding:4px 8px;border-bottom:1px solid #2a2a2a;width:50px;">2d6</th><th style="font-family:Montserrat,sans-serif;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#c8a020;text-align:left;padding:4px 8px;border-bottom:1px solid #2a2a2a;">Effect</th></tr>';
  lvlTalentRows().forEach(r=>{
    const hit = _lvl.talentRoll && _lvl.talentRoll >= r.lo && _lvl.talentRoll <= r.hi;
    const bg = hit ? 'background:#241f10;border-left:3px solid #c8a020;' : '';
    h += '<tr style="'+bg+'"><td style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:900;color:#eee;padding:5px 8px;border-bottom:1px solid #1e1e1e;vertical-align:top;">'+r.range+(hit?' 🎲':'')+'</td><td style="font-family:Montserrat,sans-serif;font-size:10px;color:#ccc;padding:5px 8px;border-bottom:1px solid #1e1e1e;line-height:1.4;">'+r.text+'</td></tr>';
  });
  h += '</table>';
  h += '<div style="display:flex;gap:6px;margin-bottom:10px;">';
  h += '<button class="ccw-roll-btn" style="flex:1;margin:0;" onclick="lvlRollTalent()">🎲 Roll Talent</button>';
  h += '<select onchange="lvlPickTalent(this.value)" style="flex:1;padding:8px 10px;background:#141414;border:1px solid #2a2a2a;color:#eee;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;outline:none;cursor:pointer;">';
  h += '<option value="">— Choose a Talent —</option>';
  lvlTalentRows().forEach((r,i)=>{
    const sel = (_lvl.talentPick === String(i)) ? ' selected' : '';
    h += '<option value="'+i+'"'+sel+'>'+r.range+': '+r.text.slice(0,60)+(r.text.length>60?'…':'')+'</option>';
  });
  h += '</select></div>';
  if(_lvl.talent) {
    h += '<div class="ccw-result">'+(_lvl.talentRoll ? '🎲 Rolled '+_lvl.talentRoll : '✔ Chosen')+': '+_lvl.talent+'</div>';
    const known = [...document.querySelectorAll('#spells-list .spell-row .spell-input')].map(el=>el.value.trim()).filter(Boolean);
    const allKnown = [...new Set([...known, ..._lvl.newSpells])].filter(sp=>sp!=='Magic Missile');
    h += ccwTalentChoiceUI(_lvl.tres, '_lvl.tres', allKnown, _lvl.cls);
  }
  return h;
}
// Pick a level-up talent directly instead of rolling
function lvlPickTalent(idx) {
  if(idx === '') return;
  const r = lvlTalentRows()[parseInt(idx)];
  if(!r) return;
  _lvl.talentPick = String(idx);
  _lvl.talentRoll = null;
  _lvl.talent = r.text;
  _lvl.tres = ccwAnalyzeTalent(_lvl.talent, _lvl.cls);
  ccwResolve(_lvl.tres);
  lvlRender();
}

function lvlRollTalent() {
  const roll = Math.ceil(Math.random()*6)+Math.ceil(Math.random()*6);
  const r = lvlTalentRows().find(x=>roll>=x.lo && roll<=x.hi);
  _lvl.talentRoll = roll;
  _lvl.talent = r ? r.text : '';
  _lvl.tres = ccwAnalyzeTalent(_lvl.talent, _lvl.cls);
  ccwResolve(_lvl.tres);
  lvlRender();
}

function lvlSpells() {
  const cls = _lvl.cls;
  if(!_lvl.spellSrc) _lvl.spellSrc = defaultSpellSources(cls, sheetAlignment());
  const own = { Wizard:'Wizard', Priest:'Priest', Witch:'Witch' }[cls] || '';
  // Already-known spells (from the sheet)
  const known = [...document.querySelectorAll('#spells-list .spell-row .spell-input')].map(el=>el.value.trim()).filter(Boolean);
  const tierCounts = {};
  _lvl.spellTiers.forEach(t=>{ tierCounts[t]=(tierCounts[t]||0)+1; });
  let h = '<p class="ccw-hint">You gain '+_lvl.spellsNeeded+' new spell'+(_lvl.spellsNeeded>1?'s':'')+': '+Object.entries(tierCounts).map(([t,c])=>c+' × Tier '+t).join(', ')+'. ('+_lvl.newSpells.length+'/'+_lvl.spellsNeeded+' selected)</p>';
  h += spellSourceBar(_lvl.spellSrc, cls, 'lvlToggleSpellSrc');
  Object.keys(tierCounts).forEach(tier=>{
    h += '<p class="ccw-hint" style="margin-top:8px;color:#c8a020;font-weight:700;">Tier '+tier+'</p>';
    h += '<div class="ccw-choice-grid">';
    // Own list first, so a duplicate name resolves to the character's own version
    const seen = new Set();
    const rows = SD_SPELLS
      .filter(s=>s.tier===String(tier) && spellInSources(s, _lvl.spellSrc) && !known.includes(s.name))
      .sort((a,b)=>{
        const ao = (a.caster===own || a.caster==='Both') ? 0 : 1;
        const bo = (b.caster===own || b.caster==='Both') ? 0 : 1;
        return ao - bo;
      })
      .filter(s=>{ if(seen.has(s.name)) return false; seen.add(s.name); return true; });
    if(!rows.length) h += '<p class="ccw-hint" style="color:#666;">Nothing available at this tier from the selected lists.</p>';
    rows.forEach(s=>{
      const sel = _lvl.newSpells.includes(s.name) ? ' selected' : '';
      const meta = [s.range?'Range: '+s.range:'', s.duration?'Dur: '+s.duration:'', s.damage?'Dmg: '+s.damage:''].filter(Boolean).join(' · ');
      const foreign = (s.caster!==own && s.caster!=='Both');
      const tag = foreign ? '<span style="color:#8a7ac8;font-size:8px;font-weight:700;"> · '+s.caster+'</span>' : '';
      h += '<button class="ccw-choice'+sel+'" onclick="lvlToggleSpell(\''+s.name.replace(/'/g,"\\'")+'\',\''+tier+'\',\''+s.caster+'\')"><div class="ccw-choice-name" style="font-size:11px;">'+s.name+tag+'</div>'+(meta?'<div class="ccw-choice-desc" style="color:#6ac8df;font-size:8px;">'+meta+'</div>':'')+'<div class="ccw-choice-desc">'+(s.desc||'')+'</div></button>';
    });
    h += '</div>';
  });
  return h;
}
function lvlToggleSpellSrc(name, on) {
  if(!_lvl.spellSrc) _lvl.spellSrc = defaultSpellSources(_lvl.cls, sheetAlignment());
  _lvl.spellSrc[name] = !!on;
  _lvl.newSpells = _lvl.newSpells.filter(sp=>{
    const src = _lvl.spellSrcOf[sp];
    if(src && !spellInSources({caster:src}, _lvl.spellSrc)) { delete _lvl.spellSrcOf[sp]; return false; }
    return true;
  });
  lvlRender();
}
function lvlToggleSpell(name, tier, caster) {
  const i = _lvl.newSpells.indexOf(name);
  if(i >= 0) { _lvl.newSpells.splice(i,1); delete _lvl.spellSrcOf[name]; lvlRender(); return; }
  // Count how many of this tier already selected (resolve each pick against
  // the list it actually came from — names can repeat across spell lists)
  const tierNeeded = _lvl.spellTiers.filter(t=>String(t)===String(tier)).length;
  const tierSelected = _lvl.newSpells.filter(n=>{
    const sp = findSpell(n, _lvl.spellSrcOf[n] || null);
    return sp && sp.tier===String(tier);
  }).length;
  if(tierSelected >= tierNeeded) return;
  if(_lvl.newSpells.length >= _lvl.spellsNeeded) return;
  _lvl.newSpells.push(name);
  if(caster) _lvl.spellSrcOf[name] = caster;
  lvlRender();
}

function lvlFinish() {
  const align = document.getElementById('f-alignment')?.value.trim() || 'Neutral';
  const alignKey = ['Lawful','Chaotic','Neutral'].find(a=>a.toLowerCase()===align.toLowerCase()) || 'Neutral';
  const titleIdx = Math.min(4, Math.floor((_lvl.newLevel-1)/2));
  const newTitle = (RC_TITLES[_lvl.cls]?.[alignKey]||[])[titleIdx] || '';
  const oldTitle = document.getElementById('f-title')?.value.trim() || '';
  _lvl.newTitle = newTitle;
  let h = '<div class="ccw-summary"><div class="ccw-summary-title">Level '+_lvl.newLevel+' Summary</div>';
  h += '<div>+'+_lvl.hpRoll+' max HP</div>';
  if(_lvl.talent) h += '<div>New Talent: '+((_lvl.tres&&_lvl.tres.final)||_lvl.talent)+'</div>';
  if(_lvl.newSpells.length) h += '<div>New Spells: '+_lvl.newSpells.join(', ')+'</div>';
  if(newTitle && newTitle!==oldTitle) h += '<div>New Title: '+newTitle+'</div>';
  h += '<div style="margin-top:6px;color:#888;font-size:10px;">XP resets to 0 on level up.</div>';
  h += '</div>';
  return h;
}

function lvlApply() {
  const set = (id,v) => { const el=document.getElementById(id); if(el) el.value=v; };
  // Level
  set('f-level', _lvl.newLevel);
  set('xp-level', _lvl.newLevel);
  // XP reset
  set('xp-current', '0');
  // HP
  const hpMaxEl = document.getElementById('hp-max');
  const newMax = (parseInt(hpMaxEl?.value)||0) + _lvl.hpRoll;
  set('hp-max', newMax);
  set('hp-current', newMax);
  // Title
  if(_lvl.newTitle) set('f-title', _lvl.newTitle);
  // Talent appended to talents text (resolved final if choices were made)
  const talentText = (_lvl.tres && _lvl.tres.final) || _lvl.talent;
  if(talentText) {
    const ta = document.getElementById('talents-text');
    if(ta) ta.value = (ta.value ? ta.value + '\n' : '') + '— Level ' + _lvl.newLevel + ' Talent —\n' + talentText;
  }
  // Apply stat boosts from talent choices to the sheet
  if(_lvl.tres && _lvl.tres.statBoost) {
    const map = {STR:'str-val',DEX:'dex-val',CON:'con-val',INT:'int-val',WIS:'wis-val',CHA:'cha-val'};
    Object.entries(_lvl.tres.statBoost).forEach(([k,v])=>{
      const el = document.getElementById(map[k]);
      if(el) { el.value = String((parseInt(el.value)||10) + v); el.dispatchEvent(new Event('input')); }
    });
  }
  // Wizard talent picked spell: add to newSpells so a row is created
  [(_lvl.tres), (_lvl.tres && _lvl.tres.sub)].forEach(p=>{
    if(p && p.kind==='wizspell' && p.picked && !_lvl.newSpells.includes(p.picked)) _lvl.newSpells.push(p.picked);
  });
  // New spells added as rows
  _lvl.newSpells.forEach(name=>{
    const s = findSpell(name, _lvl.spellSrcOf[name] || _lvl.cls);
    _spellCount++;
    const row = addSpellRow(_spellCount);
    if(!row || !s) return;
    const q = (cl)=>row.querySelector(cl);
    const inp=q('.spell-input'); if(inp) inp.value=s.name;
    const lvl=q('.spell-level'); if(lvl) lvl.value=s.tier;
    const rng=q('.spell-range'); if(rng) rng.value=s.range;
    const dur=q('.spell-duration'); if(dur) dur.value=s.duration;
    const dmg=q('.spell-damage'); if(dmg) dmg.value=s.damage||'';
    const dsc=q('.spell-desc'); if(dsc){dsc.value=s.desc;autoResizeDesc(dsc);}
  });
  // Apply talent attack / spell / AC bonuses to the existing sheet
  (function(){
    const f = (_lvl.tres && _lvl.tres.final) || '';
    if(!f) return;
    const bumpVal = (el, n) => {
      if(!el) return;
      const cur = parseInt((el.value||'').replace(/^\+/,'')) || 0;
      const v = cur + n;
      el.value = v > 0 ? '+'+v : (v < 0 ? String(v) : '');
    };
    const bumpDmg = (d, n) => d.split('/').map(part=>{
      const m = part.match(/^(.*?)([+-]\d+)?$/);
      const mod = (parseInt(m[2]||'0')) + n;
      return m[1] + (mod > 0 ? '+'+mod : (mod < 0 ? String(mod) : ''));
    }).join('/');
    const rowWeaponType = (row) => {
      let nm = row.querySelectorAll('td input')[0]?.value.trim() || '';
      const bs = nm.match(/^Backstab \((.+)\)$/i);
      if(bs) nm = bs[1];
      const w = (typeof SD_WEAPONS!=='undefined') ? SD_WEAPONS.find(x=>x.name.toLowerCase()===nm.toLowerCase()) : null;
      if(w) return w.type==='R' ? 'ranged' : 'melee';
      const rng = row.querySelectorAll('td select')[1]?.value || '';
      return rng==='Close' ? 'melee' : (rng ? 'ranged' : 'melee');
    };
    const rows = [...document.querySelectorAll('#attacks-body tr')];

    // Melee / ranged attack bonuses
    let mB=0, rB=0, mD=0, rD=0;
    if(/\+1 to melee and ranged attacks/i.test(f) || /\+1 to melee\/ranged attacks/i.test(f)) { mB=1; rB=1; }
    else if(/\+1 to melee attacks/i.test(f)) { mB=1; if(/and damage/i.test(f)) mD=1; }
    else if(/\+1 to ranged attacks/i.test(f)) { rB=1; if(/and damage/i.test(f)) rD=1; }
    if(mB||rB) rows.forEach(row=>{
      const t = rowWeaponType(row);
      const inputs = row.querySelectorAll('td input');
      const b = t==='melee' ? mB : rB;
      const d = t==='melee' ? mD : rD;
      if(b) bumpVal(inputs[1], b);
      if(d && inputs[2] && inputs[2].value.trim()) inputs[2].value = bumpDmg(inputs[2].value.trim(), d);
    });

    // Spellcasting check bonus
    if(/\+1 to (priest |witch )?spellcasting checks/i.test(f) || /Magical Dabbler/i.test(f)) {
      bumpVal(document.getElementById('spell-gbonus'), 1);
    }

    // Weapon Mastery (talent) — newly mastered weapon gains its full value now:
    // +1 atk/dmg plus half the character's level (round down).
    let m = f.match(/Weapon Mastery with one additional weapon type — (.+)$/i);
    if(m) {
      const wname = m[1].trim();
      const wn = wname.toLowerCase();
      const gain = masteryBonus(_lvl.newLevel);
      if(!_charMastery.some(x=>x.toLowerCase()===wn)) _charMastery.push(wname);
      rows.forEach(row=>{
        const inputs = row.querySelectorAll('td input');
        let nm = (inputs[0]?.value||'').trim();
        const bs = nm.match(/^Backstab \((.+)\)$/i);
        if(bs) nm = bs[1];
        if(nm.toLowerCase()===wn) {
          bumpVal(inputs[1], gain);
          if(inputs[2] && inputs[2].value.trim()) inputs[2].value = bumpDmg(inputs[2].value.trim(), gain);
        }
      });
    }

    // Ranger d12 — chosen weapon: damage dice become d12
    m = f.match(/d12 damage with one weapon type you choose — (.+)$/i);
    if(m) {
      const wn = m[1].trim().toLowerCase();
      rows.forEach(row=>{
        const inputs = row.querySelectorAll('td input');
        let nm = (inputs[0]?.value||'').trim();
        const bs = nm.match(/^Backstab \((.+)\)$/i);
        if(bs) nm = bs[1];
        if(nm.toLowerCase()===wn && inputs[2] && inputs[2].value.trim()) {
          inputs[2].value = inputs[2].value.replace(/d\d+/g, 'd12');
        }
      });
    }

    // Thief: Backstab +1 dice
    if(/Backstab deals \+1 dice/i.test(f)) {
      rows.forEach(row=>{
        const inputs = row.querySelectorAll('td input');
        if(/^Backstab/i.test(inputs[0]?.value||'') && inputs[2] && inputs[2].value.trim()) {
          inputs[2].value = inputs[2].value.replace(/(\d+)d/g, (_,n)=>(parseInt(n)+1)+'d');
        }
      });
    }

    // Armor talent: +1 AC — into the AC bonus box
    m = f.match(/Choose one armor type, get \+1 AC from it — (.+)$/i);
    if(m) {
      bumpVal(document.getElementById('ac-bonus'), 1);
      if(_acBonusOn) {
        const acEl = document.getElementById('ac-val');
        if(acEl) acEl.value = String((parseInt(acEl.value)||0) + 1);
      }
    }
  })();

  // Auto-toggle advantage: talent-chosen spell + Magic Missile
  const lvlAdvSpells = new Set(['Magic Missile']);
  [(_lvl.tres), (_lvl.tres && _lvl.tres.sub)].forEach(p=>{
    if(p && p.kind==='spellknown' && p.picked) lvlAdvSpells.add(p.picked);
  });
  document.querySelectorAll('#spells-list .spell-row').forEach(row=>{
    const nm = row.querySelector('.spell-input')?.value.trim();
    if(nm && lvlAdvSpells.has(nm)) {
      const ab = row.querySelector('.spell-adv-btn');
      if(ab) ab.classList.add('on');
    }
  });


  // ── Half-level scaling (Shadowdark) ──
  // Weapon Mastery: "add half your level to these rolls (round down)".
  // Backstab: "add additional weapon dice equal to half your level (round down)".
  // floor(level/2) ticks up by 1 exactly on even levels, so scale then.
  if(_lvl.newLevel % 2 === 0) {
    const rows2 = [...document.querySelectorAll('#attacks-body tr')];
    const bump = (el, n) => {
      if(!el) return;
      const cur = parseInt(el.value) || 0;
      const v = cur + n;
      el.value = v > 0 ? '+'+v : (v < 0 ? String(v) : '');
    };
    const bumpDmg2 = (d, n) => d.split('/').map(part=>{
      const m = part.match(/^(.*?)([+-]\d+)?$/);
      const mod = (parseInt(m[2]||'0')) + n;
      return m[1] + (mod > 0 ? '+'+mod : (mod < 0 ? String(mod) : ''));
    }).join('/');
    // Add one damage die: "2d6+1" → "3d6+1"
    const addDie = (d) => d.split('/').map(part =>
      part.replace(/(\d*)d(\d+)/, (mm, n0, faces) => ((parseInt(n0)||1) + 1) + 'd' + faces)
    ).join('/');

    rows2.forEach(row=>{
      const inputs = row.querySelectorAll('td input');
      let nm = (inputs[0]?.value || '').trim();
      if(!nm) return;
      const bs = nm.match(/^Backstab \((.+)\)$/i);
      const weaponName = bs ? bs[1] : nm;

      // Weapon Mastery: +1 attack and +1 damage on mastered weapon types
      if(_charMastery.some(x => x.toLowerCase() === weaponName.toLowerCase())) {
        bump(inputs[1], 1);
        if(inputs[2] && inputs[2].value.trim()) inputs[2].value = bumpDmg2(inputs[2].value.trim(), 1);
      }
      // Backstab: one more weapon die of damage
      if(bs && _lvl.cls === 'Thief' && inputs[2] && inputs[2].value.trim()) {
        inputs[2].value = addDie(inputs[2].value.trim());
      }
    });
  }

  saveSheet(false);
  addLog('Level Up','⬆','Now level '+_lvl.newLevel+' (+'+_lvl.hpRoll+' HP'+(_lvl.talent?', new talent':'')+(_lvl.newSpells.length?', '+_lvl.newSpells.length+' new spell'+(_lvl.newSpells.length>1?'s':''):'')+')','normal');
  lvlClose();
  updateHeaderButton();
}

// ── Swap Create/Level Up button based on sheet state ──────────────────────
function updateHeaderButton() {
  const btn = document.getElementById('hdr-create-btn');
  if(!btn) return;
  const hasChar = (document.getElementById('f-name')?.value.trim()) && (document.getElementById('f-class')?.value.trim());
  if(hasChar) {
    btn.textContent = '⬆ Level Up';
    btn.onclick = startLevelUp;
  } else {
    btn.textContent = '⚒ Create';
    btn.onclick = startCharWizard;
  }
}

// Init: swap button based on existing character + watch for changes
updateHeaderButton();
document.getElementById('f-name')?.addEventListener('input', updateHeaderButton);
document.getElementById('f-class')?.addEventListener('input', updateHeaderButton);
</script>

let _shopTab = 'basic';
let _shopClassOnly = true;   // hide gear the character's class can't use

// The class typed on the sheet, matched loosely against RC_CLASS_INFO
// ("fighter", "Fighter (Champion)", etc). Returns null for homebrew classes.
function shopSheetClass() {
  const raw = (document.getElementById('f-class')?.value || '').trim().toLowerCase();
  if(!raw) return null;
  return Object.keys(RC_CLASS_INFO).find(c => raw.includes(c.toLowerCase())) || null;
}

// Names the class may wield/wear. Null means "no restriction known".
function shopAllowedNames(tab) {
  const cls = shopSheetClass();
  if(!cls) return null;
  if(tab === 'weapons') return ccwClassWeapons(cls);
  if(tab === 'armor')   return ccwClassArmor(cls);
  return null;
}

function shopItemAllowed(tab, it) {
  const allowed = shopAllowedNames(tab);
  if(!allowed) return true;
  return allowed.includes(it.name);
}

function shopToggleClassOnly(on) { _shopClassOnly = !!on; shopRender(); }

function shopFmtCost(it) {
  if(it.gp) return it.gp+' gp';
  if(it.sp) return it.sp+' sp';
  if(it.cp) return it.cp+' cp';
  return '—';
}
function shopCostCp(it) { return (it.gp||0)*100 + (it.sp||0)*10 + (it.cp||0); }

function openShop() {
  _shopTab = 'basic';   // always open on Basic Gear
  document.getElementById('shop-overlay').style.display = 'flex';
  shopRender();
}
function closeShop() { document.getElementById('shop-overlay').style.display = 'none'; }
function shopSetTab(t) { _shopTab = t; shopRender(); }

let _shopMagicSub = 'Potions, Scrolls & Wands';

// Tap-to-expand full descriptions (shop + spellbook)
function toggleFullDesc(el) {
  const short = el.querySelector('.desc-short');
  const full = el.querySelector('.desc-full');
  if(!full) return;
  const open = full.style.display !== 'none';
  full.style.display = open ? 'none' : 'block';
  if(short) short.style.display = open ? 'block' : 'none';
}
function shopMagicItems() { return SHOP_MAGIC[_shopMagicSub] || []; }
function shopSetMagicSub(s) { _shopMagicSub = s; shopRender(); }


function shopRender() {
  // Tabs
  const tabBar = document.getElementById('shop-tabs');
  tabBar.innerHTML = SHOP_TABS.map(t=>
    '<button onclick="shopSetTab(\''+t.id+'\')" style="flex:1;padding:8px 4px;background:'+(_shopTab===t.id?'#c8a020':'#141414')+';color:'+(_shopTab===t.id?'#1a1a1a':'#888')+';border:none;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:900;font-size:9px;letter-spacing:.08em;text-transform:uppercase;">'+t.label+'</button>'
  ).join('');

  // Magic subtabs
  const subBar = document.getElementById('shop-subtabs');
  if(_shopTab==='magic') {
    subBar.style.display = 'flex';
    subBar.innerHTML = SHOP_MAGIC_SUBS.map(s=>
      '<button onclick="shopSetMagicSub(\''+s.replace(/'/g,"\\'")+'\')" style="flex:1 0 auto;padding:5px 6px;background:'+(_shopMagicSub===s?'#3a3320':'#0f0f0f')+';color:'+(_shopMagicSub===s?'#c8a020':'#666')+';border:none;border-bottom:2px solid '+(_shopMagicSub===s?'#c8a020':'transparent')+';cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:8px;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;">'+s+'</button>'
    ).join('');
  } else {
    subBar.style.display = 'none';
    subBar.innerHTML = '';
  }

  // GP display
  const gp = document.getElementById('coin-gp')?.value || '0';
  const sp = document.getElementById('coin-sp')?.value || '0';
  const cp = document.getElementById('coin-cp')?.value || '0';
  document.getElementById('shop-coins').textContent = '💰 '+(gp||0)+' gp · '+(sp||0)+' sp · '+(cp||0)+' cp';

  // Items
  const items = _shopTab==='weapons' ? SHOP_WEAPONS
              : _shopTab==='armor'   ? SHOP_ARMOR
              : _shopTab==='basic'   ? SHOP_BASIC
              : shopMagicItems();

  // Class filter — only meaningful on the Weapons and Armor tabs
  const filterBar = document.getElementById('shop-classfilter');
  const cls = shopSheetClass();
  const filterable = (_shopTab==='weapons' || _shopTab==='armor') && !!cls;
  if(filterable) {
    const hidden = items.filter(it => !shopItemAllowed(_shopTab, it)).length;
    filterBar.style.display = 'flex';
    filterBar.innerHTML =
        '<label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#888;">'
      +   '<input type="checkbox" '+(_shopClassOnly?'checked':'')+' onchange="shopToggleClassOnly(this.checked)" style="accent-color:#c8a020;width:15px;height:15px;cursor:pointer;">'
      +   cls+' Only'
      + '</label>'
      + (_shopClassOnly && hidden ? '<span style="margin-left:auto;font-family:Montserrat,sans-serif;font-size:9px;color:#5a5a5a;">'+hidden+' hidden</span>' : '');
  } else {
    filterBar.style.display = 'none';
    filterBar.innerHTML = '';
  }

  // Keep each item's ORIGINAL index — Buy/Add look items up by position
  const shown = items
    .map((it, i) => ({ it, i }))
    .filter(({it}) => !(_shopClassOnly && filterable) || shopItemAllowed(_shopTab, it));

  const body = document.getElementById('shop-body');
  if(!shown.length) {
    body.innerHTML = '<div style="padding:20px 4px;text-align:center;font-family:Montserrat,sans-serif;font-size:10px;color:#666;line-height:1.6;">Nothing here a '+(cls||'character')+' can use.<br>Untick the box above to see everything.</div>';
    return;
  }
  body.innerHTML = shown.map(({it, i})=>{
    const cost = shopFmtCost(it);
    const canBuy = shopCostCp(it) > 0;
    const hasFull = !!it.full;
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1e1e1e;">'
      + '<div style="flex:1;min-width:0;'+(hasFull?'cursor:pointer;':'')+'" '+(hasFull?'onclick="toggleFullDesc(this)"':'')+'>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#eee;">'+it.name+(it.qty?' ('+it.qty+')':'')+'</div>'
      +   (it.note?'<div class="desc-short" style="font-family:Montserrat,sans-serif;font-size:9px;color:#888;line-height:1.3;">'+it.note+(hasFull?' <span style="color:#c8a020;">▸ more</span>':'')+'</div>':'')
      +   (hasFull?'<div class="desc-full" style="display:none;font-family:Montserrat,sans-serif;font-size:9px;color:#bbb;line-height:1.45;">'+it.full+' <span style="color:#c8a020;">▾ less</span></div>':'')
      + '</div>'
      + '<div style="font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;color:#c8a020;width:44px;text-align:right;flex-shrink:0;">'+cost+'</div>'
      + (canBuy
          ? '<button onclick="shopBuy(\''+_shopTab+'\','+i+')" style="padding:5px 10px;background:#1a2e3a;color:#6ac8df;border:1px solid #1a5a7a;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Buy</button>'
          : '<span style="width:44px;flex-shrink:0;"></span>')
      + '<button onclick="shopAdd(\''+_shopTab+'\','+i+')" style="padding:5px 10px;background:#241f10;color:#c8a020;border:1px solid #7a5a00;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Add</button>'
      + '</div>';
  }).join('');
}

function shopGetItem(tab, i) {
  const items = tab==='weapons' ? SHOP_WEAPONS : tab==='armor' ? SHOP_ARMOR : tab==='basic' ? SHOP_BASIC : shopMagicItems();
  return items[i];
}


// ── Gear slot cost (Shadowdark pg. 33-35) ──
// Bastard sword / greataxe / greatsword take 2 slots; chainmail 2, plate mail 3.
const GEAR_SLOT_COST = { 'Chainmail':2, 'Plate mail':3 };
function itemSlotCost(name) {
  const n = String(name||'').trim();
  if(!n) return 1;
  if(GEAR_SLOT_COST[n]) return GEAR_SLOT_COST[n];
  const w = (typeof SD_WEAPONS !== 'undefined') ? SD_WEAPONS.find(x=>x.name===n) : null;
  if(w) {
    const m = /(\d+)\s*slots?/i.exec(w.props||'');
    if(m) return parseInt(m[1]);
  }
  return 1;
}

function shopNextSlot() {
  const rows = document.querySelectorAll('#gear-list > div');
  for(let i=1;i<rows.length;i++){
    const row = rows[i];
    if(row.classList.contains('gear-slot-disabled')) continue;
    const nameEl = row.querySelector('.gear-name');
    if(nameEl && !nameEl.value.trim()) return row;
  }
  return null;
}

function shopAddToGear(it) {
  if(it.kit) {
    // Crawling kit: expand into items; Backpack to Free Carry if empty
    const kit = [{name:'Flint & Steel'},{name:'Torch',qty:'2'},{name:'Rations',qty:'3'},{name:'Iron Spikes',qty:'10'},{name:'Grappling Hook'},{name:'Rope (60 ft)'}];
    const fc = document.getElementById('free-carry');
    if(fc && !fc.value.trim()) fc.value = 'Backpack';
    else kit.unshift({name:'Backpack'});
    let placed = 0;
    for(const k of kit) {
      const row = shopNextSlot();
      if(!row) break;
      row.querySelector('.gear-name').value = k.name;
      const q = row.querySelector('.gear-qty');
      if(q) q.value = k.qty || '';
      placed++;
    }
    if(placed < kit.length) alert('Not enough free gear slots for the whole kit — added what fits.');
    return true;
  }
  const slotCost = itemSlotCost(it.name);
  const row = shopNextSlot();
  if(!row) { alert('No free gear slots available.'); return false; }
  row.querySelector('.gear-name').value = it.name;
  const q = row.querySelector('.gear-qty');
  if(q) q.value = it.qty || '';
  // Bulky items (2-slot weapons, chainmail, plate mail) occupy extra slots
  for(let s = 1; s < slotCost; s++) {
    const extra = shopNextSlot();
    if(!extra) { alert(it.name + ' needs ' + slotCost + ' gear slots — not enough room.'); break; }
    extra.querySelector('.gear-name').value = '↳ ' + it.name;
    const eq = extra.querySelector('.gear-qty');
    if(eq) eq.value = '';
  }
  return true;
}

function shopAdd(tab, i) {
  const it = shopGetItem(tab, i);
  if(!it) return;
  if(it.pick) { openSpellPick(it.pick); return; }
  if(shopAddToGear(it)) {
    if(tab==='weapons') shopAddAttack(it.name);
    saveSheet(false); closeShop();
  }
}

function shopBuy(tab, i) {
  const it = shopGetItem(tab, i);
  if(!it) return;
  const cost = shopCostCp(it);
  const gpEl = document.getElementById('coin-gp');
  const spEl = document.getElementById('coin-sp');
  const cpEl = document.getElementById('coin-cp');
  const total = (parseInt(gpEl?.value)||0)*100 + (parseInt(spEl?.value)||0)*10 + (parseInt(cpEl?.value)||0);
  if(total < cost) { alert('Not enough coin! '+it.name+' costs '+shopFmtCost(it)+'.'); return; }
  if(!shopAddToGear(it)) return;
  if(tab==='weapons') shopAddAttack(it.name);
  const left = total - cost;
  if(gpEl) gpEl.value = String(Math.floor(left/100));
  if(spEl) spEl.value = String(Math.floor((left%100)/10));
  if(cpEl) cpEl.value = String(left%10);
  addLog('Purchase','🛒',it.name+' — '+shopFmtCost(it),'normal');
  saveSheet(false);
  closeShop();
}

// ── Weapon purchases also become attack rows ──
function shopAddAttack(name) {
  const w = (typeof SD_WEAPONS!=='undefined' ? SD_WEAPONS : []).find(x=>x.name===name);
  if(!w || typeof addAttackRow!=='function') return;
  addAttackRow();
  const tbody = document.getElementById('attacks-body');
  const row = tbody ? tbody.lastElementChild : null;
  if(!row) return;
  const inputs = row.querySelectorAll('td input');
  const selects = row.querySelectorAll('td select');
  const isFinesse = (w.props||'').toLowerCase().includes('finesse');
  const useDex = (w.type==='R') || (isFinesse && getStatMod('dex') > getStatMod('str'));
  if(inputs[0]) inputs[0].value = w.name;
  if(inputs[1]) inputs[1].value = '';
  if(inputs[2]) inputs[2].value = w.damage;
  if(selects[0]) selects[0].value = useDex ? 'dex' : 'str';
  if(selects[1]) { const parts=(w.range||'').split('/'); selects[1].value = parts[parts.length-1].trim(); }

  // Thief: also add a Backstab row for this weapon
  const cls = document.getElementById('f-class')?.value.trim().toLowerCase();
  if(cls === 'thief') {
    // Match dice count to any existing Backstab rows (covers talent upgrades), default 2
    let bsDice = 2;
    document.querySelectorAll('#attacks-body tr').forEach(r=>{
      const nm = r.querySelectorAll('td input')[0]?.value || '';
      const dm = r.querySelectorAll('td input')[2]?.value || '';
      if(/^Backstab/i.test(nm)) {
        const m = dm.match(/(\d+)d/);
        if(m) bsDice = Math.max(bsDice, parseInt(m[1]));
      }
    });
    addAttackRow();
    const bsRow = tbody.lastElementChild;
    if(bsRow) {
      const bi = bsRow.querySelectorAll('td input');
      const bs = bsRow.querySelectorAll('td select');
      if(bi[0]) bi[0].value = 'Backstab ('+w.name+')';
      if(bi[2]) bi[2].value = w.damage.replace(/1d/g, bsDice+'d');
      if(bs[0]) bs[0].value = useDex ? 'dex' : 'str';
      if(bs[1]) { const parts=(w.range||'').split('/'); bs[1].value = parts[parts.length-1].trim(); }
    }
  }
}

// ── Spell pick for generic Scroll / Wand ──
let _spellPickKind = 'Scroll';
function openSpellPick(kind) {
  _spellPickKind = kind;
  document.getElementById('spellpick-title').textContent = 'Choose Spell for ' + (kind==='Scroll' ? 'Spell Scroll' : 'Magic Wand');
  const body = document.getElementById('spellpick-body');
  const spells = (typeof SD_SPELLS!=='undefined' ? SD_SPELLS : []).slice().sort((a,b)=> a.tier===b.tier ? a.name.localeCompare(b.name) : a.tier.localeCompare(b.tier));
  body.innerHTML = spells.map(s=>{
    const meta = ['T'+s.tier, s.caster, s.range?'Range: '+s.range:'', s.duration?'Dur: '+s.duration:'', s.damage?'Dmg: '+s.damage:''].filter(Boolean).join(' · ');
    const pFull = (typeof SD_SPELL_FULL!=='undefined' && SD_SPELL_FULL[s.name]) || '';
    return '<div style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid #1e1e1e;">'
      + '<div style="flex:1;min-width:0;'+(pFull?'cursor:pointer;':'')+'" '+(pFull?'onclick="toggleFullDesc(this)"':'')+'>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;color:#eee;">'+s.name+'</div>'
      +   '<div style="font-family:Montserrat,sans-serif;font-size:8px;color:#9a7ac8;line-height:1.3;">'+meta+'</div>'
      +   (s.desc?'<div class="desc-short" style="font-family:Montserrat,sans-serif;font-size:9px;color:#888;line-height:1.3;">'+s.desc+(pFull?' <span style="color:#b89ae0;">▸ more</span>':'')+'</div>':'')
      +   (pFull?'<div class="desc-full" style="display:none;font-family:Montserrat,sans-serif;font-size:9px;color:#bbb;line-height:1.45;">'+pFull+' <span style="color:#b89ae0;">▾ less</span></div>':'')
      + '</div>'
      + '<button onclick="spellPickChoose(\''+s.name.replace(/'/g,"\\'")+'\',\''+s.tier+'\')" style="padding:5px 10px;background:#2a1a3a;color:#b89ae0;border:1px solid #5a3a8a;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700;font-size:9px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;">Choose</button>'
      + '</div>';
  }).join('');
  document.getElementById('spellpick-overlay').style.display = 'flex';
}
function closeSpellPick() { document.getElementById('spellpick-overlay').style.display = 'none'; }
function spellPickChoose(name, tier) {
  const it = { name: _spellPickKind + ': ' + name };
  if(shopAddToGear(it)) {
    addLog('Item Added','🛒',it.name+' (T'+tier+')','normal');
    saveSheet(false);
  }
  closeSpellPick();
  closeShop();
}

</script>
